        if (pk.t > 54) { pk.kick++; pkAfterKick(); }
        break;

      // ===== まるりんが守る（クリウド＝キッカー）=====
      case "dready":
        moveCursor();
        if (pk.t > 48) { pk.kickerDir = Math.floor(Math.random() * 3); pk.sub = "dwind"; pk.t = 0; }
        break;
      case "dwind":
        moveCursor();
        if (pk.t > 20) {   // 予備動作を短く＝読む時間が少なく難しく
          pk.dive = pk.cursor;
          pk.sub = "dshot"; pk.t = 0;
          pk.ball.fly = true;
          pk.ball.sx = PKX.spotX; pk.ball.sy = PKX.spotY;
          pk.ball.tx = PKX.courseX[pk.kickerDir]; pk.ball.ty = PKX.courseY;
          sfx.jump();
        }
        break;
      case "dshot": {
        const dur = 24, k = Math.min(1, pk.t / dur);
        pk.ball.x = pk.ball.sx + (pk.ball.tx - pk.ball.sx) * k;
        pk.ball.y = pk.ball.sy + (pk.ball.ty - pk.ball.sy) * k - Math.sin(k * Math.PI) * 40;
        pk.diverT = Math.min(1, pk.t / 12);
        if (pk.t >= dur) {
          const saved = pk.dive === pk.kickerDir;
          pk.outcome = saved ? "save" : "goal";
          pk.foeRes.push(saved ? "save" : "goal");
          if (saved) { sfx.win(); score += 500; spawnParticles(pk.ball.tx, pk.ball.ty, "#7fd4ff", 16); }
          else { pk.foe++; sfx.stomp(); }
          pk.sub = "dres"; pk.t = 0;
        }
        break;
      }
      case "dres":
        if (pk.t > 54) { pk.kick++; pkAfterKick(); }
        break;

      // ===== 決着 =====
      case "win":
        if (pk.t === 2) playVoice("get");
        if (pk.t > 150) { pk = null; stageCleared(); }
        break;
      case "lose":
        if (pk.t === 2) { playVoice("sad"); stopBGM(); }
        if (pk.t > 130) {
          lives--;
          if (lives > 0) { setupPK(); startBGM(); }
          else { pk = null; state = "gameover"; }
        }
        break;
    }
  }

  // 次のステージへ（パワーアップ状態は引き継ぐ）
  function advanceStage() {
    const keepPowered = player.powered, keepSeed = player.seed, keepWing = player.wing;
    loadStage(stageIndex + 1);
    saveProgress(stageIndex);       // 新しいステージに到達したので記録
    buildLevel();
    if (keepPowered) setPowered(true);
    player.seed = keepSeed; player.wing = keepWing;
    stageBgm().currentTime = 0;
    startBGM();
    state = "play";
  }

  function updateParticles() {
    for (const pt of particles) {
      pt.x += pt.vx; pt.y += pt.vy; pt.vy += pt.coin ? 0.4 : 0.35; pt.life--;
    }
    particles = particles.filter(pt => pt.life > 0);
  }

  function resetGameAt(startIndex) {
    lives = 3; score = 0; coinsGot = 0;
    inBoss = false; bosses = []; cukes = []; pk = null;
    loadStage(startIndex || 0);
    saveProgress(stageIndex);       // 今いるステージを記録
    buildLevel();
    stageBgm().currentTime = 0;
    startBGM();
    state = "play";
  }
  function resetGame() { resetGameAt(0); }

  // ---------- 描画 ----------
  function draw() {
    if (state === "boss" && pk) { drawPK(); return; }   // ポルトガル：PK戦は専用画面
    if (inBoss && STAGES[stageIndex].boss === "penguins") {
      // 駅構内（ボス戦）：やわらかい室内色
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#e2e9ef");
      g.addColorStop(1, "#eef2f6");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    } else if (inBoss && STAGES[stageIndex].boss === "sumo") {
      // 相撲場の館内（ボス戦）：あたたかい木の色
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#f0e2c6");
      g.addColorStop(1, "#f6ecd6");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    } else if (inBoss && STAGES[stageIndex].boss === "mega") {
      // メガロドン戦：船の上（どんよりした海の空）
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#3f6076");
      g.addColorStop(0.5, "#5f8ea6");
      g.addColorStop(1, "#83b3c8");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      drawClouds();
    } else if (inBoss && STAGES[stageIndex].boss === "zagat") {
      // ザガット戦：青空の遺跡（寝釈迦仏のある広場）
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#4aa8e0");
      g.addColorStop(0.6, "#addcf0");
      g.addColorStop(1, "#e7f5fb");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      drawClouds();
    } else if (theme === "thailand") {
      // タイランド：あたたかい南国の空
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#f0a94e");
      g.addColorStop(0.5, "#f6cf86");
      g.addColorStop(1, "#fdf0cf");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      drawClouds();
    } else if (theme === "portugal") {
      // ポルトガル：さわやかな海辺の青空
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#4aa6e4");
      g.addColorStop(0.55, "#a6d8f2");
      g.addColorStop(1, "#eaf6fc");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      drawClouds();
    } else if (theme === "hawaii") {
      // 前半＝ビーチの空／後半＝海の中（カメラ位置でクロスフェード）
      const t = Math.max(0, Math.min(1, (camX + W/2 - 2720) / 620));
      let g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#4fb4ea");
      g.addColorStop(0.6, "#a9e0f5");
      g.addColorStop(1, "#eaf6fb");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      if (t < 0.92) drawClouds();
      if (t > 0) {
        ctx.save(); ctx.globalAlpha = t;
        const u = ctx.createLinearGradient(0, 0, 0, H);
        u.addColorStop(0, "#1a86b8");
        u.addColorStop(0.55, "#137aa8");
        u.addColorStop(1, "#0c5a82");
        ctx.fillStyle = u; ctx.fillRect(0, 0, W, H);
        // 光のすじ
        ctx.fillStyle = "rgba(200,240,255,0.12)";
        for (let i = 0; i < 4; i++) {
          const rx = 120 + i * 190 - (camX * 0.2) % 190;
          ctx.beginPath(); ctx.moveTo(rx, 0); ctx.lineTo(rx + 30, 0); ctx.lineTo(rx + 80, H); ctx.lineTo(rx + 50, H); ctx.closePath(); ctx.fill();
        }
        ctx.restore();
      }
    } else if (theme === "town") {
      // 街の空（少しやわらかい水色）
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#9fd8f2");
      g.addColorStop(0.55, "#cdeaf6");
      g.addColorStop(1, "#eef7fb");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      drawClouds();
      drawSkyline();
    } else if (theme === "narita") {
      // 成田：やわらかい青空＋緑の木立
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#8fcdf0");
      g.addColorStop(0.55, "#c6e7f4");
      g.addColorStop(1, "#eaf6ef");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      drawClouds();
      drawHills();
    } else {
      // 空グラデーション（くさはら）
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#8fd3ff");
      g.addColorStop(0.6, "#bfe9ff");
      g.addColorStop(1, "#e8f8ff");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      drawClouds();
      drawHills();
    }

    ctx.save();
    ctx.translate(-Math.round(camX), 0);

    if (inBoss) drawBossBackdrop();
    else if (theme === "town") drawTownDecor();
    else if (theme === "narita") drawNaritaDecor();
    else if (theme === "hawaii") drawHawaiiDecor();
    else if (theme === "thailand") drawThaiDecor();
    else if (theme === "portugal") drawPortugalDecor();
    drawSolids();
    drawCoins();
    drawNuts();
    drawFlowers();
    drawFeathers();
    drawBubbles();
    drawBreads();
    if (goal) drawGoal(goal);
    drawSeeds();
    drawEnemies();
    drawBalls();
    drawBarrels();
    if (bosses.length) drawBosses();
    drawCukes();
    drawHazards();
    drawParticles();
    if (state !== "gameover") drawPlayer();

    ctx.restore();

    drawHUD();

    if (state === "pause")      drawCenterText("ポーズ中", "Pキーで再開");
    if (state === "gameover")   drawGameOver();
    if (state === "clear")      drawClear();
    if (state === "stageclear") drawStageClear();
  }

  function drawClouds() {
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    const cs = [[120,70,40],[360,110,55],[620,60,46],[520,150,38],[730,120,50]];
    for (const [bx,by,r] of cs) {
      const x = (bx - camX*0.3) % (W+300);
      const px = x < -150 ? x + W + 300 : x;
      cloud(px, by, r);
    }
  }
  function cloud(x, y, r) {
    ctx.beginPath();
    ctx.arc(x, y, r*0.6, 0, 7); ctx.arc(x+r*0.6, y+6, r*0.5, 0, 7);
    ctx.arc(x-r*0.6, y+8, r*0.45, 0, 7); ctx.arc(x+r*0.2, y-r*0.3, r*0.5, 0, 7);
    ctx.fill();
  }
  function drawHills() {
    ctx.fillStyle = "#7ec850";
    for (let i = -1; i < 8; i++) {
      const x = i*220 - (camX*0.5) % 220;
      ctx.beginPath();
      ctx.ellipse(x+110, H-60, 150, 90, 0, Math.PI, 0);
      ctx.fill();
    }
  }

  // ===== ステージ2：南流山の街 =====
  const GROUND_Y = 360; // 地面の上端

  // 遠くのビル群（パララックス）
  function drawSkyline() {
    const cols = ["#b9c6d6", "#c7d3e0", "#aeb9c9"];
    for (let i = -1; i < 12; i++) {
      const bw = 92;
      let x = i*140 - (camX*0.4) % 140;
      const h = 90 + ((i*53) % 60 + 60) % 60;
      ctx.fillStyle = cols[((i%3)+3)%3];
      ctx.fillRect(x, GROUND_Y - h, bw, h);
      ctx.fillStyle = "rgba(255,255,255,0.35)";
      for (let wy = GROUND_Y - h + 12; wy < GROUND_Y - 10; wy += 18)
        for (let wx = x + 8; wx < x + bw - 10; wx += 18)
          ctx.fillRect(wx, wy, 8, 10);
    }
  }

  // 看板付きの建物（ヤオコー・コーナンなど）
  function signBuilding(x, w, h, wall, roof, label, bg, fg) {
    const top = GROUND_Y - h;
    ctx.fillStyle = wall; ctx.fillRect(x, top, w, h);
    ctx.fillStyle = roof; ctx.fillRect(x, top, w, 12);
    // 入口
    ctx.fillStyle = "rgba(120,150,180,0.55)";
    ctx.fillRect(x + w/2 - 26, GROUND_Y - 52, 52, 52);
    // 窓
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    for (let wy = top + 22; wy < GROUND_Y - 60; wy += 24)
      for (let wx = x + 12; wx < x + w - 16; wx += 26)
        ctx.fillRect(wx, wy, 16, 16);
    // 看板
    ctx.font = "bold 17px 'Segoe UI', sans-serif";
    const sw = Math.max(80, ctx.measureText(label).width + 28);
    const sx = x + (w - sw)/2, sy = top - 32;
    ctx.fillStyle = bg; ctx.fillRect(sx, sy, sw, 28);
    ctx.strokeStyle = "rgba(0,0,0,0.15)"; ctx.strokeRect(sx + 0.5, sy + 0.5, sw - 1, 27);
    ctx.fillStyle = fg; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(label, x + w/2, sy + 14);
  }

  function sevenEleven(x) {
    const w = 200, h = 138, top = GROUND_Y - h;
    ctx.fillStyle = "#f4f4f4"; ctx.fillRect(x, top, w, h);
    ctx.fillStyle = "rgba(150,190,210,0.6)"; ctx.fillRect(x + 14, GROUND_Y - 72, w - 28, 72);
    // 看板（白地・オレンジ/緑/赤の帯）
    const sw = 184, sx = x + (w - sw)/2, sy = top - 36, sh = 32;
    ctx.fillStyle = "#fff"; ctx.fillRect(sx, sy, sw, sh);
    ctx.fillStyle = "#e7541f"; ctx.fillRect(sx, sy, sw, 5);
    ctx.fillStyle = "#159a4a"; ctx.fillRect(sx, sy + sh - 10, sw, 5);
    ctx.fillStyle = "#d3202a"; ctx.fillRect(sx, sy + sh - 5, sw, 5);
    ctx.font = "bold 17px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillStyle = "#e7541f"; ctx.fillText("7", sx + 24, sy + 15);
    ctx.fillStyle = "#159a4a"; ctx.fillText("ELEVEN", sx + sw/2 + 12, sy + 15);
  }

  function bus(x, baseY) {
    ctx.fillStyle = "#4a9d5b"; ctx.fillRect(x, baseY - 34, 78, 34);
    ctx.fillStyle = "#dff0e2";
    ctx.fillRect(x + 6, baseY - 26, 60, 12);
    ctx.fillStyle = "#2b2b2b";
    ctx.beginPath(); ctx.arc(x + 18, baseY, 7, 0, 7); ctx.arc(x + 60, baseY, 7, 0, 7); ctx.fill();
  }
  function taxi(x, baseY) {
    ctx.fillStyle = "#f2c200"; ctx.fillRect(x, baseY - 24, 62, 24);
    ctx.fillStyle = "#f2c200"; ctx.fillRect(x + 12, baseY - 36, 38, 14);
    ctx.fillStyle = "#bfe0f0"; ctx.fillRect(x + 15, baseY - 33, 32, 10);
    ctx.fillStyle = "#333"; ctx.fillRect(x + 22, baseY - 40, 18, 5); // 行灯
    ctx.fillStyle = "#2b2b2b";
    ctx.beginPath(); ctx.arc(x + 15, baseY, 6, 0, 7); ctx.arc(x + 48, baseY, 6, 0, 7); ctx.fill();
  }
  function rotary(x) {
    // 舗装
    ctx.fillStyle = "#c9cdd3"; ctx.fillRect(x - 10, GROUND_Y - 6, 330, 6);
    // 案内サイン
    ctx.fillStyle = "#1c66b0"; ctx.fillRect(x + 60, GROUND_Y - 120, 8, 120);
    ctx.fillStyle = "#1c66b0"; ctx.fillRect(x + 18, GROUND_Y - 126, 132, 28);
    ctx.fillStyle = "#fff"; ctx.font = "bold 14px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("駅前ロータリー", x + 84, GROUND_Y - 112);
    bus(x + 20, GROUND_Y - 6);
    taxi(x + 230, GROUND_Y - 6);
  }

  // つくばエクスプレスの電車
  function txTrain(x) {
    const w = 250, top = GROUND_Y - 88;
    ctx.fillStyle = "#d7dbe0"; ctx.fillRect(x - 10, GROUND_Y - 12, w + 20, 12); // ホーム
    ctx.fillStyle = "#f5f6f8"; ctx.fillRect(x, top, w, 76);
    ctx.strokeStyle = "#c2c7cd"; ctx.strokeRect(x + 0.5, top + 0.5, w - 1, 75);
    ctx.fillStyle = "#e11f2e"; ctx.fillRect(x, top + 42, w, 8);  // 赤帯
    ctx.fillStyle = "#1b62c4"; ctx.fillRect(x, top + 50, w, 4);  // 青帯
    ctx.fillStyle = "#2b3a4a";
    for (let i = 0; i < 5; i++) ctx.fillRect(x + 16 + i*46, top + 14, 34, 20); // 窓
    ctx.fillStyle = "#c9d2da"; ctx.fillRect(x + w/2 - 12, top + 12, 24, 60);   // ドア
    ctx.fillStyle = "#e11f2e"; ctx.font = "bold 15px 'Segoe UI', sans-serif"; ctx.textAlign = "left"; ctx.textBaseline = "middle";
    ctx.fillText("TX", x + 10, top + 63);
    ctx.fillStyle = "#444"; ctx.font = "11px 'Segoe UI', sans-serif";
    ctx.fillText("つくばエクスプレス", x + 36, top + 64);
  }

  // 駅名標「南流山」
  function stationSign(x) {
    const w = 186, h = 56, top = GROUND_Y - 150;
    ctx.fillStyle = "#8a9099"; ctx.fillRect(x + 20, top + h, 6, GROUND_Y - (top + h));
    ctx.fillStyle = "#8a9099"; ctx.fillRect(x + w - 26, top + h, 6, GROUND_Y - (top + h));
    ctx.fillStyle = "#fff"; ctx.fillRect(x, top, w, h);
    ctx.strokeStyle = "#333"; ctx.strokeRect(x + 0.5, top + 0.5, w - 1, h - 1);
    ctx.fillStyle = "#e11f2e"; ctx.fillRect(x, top, w, 8); // TXライン色
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillStyle = "#111"; ctx.font = "bold 21px 'Segoe UI', sans-serif";
    ctx.fillText("南流山", x + w/2, top + 28);
    ctx.fillStyle = "#444"; ctx.font = "11px 'Segoe UI', sans-serif";
    ctx.fillText("Minami-nagareyama", x + w/2, top + 46);
    ctx.fillStyle = "#666"; ctx.font = "10px sans-serif";
    ctx.textAlign = "left";  ctx.fillText("← 流山セントラルパーク", x + 4, top + h + 11);
    ctx.textAlign = "right"; ctx.fillText("三郷中央 →", x + w - 4, top + h + 11);
  }

  function drawTownDecor() {
    const Lc = camX - 360, R = camX + W + 80;
    const put = (x, fn) => { if (x > Lc && x < R) fn(); };
    put(700,  () => sevenEleven(700));
    put(1800, () => signBuilding(1800, 220, 150, "#f2f2f2", "#e0342f", "ヤオコー", "#e0342f", "#fff"));
    put(2700, () => signBuilding(2700, 230, 160, "#eef0f2", "#f07a1a", "コーナン", "#f07a1a", "#fff"));
    put(3700, () => rotary(3700));
    put(4600, () => txTrain(4600));
    put(5300, () => stationSign(5300));
  }

  // ===== ひまわり（たねまるりんアイテム）=====
  function drawFlowers() {
    for (const f of flowers) {
      if (f.got) continue;
      if (f.x + f.w < camX - 40 || f.x > camX + W + 40) continue;
      f.t += 0.08;
      const cx = f.x + f.w/2, cy = f.y + f.h/2 + Math.sin(f.t)*3;
      ctx.save();
      ctx.globalAlpha = 0.5 + Math.abs(Math.sin(f.t))*0.3;
      ctx.fillStyle = "#fff6c0";
      ctx.beginPath(); ctx.arc(cx, cy, f.w/2 + 2, 0, 7); ctx.fill();
      ctx.restore();
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(Math.sin(f.t*0.5)*0.12);
      ctx.fillStyle = "#ffcf33";
      for (let i = 0; i < 10; i++) {
        ctx.save(); ctx.rotate(i*Math.PI/5);
        ctx.beginPath(); ctx.ellipse(0, -13, 4, 8, 0, 0, 7); ctx.fill();
        ctx.restore();
      }
      ctx.fillStyle = "#7a4a20"; ctx.beginPath(); ctx.arc(0, 0, 8, 0, 7); ctx.fill();
      ctx.fillStyle = "#5a3414";
      for (let i = 0; i < 6; i++) { const a = i*1.05; ctx.beginPath(); ctx.arc(Math.cos(a)*3, Math.sin(a)*3, 1.3, 0, 7); ctx.fill(); }
      ctx.restore();
    }
  }

  // ===== 種の飛び道具 =====
  function drawSeeds() {
    for (const sd of seeds) {
      ctx.save();
      ctx.translate(sd.x, sd.y);
      ctx.rotate(sd.t * 0.5);
      ctx.fillStyle = "#3a2b1a";
      ctx.beginPath(); ctx.ellipse(0, 0, 4.5, 6.5, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#d9c9a0";
      ctx.beginPath(); ctx.ellipse(-1, -1, 1.6, 3, 0, 0, 7); ctx.fill();
      ctx.restore();
    }
  }

  function drawSolids() {
    for (const s of solids) {
      if (s.x + s.w < camX - 40 || s.x > camX + W + 40) continue;
      if (s.type === "ground" && inBoss && STAGES[stageIndex].boss === "mega") {
        // メガロドン戦：地面は木のいかだ（デッキ）
        const topEdge = !isSolidAt(s.x, s.y - TILE);
        ctx.fillStyle = "#8a5e34"; ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.fillStyle = "#7a4f2b";
        for (let py = s.y + 4; py < s.y + s.h; py += 12) ctx.fillRect(s.x, py, s.w, 2);   // 板の目
        ctx.strokeStyle = "rgba(60,40,20,0.35)"; ctx.lineWidth = 1;
        ctx.strokeRect(s.x + 0.5, s.y + 0.5, s.w - 1, s.h - 1);
        if (topEdge) { ctx.fillStyle = "#a5794a"; ctx.fillRect(s.x, s.y, s.w, 5); }
      } else if (s.type === "ground" && inBoss && STAGES[stageIndex].boss === "zagat") {
        // ザガット戦：石畳の広場
        ctx.fillStyle = "#cfccc4"; ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.strokeStyle = "rgba(120,115,105,0.5)"; ctx.lineWidth = 1;
        ctx.strokeRect(s.x + 0.5, s.y + 0.5, s.w - 1, s.h - 1);          // 目地
        ctx.fillStyle = "#c3c0b7";
        for (let i=0;i<2;i++) for(let j=0;j<2;j++) ctx.fillRect(s.x+8+i*18, s.y+12+j*14, 8, 5);
        if (!isSolidAt(s.x, s.y - TILE)) { ctx.fillStyle = "#dedbd3"; ctx.fillRect(s.x, s.y, s.w, 5); }
      } else if (s.type === "ground" && theme === "thailand") {
        // タイランド：赤茶けた大地
        ctx.fillStyle = "#a3623a"; ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.fillStyle = "#93552f";
        for (let i=0;i<3;i++) for(let j=0;j<3;j++) ctx.fillRect(s.x+4+i*13, s.y+13+j*10, 7, 5);
        if (!isSolidAt(s.x, s.y - TILE)) {
          ctx.fillStyle = "#6faf3f"; ctx.fillRect(s.x, s.y, s.w, 8);      // 草
          ctx.fillStyle = "#82c74f"; ctx.fillRect(s.x, s.y, s.w, 4);
        }
      } else if (s.type === "ground" && theme === "portugal") {
        // ポルトガル：白い石畳＋青いアズレージョのふち
        ctx.fillStyle = "#e7e2d6"; ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.strokeStyle = "rgba(150,140,120,0.45)"; ctx.lineWidth = 1;
        ctx.strokeRect(s.x + 0.5, s.y + 0.5, s.w - 1, s.h - 1);
        ctx.fillStyle = "#d8d2c2";
        for (let i = 0; i < 2; i++) for (let j = 0; j < 2; j++) ctx.fillRect(s.x + 8 + i*18, s.y + 12 + j*14, 9, 6);
        if (!isSolidAt(s.x, s.y - TILE)) {
          ctx.fillStyle = "#2f6fb0"; ctx.fillRect(s.x, s.y, s.w, 6);       // 青タイルのふち
          ctx.fillStyle = "#5b9bd8";
          for (let bx = s.x + 3; bx < s.x + s.w - 3; bx += 12) ctx.fillRect(bx, s.y + 1, 6, 4);
        }
      } else if (s.type === "ground" && theme === "hawaii") {
        // ハワイ：砂浜／海底の砂
        const underwater = s.x + s.w/2 > 3000;
        ctx.fillStyle = underwater ? "#d8c48c" : "#e8d49c";
        ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.fillStyle = underwater ? "#cbb87f" : "#dcc88c";           // 砂つぶ
        for (let i=0;i<3;i++) for(let j=0;j<3;j++) ctx.fillRect(s.x+4+i*13, s.y+13+j*10, 6, 4);
        if (!isSolidAt(s.x, s.y - TILE)) {
          ctx.fillStyle = underwater ? "#e4d4a2" : "#f3e6bd"; ctx.fillRect(s.x, s.y, s.w, 6);
        }
      } else if (s.type === "ground") {
        // 土＋草
        ctx.fillStyle = "#7a4a24";
        ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.fillStyle = "#8a5a2c";
        for (let i=0;i<3;i++) for(let j=0;j<3;j++){
          ctx.fillRect(s.x+3+i*13, s.y+13+j*10, 8, 6);
        }
        if (!isSolidAt(s.x, s.y - TILE)) {
          ctx.fillStyle = "#57b83a"; ctx.fillRect(s.x, s.y, s.w, 10);
          ctx.fillStyle = "#66cc44"; ctx.fillRect(s.x, s.y, s.w, 5);
        }
      } else if (s.type === "brick") {
        ctx.fillStyle = "#b5651d"; ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.fillStyle = "#8a4a12";
        ctx.fillRect(s.x, s.y+TILE/2-1, s.w, 2);
        ctx.fillRect(s.x+TILE/2-1, s.y, 2, TILE/2);
        ctx.fillRect(s.x+TILE/4-1, s.y+TILE/2, 2, TILE/2);
        ctx.fillRect(s.x+3*TILE/4-1, s.y+TILE/2, 2, TILE/2);
        ctx.strokeStyle = "rgba(0,0,0,.15)"; ctx.strokeRect(s.x+0.5, s.y+0.5, s.w-1, s.h-1);
      } else if (s.type === "question") {
        const t = Math.sin(elapsed*0.12)*2;
        ctx.fillStyle = "#e8a92a"; ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.fillStyle = "#f7c948"; ctx.fillRect(s.x+3, s.y+3, s.w-6, s.h-6);
        ctx.fillStyle = "#7a5a12";
        ctx.font = "bold 24px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.fillText("?", s.x+TILE/2, s.y+TILE/2 + t*0.5);
        // 角の鋲
        ctx.fillStyle="#7a5a12";
        [[6,6],[TILE-8,6],[6,TILE-8],[TILE-8,TILE-8]].forEach(([dx,dy])=>ctx.fillRect(s.x+dx,s.y+dy,3,3));
      }
    }
  }
  function isSolidAt(x, y) {
    for (const s of solids) if (x >= s.x && x < s.x+s.w && y >= s.y && y < s.y+s.h) return true;
    return false;
  }

  function drawCoins() {
    for (const c of coins) {
      if (c.got) continue;
      c.t += 0.1;
      const wob = Math.abs(Math.cos(c.t)) ;
      const cx = c.x + c.w/2, cy = c.y + c.h/2;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(0.3 + 0.7*wob, 1);
      ctx.fillStyle = "#ffcf33";
      ctx.beginPath(); ctx.arc(0,0,c.w/2,0,7); ctx.fill();
      ctx.fillStyle = "#ffe58a";
      ctx.beginPath(); ctx.arc(0,0,c.w/2-4,0,7); ctx.fill();
      ctx.strokeStyle = "#e0a800"; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(0,0,c.w/2-2,0,7); ctx.stroke();
      ctx.restore();
    }
  }

  function drawNuts() {
    for (const n of nuts) {
      if (n.got) continue;
      if (n.x + n.w < camX - 40 || n.x > camX + W + 40) continue;
      n.t += 0.08;
      const cx = n.x + n.w/2, cy = n.y + n.h/2 + Math.sin(n.t)*3;
      // きらめき台座
      ctx.save();
      ctx.globalAlpha = 0.5 + Math.abs(Math.sin(n.t))*0.3;
      ctx.fillStyle = "#fff6c0";
      ctx.beginPath(); ctx.arc(cx, cy, n.w/2 + 3, 0, 7); ctx.fill();
      ctx.restore();
      // どんぐり（ナッツ）本体
      ctx.save();
      ctx.translate(cx, cy);
      // 実
      ctx.fillStyle = "#d69a52";
      ctx.beginPath(); ctx.ellipse(0, 3, 9, 11, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#e8b370";
      ctx.beginPath(); ctx.ellipse(-2, 2, 5, 7, 0, 0, 7); ctx.fill();
      // 帽子
      ctx.fillStyle = "#8a5a2c";
      ctx.beginPath(); ctx.ellipse(0, -6, 10, 5, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#6f4620";
      ctx.beginPath(); ctx.arc(0, -10, 2, 0, 7); ctx.fill();
      ctx.fillRect(-1.2, -13, 2.4, 4);
      // 帽子の網目
      ctx.strokeStyle = "#6f4620"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(-8,-6); ctx.lineTo(8,-6);
      ctx.moveTo(-6,-4); ctx.lineTo(6,-4); ctx.stroke();
      ctx.restore();
    }
  }

  function drawGoal(gl) {
    if (theme === "town") { drawGate(gl); return; }
    if (theme === "narita") { drawAirport(gl); return; }
    if (theme === "hawaii") { drawHawaiiGoal(gl); return; }
    if (theme === "portugal") { drawStadiumGoal(gl); return; }
    const x = gl.x;
    // ポール
    ctx.fillStyle = "#cfcfcf"; ctx.fillRect(x-3, gl.top, 6, TILE*6);
    ctx.fillStyle = "#ffd34d";
    ctx.beginPath(); ctx.arc(x, gl.top, 8, 0, 7); ctx.fill();
    // 旗
    const wave = Math.sin(elapsed*0.15)*4;
    ctx.fillStyle = "#e94560";
    ctx.beginPath();
    ctx.moveTo(x+3, gl.top+8);
    ctx.lineTo(x+52+wave, gl.top+22);
    ctx.lineTo(x+3, gl.top+36);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle="#fff"; ctx.font="bold 16px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("G", x+22, gl.top+22);
    // 台座
    ctx.fillStyle="#5a8f3a";
    ctx.fillRect(x-TILE, gl.top+TILE*6, TILE*2, TILE);
  }

  // ゴール：サッカースタジアム（ポルトガル）
  function drawStadiumGoal(gl) {
    const x = gl.x, gy = GROUND_Y;
    // 照明塔（左右）
    for (const sx of [x - 60, x + 150]) {
      ctx.fillStyle = "#8a9099"; ctx.fillRect(sx, gy - 210, 6, 210);
      ctx.fillStyle = "#cfd6dc"; ctx.fillRect(sx - 20, gy - 226, 46, 20);
      ctx.fillStyle = "#fff7cc";
      for (let i = 0; i < 3; i++) for (let j = 0; j < 2; j++) ctx.fillRect(sx - 16 + i*14, gy - 223 + j*9, 10, 6);
    }
    // スタンド本体（すり鉢状）
    ctx.fillStyle = "#d7dde2";
    ctx.beginPath();
    ctx.moveTo(x - 70, gy); ctx.lineTo(x - 48, gy - 150); ctx.lineTo(x + 138, gy - 150); ctx.lineTo(x + 160, gy);
    ctx.closePath(); ctx.fill();
    // 観客席の段＋観客
    ctx.fillStyle = "#c2cad0";
    for (let i = 0; i < 4; i++) ctx.fillRect(x - 46 + i*3, gy - 140 + i*30, 182 - i*6, 12);
    ctx.fillStyle = "#8a97a2";
    for (let r = 0; r < 4; r++) for (let c = 0; c < 22; c++) { ctx.beginPath(); ctx.arc(x - 38 + c*8, gy - 132 + r*30, 2, 0, 7); ctx.fill(); }
    // 屋根の帯（青）
    ctx.fillStyle = "#2f6fb0"; ctx.fillRect(x - 50, gy - 152, 190, 8);
    // 入口アーチ（暗い開口）＝まるりんが入る所
    ctx.fillStyle = "#20303a"; roundRectPath(x - 18, gy - 86, 76, 86, 10); ctx.fill();
    ctx.fillStyle = "#2b4150"; roundRectPath(x - 10, gy - 78, 60, 78, 8); ctx.fill();
    // 入口の看板
    ctx.fillStyle = "#0a6b3b"; roundRectPath(x - 28, gy - 118, 96, 26, 6); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.font = "bold 15px 'Segoe UI',sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("STADIUM", x + 20, gy - 105);
    // サッカーボールのエンブレム
    const bx = x + 20, by = gy - 140;
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(bx, by, 11, 0, 7); ctx.fill();
    ctx.strokeStyle = "#c9ccd2"; ctx.lineWidth = 1.2; ctx.beginPath(); ctx.arc(bx, by, 11, 0, 7); ctx.stroke();
    ctx.fillStyle = "#20242c"; pentagon(bx, by, 4.6);
    // ポルトガル国旗（屋根に）
    ctx.fillStyle = "#0a6b3b"; ctx.fillRect(x + 116, gy - 180, 15, 11);
    ctx.fillStyle = "#d21e2b"; ctx.fillRect(x + 131, gy - 180, 17, 11);
    ctx.fillStyle = "#f5d20c"; ctx.beginPath(); ctx.arc(x + 131, gy - 174.5, 3, 0, 7); ctx.fill();
    ctx.strokeStyle = "#8a9099"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(x + 116, gy - 180); ctx.lineTo(x + 116, gy - 152); ctx.stroke();
    // ゴール案内の矢印
    ctx.fillStyle = "#ffd34d"; ctx.font = "bold 13px 'Segoe UI',sans-serif"; ctx.textAlign = "center";
    ctx.fillText("GOAL", x + 20, gy - 20);
  }

  // ゴール：南流山駅の改札
  function drawGate(gl) {
    const x = gl.x;
    // 駅舎の壁
    ctx.fillStyle = "#ece6d8"; ctx.fillRect(x - 44, gl.top + 42, 190, GROUND_Y - (gl.top + 42));
    // 屋根・駅名看板
    ctx.fillStyle = "#3777bd"; ctx.fillRect(x - 54, gl.top + 14, 210, 36);
    ctx.fillStyle = "#fff"; ctx.font = "bold 19px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("南流山駅", x + 50, gl.top + 32);
    // 「改札口→」表示
    const chY = GROUND_Y - 74;
    ctx.fillStyle = "#2f7d32"; ctx.fillRect(x - 16, chY - 28, 104, 22);
    ctx.fillStyle = "#fff"; ctx.font = "bold 14px 'Segoe UI', sans-serif";
    ctx.fillText("改札口 →", x + 36, chY - 17);
    // 改札機 2台
    for (let i = 0; i < 2; i++) {
      const gx = x - 6 + i*72;
      ctx.fillStyle = "#dfe3e6"; ctx.fillRect(gx, chY, 28, 74);
      ctx.fillStyle = "#f2c200"; ctx.fillRect(gx, chY, 28, 10);       // 黄色い天面
      ctx.fillStyle = "#33aa55"; ctx.fillRect(gx + 5, chY + 20, 18, 9); // 通れる緑ランプ
      ctx.fillStyle = "#2b6cb0"; ctx.fillRect(gx + 6, chY + 36, 16, 22); // 読み取り部
    }
  }

  // ===== ステージ3：成田 =====
  function drawNaritaDecor() {
    const Lc = camX - 460, R = camX + W + 80;
    const put = (x, fn) => { if (x > Lc && x < R) fn(); };
    put(300,  () => naritaStation(300));
    put(1700, () => pagoda(1700));
    put(3100, () => signBuilding(3100, 240, 150, "#f4eef4", "#e5007e", "イオン成田", "#e5007e", "#fff"));
    put(4500, () => airportRoadSign(4500));
  }

  // 成田駅
  function naritaStation(x) {
    const w = 210, h = 132, top = GROUND_Y - h;
    ctx.fillStyle = "#e8ddc8"; ctx.fillRect(x, top, w, h);            // 壁
    ctx.fillStyle = "#7a5230"; ctx.fillRect(x - 6, top - 14, w + 12, 18); // 屋根
    ctx.fillStyle = "rgba(120,140,160,0.5)"; ctx.fillRect(x + w/2 - 34, GROUND_Y - 60, 68, 60); // 入口
    ctx.fillStyle = "rgba(255,255,255,0.55)";
    for (let wy = top + 20; wy < GROUND_Y - 66; wy += 24)
      for (let wx = x + 14; wx < x + w - 18; wx += 30)
        ctx.fillRect(wx, wy, 20, 16);
    const sw = 128, sx = x + (w - sw)/2, sy = top - 46;
    ctx.fillStyle = "#0a5c3a"; ctx.fillRect(sx, sy, sw, 30);          // 駅名看板（JR系グリーン）
    ctx.fillStyle = "#fff"; ctx.font = "bold 19px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("成田駅", x + w/2, sy + 15);
  }

  // 成田山 三重塔（朱塗り）
  function pagoda(x) {
    const cx = x + 60, baseY = GROUND_Y;
    ctx.fillStyle = "#cfc4a8"; ctx.fillRect(x + 22, baseY - 12, 76, 12); // 基壇
    const tiers = [
      { roofW: 96, bodyW: 36, bodyTop: baseY - 60, bodyH: 48 }, // 下層
      { roofW: 78, bodyW: 30, bodyTop: baseY - 104, bodyH: 44 }, // 中層
      { roofW: 62, bodyW: 24, bodyTop: baseY - 146, bodyH: 42 }  // 上層
    ];
    for (let i = 2; i >= 0; i--) {  // 上から描いて下の屋根を手前に
      const t = tiers[i], ry = t.bodyTop;
      ctx.fillStyle = "#c0392b"; ctx.fillRect(cx - t.bodyW/2, t.bodyTop, t.bodyW, t.bodyH); // 胴
      ctx.fillStyle = "#9e2f24"; ctx.fillRect(cx - t.bodyW/2, t.bodyTop, 4, t.bodyH);        // 柱の陰
      ctx.fillStyle = "#7a2f25";                                                              // 屋根
      ctx.beginPath();
      ctx.moveTo(cx - t.roofW/2, ry + 10);
      ctx.quadraticCurveTo(cx - t.roofW/2 - 4, ry - 4, cx - t.roofW/2 + 10, ry - 6);
      ctx.lineTo(cx + t.roofW/2 - 10, ry - 6);
      ctx.quadraticCurveTo(cx + t.roofW/2 + 4, ry - 4, cx + t.roofW/2, ry + 10);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#efe6cf"; ctx.fillRect(cx - t.roofW/2 + 6, ry + 7, t.roofW - 12, 3);  // 軒先の白
    }
    const topY = tiers[2].bodyTop;                 // 相輪（金）
    ctx.strokeStyle = "#d4af37"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(cx, topY - 6); ctx.lineTo(cx, topY - 30); ctx.stroke();
    ctx.fillStyle = "#d4af37"; ctx.beginPath(); ctx.arc(cx, topY - 32, 3, 0, 7); ctx.fill();
    ctx.fillStyle = "#5b3a1a"; ctx.fillRect(x + 32, baseY - 13, 56, 15);   // 立て札
    ctx.fillStyle = "#fff"; ctx.font = "9px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("成田山 三重塔", x + 60, baseY - 6);
  }

  // 「成田空港 →」の道路案内標識
  function airportRoadSign(x) {
    ctx.fillStyle = "#8a9099"; ctx.fillRect(x + 40, GROUND_Y - 120, 8, 120);
    ctx.fillStyle = "#1b7a3a"; ctx.fillRect(x - 6, GROUND_Y - 134, 140, 34);
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.strokeRect(x - 4, GROUND_Y - 132, 136, 30);
    ctx.fillStyle = "#fff"; ctx.font = "bold 15px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("成田空港 ✈ →", x + 64, GROUND_Y - 117);
  }

  // ゴール：成田空港
  function drawAirport(gl) {
    const x = gl.x;
    const tw = 230, th = 122, top = GROUND_Y - th;
    ctx.fillStyle = "#eef2f6"; ctx.fillRect(x - 44, top, tw, th);      // ターミナル
    ctx.fillStyle = "#cdd7e0"; ctx.fillRect(x - 44, top, tw, 16);      // 屋根
    ctx.fillStyle = "#8fc4e6";                                         // ガラス張りの窓
    for (let wy = top + 26; wy < GROUND_Y - 18; wy += 22)
      ctx.fillRect(x - 34, wy, tw - 20, 14);
    ctx.fillStyle = "#dfe6ec"; ctx.fillRect(x + tw - 78, top - 70, 16, 70); // 管制塔
    ctx.fillStyle = "#3a4652"; ctx.fillRect(x + tw - 86, top - 84, 32, 18);
    ctx.fillStyle = "#8fc4e6"; ctx.fillRect(x + tw - 82, top - 80, 24, 8);
    const sw = 200, sx = x - 30, sy = top - 48;                        // 看板
    ctx.fillStyle = "#0a2e6b"; ctx.fillRect(sx, sy, sw, 36);
    ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "bold 18px 'Segoe UI', sans-serif"; ctx.fillText("✈ 成田空港", sx + sw/2, sy + 13);
    ctx.font = "9px 'Segoe UI', sans-serif"; ctx.fillText("NARITA AIRPORT", sx + sw/2, sy + 27);
    const py = top - 46 + Math.sin(elapsed*0.05)*6;                    // 飛行機（ふわふわ）
    drawPlane(x + 46, py);
    // ゴールのぼり
    const wave = Math.sin(elapsed*0.15)*4;
    ctx.fillStyle = "#cfcfcf"; ctx.fillRect(x - 3, gl.top, 6, TILE*3);
    ctx.fillStyle = "#e94560";
    ctx.beginPath();
    ctx.moveTo(x + 3, gl.top); ctx.lineTo(x + 48 + wave, gl.top + 13); ctx.lineTo(x + 3, gl.top + 26);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.font = "bold 14px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("G", x + 20, gl.top + 13);
  }

  function drawPlane(x, y) {
    ctx.save(); ctx.translate(x, y);
    ctx.fillStyle = "#ffffff";
    ctx.beginPath(); ctx.ellipse(0, 0, 34, 9, 0, 0, 7); ctx.fill();     // 胴体
    ctx.beginPath(); ctx.moveTo(-30, 0); ctx.lineTo(-42, -14); ctx.lineTo(-24, -2); ctx.closePath(); ctx.fill(); // 尾翼
    ctx.fillStyle = "#d3dbe2";
    ctx.beginPath(); ctx.moveTo(-2, 2); ctx.lineTo(-16, 16); ctx.lineTo(8, 4); ctx.closePath(); ctx.fill();      // 主翼
    ctx.fillStyle = "#5aa0d0";
    for (let i = -1; i < 5; i++) ctx.fillRect(i*8, -3, 4, 4);           // 窓
    ctx.fillStyle = "#e0453f"; ctx.fillRect(24, -3, 9, 6);             // 機首
    ctx.restore();
  }

  // はね（はねまるりんアイテム）
  function drawFeathers() {
    for (const f of feathers) {
      if (f.got) continue;
      if (f.x + f.w < camX - 40 || f.x > camX + W + 40) continue;
      f.t += 0.08;
      const cx = f.x + f.w/2, cy = f.y + f.h/2 + Math.sin(f.t)*3;
      ctx.save();
      ctx.globalAlpha = 0.5 + Math.abs(Math.sin(f.t))*0.3;
      ctx.fillStyle = "#eaf5ff";
      ctx.beginPath(); ctx.arc(cx, cy, f.w/2 + 2, 0, 7); ctx.fill();
      ctx.restore();
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(Math.sin(f.t*0.5)*0.15 - 0.2);
      ctx.fillStyle = "#ffffff";
      ctx.beginPath(); ctx.ellipse(0, 0, 6, 14, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#cfe8fb";
      ctx.beginPath(); ctx.ellipse(2.4, 0, 2.6, 12, 0, 0, 7); ctx.fill();
      ctx.strokeStyle = "#9cc7e6"; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.moveTo(0, -13); ctx.lineTo(0, 13); ctx.stroke();
      ctx.restore();
    }
  }

  // フランスパン（1UP）
  function drawBreads() {
    for (const br of breads) {
      if (br.got) continue;
      if (br.x + br.w < camX - 40 || br.x > camX + W + 40) continue;
      const cx = br.x + br.w/2, cy = br.y + br.h/2;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(-0.18);
      // 本体（こんがりバゲット）
      ctx.fillStyle = "#d19a41";
      ctx.beginPath(); ctx.ellipse(0, 0, 17, 8, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#e7b96a";
      ctx.beginPath(); ctx.ellipse(-2, -1.5, 14, 5.5, 0, 0, 7); ctx.fill();
      // 両端の焼き色濃いめ
      ctx.fillStyle = "#b9822f";
      ctx.beginPath(); ctx.ellipse(-15, 0, 3, 6, 0, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.ellipse(15, 0, 3, 6, 0, 0, 7); ctx.fill();
      // 斜めの切れ込み
      ctx.strokeStyle = "#8a5a20"; ctx.lineWidth = 1.4; ctx.lineCap = "round";
      for (let i = -2; i <= 2; i++) { ctx.beginPath(); ctx.moveTo(i*6 - 2, -4); ctx.lineTo(i*6 + 2, 4); ctx.stroke(); }
      ctx.restore();
      // 1UP 表示
      ctx.fillStyle = "#2f7d32"; ctx.font = "bold 9px 'Segoe UI', sans-serif";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("1UP", cx, br.y - 6);
    }
  }

  // 車（地上の速い敵）
  function drawCar(e) {
    ctx.save();
    const cx = e.x + e.w/2, by = e.y + e.h;
    ctx.translate(cx, by);
    if (!e.alive) { ctx.scale(1.05, 0.3); ctx.globalAlpha = 0.7; }
    const dir = e.vx > 0 ? 1 : -1;
    const bob = Math.sin(e.t*0.4)*0.8;
    ctx.fillStyle = "#d33b3b"; ctx.fillRect(-23, -16 + bob, 46, 15);   // 車体
    ctx.fillStyle = "#e05555";                                         // キャビン
    ctx.beginPath();
    ctx.moveTo(-13, -16 + bob); ctx.lineTo(-8, -27 + bob);
    ctx.lineTo(11, -27 + bob); ctx.lineTo(16, -16 + bob); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#bfe0f2";                                         // 窓
    ctx.beginPath(); ctx.moveTo(-9, -17 + bob); ctx.lineTo(-6, -25 + bob);
    ctx.lineTo(1, -25 + bob); ctx.lineTo(1, -17 + bob); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(3, -17 + bob); ctx.lineTo(3, -25 + bob);
    ctx.lineTo(9, -25 + bob); ctx.lineTo(13, -17 + bob); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#ffe9a8";                                         // ヘッドライト
    ctx.beginPath(); ctx.arc(dir*20, -8 + bob, 2.4, 0, 7); ctx.fill();
    ctx.fillStyle = "#222";                                            // タイヤ
    ctx.beginPath(); ctx.arc(-13, -1, 5, 0, 7); ctx.arc(13, -1, 5, 0, 7); ctx.fill();
    ctx.fillStyle = "#888";
    ctx.beginPath(); ctx.arc(-13, -1, 2, 0, 7); ctx.arc(13, -1, 2, 0, 7); ctx.fill();
    ctx.restore();
  }

  // ネコ（地上の敵）
  function drawCat(e) {
    ctx.save();
    const cx = e.x + e.w/2, by = e.y + e.h;
    ctx.translate(cx, by);
    if (!e.alive) { ctx.scale(1.1, 0.25); ctx.globalAlpha = 0.7; }
    const dir = e.vx > 0 ? 1 : -1;
    const wob = Math.sin(e.t*0.25)*2;
    // しっぽ
    ctx.strokeStyle = "#6b6b6b"; ctx.lineWidth = 4; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(-dir*12, -8); ctx.quadraticCurveTo(-dir*22, -14, -dir*17, -26); ctx.stroke();
    // 体
    ctx.fillStyle = "#7d7d7d";
    ctx.beginPath(); ctx.ellipse(0, -9, 14, 9, 0, 0, 7); ctx.fill();
    // 頭
    ctx.beginPath(); ctx.arc(dir*11, -16, 9, 0, 7); ctx.fill();
    // 耳
    ctx.beginPath(); ctx.moveTo(dir*5, -22); ctx.lineTo(dir*7, -31); ctx.lineTo(dir*13, -23); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(dir*14, -23); ctx.lineTo(dir*18, -31); ctx.lineTo(dir*19, -21); ctx.closePath(); ctx.fill();
    // 足
    ctx.fillStyle = "#5f5f5f";
    ctx.beginPath(); ctx.ellipse(-6 + wob, 0, 4, 3, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(6 - wob, 0, 4, 3, 0, 0, 7); ctx.fill();
    if (e.alive) {
      ctx.fillStyle = "#eef05a";
      ctx.beginPath(); ctx.arc(dir*8, -17, 2.6, 0, 7); ctx.arc(dir*15, -17, 2.6, 0, 7); ctx.fill();
      ctx.fillStyle = "#111"; ctx.fillRect(dir*8 - 0.7, -19.5, 1.4, 5); ctx.fillRect(dir*15 - 0.7, -19.5, 1.4, 5);
      ctx.fillStyle = "#e79aa0"; ctx.beginPath(); ctx.arc(dir*11.5, -13, 1.6, 0, 7); ctx.fill();
      // ひげ
      ctx.strokeStyle = "rgba(255,255,255,0.7)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(dir*13, -13); ctx.lineTo(dir*22, -15); ctx.moveTo(dir*13, -11); ctx.lineTo(dir*22, -10); ctx.stroke();
    }
    ctx.restore();
  }

  // カラス（飛ぶ敵）
  function drawCrow(e) {
    ctx.save();
    const cx = e.x + e.w/2, cy = e.y + e.h/2;
    ctx.translate(cx, cy);
    if (!e.alive) { ctx.scale(1.1, 0.3); ctx.globalAlpha = 0.7; }
    const dir = e.vx > 0 ? 1 : -1;
    const flap = Math.sin(e.t*0.3)*10;
    // 翼
    ctx.fillStyle = "#23262b";
    ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(-18, -2 - flap); ctx.lineTo(-4, 6); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(18, -2 - flap); ctx.lineTo(4, 6); ctx.closePath(); ctx.fill();
    // 尾
    ctx.beginPath(); ctx.moveTo(-dir*8, 0); ctx.lineTo(-dir*18, 5); ctx.lineTo(-dir*8, 7); ctx.closePath(); ctx.fill();
    // 体
    ctx.fillStyle = "#2b2f35";
    ctx.beginPath(); ctx.ellipse(0, 0, 12, 9, 0, 0, 7); ctx.fill();
    // 頭
    ctx.beginPath(); ctx.arc(dir*10, -4, 7, 0, 7); ctx.fill();
    // くちばし
    ctx.fillStyle = "#f0a51e";
    ctx.beginPath(); ctx.moveTo(dir*15, -5); ctx.lineTo(dir*27, -2); ctx.lineTo(dir*15, 1); ctx.closePath(); ctx.fill();
    if (e.alive) {
      ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(dir*11, -5, 2.4, 0, 7); ctx.fill();
      ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(dir*12, -5, 1.3, 0, 7); ctx.fill();
    }
    ctx.restore();
  }

  function drawEnemies() {
    for (const e of enemies) {
      if (e.x + e.w < camX - 40 || e.x > camX + W + 40) continue;
      if (e.kind === "cat")  { drawCat(e);  continue; }
      if (e.kind === "crow") { drawCrow(e); continue; }
      if (e.kind === "car")  { drawCar(e);  continue; }
      if (e.kind === "crab") { drawCrab(e); continue; }
      if (e.kind === "gull") { drawGull(e); continue; }
      if (e.kind === "puffer") { drawPuffer(e); continue; }
      if (e.kind === "jelly") { drawJelly(e); continue; }
      if (e.kind === "monkey") { drawMonkey(e); continue; }
      if (e.kind === "snake") { drawSnake(e); continue; }
      if (e.kind === "rooster") { drawRooster(e); continue; }
      if (e.kind === "sardine") { drawSardine(e); continue; }
      if (e.kind === "octopus") { drawOctopus(e); continue; }
      ctx.save();
      const cx = e.x + e.w/2, by = e.y + e.h;
      ctx.translate(cx, by);
      if (!e.alive) { ctx.scale(1.1, 0.25); ctx.globalAlpha = 0.7; }
      // クリ栗風の敵（くるみ）
      const wob = Math.sin(e.t*0.25)*3;
      // 体
      ctx.fillStyle = "#8a5a34";
      ctx.beginPath(); ctx.ellipse(0, -e.h*0.45, e.w*0.5, e.h*0.5, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#a56b3e";
      ctx.beginPath(); ctx.ellipse(0, -e.h*0.5, e.w*0.38, e.h*0.36, 0, 0, 7); ctx.fill();
      // 足
      ctx.fillStyle = "#4a3220";
      ctx.beginPath(); ctx.ellipse(-8+wob, 0, 6, 4, 0, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.ellipse(8-wob, 0, 6, 4, 0, 0, 7); ctx.fill();
      // 目
      if (e.alive) {
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(-6,-e.h*0.55,4,0,7); ctx.arc(6,-e.h*0.55,4,0,7); ctx.fill();
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(-6+ (e.vx>0?1:-1),-e.h*0.55,2,0,7); ctx.arc(6+(e.vx>0?1:-1),-e.h*0.55,2,0,7); ctx.fill();
        // 怒り眉
        ctx.strokeStyle="#3a2414"; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(-10,-e.h*0.72); ctx.lineTo(-3,-e.h*0.63);
        ctx.moveTo(10,-e.h*0.72); ctx.lineTo(3,-e.h*0.63); ctx.stroke();
      }
      ctx.restore();
    }
  }

  // 角丸長方形のパス
  function roundRectPath(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ボス戦の背景（駅の中）
  function drawBossBackdrop() {
    if (STAGES[stageIndex].boss === "sumo") { drawSumoBackdrop(); return; }
    if (STAGES[stageIndex].boss === "mega") { drawDeepSeaBackdrop(); return; }
    if (STAGES[stageIndex].boss === "zagat") { drawZagatBackdrop(); return; }
    if (STAGES[stageIndex].boss !== "penguins") return;
    // 奥の壁と柱
    ctx.fillStyle = "#cdd9e4"; ctx.fillRect(0, 150, W, 130);
    ctx.fillStyle = "rgba(150,165,180,0.45)";
    ctx.fillRect(90, 150, 26, 210); ctx.fillRect(W - 116, 150, 26, 210);
    ctx.fillRect(W/2 - 13, 150, 26, 210);
    // 改札機（奥）
    ctx.fillStyle = "#dfe3e6";
    for (let i = 0; i < 5; i++) { const gx = 150 + i*110; ctx.fillRect(gx, 300, 26, 58); ctx.fillStyle = "#f2c200"; ctx.fillRect(gx, 300, 26, 8); ctx.fillStyle = "#dfe3e6"; }
    // 駅名看板
    ctx.fillStyle = "#2f7d32"; ctx.fillRect(W/2 - 112, 96, 224, 34);
    ctx.fillStyle = "#fff"; ctx.font = "bold 18px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("みなみながれやま駅", W/2, 113);
    ctx.fillStyle = "#ffd34d"; ctx.font = "11px 'Segoe UI', sans-serif";
    ctx.fillText("Minami-nagareyama", W/2, 126);
  }

  // ボスの描画（種類ごとに振り分け）
  function drawBosses() {
    for (const b of bosses) {
      if (b.kind === "pegi" || b.kind === "nisepegi") drawPenguinBoss(b);
      else if (b.kind === "sumo") drawSumoBoss(b);
      else if (b.kind === "mega") drawMegaBoss(b);
      else if (b.kind === "zagat") drawZagat(b);
      else drawKuriBoss(b);
    }
  }

  // にせぺぎが投げるキュウリ／こうようがまく塩
  function drawCukes() {
    for (const cu of cukes) {
      if (cu.kind === "shock") {   // 四股の地響き（土ぼこりの波）
        ctx.save();
        ctx.translate(cu.x, cu.y);
        const s = cu.vx < 0 ? -1 : 1;
        ctx.fillStyle = "rgba(196,178,138,0.85)";
        ctx.beginPath();
        ctx.moveTo(-16, 8);
        ctx.quadraticCurveTo(-4, 8 - (10 + Math.sin(cu.t*0.5)*3), 4, 8);
        ctx.quadraticCurveTo(10, 8 - 6, 16, 8);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = "rgba(220,205,165,0.7)";
        for (let i = 0; i < 4; i++) { ctx.beginPath(); ctx.arc(s*(-10 + i*7), 2 - (i%2)*4 - Math.sin(cu.t*0.4+i)*2, 2.2, 0, 7); ctx.fill(); }
        ctx.restore();
        continue;
      }
      if (cu.kind === "tiger" || cu.kind === "gtiger") { drawTigerShot(cu.x, cu.y, cu.kind === "tiger", cu.t); continue; }
      if (cu.kind === "salt") {   // 塩の一つかみ（白い粒のかたまり）
        ctx.save();
        ctx.translate(cu.x, cu.y);
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        const dots = [[0,0],[-5,-2],[5,-1],[-2,4],[3,4],[-6,3],[6,3],[0,-5]];
        for (const [dx, dy] of dots) { ctx.beginPath(); ctx.arc(dx + Math.sin(cu.t*0.4)*1.5, dy, 2.4, 0, 7); ctx.fill(); }
        ctx.fillStyle = "#e7e0cf";
        for (const [dx, dy] of [[-3,0],[4,2],[-1,-3]]) { ctx.beginPath(); ctx.arc(dx, dy, 1.6, 0, 7); ctx.fill(); }
        ctx.restore();
        continue;
      }
      if (cu.kind === "egg") {   // カモメが落とす卵
        ctx.save();
        ctx.translate(cu.x, cu.y);
        ctx.rotate(Math.sin(cu.t*0.1)*0.3);
        ctx.fillStyle = "#f7efdc"; ctx.beginPath(); ctx.ellipse(0, 0, 7, 9, 0, 0, 7); ctx.fill();
        ctx.fillStyle = "#fffaf0"; ctx.beginPath(); ctx.ellipse(-2, -2, 3, 4.5, 0, 0, 7); ctx.fill();
        ctx.fillStyle = "rgba(196,176,138,0.5)";
        ctx.beginPath(); ctx.arc(2.5, 3, 1.3, 0, 7); ctx.arc(-3, 3.5, 1, 0, 7); ctx.arc(1, -4, 0.9, 0, 7); ctx.fill();
        ctx.restore();
        continue;
      }
      ctx.save();
      ctx.translate(cu.x, cu.y);
      ctx.rotate(cu.t * 0.18);
      ctx.fillStyle = "#4e8a2b";
      ctx.beginPath(); ctx.ellipse(0, 0, 13, 7, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#6cae3e";
      ctx.beginPath(); ctx.ellipse(0, 0, 12, 6, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#8cc655";
      ctx.beginPath(); ctx.ellipse(-1, -1.5, 8.5, 3, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#3f7a24";
      for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.arc(i*5, 1.5, 1, 0, 7); ctx.fill(); }
      ctx.fillStyle = "#5a8f2f"; ctx.fillRect(11, -1.5, 4, 3);   // へた
      ctx.restore();
    }
  }

  // ===== タイガーショット（上段＝high／下段＝low）の描画 =====
  function drawTigerShot(x, y, high, t) {
    ctx.save();
    ctx.translate(x, y);
    const core = high ? "#fff0c0" : "#ffe0a8";
    const c1 = high ? "#ffca38" : "#ff9a2e";
    const c2 = high ? "#ff8c1a" : "#ff5a1a";
    // 後ろへ伸びる炎の尾（右へ）
    ctx.fillStyle = high ? "rgba(255,170,40,0.4)" : "rgba(255,110,30,0.4)";
    ctx.beginPath(); ctx.moveTo(4, -7); ctx.lineTo(30 + Math.sin(t*0.5)*5, 0); ctx.lineTo(4, 7); ctx.closePath(); ctx.fill();
    // 本体
    ctx.fillStyle = c2; ctx.beginPath(); ctx.ellipse(0, 0, 17, 13, 0, 0, 7); ctx.fill();
    ctx.fillStyle = c1; ctx.beginPath(); ctx.ellipse(-1, -1, 13, 10, 0, 0, 7); ctx.fill();
    // 虎のシマ
    ctx.strokeStyle = "rgba(120,40,0,0.65)"; ctx.lineWidth = 2;
    for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.moveTo(i*6, -9); ctx.lineTo(i*6 - 2, 9); ctx.stroke(); }
    // 中心の光
    ctx.fillStyle = core; ctx.beginPath(); ctx.ellipse(-2, -2, 6, 4.5, 0, 0, 7); ctx.fill();
    ctx.restore();
  }
  function drawHazards() {
    for (const h of hazards) {
      if (h.x < camX - 60 || h.x > camX + W + 60) continue;
      drawTigerShot(h.x, h.y, h.kind === "tiger", h.t);
    }
  }

  // ===== ポルトガル：ボール・樽・敵・風景・PK戦 =====
  function pentagon(cx, cy, r) {
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = i * (Math.PI * 2 / 5) - Math.PI / 2;
      const x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath(); ctx.fill();
  }
  function heart(cx, cy, s) {
    ctx.beginPath(); ctx.arc(cx - s * 0.5, cy - s * 0.3, s * 0.55, 0, 7); ctx.arc(cx + s * 0.5, cy - s * 0.3, s * 0.55, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx - s, cy - s * 0.1); ctx.lineTo(cx + s, cy - s * 0.1); ctx.lineTo(cx, cy + s); ctx.closePath(); ctx.fill();
  }

  // 蹴れるサッカーボール
  function drawBalls() {
    for (const ball of balls) {
      if (ball.x + ball.w < camX - 40 || ball.x > camX + W + 40) continue;
      const cx = ball.x + ball.w / 2, cy = ball.y + ball.h / 2, r = ball.w / 2;
      ctx.fillStyle = "rgba(0,0,0,0.15)";
      ctx.beginPath(); ctx.ellipse(cx, ball.y + ball.h + 2, r * 0.9, 4, 0, 0, 7); ctx.fill();
      ctx.save(); ctx.translate(cx, cy); ctx.rotate(ball.rot || 0);
      ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(0, 0, r, 0, 7); ctx.fill();
      ctx.strokeStyle = "#c9ccd2"; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(0, 0, r, 0, 7); ctx.stroke();
      ctx.fillStyle = "#20242c"; pentagon(0, 0, r * 0.42);
      for (let i = 0; i < 5; i++) {
        const a = i * (Math.PI * 2 / 5) - Math.PI / 2;
        ctx.beginPath(); ctx.arc(Math.cos(a) * r * 0.72, Math.sin(a) * r * 0.72, r * 0.15, 0, 7); ctx.fill();
      }
      ctx.restore();
    }
  }

  // 転がってくるポルトワインの樽
  function drawBarrels() {
    for (const bl of barrels) {
      if (bl.x + bl.w < camX - 40 || bl.x > camX + W + 40) continue;
      const cx = bl.x + bl.w / 2, cy = bl.y + bl.h / 2, R = bl.w / 2;
      ctx.fillStyle = "rgba(0,0,0,0.15)";
      ctx.beginPath(); ctx.ellipse(cx, bl.y + bl.h + 2, R * 0.9, 4, 0, 0, 7); ctx.fill();
      ctx.save(); ctx.translate(cx, cy); ctx.rotate(bl.rot || 0);
      ctx.fillStyle = "#8a4a26"; ctx.beginPath(); ctx.arc(0, 0, R, 0, 7); ctx.fill();
      ctx.fillStyle = "#9c5a30"; ctx.beginPath(); ctx.arc(0, 0, R * 0.82, 0, 7); ctx.fill();
      ctx.strokeStyle = "rgba(60,30,15,0.5)"; ctx.lineWidth = 2;
      for (let i = -2; i <= 2; i++) { ctx.beginPath(); ctx.moveTo(i * 5, -R * 0.85); ctx.lineTo(i * 5, R * 0.85); ctx.stroke(); }
      ctx.strokeStyle = "#c9b48a"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(0, 0, R * 0.9, 0, 7); ctx.stroke();
      ctx.beginPath(); ctx.arc(0, 0, R * 0.45, 0, 7); ctx.stroke();
      ctx.restore();
    }
  }

  // バルセロスのオンドリ
  function drawRooster(e) {
    const cx = e.x + e.w / 2, by = e.y + e.h, dir = e.vx > 0 ? 1 : -1;
    ctx.save(); ctx.translate(cx, by);
    if (!e.alive) { ctx.scale(1.1, 0.25); ctx.globalAlpha = 0.7; }
    ctx.scale(dir, 1);
    if (e.alive) { ctx.fillStyle = "rgba(0,0,0,0.15)"; ctx.beginPath(); ctx.ellipse(0, -1, 12, 3, 0, 0, 7); ctx.fill(); }
    // 足
    ctx.strokeStyle = "#e0a83a"; ctx.lineWidth = 2.5; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(-4, -5); ctx.lineTo(-4, -1); ctx.moveTo(4, -5); ctx.lineTo(4, -1); ctx.stroke();
    // カラフルなしっぽ
    const tail = [["#d63b3b", -0.5], ["#e8a23a", -0.9], ["#3a9b57", -1.3], ["#3a72c4", -1.7]];
    for (const [col, ang] of tail) { ctx.save(); ctx.translate(-8, -16); ctx.rotate(ang); ctx.fillStyle = col; ctx.beginPath(); ctx.ellipse(-8, 0, 9, 3.2, 0, 0, 7); ctx.fill(); ctx.restore(); }
    // 体（黒）
    ctx.fillStyle = "#26262c"; ctx.beginPath(); ctx.ellipse(0, -13, 11, 12, 0, 0, 7); ctx.fill();
    // 胸のハート（バルセロス風）
    ctx.fillStyle = "#e14b6a"; heart(3, -12, 3);
    // 頭
    ctx.fillStyle = "#26262c"; ctx.beginPath(); ctx.arc(7, -22, 6, 0, 7); ctx.fill();
    // とさか（赤）
    ctx.fillStyle = "#e23b3b";
    ctx.beginPath(); ctx.arc(5, -29, 2.4, 0, 7); ctx.arc(8, -30, 2.6, 0, 7); ctx.arc(11, -29, 2.2, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(7, -16, 2, 3, 0, 0, 7); ctx.fill();   // 肉垂れ
    // くちばし
    ctx.fillStyle = "#f2b21e"; ctx.beginPath(); ctx.moveTo(12, -23); ctx.lineTo(17, -22); ctx.lineTo(12, -20); ctx.closePath(); ctx.fill();
    if (e.alive) { ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(8, -23, 2, 0, 7); ctx.fill(); ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(9, -23, 1, 0, 7); ctx.fill(); }
    ctx.restore();
  }

  // イワシくん（焼きイワシ）
  function drawSardine(e) {
    const cx = e.x + e.w / 2, cy = e.y + e.h / 2, dir = e.vx > 0 ? 1 : -1;
    ctx.save(); ctx.translate(cx, cy);
    if (!e.alive) { ctx.scale(1.1, 0.3); ctx.globalAlpha = 0.7; }
    ctx.scale(dir, 1);
    const wig = Math.sin(e.t * 0.4) * 3;
    ctx.fillStyle = "#7b8794"; ctx.beginPath(); ctx.moveTo(-13, 0); ctx.lineTo(-20, -6 + wig); ctx.lineTo(-20, 6 + wig); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#aeb8c2"; ctx.beginPath(); ctx.ellipse(0, 0, 15, 8, 0, 0, 7); ctx.fill();
    ctx.fillStyle = "#c9d1d9"; ctx.beginPath(); ctx.ellipse(0, 1, 13, 5.5, 0, 0, 7); ctx.fill();
    ctx.fillStyle = "#8a95a1"; ctx.beginPath(); ctx.moveTo(-4, -6); ctx.lineTo(2, -11); ctx.lineTo(5, -6); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = "rgba(90,70,50,0.5)"; ctx.lineWidth = 1.5;
    for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.moveTo(i * 5, -4); ctx.lineTo(i * 5 - 2, 4); ctx.stroke(); }
    if (e.alive) { ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(9, -1, 2.4, 0, 7); ctx.fill(); ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(9.6, -1, 1.2, 0, 7); ctx.fill(); }
    ctx.restore();
  }

  // タコにいさん
  function drawOctopus(e) {
    const cx = e.x + e.w / 2, by = e.y + e.h;
    ctx.save(); ctx.translate(cx, by);
    if (!e.alive) { ctx.scale(1.1, 0.3); ctx.globalAlpha = 0.7; }
    ctx.fillStyle = "#c0553e";
    for (let i = -3; i <= 3; i++) {
      const bx = i * 5, sway = Math.sin(e.t * 0.2 + i) * 3;
      ctx.beginPath(); ctx.moveTo(bx - 3, -9); ctx.quadraticCurveTo(bx + sway, -3, bx + sway, 0); ctx.quadraticCurveTo(bx + sway + 2, -3, bx + 3, -9); ctx.fill();
    }
    ctx.fillStyle = "#d76a50"; ctx.beginPath(); ctx.ellipse(0, -20, 15, 16, 0, 0, 7); ctx.fill();
    ctx.fillStyle = "#e08268"; ctx.beginPath(); ctx.ellipse(-4, -24, 7, 7, 0, 0, 7); ctx.fill();
    if (e.alive) {
      ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(-5, -22, 4, 0, 7); ctx.arc(6, -22, 4, 0, 7); ctx.fill();
      ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(-4, -22, 2, 0, 7); ctx.arc(7, -22, 2, 0, 7); ctx.fill();
    }
    ctx.fillStyle = "rgba(200,60,60,0.35)"; ctx.beginPath(); ctx.arc(-9, -16, 2.5, 0, 7); ctx.arc(10, -16, 2.5, 0, 7); ctx.fill();
    ctx.restore();
  }

  // リスボンの港町の風景（世界座標・スクロール）
  function drawPortugalDecor() {
    // 遠くのスタジアム
    for (let x = 60; x < LEVEL_W; x += 880) {
      if (x + 320 < camX - 40 || x > camX + W + 40) continue;
      ctx.fillStyle = "#cfd8df";
      ctx.beginPath(); ctx.moveTo(x, GROUND_Y - 72); ctx.lineTo(x + 70, GROUND_Y - 122); ctx.lineTo(x + 250, GROUND_Y - 122); ctx.lineTo(x + 320, GROUND_Y - 72); ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#e6ebef"; ctx.fillRect(x + 70, GROUND_Y - 120, 180, 10);
      ctx.fillStyle = "#bcc6cd"; ctx.fillRect(x, GROUND_Y - 72, 320, 14);
    }
    // 川/海の帯（画面に追従）
    ctx.fillStyle = "#4f9ccb"; ctx.fillRect(camX, GROUND_Y - 60, W, 10);
    ctx.fillStyle = "rgba(255,255,255,0.35)";
    for (let i = 0; i < 12; i++) ctx.fillRect(camX + (i * 70 + (elapsed % 70)), GROUND_Y - 57, 22, 2);
    // 街並み（オレンジ屋根＋アズレージョの壁）
    for (let i = 0; i * 150 < LEVEL_W; i++) {
      const x = i * 150, bw = 92;
      if (x + bw < camX - 40 || x > camX + W + 40) continue;
      const h = 96 + ((i * 37) % 40), top = GROUND_Y - h;
      ctx.fillStyle = (i % 2 === 0) ? "#eef1ee" : "#cfe0ef";
      ctx.fillRect(x, top, bw, h);
      if (i % 2 !== 0) {
        ctx.fillStyle = "rgba(47,111,176,0.45)";
        for (let wy = top + 10; wy < GROUND_Y - 10; wy += 16) for (let wx = x + 10; wx < x + bw - 8; wx += 16) { ctx.beginPath(); ctx.arc(wx, wy, 3, 0, 7); ctx.fill(); }
      }
      ctx.fillStyle = "#d9793e";
      ctx.beginPath(); ctx.moveTo(x - 6, top); ctx.lineTo(x + bw / 2, top - 22); ctx.lineTo(x + bw + 6, top); ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#c96a34"; ctx.fillRect(x - 6, top - 2, bw + 12, 4);
      ctx.fillStyle = "rgba(120,150,180,0.5)";
      for (let wy = top + 16; wy < GROUND_Y - 22; wy += 30) for (let wx = x + 16; wx < x + bw - 18; wx += 30) ctx.fillRect(wx, wy, 16, 20);
    }
    // 黄色いトラム（路面電車）
    for (let x = 320; x < LEVEL_W; x += 720) {
      if (x + 90 < camX - 40 || x > camX + W + 40) continue;
      drawTram(x, GROUND_Y - 46);
    }
  }
  function drawTram(x, y) {
    ctx.save(); ctx.translate(x, y);
    ctx.fillStyle = "#f2c500"; roundRectPath(0, 0, 84, 40, 6); ctx.fill();
    ctx.fillStyle = "#e0b400"; ctx.fillRect(0, 30, 84, 10);
    ctx.fillStyle = "#bfe3f5"; for (let i = 0; i < 3; i++) ctx.fillRect(8 + i * 26, 8, 20, 16);
    ctx.fillStyle = "#c99a00"; ctx.fillRect(6, -4, 72, 5);
    ctx.fillStyle = "#333"; ctx.beginPath(); ctx.arc(20, 42, 6, 0, 7); ctx.arc(64, 42, 6, 0, 7); ctx.fill();
    ctx.fillStyle = "#c0392b"; ctx.fillRect(34, 2, 18, 9);
    ctx.fillStyle = "#fff"; ctx.font = "bold 8px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText("28", 43, 7);
    ctx.restore();
  }

  // ===== PK戦の描画 =====
  function drawPK() {
    drawPKArena();
    const attack = pk.kick % 2 === 0;
    drawPKCourse(attack);
    if (attack) { drawClovisKeeper(); drawMaruKicker(); drawPKBall(); }
    else { drawMaruKeeper(); drawClovisKicker(); drawPKBall(); }
    for (const pt of particles) { ctx.save(); ctx.globalAlpha = Math.max(0, Math.min(1, pt.life / 28)); ctx.fillStyle = pt.color; ctx.fillRect(pt.x - 2, pt.y - 2, 4, 4); ctx.restore(); }
    drawPKHud(attack);
    if (pk.sub === "win" || pk.sub === "lose") drawPKResult();
    else if (pk.sub === "intro") drawPKIntro();
  }

  function drawPKArena() {
    ctx.fillStyle = "#5bb0e6"; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = "#c9d3dc"; ctx.fillRect(0, 110, W, 90);
    ctx.fillStyle = "#9aa7b3"; for (let y = 118; y < 196; y += 16) ctx.fillRect(0, y, W, 5);
    ctx.fillStyle = "#7c8894";
    for (let x = 20; x < W; x += 26) { const yy = 122 + ((x * 7) % 3) * 8; ctx.beginPath(); ctx.arc(x, yy, 3, 0, 7); ctx.fill(); }
    // ポルトガル国旗
    ctx.fillStyle = "#0a6b3b"; ctx.fillRect(352, 84, 26, 18); ctx.fillStyle = "#d21e2b"; ctx.fillRect(378, 84, 52, 18);
    ctx.fillStyle = "#f5d20c"; ctx.beginPath(); ctx.arc(378, 93, 6, 0, 7); ctx.fill();
    ctx.strokeStyle = "#555"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(352, 84); ctx.lineTo(352, 118); ctx.stroke();
    // 芝生
    ctx.fillStyle = "#4c9e3c"; ctx.fillRect(0, 200, W, H - 200);
    ctx.fillStyle = "#57ab45"; for (let i = 0; i < 5; i++) ctx.fillRect(0, 220 + i * 40, W, 18);
    // ゴール
    ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 6; ctx.strokeRect(PKX.goalL, PKX.goalTop, PKX.goalR - PKX.goalL, PKX.goalH);
    ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.lineWidth = 1;
    for (let x = PKX.goalL + 16; x < PKX.goalR; x += 16) { ctx.beginPath(); ctx.moveTo(x, PKX.goalTop); ctx.lineTo(x, PKX.goalTop + PKX.goalH); ctx.stroke(); }
    for (let y = PKX.goalTop + 16; y < PKX.goalTop + PKX.goalH; y += 16) { ctx.beginPath(); ctx.moveTo(PKX.goalL, y); ctx.lineTo(PKX.goalR, y); ctx.stroke(); }
    // ペナルティボックス
    ctx.strokeStyle = "rgba(255,255,255,0.85)"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(150, H); ctx.lineTo(150, 300); ctx.lineTo(650, 300); ctx.lineTo(650, H); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(400, 300, 60, 22, 0, 0.12 * Math.PI, 0.88 * Math.PI); ctx.stroke();
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(PKX.spotX, PKX.spotY, 4, 0, 7); ctx.fill();
  }

  function drawPKCourse(attack) {
    const selecting = pk.sub === "aim" || pk.sub === "dready" || pk.sub === "dwind";
    if (!selecting) return;
    const zoneW = (PKX.goalR - PKX.goalL) / 3;
    for (let i = 0; i < 3; i++) {
      const zx = PKX.goalL + i * zoneW;
      ctx.fillStyle = (i === pk.cursor) ? "rgba(255,211,77,0.4)" : "rgba(255,211,77,0.1)";
      ctx.fillRect(zx, PKX.goalTop, zoneW, PKX.goalH);
      if (i === pk.cursor) { ctx.strokeStyle = "#ffd34d"; ctx.lineWidth = 4; ctx.strokeRect(zx, PKX.goalTop, zoneW, PKX.goalH); }
    }
    ctx.fillStyle = "#fff2b0"; ctx.font = "bold 14px 'Segoe UI',sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(attack ? "ねらうコース" : "とぶ方向", PKX.spotX, PKX.goalTop - 14);
  }

  function drawPKBall() {
    const b = pk.ball;
    const bx = b.fly ? b.x : PKX.spotX, by = b.fly ? b.y : PKX.spotY;
    ctx.save(); ctx.translate(bx, by);
    ctx.fillStyle = "rgba(0,0,0,0.15)"; ctx.beginPath(); ctx.ellipse(0, 11, 10, 3, 0, 0, 7); ctx.fill();
    ctx.rotate(b.fly ? pk.t * 0.3 : 0);
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(0, 0, 10, 0, 7); ctx.fill();
    ctx.strokeStyle = "#c9ccd2"; ctx.lineWidth = 1.2; ctx.beginPath(); ctx.arc(0, 0, 10, 0, 7); ctx.stroke();
    ctx.fillStyle = "#20242c"; pentagon(0, 0, 4.2);
    ctx.restore();
  }

  function drawClovisKeeper() {
    let dx = 0, lean = 0, arms = 0.15;
    if (pk.sub === "ashot" || pk.sub === "ares") {
      const dir = pk.keeperDir - 1;
      dx = dir * 92 * pk.keeperT; lean = dir * 0.5 * pk.keeperT; arms = 1;
    }
    pkDrawClovis(PKX.spotX + dx, 262, { lean, armsUp: arms });
  }
  function drawClovisKicker() {
    let lean = 0, kickLeg = 0, runup = 0;
    if (pk.sub === "dready") runup = pk.t;
    // ヒントは「けり出す直前」に「ほんの少しだけ」出す（早くから方向が丸わかりにならない＝難しく）
    if (pk.sub === "dwind" && pk.t > 13) lean = (pk.kickerDir - 1) * 0.12;
    if (pk.sub === "dshot" || pk.sub === "dres") { kickLeg = 1; lean = (pk.kickerDir - 1) * 0.12; }
    pkDrawClovis(PKX.spotX - 30, 404, { lean, kickLeg, runup });
  }
  function drawMaruKicker() {
    const kick = pk.sub === "ashot" && pk.t < 10;
    pkDrawMaru(PKX.spotX + 42, 404, { kick });
  }
  function drawMaruKeeper() {
    let dx = 0, lean = 0, dive = false;
    if (pk.sub === "dshot" || pk.sub === "dres") {
      const dir = pk.dive - 1;
      dx = dir * 96 * pk.diverT; lean = dir * 0.5 * pk.diverT; dive = pk.diverT > 0.2;
    } else {
      dx = (pk.cursor - 1) * 34;
    }
    pkDrawMaru(PKX.spotX + dx, 268, { arms: true, dive, lean });
  }

  // クリウド（ロナウド系ストライカー・オリジナル寄せ）
  function pkDrawClovis(cx, footY, o) {
    o = o || {};
    ctx.save(); ctx.translate(cx, footY);
    if (o.lean) ctx.rotate(o.lean);
    ctx.fillStyle = "rgba(0,0,0,0.18)"; ctx.beginPath(); ctx.ellipse(0, 2, 22, 5, 0, 0, 7); ctx.fill();
    const legSwing = o.runup ? Math.sin(o.runup * 0.4) * 8 : 0;
    // 脚（肌）
    ctx.strokeStyle = "#dca87e"; ctx.lineWidth = 8; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(-6, -40); ctx.lineTo(-8 + legSwing, -6); ctx.stroke();
    if (o.kickLeg) { ctx.beginPath(); ctx.moveTo(6, -40); ctx.lineTo(26, -30); ctx.stroke(); }
    else { ctx.beginPath(); ctx.moveTo(6, -40); ctx.lineTo(8 - legSwing, -6); ctx.stroke(); }
    // 緑のソックス
    ctx.strokeStyle = "#1f7a44"; ctx.lineWidth = 8;
    ctx.beginPath(); ctx.moveTo(-8 + legSwing, -11); ctx.lineTo(-8 + legSwing, -4); ctx.stroke();
    if (o.kickLeg) { ctx.beginPath(); ctx.moveTo(23, -31); ctx.lineTo(27, -30); ctx.stroke(); }
    else { ctx.beginPath(); ctx.moveTo(8 - legSwing, -11); ctx.lineTo(8 - legSwing, -4); ctx.stroke(); }
    // シューズ（黒）
    ctx.fillStyle = "#1a1a1a";
    ctx.beginPath(); ctx.ellipse(-8 + legSwing, -2, 6, 3, 0, 0, 7); ctx.fill();
    if (o.kickLeg) { ctx.beginPath(); ctx.ellipse(29, -29, 6, 3, 0, 0, 7); ctx.fill(); }
    else { ctx.beginPath(); ctx.ellipse(8 - legSwing, -2, 6, 3, 0, 0, 7); ctx.fill(); }
    // 緑の短パン
    ctx.fillStyle = "#1f7a44"; roundRectPath(-12, -58, 24, 22, 4); ctx.fill();
    ctx.fillStyle = "#186235"; ctx.fillRect(-12, -44, 24, 3);
    // 赤いユニフォーム（胴）
    ctx.fillStyle = "#d8232a"; roundRectPath(-14, -92, 28, 38, 6); ctx.fill();
    ctx.fillStyle = "#c01d24"; ctx.fillRect(-14, -60, 28, 4);
    // 緑のV襟
    ctx.strokeStyle = "#0a6b3b"; ctx.lineWidth = 3; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(-7, -91); ctx.lineTo(0, -84); ctx.lineTo(7, -91); ctx.stroke();
    // 左胸プーマ（白）＋右胸クレスト（金）
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.ellipse(-8, -84, 2.4, 1.4, -0.3, 0, 7); ctx.fill();
    ctx.fillStyle = "#f5d20c"; ctx.beginPath(); ctx.arc(8, -84, 2.2, 0, 7); ctx.fill();
    // 背番号7
    ctx.fillStyle = "#fff"; ctx.font = "bold 15px 'Segoe UI',sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText("7", 0, -72);
    // 腕（赤い長袖＋肌の手）
    ctx.lineCap = "round";
    if (o.armsUp) {
      const a = o.armsUp;
      ctx.strokeStyle = "#d8232a"; ctx.lineWidth = 7;
      ctx.beginPath(); ctx.moveTo(-12, -86); ctx.lineTo(-14 - 14 * a, -94 - 10 * a); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(12, -86); ctx.lineTo(14 + 14 * a, -94 - 10 * a); ctx.stroke();
      ctx.fillStyle = "#dca87e"; ctx.beginPath(); ctx.arc(-14 - 14 * a, -94 - 10 * a, 4, 0, 7); ctx.arc(14 + 14 * a, -94 - 10 * a, 4, 0, 7); ctx.fill();
    } else {
      ctx.strokeStyle = "#d8232a"; ctx.lineWidth = 7;
      ctx.beginPath(); ctx.moveTo(-12, -86); ctx.lineTo(-19, -64); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(12, -86); ctx.lineTo(19, -64); ctx.stroke();
      ctx.fillStyle = "#dca87e"; ctx.beginPath(); ctx.arc(-19, -63, 3.6, 0, 7); ctx.arc(19, -63, 3.6, 0, 7); ctx.fill();
    }
    // キャプテンマーク（左腕・青）
    ctx.strokeStyle = "#2b4aa0"; ctx.lineWidth = 8; ctx.beginPath(); ctx.moveTo(-13, -82); ctx.lineTo(-14, -77); ctx.stroke();
    // 頭（肌）
    ctx.fillStyle = "#e3b487"; ctx.beginPath(); ctx.arc(0, -104, 10, 0, 7); ctx.fill();
    // 髪（短髪：トップは短めのスパイク、サイドは刈り上げ、生え際は高め）
    ctx.fillStyle = "#2a2018";
    ctx.beginPath();
    ctx.moveTo(-9.5, -109);
    ctx.quadraticCurveTo(-10.5, -113.5, -6, -114);
    ctx.quadraticCurveTo(0, -115.5, 6, -114);
    ctx.quadraticCurveTo(10.5, -113.5, 9.5, -109);
    ctx.quadraticCurveTo(5, -110.5, 2.4, -109.6);       // 生え際（少しM字）
    ctx.quadraticCurveTo(0, -108.8, -2.4, -109.6);
    ctx.quadraticCurveTo(-5, -110.5, -9.5, -109);
    ctx.closePath(); ctx.fill();
    // トップの小さなスパイク（短め）
    for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.moveTo(i*5 - 2, -113.5); ctx.lineTo(i*5 + 0.5, -117); ctx.lineTo(i*5 + 2, -113.5); ctx.closePath(); ctx.fill(); }
    // サイドの刈り上げ（薄く短く）
    ctx.fillStyle = "#3a2c20";
    ctx.fillRect(-10, -110, 1.6, 5); ctx.fillRect(8.4, -110, 1.6, 5);
    // 眉＋目
    ctx.strokeStyle = "#241c14"; ctx.lineWidth = 1.4; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(-6.3, -107); ctx.lineTo(-1.8, -106.6); ctx.moveTo(1.8, -106.6); ctx.lineTo(6.3, -107); ctx.stroke();
    ctx.fillStyle = "#20303a"; ctx.beginPath(); ctx.arc(-3.6, -104.5, 1.5, 0, 7); ctx.arc(3.6, -104.5, 1.5, 0, 7); ctx.fill();
    // 大きな笑顔（白い歯）
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.ellipse(0, -99.5, 4.2, 2.4, 0, 0, Math.PI); ctx.fill();
    ctx.strokeStyle = "#a85a3a"; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(0, -100, 4.4, 0.15, Math.PI - 0.15); ctx.stroke();
    ctx.restore();
  }

  // PK戦のまるりん（簡易・キック／セーブ姿勢）
  function pkDrawMaru(cx, footY, o) {
    o = o || {};
    ctx.save(); ctx.translate(cx, footY);
    if (o.lean) ctx.rotate(o.lean);
    ctx.fillStyle = "rgba(0,0,0,0.18)"; ctx.beginPath(); ctx.ellipse(0, 2, 16, 4, 0, 0, 7); ctx.fill();
    ctx.fillStyle = "#f6e2c0";
    if (o.kick) { ctx.beginPath(); ctx.ellipse(14, -6, 6, 4, 0, 0, 7); ctx.fill(); ctx.beginPath(); ctx.ellipse(-6, -2, 6, 4, 0, 0, 7); ctx.fill(); }
    else if (o.dive) { ctx.beginPath(); ctx.ellipse(-14, -4, 6, 4, 0, 0, 7); ctx.fill(); ctx.beginPath(); ctx.ellipse(14, -4, 6, 4, 0, 0, 7); ctx.fill(); }
    else { ctx.beginPath(); ctx.ellipse(-6, -2, 6, 4, 0, 0, 7); ctx.fill(); ctx.beginPath(); ctx.ellipse(6, -2, 6, 4, 0, 0, 7); ctx.fill(); }
    ctx.fillStyle = "#b8bcc4"; ctx.beginPath(); ctx.ellipse(0, -20, 17, 19, 0, 0, 7); ctx.fill();
    ctx.fillStyle = "#efe1c6"; ctx.beginPath(); ctx.ellipse(-9, -36, 5, 6, -0.3, 0, 7); ctx.fill(); ctx.beginPath(); ctx.ellipse(9, -36, 5, 6, 0.3, 0, 7); ctx.fill();
    ctx.fillStyle = "#fbf3e2"; ctx.beginPath(); ctx.ellipse(2, -16, 13, 15, 0, 0, 7); ctx.fill();
    ctx.fillStyle = "#4fb4ea"; ctx.beginPath(); ctx.arc(-3, -24, 4, 0, 7); ctx.arc(7, -24, 3.6, 0, 7); ctx.fill();
    ctx.fillStyle = "#15151a"; ctx.beginPath(); ctx.arc(-3, -24, 3, 0, 7); ctx.arc(7, -24, 2.6, 0, 7); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(-2, -25, 1.1, 0, 7); ctx.arc(8, -25, 1, 0, 7); ctx.fill();
    ctx.fillStyle = "#161619"; ctx.beginPath(); ctx.ellipse(3, -18, 3.4, 2.8, 0, 0, 7); ctx.fill();
    // 口（ハムスターのにっこり）
    ctx.strokeStyle = "#3a3128"; ctx.lineWidth = 1.4; ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(3, -15); ctx.quadraticCurveTo(0, -11.5, -3, -13.5);
    ctx.moveTo(3, -15); ctx.quadraticCurveTo(6, -11.5, 9, -13.5);
    ctx.stroke();
    // 腕（守り時：短くあげた手）
    if (o.arms) {
      ctx.strokeStyle = "#f6e2c0"; ctx.lineWidth = 5; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(-12, -24); ctx.lineTo(-17, -31); ctx.moveTo(12, -24); ctx.lineTo(17, -31); ctx.stroke();
      ctx.fillStyle = "#f6e2c0"; ctx.beginPath(); ctx.arc(-17, -31, 3, 0, 7); ctx.arc(17, -31, 3, 0, 7); ctx.fill();
      ctx.fillStyle = "#f0bd98"; ctx.beginPath(); ctx.arc(-17, -30, 1.3, 0, 7); ctx.arc(17, -30, 1.3, 0, 7); ctx.fill();
    }
    ctx.restore();
  }

  function pkScoreDot(x, y, res) {
    if (res === "goal") { ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(x, y, 8, 0, 7); ctx.fill(); ctx.strokeStyle = "#222"; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(x, y, 8, 0, 7); ctx.stroke(); ctx.fillStyle = "#20242c"; ctx.beginPath(); ctx.arc(x, y, 3, 0, 7); ctx.fill(); }
    else if (res === "miss") { ctx.strokeStyle = "rgba(255,255,255,0.85)"; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.moveTo(x - 5, y - 5); ctx.lineTo(x + 5, y + 5); ctx.moveTo(x + 5, y - 5); ctx.lineTo(x - 5, y + 5); ctx.stroke(); }
    else { ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 1.6; ctx.beginPath(); ctx.arc(x, y, 8, 0, 7); ctx.stroke(); }
  }

  function drawPKHud(attack) {
    // スコアボード
    ctx.fillStyle = "rgba(0,0,0,0.4)"; roundRectPath(14, 12, 240, 64, 10); ctx.fill();
    ctx.textAlign = "left"; ctx.textBaseline = "middle"; ctx.font = "bold 15px 'Segoe UI',sans-serif";
    ctx.fillStyle = "#fff"; ctx.fillText("まるりん", 26, 30);
    ctx.fillStyle = "#ffd34d"; ctx.fillText("クリウド", 26, 58);
    for (let i = 0; i < 3; i++) {
      pkScoreDot(150 + i * 28, 30, pk.myRes[i]);
      pkScoreDot(150 + i * 28, 58, pk.foeRes[i] === "goal" ? "goal" : (pk.foeRes[i] === "save" ? "miss" : undefined));
    }
    // ターン表示
    ctx.fillStyle = attack ? "#2f7d32" : "#c0392b"; roundRectPath(W - 250, 12, 236, 30, 8); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.font = "bold 15px 'Segoe UI',sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    const num = Math.min(3, Math.floor(pk.kick / 2) + 1);
    ctx.fillText((attack ? "こうげき" : "ぼうぎょ") + "　" + num + " / 3本目", W - 132, 27);
    // メッセージ
    let msg = "", big = false, good = false;
    if (pk.sub === "aim") msg = "← →  コースをえらぶ　　ジャンプ  シュート！";
    else if (pk.sub === "dready" || pk.sub === "dwind") msg = "← →  とぶ方向をえらんで、とめろ！";
    else if (pk.sub === "ares" || pk.sub === "dres") {
      big = true;
      if (pk.outcome === "goal" && attack) { msg = "ゴール！！"; good = true; }
      else if (pk.outcome === "save" && attack) msg = "とめられた…";
      else if (pk.outcome === "save" && !attack) { msg = "スーパーセーブ！！"; good = true; }
      else if (pk.outcome === "goal" && !attack) msg = "きめられた…";
    }
    if (msg) {
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.font = big ? "bold 30px 'Segoe UI',sans-serif" : "16px 'Segoe UI',sans-serif";
      const w = ctx.measureText(msg).width + 40;
      ctx.fillStyle = "rgba(0,0,0,0.45)"; ctx.fillRect(W / 2 - w / 2, big ? 96 : H - 42, w, big ? 46 : 28);
      ctx.fillStyle = big ? (good ? "#ffe14d" : "#ff9a9a") : "#fff";
      ctx.fillText(msg, W / 2, big ? 119 : H - 28);
    }
  }

  function drawPKIntro() {
    const a = pk.t < 70 ? 1 : Math.max(0, (96 - pk.t) / 26);
    ctx.save(); ctx.globalAlpha = a; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillStyle = "rgba(120,0,0,0.42)"; ctx.fillRect(W / 2 - 220, H / 2 - 46, 440, 64);
    ctx.fillStyle = "#ffdd55"; ctx.font = "bold 34px 'Segoe UI',sans-serif"; ctx.fillText("PKせん！", W / 2, H / 2 - 14);
    ctx.fillStyle = "#fff"; ctx.font = "16px 'Segoe UI',sans-serif"; ctx.fillText("クリウド と 3本しょうぶ！", W / 2, H / 2 + 16);
    ctx.restore();
  }

  function drawPKResult() {
    ctx.save();
    ctx.fillStyle = pk.sub === "win" ? "rgba(0,40,10,0.55)" : "rgba(30,0,0,0.6)"; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    if (pk.sub === "win") {
      for (let i = 0; i < 40; i++) { const t = pk.t * 2 + i * 37; const x = (i * 61 + t * 0.6) % W; const y = (t * 1.2 + i * 40) % H; ctx.fillStyle = ["#e94560", "#ffd34d", "#66cc44", "#3aa8e0", "#fff"][i % 5]; ctx.fillRect(x, y, 6, 6); }
      ctx.fillStyle = "#ffd34d"; ctx.font = "bold 46px 'Segoe UI',sans-serif"; ctx.fillText("かった！ 🎉", W / 2, H / 2 - 30);
      ctx.fillStyle = "#fff"; ctx.font = "22px 'Segoe UI',sans-serif"; ctx.fillText("PK  " + pk.my + " - " + pk.foe + "  クリウド", W / 2, H / 2 + 14);
    } else {
      ctx.fillStyle = "#ff8a8a"; ctx.font = "bold 42px 'Segoe UI',sans-serif"; ctx.fillText("まけ…", W / 2, H / 2 - 24);
      ctx.fillStyle = "#fff"; ctx.font = "18px 'Segoe UI',sans-serif";
      ctx.fillText((lives - 1 > 0) ? "もういちど ちょうせん！" : "ゲームオーバー…", W / 2, H / 2 + 20);
    }
    ctx.restore();
  }

  // ===== タイランドの風景（寺院・ヤシ・ゾウ）=====
  function thaiWat(x, h) {
    const baseY = GROUND_Y, w = h * 0.9;
    ctx.fillStyle = "#e7c46a";
    ctx.fillRect(x, baseY - h*0.55, w, h*0.55);           // 本体
    ctx.fillStyle = "#d8a94a";
    // 段々の屋根
    for (let i = 0; i < 3; i++) {
      const ry = baseY - h*0.55 - i*h*0.14, rw = w*(0.9 - i*0.22);
      ctx.beginPath(); ctx.moveTo(x + w/2 - rw/2, ry); ctx.lineTo(x + w/2, ry - h*0.16); ctx.lineTo(x + w/2 + rw/2, ry); ctx.closePath(); ctx.fill();
    }
    // 尖塔
    ctx.fillStyle = "#c8952f";
    ctx.beginPath(); ctx.moveTo(x + w/2 - 5, baseY - h*0.55 - 3*h*0.14);
    ctx.lineTo(x + w/2, baseY - h - 6); ctx.lineTo(x + w/2 + 5, baseY - h*0.55 - 3*h*0.14); ctx.closePath(); ctx.fill();
  }
  function palm(x, sc) {
    ctx.save(); ctx.translate(x, GROUND_Y); ctx.scale(sc, sc);
    ctx.strokeStyle = "#8a5f38"; ctx.lineWidth = 8; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(-6, -60, 6, -110); ctx.stroke();
    ctx.fillStyle = "#3f9a4a";
    for (let a = 0; a < 5; a++) {
      const ang = -Math.PI/2 + (a - 2) * 0.6;
      ctx.save(); ctx.translate(6, -110); ctx.rotate(ang);

  // 階段状の寺院（ずんぐりした石のピラミッド＋尖塔）
  function drawStepTemple(x, baseY) {
    const steps = 5, sh = 15, base = 150;
    for (let i = 0; i < steps; i++) {
      const w = base - i*22;
      ctx.fillStyle = i % 2 ? "#c8b77e" : "#d6c58e";
      ctx.fillRect(x + i*11, baseY - (i+1)*sh, w, sh);
      ctx.fillStyle = "rgba(150,130,80,0.5)";
      for (let gx = x + i*11 + 10; gx < x + i*11 + w - 6; gx += 20) ctx.fillRect(gx, baseY - (i+1)*sh + 3, 2, sh - 6);
    }
    // 頂上の尖り
    const topW = base - steps*22, tx = x + steps*11;
    ctx.fillStyle = "#c8b77e";
    ctx.beginPath(); ctx.moveTo(tx, baseY - steps*sh); ctx.lineTo(tx + topW/2, baseY - steps*sh - 30); ctx.lineTo(tx + topW, baseY - steps*sh); ctx.closePath(); ctx.fill();
  }

  // 寝釈迦仏（横たわった大仏の石像）
  function drawRecliningBuddha(x, baseY) {
    const white = "#e9e6dd", shade = "#d3cfc2", line = "#b8b3a4";
    // 台座
    ctx.fillStyle = "#cfcabb"; ctx.fillRect(x, baseY - 8, 540, 18);
    ctx.fillStyle = "#bdb8a8"; ctx.fillRect(x, baseY + 6, 540, 6);

    ctx.fillStyle = white;

    ctx.moveTo(x + 40, baseY - 6);
    ctx.quadraticCurveTo(x + 60, baseY - 150, x + 175, baseY - 150);   // 肩〜背
    ctx.quadraticCurveTo(x + 330, baseY - 150, x + 425, baseY - 108);  // 腰
    ctx.quadraticCurveTo(x + 520, baseY - 78, x + 545, baseY - 6);     // 足先

    ctx.fillStyle = shade;
    ctx.beginPath();
    ctx.moveTo(x + 70, baseY - 6);
    ctx.quadraticCurveTo(x + 320, baseY - 54, x + 545, baseY - 6);

    ctx.moveTo(x + 185, baseY - 148);

    ctx.lineTo(x + 185, baseY - 6);

    ctx.fillStyle = "#c96b3a"; ctx.fillRect(x + 150, baseY - 160, 400, 160);
    ctx.fillStyle = "#b95c2e"; ctx.fillRect(x + 150, baseY - 30, 400, 30);   // 折り返しの陰
    ctx.strokeStyle = "rgba(110,45,18,0.55)"; ctx.lineWidth = 2;             // 格子模様
    for (let gx = x + 168; gx < x + 520; gx += 26) { ctx.beginPath(); ctx.moveTo(gx, baseY - 160); ctx.lineTo(gx, baseY); ctx.stroke(); }
    for (let gy = baseY - 150; gy < baseY; gy += 24) { ctx.beginPath(); ctx.moveTo(x + 150, gy); ctx.lineTo(x + 545, gy); ctx.stroke(); }
    ctx.fillStyle = "rgba(255,220,160,0.35)";                                // 点の飾り
    for (let gx = x + 181; gx < x + 520; gx += 26) for (let gy = baseY - 138; gy < baseY; gy += 24) { ctx.beginPath(); ctx.arc(gx, gy, 2.4, 0, 7); ctx.fill(); }
    ctx.restore();

    // 支える腕（頭の下へ伸びる）
    ctx.fillStyle = white; ctx.fillRect(x + 60, baseY - 40, 120, 34);
    ctx.fillStyle = shade; ctx.beginPath(); ctx.ellipse(x + 66, baseY - 24, 16, 14, 0, 0, 7); ctx.fill();  // 手

    // 頭（左・手枕）

    // 螺髪（つぶつぶの髪）＋肉髻
    ctx.fillStyle = shade;
    ctx.beginPath(); ctx.arc(hx - 4, hy - 20, 42, Math.PI * 1.02, Math.PI * 1.98); ctx.fill();
    ctx.beginPath(); ctx.arc(hx - 2, hy - 50, 11, 0, 7); ctx.fill();                 // 肉髻（頭頂の盛り上がり）
    ctx.fillStyle = line;
    for (let r = 0; r < 5; r++) for (let c = 0; c < 7; c++) { ctx.beginPath(); ctx.arc(hx - 34 + c*11, hy - 42 + r*7, 2.2, 0, 7); ctx.fill(); }
    // 穏やかな顔
    ctx.strokeStyle = "#9a958a"; ctx.lineWidth = 2; ctx.lineCap = "round";
    ctx.beginPath(); ctx.arc(hx - 14, hy - 2, 7, 0.15, Math.PI - 0.15); ctx.stroke();   // 伏し目
    ctx.beginPath(); ctx.arc(hx + 10, hy - 2, 7, 0.15, Math.PI - 0.15); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(hx - 2, hy + 2); ctx.lineTo(hx - 2, hy + 12); ctx.stroke();  // 鼻
    ctx.beginPath(); ctx.arc(hx - 2, hy + 20, 8, 0.15, Math.PI - 0.15); ctx.stroke();        // 口
    // 長い耳たぶ
