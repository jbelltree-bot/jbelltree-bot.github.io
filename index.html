    }
  }
  // 戦闘機（ドランプ第2段階の空爆）
  function drawJets() {
    for (const j of jets) {
      ctx.save(); ctx.translate(j.x, j.y);
      const dir = j.vx > 0 ? 1 : -1; ctx.scale(dir, 1);
      ctx.fillStyle = "rgba(255,150,40,0.7)"; ctx.beginPath(); ctx.moveTo(-26, -2); ctx.lineTo(-40, 0); ctx.lineTo(-26, 2); ctx.closePath(); ctx.fill();   // 噴射
      ctx.fillStyle = "#5a6470"; ctx.beginPath(); ctx.moveTo(-26, 0); ctx.lineTo(20, -4); ctx.lineTo(30, 0); ctx.lineTo(20, 4); ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#48505a"; ctx.beginPath(); ctx.moveTo(-6, 0); ctx.lineTo(-18, 12); ctx.lineTo(2, 3); ctx.closePath(); ctx.fill();   // 主翼
      ctx.beginPath(); ctx.moveTo(-24, -1); ctx.lineTo(-30, -12); ctx.lineTo(-18, -2); ctx.closePath(); ctx.fill();   // 尾翼
      ctx.fillStyle = "#9fd0ee"; ctx.beginPath(); ctx.ellipse(12, -2, 5, 3, 0, 0, 7); ctx.fill();
      ctx.restore();
    }
  }
  // ミサイル着弾の画面いっぱいの大爆発（スクリーン座標・カメラ変換の外で描く）
  function drawBigBoom() {
    const prog = 1 - bigBoom / 60;          // 0→1
    const cx = W/2, cy = BOSS_GROUND - 20;
    ctx.save();
    // 白フラッシュ（最初の一瞬まぶしく）
    if (prog < 0.35) { ctx.fillStyle = "rgba(255,255,255," + (0.9 * (1 - prog/0.35)) + ")"; ctx.fillRect(0, 0, W, H); }
    // 広がる火球（画面をはみ出すほど大きく）
    const R = 40 + prog * (W * 0.95);
    const layers = [["rgba(255,80,20,",0.9],["rgba(255,150,30,",0.85],["rgba(255,210,70,",0.8],["rgba(255,255,200,",0.75]];
    for (let i = 0; i < layers.length; i++) {
      const rr = R * (1 - i*0.18);
      ctx.fillStyle = layers[i][0] + (layers[i][1] * (1 - prog) * (0.6 + 0.4*Math.sin(bigBoom*0.5))) + ")";
      ctx.beginPath(); ctx.arc(cx + (Math.random()-0.5)*8, cy + (Math.random()-0.5)*8, Math.max(1, rr), 0, 7); ctx.fill();
    }
    // もくもくキノコ雲風の暗い縁＋煙
    ctx.fillStyle = "rgba(60,30,10," + (0.35 * (1 - prog)) + ")";
    for (let i = 0; i < 10; i++) { const a = i/10*7 + bigBoom*0.1; const d = R*0.85; ctx.beginPath(); ctx.arc(cx + Math.cos(a)*d, cy + Math.sin(a)*d*0.7, R*0.28, 0, 7); ctx.fill(); }
    // 放射状の閃光
    ctx.strokeStyle = "rgba(255,240,180," + (0.7 * (1 - prog)) + ")"; ctx.lineWidth = 3;
    for (let i = 0; i < 12; i++) { const a = i/12*7; ctx.beginPath(); ctx.moveTo(cx + Math.cos(a)*R*0.3, cy + Math.sin(a)*R*0.3); ctx.lineTo(cx + Math.cos(a)*R*1.1, cy + Math.sin(a)*R*1.1); ctx.stroke(); }
    ctx.restore();
  }
  // ミサイル発射までのカウントダウンHUD（第2段階）
  function drawMissileTimer(b) {
    const sec = Math.max(0, Math.ceil(b.missileT / 60));
    const warn = b.doomT > 0 || sec <= 5;
    ctx.save();
    const bw = 264, bx = W/2 - bw/2, by = 46;
    ctx.fillStyle = "rgba(20,0,0,0.72)"; roundRectPath(bx, by, bw, 40, 8); ctx.fill();
    ctx.strokeStyle = warn && Math.floor(elapsed/6) % 2 === 0 ? "#ff5a5a" : "#e0323a"; ctx.lineWidth = 2; roundRectPath(bx, by, bw, 40, 8); ctx.stroke();
    ctx.textAlign = "left"; ctx.textBaseline = "middle";
    ctx.font = "18px 'Segoe UI',sans-serif"; ctx.fillText("🚀", bx + 10, by + 20);
    ctx.fillStyle = "#fff"; ctx.font = "bold 13px 'Segoe UI',sans-serif"; ctx.fillText("ミサイル発射まで", bx + 34, by + 13);
    const barW = bw - 90, frac = Math.max(0, b.missileT / 1200);
    ctx.fillStyle = "#3a1010"; ctx.fillRect(bx + 34, by + 22, barW, 8);
    ctx.fillStyle = sec <= 5 ? "#ff3a3a" : "#ffb020"; ctx.fillRect(bx + 34, by + 22, barW * frac, 8);
    ctx.fillStyle = "#fff"; ctx.textAlign = "right"; ctx.font = "bold 22px 'Segoe UI',sans-serif"; ctx.fillText(sec + "", bx + bw - 12, by + 20);
    if (b.doomT > 0) { ctx.fillStyle = "#ff3a3a"; ctx.textAlign = "center"; ctx.font = "bold 24px 'Segoe UI',sans-serif"; ctx.fillText("ミサイル発射！！", W/2, by + 62); }
    ctx.restore();
  }

  // クリウド第2ラウンドのボス描画（PK戦のストライカー絵を流用）
  function drawClovisBoss(b) {
    const cx = b.x + b.w/2, footY = b.y + b.h;
    // 影
    ctx.fillStyle = "rgba(0,0,0,0.18)"; ctx.beginPath(); ctx.ellipse(cx, footY, 26, 6, 0, 0, 7); ctx.fill();
    // 怒りモードのオーラ＋💢
    if (b.raging && b.alive) {
      ctx.save();
      const pl = 0.5 + 0.5 * Math.sin(b.t * 0.3);
      ctx.globalAlpha = 0.25 + pl * 0.2; ctx.fillStyle = "#ff5a4a";
      ctx.beginPath(); ctx.ellipse(cx, footY - 54, 40, 62, 0, 0, 7); ctx.fill();
      ctx.restore();
      ctx.font = "20px 'Segoe UI',sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("💢", cx + b.face * 26, footY - 108);
    }
    ctx.save();
    if (b.hurtFlash > 0 && Math.floor(b.hurtFlash/4) % 2 === 0) ctx.globalAlpha = 0.4;
    // つぶれ（被弾・撃破）を縦スケールで表現
    ctx.translate(cx, footY); ctx.scale(1, Math.max(0.15, b.squash)); ctx.translate(-cx, -footY);
    const opts = {};
    if (b.mode === "dribble" || b.mode === "dribwind") { opts.runup = b.runup; opts.lean = b.face * 0.16; }
    else if (b.kickLeg > 0.35 && b.face > 0) { opts.kickLeg = 1; }   // 右向きの蹴りだけ脚を出す（絵の都合）
    else if (b.mode !== "idle") { opts.lean = b.face * 0.08; }
    pkDrawClovis(cx, footY, opts);
    ctx.restore();
    // 撃破時のセリフ
    if (!b.alive && b.dyingT > 6 && b.dyingT < 78) drawClovisDefeatBubble(cx, b.y + 4);
  }

  // 撃破時の吹き出し「まいったよ…また勝負だ！」
  function drawClovisDefeatBubble(cx, topY) {
    const bw = 188, bh = 40, bx = Math.max(8, Math.min(W - bw - 8, cx - bw/2)), by = Math.max(8, topY - bh - 14);
    ctx.save();
    ctx.fillStyle = "#fff"; ctx.strokeStyle = "#1c2b33"; ctx.lineWidth = 2.5; ctx.lineJoin = "round";
    roundRectPath(bx, by, bw, bh, 12); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx - 8, by + bh); ctx.lineTo(cx + 2, by + bh + 12); ctx.lineTo(cx + 8, by + bh); ctx.closePath();
    ctx.fillStyle = "#fff"; ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx - 8, by + bh); ctx.lineTo(cx + 2, by + bh + 12); ctx.lineTo(cx + 8, by + bh); ctx.stroke();
    ctx.fillStyle = "#1a2830"; ctx.font = "bold 16px 'Segoe UI',sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("まいったよ…また勝負だ！", bx + bw/2, by + bh/2);
    ctx.restore();
  }

  // にせぺぎが投げるキュウリ／こうようがまく塩
  function drawCukes() {
    for (const cu of cukes) {
      if (cu.kind === "shock") {   // 四股の地響き（土ぼこりの波）
        ctx.save();
        ctx.translate(cu.x, cu.y);
        const s = cu.vx < 0 ? -1 : 1;
        ctx.fillStyle = "rgba(196,178,138,0.85)";
        ctx.beginPath();
        ctx.moveTo(-16, 8);
        ctx.quadraticCurveTo(-4, 8 - (10 + Math.sin(cu.t*0.5)*3), 4, 8);
        ctx.quadraticCurveTo(10, 8 - 6, 16, 8);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = "rgba(220,205,165,0.7)";
        for (let i = 0; i < 4; i++) { ctx.beginPath(); ctx.arc(s*(-10 + i*7), 2 - (i%2)*4 - Math.sin(cu.t*0.4+i)*2, 2.2, 0, 7); ctx.fill(); }
        ctx.restore();
        continue;
      }
      if (cu.kind === "tiger" || cu.kind === "gtiger") { drawTigerShot(cu.x, cu.y, cu.kind === "tiger", cu.t); continue; }
      if (cu.kind === "salt") {   // 塩の一つかみ（白い粒のかたまり）
        ctx.save();
        ctx.translate(cu.x, cu.y);
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        const dots = [[0,0],[-5,-2],[5,-1],[-2,4],[3,4],[-6,3],[6,3],[0,-5]];
        for (const [dx, dy] of dots) { ctx.beginPath(); ctx.arc(dx + Math.sin(cu.t*0.4)*1.5, dy, 2.4, 0, 7); ctx.fill(); }
        ctx.fillStyle = "#e7e0cf";
        for (const [dx, dy] of [[-3,0],[4,2],[-1,-3]]) { ctx.beginPath(); ctx.arc(dx, dy, 1.6, 0, 7); ctx.fill(); }
        ctx.restore();
        continue;
      }
      if (cu.kind === "egg") {   // カモメが落とす卵
        ctx.save();
        ctx.translate(cu.x, cu.y);
        ctx.rotate(Math.sin(cu.t*0.1)*0.3);
        ctx.fillStyle = "#f7efdc"; ctx.beginPath(); ctx.ellipse(0, 0, 7, 9, 0, 0, 7); ctx.fill();
        ctx.fillStyle = "#fffaf0"; ctx.beginPath(); ctx.ellipse(-2, -2, 3, 4.5, 0, 0, 7); ctx.fill();
        ctx.fillStyle = "rgba(196,176,138,0.5)";
        ctx.beginPath(); ctx.arc(2.5, 3, 1.3, 0, 7); ctx.arc(-3, 3.5, 1, 0, 7); ctx.arc(1, -4, 0.9, 0, 7); ctx.fill();
        ctx.restore();
        continue;
      }
      if (cu.kind === "bullet") {   // SPの銃弾
        ctx.save(); ctx.translate(cu.x, cu.y);
        ctx.fillStyle = "rgba(255,210,74,0.4)"; ctx.beginPath(); ctx.moveTo(-cu.vx*1.4, 0); ctx.lineTo(0, -3); ctx.lineTo(0, 3); ctx.closePath(); ctx.fill();
        ctx.fillStyle = "#f4c542"; ctx.beginPath(); ctx.ellipse(0, 0, 4, 2.4, 0, 0, 7); ctx.fill();
        ctx.restore();
        continue;
      }
      if (cu.kind === "shockwave") {   // 演説の衝撃波（地を這うドーム）
        ctx.save();
        for (let i = 0; i < 3; i++) {
          ctx.globalAlpha = (0.7 - i * 0.22) * (0.7 + 0.3 * Math.sin(cu.t * 0.4));
          ctx.strokeStyle = "#e8823c"; ctx.lineWidth = 4 - i;
          ctx.beginPath(); ctx.arc(cu.x, BOSS_GROUND, 11 + i * 8, Math.PI * 1.04, Math.PI * 1.96); ctx.stroke();
        }
        ctx.globalAlpha = 0.5; ctx.fillStyle = "#c8a06a";
        ctx.beginPath(); ctx.arc(cu.x - Math.sign(cu.vx) * 12, BOSS_GROUND - 3, 3, 0, 7); ctx.fill();
        ctx.restore(); ctx.globalAlpha = 1;
        continue;
      }
      if (cu.kind === "golf") {   // ゴルフボール
        ctx.fillStyle = "rgba(0,0,0,0.15)"; ctx.beginPath(); ctx.ellipse(cu.x, BOSS_GROUND + 1, 8, 3, 0, 0, 7); ctx.fill();
        ctx.save(); ctx.translate(cu.x, cu.y); ctx.rotate(cu.rot || 0);
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(0, 0, 8, 0, 7); ctx.fill();
        ctx.strokeStyle = "#c9ccd2"; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(0, 0, 8, 0, 7); ctx.stroke();
        ctx.fillStyle = "#d8dbe0"; for (let i = 0; i < 5; i++) { const a = i*1.3; ctx.beginPath(); ctx.arc(Math.cos(a)*3.5, Math.sin(a)*3.5, 1, 0, 7); ctx.fill(); }
        ctx.restore();
        continue;
      }
      if (cu.kind === "bomb") {   // 爆弾＋着地マーカー
        if (cu.y < BOSS_GROUND - 30) {
          const pulse = 0.5 + 0.5 * Math.sin(cu.t * 0.3);
          ctx.strokeStyle = "rgba(224,50,58," + (0.5 + pulse*0.4) + ")"; ctx.lineWidth = 3;
          ctx.beginPath(); ctx.ellipse(cu.markX, BOSS_GROUND - 3, 16, 6, 0, 0, 7); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(cu.markX - 9, BOSS_GROUND - 3); ctx.lineTo(cu.markX + 9, BOSS_GROUND - 3); ctx.moveTo(cu.markX, BOSS_GROUND - 11); ctx.lineTo(cu.markX, BOSS_GROUND + 5); ctx.stroke();
        }
        ctx.save(); ctx.translate(cu.x, cu.y);
        ctx.fillStyle = "#2a2e35"; ctx.beginPath(); ctx.arc(0, 0, 8, 0, 7); ctx.fill();
        ctx.fillStyle = "#4a4f58"; ctx.beginPath(); ctx.arc(-2.5, -2.5, 3, 0, 7); ctx.fill();
        ctx.fillStyle = "#7a5a2a"; ctx.fillRect(-1.5, -12, 3, 5);
        ctx.fillStyle = "#ffb020"; ctx.beginPath(); ctx.arc(0, -13, 2 + Math.sin(cu.t*0.6), 0, 7); ctx.fill();
        ctx.restore();
        continue;
      }
      if (cu.kind === "missile") {   // ミサイル
        ctx.save(); ctx.translate(cu.x, cu.y);
        ctx.fillStyle = "rgba(255,140,30,0.7)"; ctx.beginPath(); ctx.moveTo(-4, -16); ctx.lineTo(0, -16 - 14 - Math.random()*6); ctx.lineTo(4, -16); ctx.closePath(); ctx.fill();
        ctx.fillStyle = "#d0d5da"; roundRectPath(-5, -16, 10, 26, 4); ctx.fill();
        ctx.fillStyle = "#e0323a"; ctx.beginPath(); ctx.moveTo(-5, 10); ctx.lineTo(0, 20); ctx.lineTo(5, 10); ctx.closePath(); ctx.fill();
        ctx.fillStyle = "#e0323a"; ctx.fillRect(-8, -4, 3, 7); ctx.fillRect(5, -4, 3, 7);
        ctx.restore();
        continue;
      }
      if (cu.kind === "burger") {   // ドランプが投げるハンバーガー
        ctx.save(); ctx.translate(cu.x, cu.y); ctx.rotate(cu.t * 0.12);
        ctx.fillStyle = "#e0a94a"; ctx.beginPath(); ctx.ellipse(0, -5, 12, 6, 0, Math.PI, 0); ctx.fill();   // 上バンズ
        ctx.fillStyle = "#fff"; for (let i=-2;i<=2;i++){ ctx.beginPath(); ctx.arc(i*4, -8, 1, 0, 7); ctx.fill(); }   // ごま
        ctx.fillStyle = "#6cae3e"; ctx.fillRect(-12, -1, 24, 2);   // レタス
        ctx.fillStyle = "#b5442f"; ctx.fillRect(-11, 0, 22, 3);    // パティ
        ctx.fillStyle = "#f4c542"; ctx.fillRect(-11, 2, 22, 1.5);  // チーズ
        ctx.fillStyle = "#d99a3c"; ctx.beginPath(); ctx.ellipse(0, 5, 12, 5, 0, 0, Math.PI); ctx.fill();   // 下バンズ
        ctx.restore();
        continue;
      }
      if (cu.kind === "sball") {   // グラウンダーシュート（地を這うボール）＋影
        ctx.fillStyle = "rgba(0,0,0,0.15)"; ctx.beginPath(); ctx.ellipse(cu.x, BOSS_GROUND + 1, 12, 4, 0, 0, 7); ctx.fill();
        drawSoccerBallAt(cu.x, cu.y, 13, cu.rot || 0);
        continue;
      }
      if (cu.kind === "lob") {   // オーバーヘッド・ロブ（落下中は着地マーカーを表示）
        if (cu.y < BOSS_GROUND - 26) {
          ctx.save();
          const pulse = 0.5 + 0.5 * Math.sin(cu.t * 0.3);
          ctx.strokeStyle = "rgba(217,35,42," + (0.55 + pulse * 0.4) + ")"; ctx.lineWidth = 3;
          ctx.beginPath(); ctx.ellipse(cu.markX, BOSS_GROUND - 3, 17, 6, 0, 0, 7); ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(cu.markX - 9, BOSS_GROUND - 3); ctx.lineTo(cu.markX + 9, BOSS_GROUND - 3);
          ctx.moveTo(cu.markX, BOSS_GROUND - 11); ctx.lineTo(cu.markX, BOSS_GROUND + 5);
          ctx.stroke();
          ctx.restore();
        }
        drawSoccerBallAt(cu.x, cu.y, 11, cu.t * 0.3);
        continue;
      }
      ctx.save();
      ctx.translate(cu.x, cu.y);
      ctx.rotate(cu.t * 0.18);
      ctx.fillStyle = "#4e8a2b";
      ctx.beginPath(); ctx.ellipse(0, 0, 13, 7, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#6cae3e";
      ctx.beginPath(); ctx.ellipse(0, 0, 12, 6, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#8cc655";
      ctx.beginPath(); ctx.ellipse(-1, -1.5, 8.5, 3, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#3f7a24";
      for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.arc(i*5, 1.5, 1, 0, 7); ctx.fill(); }
      ctx.fillStyle = "#5a8f2f"; ctx.fillRect(11, -1.5, 4, 3);   // へた
      ctx.restore();
    }
  }

  // ===== タイガーショット（上段＝high／下段＝low）の描画 =====
  function drawTigerShot(x, y, high, t) {
    ctx.save();
    ctx.translate(x, y);
    const core = high ? "#fff0c0" : "#ffe0a8";
    const c1 = high ? "#ffca38" : "#ff9a2e";
    const c2 = high ? "#ff8c1a" : "#ff5a1a";
    // 後ろへ伸びる炎の尾（右へ）
    ctx.fillStyle = high ? "rgba(255,170,40,0.4)" : "rgba(255,110,30,0.4)";
    ctx.beginPath(); ctx.moveTo(4, -7); ctx.lineTo(30 + Math.sin(t*0.5)*5, 0); ctx.lineTo(4, 7); ctx.closePath(); ctx.fill();
    // 本体
    ctx.fillStyle = c2; ctx.beginPath(); ctx.ellipse(0, 0, 17, 13, 0, 0, 7); ctx.fill();
    ctx.fillStyle = c1; ctx.beginPath(); ctx.ellipse(-1, -1, 13, 10, 0, 0, 7); ctx.fill();
    // 虎のシマ
    ctx.strokeStyle = "rgba(120,40,0,0.65)"; ctx.lineWidth = 2;
    for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.moveTo(i*6, -9); ctx.lineTo(i*6 - 2, 9); ctx.stroke(); }
    // 中心の光
    ctx.fillStyle = core; ctx.beginPath(); ctx.ellipse(-2, -2, 6, 4.5, 0, 0, 7); ctx.fill();
    ctx.restore();
  }
  function drawHazards() {
    for (const h of hazards) {
      if (h.x < camX - 60 || h.x > camX + W + 60) continue;
      drawTigerShot(h.x, h.y, h.kind === "tiger", h.t);
    }
  }

  // ===== ポルトガル：ボール・樽・敵・風景・PK戦 =====
  function pentagon(cx, cy, r) {
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = i * (Math.PI * 2 / 5) - Math.PI / 2;
      const x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath(); ctx.fill();
  }
  function heart(cx, cy, s) {
    ctx.beginPath(); ctx.arc(cx - s * 0.5, cy - s * 0.3, s * 0.55, 0, 7); ctx.arc(cx + s * 0.5, cy - s * 0.3, s * 0.55, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx - s, cy - s * 0.1); ctx.lineTo(cx + s, cy - s * 0.1); ctx.lineTo(cx, cy + s); ctx.closePath(); ctx.fill();
  }

  // サッカーボール（中心cx,cy・半径r）を描く共通関数
  function drawSoccerBallAt(cx, cy, r, rot) {
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(rot || 0);
    ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(0, 0, r, 0, 7); ctx.fill();
    ctx.strokeStyle = "#c9ccd2"; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(0, 0, r, 0, 7); ctx.stroke();
    ctx.fillStyle = "#20242c"; pentagon(0, 0, r * 0.42);
    for (let i = 0; i < 5; i++) {
      const a = i * (Math.PI * 2 / 5) - Math.PI / 2;
      ctx.beginPath(); ctx.arc(Math.cos(a) * r * 0.72, Math.sin(a) * r * 0.72, r * 0.15, 0, 7); ctx.fill();
    }
    ctx.restore();
  }

  // 蹴れるサッカーボール
  function drawBalls() {
    for (const ball of balls) {
      if (ball.x + ball.w < camX - 40 || ball.x > camX + W + 40) continue;
      const cx = ball.x + ball.w / 2, cy = ball.y + ball.h / 2, r = ball.w / 2;
      ctx.fillStyle = "rgba(0,0,0,0.15)";
      ctx.beginPath(); ctx.ellipse(cx, ball.y + ball.h + 2, r * 0.9, 4, 0, 0, 7); ctx.fill();
      ctx.save(); ctx.translate(cx, cy); ctx.rotate(ball.rot || 0);
      ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(0, 0, r, 0, 7); ctx.fill();
      ctx.strokeStyle = "#c9ccd2"; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(0, 0, r, 0, 7); ctx.stroke();
      ctx.fillStyle = "#20242c"; pentagon(0, 0, r * 0.42);
      for (let i = 0; i < 5; i++) {
        const a = i * (Math.PI * 2 / 5) - Math.PI / 2;
        ctx.beginPath(); ctx.arc(Math.cos(a) * r * 0.72, Math.sin(a) * r * 0.72, r * 0.15, 0, 7); ctx.fill();
      }
      ctx.restore();
    }
  }

  // 転がってくるポルトワインの樽
  function drawBarrels() {
    for (const bl of barrels) {
      if (bl.x + bl.w < camX - 40 || bl.x > camX + W + 40) continue;
      const cx = bl.x + bl.w / 2, cy = bl.y + bl.h / 2, R = bl.w / 2;
      ctx.fillStyle = "rgba(0,0,0,0.15)";
      ctx.beginPath(); ctx.ellipse(cx, bl.y + bl.h + 2, R * 0.9, 4, 0, 0, 7); ctx.fill();
      ctx.save(); ctx.translate(cx, cy); ctx.rotate(bl.rot || 0);
      ctx.fillStyle = "#8a4a26"; ctx.beginPath(); ctx.arc(0, 0, R, 0, 7); ctx.fill();
      ctx.fillStyle = "#9c5a30"; ctx.beginPath(); ctx.arc(0, 0, R * 0.82, 0, 7); ctx.fill();
      ctx.strokeStyle = "rgba(60,30,15,0.5)"; ctx.lineWidth = 2;
      for (let i = -2; i <= 2; i++) { ctx.beginPath(); ctx.moveTo(i * 5, -R * 0.85); ctx.lineTo(i * 5, R * 0.85); ctx.stroke(); }
      ctx.strokeStyle = "#c9b48a"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(0, 0, R * 0.9, 0, 7); ctx.stroke();
      ctx.beginPath(); ctx.arc(0, 0, R * 0.45, 0, 7); ctx.stroke();
      ctx.restore();
    }
  }

  // バルセロスのオンドリ
  // ワニ（アメリカ・沼地）
  function drawGator(e) {
    ctx.save();
    const cx = e.x + e.w/2, by = e.y + e.h;
    ctx.translate(cx, by);
    if (!e.alive) { ctx.scale(1.05, 0.25); ctx.globalAlpha = 0.7; }
    const dir = e.vx > 0 ? 1 : -1;
    ctx.scale(dir, 1);
    const wob = Math.sin(e.t*0.2)*1.5;
    const jaw = e.alive ? (Math.sin(e.t*0.1) > 0.4 ? 4 : 0) : 0;   // 口パク
    // 尾
    ctx.fillStyle = "#4f8f43";
    ctx.beginPath(); ctx.moveTo(-16, -7); ctx.lineTo(-30, -2); ctx.lineTo(-16, -1); ctx.closePath(); ctx.fill();

      ctx.fillStyle = "#bcc6cd"; ctx.fillRect(x, GROUND_Y - 72, 320, 14);

    ctx.fillStyle = "#4f9ccb"; ctx.fillRect(camX, GROUND_Y - 60, W, 10);
    ctx.fillStyle = "rgba(255,255,255,0.35)";
    for (let i = 0; i < 12; i++) ctx.fillRect(camX + (i * 70 + (elapsed % 70)), GROUND_Y - 57, 22, 2);

    for (let i = 0; i * 150 < LEVEL_W; i++) {
      const x = i * 150, bw = 92;
      if (x + bw < camX - 40 || x > camX + W + 40) continue;
      const h = 96 + ((i * 37) % 40), top = GROUND_Y - h;

        ctx.fillStyle = "rgba(47,111,176,0.45)";

      ctx.beginPath(); ctx.moveTo(x - 6, top); ctx.lineTo(x + bw / 2, top - 22); ctx.lineTo(x + bw + 6, top); ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#c96a34"; ctx.fillRect(x - 6, top - 2, bw + 12, 4);

  // ===== PK戦の描画 =====
  function drawPK() {
    drawPKArena();

    drawPKCourse(attack);

    else { drawMaruKeeper(); drawClovisKicker(); drawPKBall(); }

    drawPKHud(attack);
    if (pk.sub === "win" || pk.sub === "lose") drawPKResult();

  function drawPKCourse(attack) {
    const selecting = pk.sub === "aim" || pk.sub === "dready" || pk.sub === "dwind";
    if (!selecting) return;
    const zoneW = (PKX.goalR - PKX.goalL) / 3;
    for (let i = 0; i < 3; i++) {
      const zx = PKX.goalL + i * zoneW;
      ctx.fillStyle = (i === pk.cursor) ? "rgba(255,211,77,0.4)" : "rgba(255,211,77,0.1)";
      ctx.fillRect(zx, PKX.goalTop, zoneW, PKX.goalH);
      if (i === pk.cursor) { ctx.strokeStyle = "#ffd34d"; ctx.lineWidth = 4; ctx.strokeRect(zx, PKX.goalTop, zoneW, PKX.goalH); }
    }
    ctx.fillStyle = "#fff2b0"; ctx.font = "bold 14px 'Segoe UI',sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(attack ? "ねらうコース" : "とぶ方向", PKX.spotX, PKX.goalTop - 14);

  function drawClovisKeeper() {
    let dx = 0, lean = 0, arms = 0.15;
    if (pk.sub === "ashot" || pk.sub === "ares") {
      const dir = pk.keeperDir - 1;
      dx = dir * 92 * pk.keeperT; lean = dir * 0.5 * pk.keeperT; arms = 1;
    }
    pkDrawClovis(PKX.spotX + dx, 262, { lean, armsUp: arms });
  }
  function drawClovisKicker() {
    let lean = 0, kickLeg = 0, runup = 0;
    if (pk.sub === "dready") runup = pk.t;
    // ヒントは「けり出す直前」に「ほんの少しだけ」出す（早くから方向が丸わかりにならない＝難しく）
    if (pk.sub === "dwind" && pk.t > 8) lean = (pk.kickerDir - 1) * 0.16;   // 蹴る方向の予備動作（ver7.8＝早め＆はっきり）
    if (pk.sub === "dshot" || pk.sub === "dres") { kickLeg = 1; lean = (pk.kickerDir - 1) * 0.16; }
    pkDrawClovis(PKX.spotX - 30, 404, { lean, kickLeg, runup });
  }
  function drawMaruKicker() {
    const kick = pk.sub === "ashot" && pk.t < 10;
    pkDrawMaru(PKX.spotX + 42, 404, { kick });
  }
  function drawMaruKeeper() {
    let dx = 0, lean = 0, dive = false;
    if (pk.sub === "dshot" || pk.sub === "dres") {
      const dir = pk.dive - 1;
      dx = dir * 96 * pk.diverT; lean = dir * 0.5 * pk.diverT; dive = pk.diverT > 0.2;

  // クリウド（ロナウド系ストライカー・オリジナル寄せ）
  function pkDrawClovis(cx, footY, o) {
    o = o || {};
    ctx.save(); ctx.translate(cx, footY);
    if (o.lean) ctx.rotate(o.lean);
    ctx.fillStyle = "rgba(0,0,0,0.18)"; ctx.beginPath(); ctx.ellipse(0, 2, 22, 5, 0, 0, 7); ctx.fill();
    const legSwing = o.runup ? Math.sin(o.runup * 0.4) * 8 : 0;
    // 脚（肌）
    ctx.strokeStyle = "#dca87e"; ctx.lineWidth = 8; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(-6, -40); ctx.lineTo(-8 + legSwing, -6); ctx.stroke();
    if (o.kickLeg) { ctx.beginPath(); ctx.moveTo(6, -40); ctx.lineTo(26, -30); ctx.stroke(); }
    else { ctx.beginPath(); ctx.moveTo(6, -40); ctx.lineTo(8 - legSwing, -6); ctx.stroke(); }
    // 緑のソックス
    ctx.strokeStyle = "#1f7a44"; ctx.lineWidth = 8;
    ctx.beginPath(); ctx.moveTo(-8 + legSwing, -11); ctx.lineTo(-8 + legSwing, -4); ctx.stroke();
    if (o.kickLeg) { ctx.beginPath(); ctx.moveTo(23, -31); ctx.lineTo(27, -30); ctx.stroke(); }
    else { ctx.beginPath(); ctx.moveTo(8 - legSwing, -11); ctx.lineTo(8 - legSwing, -4); ctx.stroke(); }
    // シューズ（黒）
    ctx.fillStyle = "#1a1a1a";
    ctx.beginPath(); ctx.ellipse(-8 + legSwing, -2, 6, 3, 0, 0, 7); ctx.fill();
    if (o.kickLeg) { ctx.beginPath(); ctx.ellipse(29, -29, 6, 3, 0, 0, 7); ctx.fill(); }
    else { ctx.beginPath(); ctx.ellipse(8 - legSwing, -2, 6, 3, 0, 0, 7); ctx.fill(); }
    // 緑の短パン
    ctx.fillStyle = "#1f7a44"; roundRectPath(-12, -58, 24, 22, 4); ctx.fill();
    ctx.fillStyle = "#186235"; ctx.fillRect(-12, -44, 24, 3);
    // 赤いユニフォーム（胴）
    ctx.fillStyle = "#d8232a"; roundRectPath(-14, -92, 28, 38, 6); ctx.fill();
    ctx.fillStyle = "#c01d24"; ctx.fillRect(-14, -60, 28, 4);
    // 緑のV襟
    ctx.strokeStyle = "#0a6b3b"; ctx.lineWidth = 3; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(-7, -91); ctx.lineTo(0, -84); ctx.lineTo(7, -91); ctx.stroke();
    // 左胸プーマ（白）＋右胸クレスト（金）
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.ellipse(-8, -84, 2.4, 1.4, -0.3, 0, 7); ctx.fill();
    ctx.fillStyle = "#f5d20c"; ctx.beginPath(); ctx.arc(8, -84, 2.2, 0, 7); ctx.fill();
    // 背番号7
    ctx.fillStyle = "#fff"; ctx.font = "bold 15px 'Segoe UI',sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText("7", 0, -72);
    // 腕（赤い長袖＋肌の手）
    ctx.lineCap = "round";
    if (o.armsUp) {
      const a = o.armsUp;
      ctx.strokeStyle = "#d8232a"; ctx.lineWidth = 7;
      ctx.beginPath(); ctx.moveTo(-12, -86); ctx.lineTo(-14 - 14 * a, -94 - 10 * a); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(12, -86); ctx.lineTo(14 + 14 * a, -94 - 10 * a); ctx.stroke();
      ctx.fillStyle = "#dca87e"; ctx.beginPath(); ctx.arc(-14 - 14 * a, -94 - 10 * a, 4, 0, 7); ctx.arc(14 + 14 * a, -94 - 10 * a, 4, 0, 7); ctx.fill();
    } else {
      ctx.strokeStyle = "#d8232a"; ctx.lineWidth = 7;
      ctx.beginPath(); ctx.moveTo(-12, -86); ctx.lineTo(-19, -64); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(12, -86); ctx.lineTo(19, -64); ctx.stroke();
      ctx.fillStyle = "#dca87e"; ctx.beginPath(); ctx.arc(-19, -63, 3.6, 0, 7); ctx.arc(19, -63, 3.6, 0, 7); ctx.fill();
    }
    // キャプテンマーク（左腕・青）
    ctx.strokeStyle = "#2b4aa0"; ctx.lineWidth = 8; ctx.beginPath(); ctx.moveTo(-13, -82); ctx.lineTo(-14, -77); ctx.stroke();
    // 頭（肌）
    ctx.fillStyle = "#e3b487"; ctx.beginPath(); ctx.arc(0, -104, 10, 0, 7); ctx.fill();
    // 髪（短髪：トップは短めのスパイク、サイドは刈り上げ、生え際は高め）
    ctx.fillStyle = "#2a2018";
    ctx.beginPath();
    ctx.moveTo(-9.5, -109);
    ctx.quadraticCurveTo(-10.5, -113.5, -6, -114);
    ctx.quadraticCurveTo(0, -115.5, 6, -114);
    ctx.quadraticCurveTo(10.5, -113.5, 9.5, -109);
    ctx.quadraticCurveTo(5, -110.5, 2.4, -109.6);       // 生え際（少しM字）
    ctx.quadraticCurveTo(0, -108.8, -2.4, -109.6);
    ctx.quadraticCurveTo(-5, -110.5, -9.5, -109);
    ctx.closePath(); ctx.fill();
    // トップの小さなスパイク（短め）
    for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.moveTo(i*5 - 2, -113.5); ctx.lineTo(i*5 + 0.5, -117); ctx.lineTo(i*5 + 2, -113.5); ctx.closePath(); ctx.fill(); }
    // サイドの刈り上げ（薄く短く）
    ctx.fillStyle = "#3a2c20";
    ctx.fillRect(-10, -110, 1.6, 5); ctx.fillRect(8.4, -110, 1.6, 5);
    // 眉＋目
    ctx.strokeStyle = "#241c14"; ctx.lineWidth = 1.4; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(-6.3, -107); ctx.lineTo(-1.8, -106.6); ctx.moveTo(1.8, -106.6); ctx.lineTo(6.3, -107); ctx.stroke();
    ctx.fillStyle = "#20303a"; ctx.beginPath(); ctx.arc(-3.6, -104.5, 1.5, 0, 7); ctx.arc(3.6, -104.5, 1.5, 0, 7); ctx.fill();
    // 大きな笑顔（白い歯）
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.ellipse(0, -99.5, 4.2, 2.4, 0, 0, Math.PI); ctx.fill();
    ctx.strokeStyle = "#a85a3a"; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(0, -100, 4.4, 0.15, Math.PI - 0.15); ctx.stroke();
    ctx.restore();
  }

  // PK戦のまるりん（簡易・キック／セーブ姿勢）
  function pkDrawMaru(cx, footY, o) {
    o = o || {};
    ctx.save(); ctx.translate(cx, footY);
    if (o.lean) ctx.rotate(o.lean);
    ctx.fillStyle = "rgba(0,0,0,0.18)"; ctx.beginPath(); ctx.ellipse(0, 2, 16, 4, 0, 0, 7); ctx.fill();

    else if (o.dive) { ctx.beginPath(); ctx.ellipse(-14, -4, 6, 4, 0, 0, 7); ctx.fill(); ctx.beginPath(); ctx.ellipse(14, -4, 6, 4, 0, 0, 7); ctx.fill(); }
    else { ctx.beginPath(); ctx.ellipse(-6, -2, 6, 4, 0, 0, 7); ctx.fill(); ctx.beginPath(); ctx.ellipse(6, -2, 6, 4, 0, 0, 7); ctx.fill(); }
    ctx.fillStyle = "#b8bcc4"; ctx.beginPath(); ctx.ellipse(0, -20, 17, 19, 0, 0, 7); ctx.fill();
    ctx.fillStyle = "#efe1c6"; ctx.beginPath(); ctx.ellipse(-9, -36, 5, 6, -0.3, 0, 7); ctx.fill(); ctx.beginPath(); ctx.ellipse(9, -36, 5, 6, 0.3, 0, 7); ctx.fill();
    ctx.fillStyle = "#fbf3e2"; ctx.beginPath(); ctx.ellipse(2, -16, 13, 15, 0, 0, 7); ctx.fill();
    ctx.fillStyle = "#4fb4ea"; ctx.beginPath(); ctx.arc(-3, -24, 4, 0, 7); ctx.arc(7, -24, 3.6, 0, 7); ctx.fill();
    ctx.fillStyle = "#15151a"; ctx.beginPath(); ctx.arc(-3, -24, 3, 0, 7); ctx.arc(7, -24, 2.6, 0, 7); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(-2, -25, 1.1, 0, 7); ctx.arc(8, -25, 1, 0, 7); ctx.fill();
    ctx.fillStyle = "#161619"; ctx.beginPath(); ctx.ellipse(3, -18, 3.4, 2.8, 0, 0, 7); ctx.fill();
    // 口（ハムスターのにっこり）
    ctx.strokeStyle = "#3a3128"; ctx.lineWidth = 1.4; ctx.lineCap = "round";

      ctx.fillStyle = "#f6e2c0"; ctx.beginPath(); ctx.arc(-17, -31, 3, 0, 7); ctx.arc(17, -31, 3, 0, 7); ctx.fill();
      ctx.fillStyle = "#f0bd98"; ctx.beginPath(); ctx.arc(-17, -30, 1.3, 0, 7); ctx.arc(17, -30, 1.3, 0, 7); ctx.fill();
    }
    ctx.restore();
  }

  function pkScoreDot(x, y, res) {
    if (res === "goal") { ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(x, y, 8, 0, 7); ctx.fill(); ctx.strokeStyle = "#222"; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(x, y, 8, 0, 7); ctx.stroke(); ctx.fillStyle = "#20242c"; ctx.beginPath(); ctx.arc(x, y, 3, 0, 7); ctx.fill(); }
    else if (res === "miss") { ctx.strokeStyle = "rgba(255,255,255,0.85)"; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.moveTo(x - 5, y - 5); ctx.lineTo(x + 5, y + 5); ctx.moveTo(x + 5, y - 5); ctx.lineTo(x - 5, y + 5); ctx.stroke(); }
    else { ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 1.6; ctx.beginPath(); ctx.arc(x, y, 8, 0, 7); ctx.stroke(); }
  }

  function drawPKHud(attack) {
    // スコアボード
    ctx.fillStyle = "rgba(0,0,0,0.4)"; roundRectPath(14, 12, 240, 64, 10); ctx.fill();
    ctx.textAlign = "left"; ctx.textBaseline = "middle"; ctx.font = "bold 15px 'Segoe UI',sans-serif";
    ctx.fillStyle = "#fff"; ctx.fillText("まるりん", 26, 30);
    ctx.fillStyle = "#ffd34d"; ctx.fillText("クリウド", 26, 58);
    for (let i = 0; i < 3; i++) {
      pkScoreDot(150 + i * 28, 30, pk.myRes[i]);
      pkScoreDot(150 + i * 28, 58, pk.foeRes[i] === "goal" ? "goal" : (pk.foeRes[i] === "save" ? "miss" : undefined));
    }
    // ターン表示
    ctx.fillStyle = attack ? "#2f7d32" : "#c0392b"; roundRectPath(W - 250, 12, 236, 30, 8); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.font = "bold 15px 'Segoe UI',sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    const num = Math.min(3, Math.floor(pk.kick / 2) + 1);
    ctx.fillText((attack ? "こうげき" : "ぼうぎょ") + "　" + num + " / 3本目", W - 132, 27);
    // メッセージ
    let msg = "", big = false, good = false;
    if (pk.sub === "aim") msg = "← →  コースをえらぶ　　ジャンプ  シュート！";
    else if (pk.sub === "dready" || pk.sub === "dwind") msg = "← →  とぶ方向をえらんで、とめろ！";
    else if (pk.sub === "ares" || pk.sub === "dres") {
      big = true;
      if (pk.outcome === "goal" && attack) { msg = "ゴール！！"; good = true; }
      else if (pk.outcome === "save" && attack) msg = "とめられた…";
      else if (pk.outcome === "save" && !attack) { msg = "スーパーセーブ！！"; good = true; }
      else if (pk.outcome === "goal" && !attack) msg = "きめられた…";
    }
    if (msg) {
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.font = big ? "bold 30px 'Segoe UI',sans-serif" : "16px 'Segoe UI',sans-serif";
      const w = ctx.measureText(msg).width + 40;
      ctx.fillStyle = "rgba(0,0,0,0.45)"; ctx.fillRect(W / 2 - w / 2, big ? 96 : H - 42, w, big ? 46 : 28);
      ctx.fillStyle = big ? (good ? "#ffe14d" : "#ff9a9a") : "#fff";
      ctx.fillText(msg, W / 2, big ? 119 : H - 28);
    }
  }

  }

  // クリウドの顔アップ（胸から上のバストショット）
  function drawClovisPortrait(cx, cy, sc) {

    ctx.quadraticCurveTo(10.5, -113.5, 9.5, -109);
    ctx.quadraticCurveTo(5, -110.5, 2.4, -109.6);

    for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.moveTo(i*5 - 2, -113.5); ctx.lineTo(i*5 + 0.5, -117); ctx.lineTo(i*5 + 2, -113.5); ctx.closePath(); ctx.fill(); }
    ctx.fillStyle = "#3a2c20"; ctx.fillRect(-10, -110, 1.6, 5); ctx.fillRect(8.4, -110, 1.6, 5);

  // 吹き出し（左向きのしっぽ付き）
  function drawSpeechBubble(bx, by, bw, bh, tailX, tailY) {
    ctx.save();
    ctx.fillStyle = "#fff"; ctx.strokeStyle = "#1c2b33"; ctx.lineWidth = 3; ctx.lineJoin = "round";
    roundRectPath(bx, by, bw, bh, 16); ctx.fill(); ctx.stroke();
    const ay = by + bh * 0.62;                       // しっぽの付け根
    ctx.beginPath(); ctx.moveTo(bx + 2, ay - 15); ctx.lineTo(tailX, tailY); ctx.lineTo(bx + 2, ay + 15); ctx.closePath();
    ctx.fillStyle = "#fff"; ctx.fill();              // 付け根の枠線を白で覆う
    ctx.beginPath(); ctx.moveTo(bx + 2, ay - 15); ctx.lineTo(tailX, tailY); ctx.lineTo(bx + 2, ay + 15); ctx.stroke();
    ctx.restore();
  }

  function drawPKResult() {
    ctx.save();
    const win = pk.sub === "win";
    ctx.fillStyle = win ? "rgba(0,40,10,0.62)" : "rgba(30,0,0,0.66)"; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    // 勝ちは紙吹雪
    if (win) {
      for (let i = 0; i < 40; i++) { const t = pk.t * 2 + i * 37; const x = (i * 61 + t * 0.6) % W; const y = (t * 1.2 + i * 40) % H; ctx.fillStyle = ["#e94560", "#ffd34d", "#66cc44", "#3aa8e0", "#fff"][i % 5]; ctx.fillRect(x, y, 6, 6); }
    }
    // 見出し
    if (win) { ctx.fillStyle = "#ffd34d"; ctx.font = "bold 42px 'Segoe UI',sans-serif"; ctx.fillText("かった！ 🎉", W / 2, 70); }
    else { ctx.fillStyle = "#ff8a8a"; ctx.font = "bold 40px 'Segoe UI',sans-serif"; ctx.fillText("まけ…", W / 2, 66); }

    // クリウドの顔＋吹き出し（少し遅れて出す）
    if (pk.t > 20) {
      const px = 168, py = 250;
      drawClovisPortrait(px, py, 2.7);
      ctx.fillStyle = "#8be08b"; ctx.font = "bold 14px 'Segoe UI',sans-serif"; ctx.textAlign = "center";
      ctx.fillText("クリウド", px, py + 66);
      // 吹き出し
      const bx = 288, bw = 468, by = 168, bh = win ? 96 : 118;
      drawSpeechBubble(bx, by, bw, bh, px + 42, py - 14);
      ctx.fillStyle = "#1a2830"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      const bcx = bx + bw / 2;
      if (win) {
        ctx.font = "bold 26px 'Segoe UI',sans-serif";
        ctx.fillText("ケンカで決着付けようや", bcx, by + bh / 2);
      } else {
        ctx.font = "bold 23px 'Segoe UI',sans-serif";
        ctx.fillText("なぜ笑うんだい？", bcx, by + 42);
        ctx.fillText("まるりんのサッカーは上手だよ", bcx, by + 78);
      }
    }

    // 下部メッセージ
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    if (win) { ctx.fillStyle = "#fff"; ctx.font = "20px 'Segoe UI',sans-serif"; ctx.fillText("PK  " + pk.my + " - " + pk.foe + "  クリウド", W / 2, 330); }
    else { ctx.fillStyle = "#ffd34d"; ctx.font = "18px 'Segoe UI',sans-serif"; ctx.fillText((lives - 1 > 0) ? "もういちど ちょうせん！" : "ゲームオーバー…", W / 2, 336); }
    ctx.restore();
  }

  // ===== タイランドの風景（寺院・ヤシ・ゾウ）=====
  function thaiWat(x, h) {
    const baseY = GROUND_Y, w = h * 0.9;
    ctx.fillStyle = "#e7c46a";
    ctx.fillRect(x, baseY - h*0.55, w, h*0.55);           // 本体
    ctx.fillStyle = "#d8a94a";
    // 段々の屋根
    for (let i = 0; i < 3; i++) {
      const ry = baseY - h*0.55 - i*h*0.14, rw = w*(0.9 - i*0.22);
      ctx.beginPath(); ctx.moveTo(x + w/2 - rw/2, ry); ctx.lineTo(x + w/2, ry - h*0.16); ctx.lineTo(x + w/2 + rw/2, ry); ctx.closePath(); ctx.fill();
    }
    // 尖塔
    ctx.fillStyle = "#c8952f";
    ctx.beginPath(); ctx.moveTo(x + w/2 - 5, baseY - h*0.55 - 3*h*0.14);
    ctx.lineTo(x + w/2, baseY - h - 6); ctx.lineTo(x + w/2 + 5, baseY - h*0.55 - 3*h*0.14); ctx.closePath(); ctx.fill();
  }
  function palm(x, sc) {
    ctx.save(); ctx.translate(x, GROUND_Y); ctx.scale(sc, sc);
    ctx.strokeStyle = "#8a5f38"; ctx.lineWidth = 8; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(-6, -60, 6, -110); ctx.stroke();
    ctx.fillStyle = "#3f9a4a";
    for (let a = 0; a < 5; a++) {
      const ang = -Math.PI/2 + (a - 2) * 0.6;

  function drawSnake(e) {

  // 階段状の寺院（ずんぐりした石のピラミッド＋尖塔）
  function drawStepTemple(x, baseY) {
    const steps = 5, sh = 15, base = 150;
    for (let i = 0; i < steps; i++) {
      const w = base - i*22;
      ctx.fillStyle = i % 2 ? "#c8b77e" : "#d6c58e";
      ctx.fillRect(x + i*11, baseY - (i+1)*sh, w, sh);
      ctx.fillStyle = "rgba(150,130,80,0.5)";
      for (let gx = x + i*11 + 10; gx < x + i*11 + w - 6; gx += 20) ctx.fillRect(gx, baseY - (i+1)*sh + 3, 2, sh - 6);
    }
    // 頂上の尖り
    const topW = base - steps*22, tx = x + steps*11;
    ctx.fillStyle = "#c8b77e";
    ctx.beginPath(); ctx.moveTo(tx, baseY - steps*sh); ctx.lineTo(tx + topW/2, baseY - steps*sh - 30); ctx.lineTo(tx + topW, baseY - steps*sh); ctx.closePath(); ctx.fill();
  }

  // 寝釈迦仏（横たわった大仏の石像）
  function drawRecliningBuddha(x, baseY) {
    const white = "#e9e6dd", shade = "#d3cfc2", line = "#b8b3a4";
    // 台座
    ctx.fillStyle = "#cfcabb"; ctx.fillRect(x, baseY - 8, 540, 18);
    ctx.fillStyle = "#bdb8a8"; ctx.fillRect(x, baseY + 6, 540, 6);

    ctx.quadraticCurveTo(x + 330, baseY - 150, x + 425, baseY - 108);  // 腰
    ctx.quadraticCurveTo(x + 520, baseY - 78, x + 545, baseY - 6);     // 足先

    ctx.strokeStyle = "rgba(110,45,18,0.55)"; ctx.lineWidth = 2;             // 格子模様
    for (let gx = x + 168; gx < x + 520; gx += 26) { ctx.beginPath(); ctx.moveTo(gx, baseY - 160); ctx.lineTo(gx, baseY); ctx.stroke(); }
    for (let gy = baseY - 150; gy < baseY; gy += 24) { ctx.beginPath(); ctx.moveTo(x + 150, gy); ctx.lineTo(x + 545, gy); ctx.stroke(); }
    ctx.fillStyle = "rgba(255,220,160,0.35)";                                // 点の飾り
    for (let gx = x + 181; gx < x + 520; gx += 26) for (let gy = baseY - 138; gy < baseY; gy += 24) { ctx.beginPath(); ctx.arc(gx, gy, 2.4, 0, 7); ctx.fill(); }
    ctx.restore();

    // 支える腕（頭の下へ伸びる）
    ctx.fillStyle = white; ctx.fillRect(x + 60, baseY - 40, 120, 34);
    ctx.fillStyle = shade; ctx.beginPath(); ctx.ellipse(x + 66, baseY - 24, 16, 14, 0, 0, 7); ctx.fill();  // 手

    ctx.beginPath(); ctx.arc(hx - 4, hy - 20, 42, Math.PI * 1.02, Math.PI * 1.98); ctx.fill();
    ctx.beginPath(); ctx.arc(hx - 2, hy - 50, 11, 0, 7); ctx.fill();                 // 肉髻（頭頂の盛り上がり）
    ctx.fillStyle = line;
    for (let r = 0; r < 5; r++) for (let c = 0; c < 7; c++) { ctx.beginPath(); ctx.arc(hx - 34 + c*11, hy - 42 + r*7, 2.2, 0, 7); ctx.fill(); }
    // 穏やかな顔
    ctx.strokeStyle = "#9a958a"; ctx.lineWidth = 2; ctx.lineCap = "round";
    ctx.beginPath(); ctx.arc(hx - 14, hy - 2, 7, 0.15, Math.PI - 0.15); ctx.stroke();   // 伏し目
    ctx.beginPath(); ctx.arc(hx + 10, hy - 2, 7, 0.15, Math.PI - 0.15); ctx.stroke();

    ctx.beginPath(); ctx.arc(hx - 2, hy + 20, 8, 0.15, Math.PI - 0.15); ctx.stroke();        // 口
    // 長い耳たぶ
    ctx.fillStyle = white; ctx.beginPath(); ctx.ellipse(hx - 40, hy + 6, 7, 17, 0, 0, 7); ctx.fill();
  }
  function drawZagat(b) {
    const cx = b.x + b.w/2, by = b.y + b.h;
    ctx.save();
    ctx.translate(cx, by);
    const sq = b.squash;
    ctx.scale(b.face, 1);                 // 向きに合わせて反転（内部は右向きで描く）

    const groundShot = shooting && b.shotLow;
    if (groundShot) ctx.scale(1.08, 0.78);   // グランドタイガーショットは低くしゃがむ
    if (!b.alive) ctx.globalAlpha = Math.max(0, 1 - b.dyingT / 90);
    const flash = b.hurtFlash > 0 && Math.floor(b.hurtFlash / 4) % 2 === 0;
    const skin  = flash ? "#ffdcb4" : "#e2a064";   // 日焼けした肌

    // 足首の白テープ

    ctx.fillRect(-W2*0.37, -H2*0.11, W2*0.3, H2*0.06);
    ctx.fillRect(W2*0.07, -H2*0.11, W2*0.3, H2*0.06);

    ctx.fillStyle = skinD;
    ctx.beginPath(); ctx.ellipse(-W2*0.2, -2, W2*0.18, 5, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(W2*0.24, -2, W2*0.18, 5, 0, 0, 7); ctx.fill();

    // 青いトランクス（赤サイドライン＋白ベルト）
    ctx.fillStyle = "#2a4fb5";
    ctx.beginPath(); roundRectPath(-W2*0.45, -H2*0.53, W2*0.9, H2*0.26, 7); ctx.fill();
    ctx.fillStyle = skin;                 // 股の切れ込み
    ctx.beginPath(); ctx.moveTo(-W2*0.07, -H2*0.27); ctx.lineTo(0, -H2*0.42); ctx.lineTo(W2*0.07, -H2*0.27); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#d62c2c";            // 赤サイドライン
    ctx.fillRect(-W2*0.45, -H2*0.53, W2*0.08, H2*0.26);
    ctx.fillRect(W2*0.37, -H2*0.53, W2*0.08, H2*0.26);
    ctx.fillStyle = wrap;                 // 白ベルト
    ctx.fillRect(-W2*0.45, -H2*0.53, W2*0.9, H2*0.05);
    ctx.fillStyle = "#cfcabb"; ctx.fillRect(-W2*0.07, -H2*0.525, W2*0.14, H2*0.035);  // バックル

    // 胴（広い肩・逆三角の筋肉質）
    ctx.fillStyle = skin;
    ctx.beginPath();
    ctx.moveTo(-W2*0.4, -H2*0.5);
    ctx.lineTo(W2*0.4, -H2*0.5);
    ctx.lineTo(W2*0.52, -H2*0.82);
    ctx.quadraticCurveTo(W2*0.42, -H2*0.9, W2*0.22, -H2*0.88);
    ctx.lineTo(-W2*0.22, -H2*0.88);
    ctx.quadraticCurveTo(-W2*0.42, -H2*0.9, -W2*0.52, -H2*0.82);
    ctx.closePath(); ctx.fill();
    // 胸筋・腹筋
    ctx.strokeStyle = skinD; ctx.lineWidth = 1.5; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(0, -H2*0.52); ctx.lineTo(0, -H2*0.8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-W2*0.28, -H2*0.72); ctx.lineTo(W2*0.28, -H2*0.72); ctx.stroke();
    for (let i = 1; i <= 2; i++) { const yy = -H2*(0.52 + i*0.055); ctx.beginPath(); ctx.moveTo(-W2*0.15, yy); ctx.lineTo(W2*0.15, yy); ctx.stroke(); }
    // 胸の大きな傷跡

      ctx.fillStyle = "#fff2b0"; ctx.beginPath(); ctx.arc(W2*0.27, -H2*1.38, 9, 0, 7); ctx.fill();
      ctx.fillStyle = "#ffd34d"; ctx.beginPath(); ctx.arc(W2*0.27, -H2*1.38, 4, 0, 7); ctx.fill();
    } else if (shooting) {
      // タイガーショット：前腕をまっすぐ前へ伸ばして撃つ（下段は低い位置＝しゃがみ）

      ctx.beginPath(); ctx.moveTo(W2*0.26, -H2*0.8); ctx.lineTo(W2*0.5, fy - H2*0.03); ctx.lineTo(W2*0.76, fy); ctx.stroke();

      fist(W2*0.76, fy);

      ctx.fillStyle = "#ffd8a0"; ctx.beginPath(); ctx.arc(W2*0.94, fy, 8, 0, 7); ctx.fill();
      ctx.fillStyle = "#ff9a3c"; ctx.beginPath(); ctx.arc(W2*0.94, fy, 4.5, 0, 7); ctx.fill();
    } else {
      // 構え：両腕を曲げて、こぶしを胸の前に上げるガード
      ctx.beginPath(); ctx.moveTo(-W2*0.4, -H2*0.82); ctx.lineTo(-W2*0.34, -H2*0.58); ctx.lineTo(-W2*0.06, -H2*0.72); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(W2*0.4, -H2*0.82); ctx.lineTo(W2*0.46, -H2*0.58); ctx.lineTo(W2*0.18, -H2*0.78); ctx.stroke();
      fist(-W2*0.06, -H2*0.72);
      fist(W2*0.18, -H2*0.78);
    }

    // 首
    ctx.fillStyle = skin; ctx.fillRect(-W2*0.13, -H2*0.92, W2*0.26, H2*0.1);
    // つるつる頭
    ctx.beginPath(); ctx.arc(0, -H2*1.0, W2*0.31, 0, 7); ctx.fill();
    // 耳
    ctx.beginPath(); ctx.arc(-W2*0.29, -H2*1.0, 4, 0, 7); ctx.arc(W2*0.29, -H2*1.0, 4, 0, 7); ctx.fill();
    if (b.alive) {
      // 怒り眉（前の目）
      ctx.strokeStyle = "#3a2418"; ctx.lineWidth = 2.6; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(-W2*0.02, -H2*1.07); ctx.lineTo(W2*0.2, -H2*1.01); ctx.stroke();
      // 前の目
      ctx.fillStyle = "#3a2418"; ctx.beginPath(); ctx.arc(W2*0.13, -H2*0.99, 2.7, 0, 7); ctx.fill();
      // 眼帯（奥の目＋ストラップ）
      ctx.strokeStyle = "#242424"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(-W2*0.3, -H2*1.11); ctx.lineTo(-W2*0.02, -H2*0.96); ctx.stroke();
      ctx.fillStyle = "#1c1c1c";
      ctx.beginPath(); ctx.ellipse(-W2*0.13, -H2*1.02, 6, 4.6, -0.3, 0, 7); ctx.fill();
      // への字口
      ctx.strokeStyle = "#7a4a2a"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(W2*0.03, -H2*0.9); ctx.lineTo(W2*0.19, -H2*0.9); ctx.stroke();
    } else {
      // やられ目（＞＜）
      ctx.strokeStyle = "#3a2418"; ctx.lineWidth = 2.6; ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(W2*0.02, -H2*1.05); ctx.lineTo(W2*0.16, -H2*0.99);
      ctx.moveTo(W2*0.16, -H2*1.05); ctx.lineTo(W2*0.02, -H2*0.99);
      ctx.stroke();
    }
    ctx.restore();
  }

  // ===== ボス：ペギ／にせぺぎ（ペンギン）=====
  function drawPenguinBoss(b) {
    const green = b.kind === "nisepegi";
    const body = green ? "#c8d27c" : "#aed4e7";
    const line = green ? "#93925f" : "#8a9aa2";
    const belly = green ? "#f3efd4" : "#fdfbf3";
    const flashBody = green ? "#eef0d8" : "#e6f2f8";
    const cx = b.x + b.w/2, by = b.y + b.h, W2 = b.w, H2 = b.h;
    ctx.save();
    ctx.translate(cx, by);
    const sq = b.squash;
    ctx.scale(1 + (1 - sq) * 0.35, sq);
    if (!b.alive) ctx.globalAlpha = Math.max(0, 1 - b.dyingT / 90);
    const flash = b.hurtFlash > 0 && Math.floor(b.hurtFlash / 4) % 2 === 0;
    // 影
    ctx.fillStyle = "rgba(0,0,0,0.12)";
    ctx.beginPath(); ctx.ellipse(0, 2, W2*0.6, 7, 0, 0, 7); ctx.fill();
    // 足
    ctx.fillStyle = "#efc04a"; ctx.strokeStyle = "#cf9f2e"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(-W2*0.26, -3, 8, 5, 0, 0, 7); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(W2*0.26, -3, 8, 5, 0, 0, 7); ctx.fill(); ctx.stroke();
    // ペギの頭のワンポイントのギザギザ（体の後ろ）
    if (!green) {
      const ty = -H2 + 5;
      ctx.fillStyle = "#9fc6da"; ctx.strokeStyle = line; ctx.lineWidth = 2; ctx.lineJoin = "round";
      ctx.beginPath();
      ctx.moveTo(-13, ty + 8); ctx.lineTo(-8, ty - 2); ctx.lineTo(-3, ty + 6);
      ctx.lineTo(2, ty - 4); ctx.lineTo(7, ty + 6); ctx.lineTo(12, ty - 2); ctx.lineTo(15, ty + 8);
      ctx.closePath(); ctx.fill(); ctx.stroke();
    }
    // 体（まるい）
    ctx.fillStyle = flash ? flashBody : body;
    ctx.strokeStyle = line; ctx.lineWidth = 3;
    roundRectPath(-W2/2, -H2, W2, H2, Math.min(W2, H2) * 0.46);
    ctx.fill(); ctx.stroke();
    // お腹
    ctx.fillStyle = belly;
    ctx.beginPath(); ctx.ellipse(0, -H2*0.30, W2*0.34, H2*0.30, 0, 0, 7); ctx.fill();
    if (b.alive) {
      const dir = b.face;
      // 目（やや横長）
      ctx.fillStyle = "#33312a";
      ctx.beginPath(); ctx.ellipse(-W2*0.16 + dir*1.5, -H2*0.55, 4.6, 3.4, 0, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.ellipse(W2*0.16 + dir*1.5, -H2*0.55, 4.6, 3.4, 0, 0, 7); ctx.fill();
      // くちばし（小さな楕円・両方同じ）
      ctx.fillStyle = "#e6bf5c"; ctx.strokeStyle = "#c39f42"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.ellipse(dir*1.5, -H2*0.42, 6, 3.6, 0, 0, 7); ctx.fill(); ctx.stroke();
    } else {
      // やられ目（＞＜）
      ctx.strokeStyle = "#33312a"; ctx.lineWidth = 2.4; ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(-W2*0.24, -H2*0.6); ctx.lineTo(-W2*0.08, -H2*0.52); ctx.lineTo(-W2*0.24, -H2*0.44);
      ctx.moveTo(W2*0.24, -H2*0.6); ctx.lineTo(W2*0.08, -H2*0.52); ctx.lineTo(W2*0.24, -H2*0.44);
      ctx.stroke();
    }
    ctx.restore();
  }

    // 顔
    if (b.alive) {

  // ===== 相撲場（土俵）の背景 =====
  function drawSumoBackdrop() {
    // 奥の板壁
    ctx.fillStyle = "#c9a877"; ctx.fillRect(0, 120, W, 150);
    ctx.strokeStyle = "rgba(120,90,55,0.35)"; ctx.lineWidth = 2;
    for (let x = 40; x < W; x += 80) { ctx.beginPath(); ctx.moveTo(x, 120); ctx.lineTo(x, 270); ctx.stroke(); }
    // 青いのぼり（場内の案内幕）
    ctx.fillStyle = "#2a4f9c";
    for (let i = 0; i < 6; i++) { ctx.fillRect(30 + i*130, 150, 22, 92); }
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    for (let i = 0; i < 6; i++) { ctx.fillRect(37 + i*130, 158, 8, 76); }
    // 吊り屋根（紫の屋形）＋房
    ctx.fillStyle = "#5a2352";
    ctx.beginPath(); ctx.moveTo(W/2 - 250, 70); ctx.lineTo(W/2 + 250, 70);
    ctx.lineTo(W/2 + 200, 110); ctx.lineTo(W/2 - 200, 110); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#6d2b63"; ctx.fillRect(W/2 - 210, 100, 420, 16);
    ctx.fillStyle = "#e9c84a"; ctx.fillRect(W/2 - 210, 100, 420, 4);
    // 四隅の房（東西南北の色）
    const tas = [[W/2 - 190, "#e04a3f"], [W/2 - 64, "#f2f2f2"], [W/2 + 64, "#3f7dd0"], [W/2 + 190, "#2f9e57"]];
    for (const [tx, tc] of tas) {
      ctx.fillStyle = "#caa63e"; ctx.fillRect(tx - 2, 110, 4, 14);
      ctx.fillStyle = tc; ctx.beginPath(); ctx.moveTo(tx, 124); ctx.lineTo(tx - 7, 150); ctx.lineTo(tx + 7, 150); ctx.closePath(); ctx.fill();
    }
    // 「西」の看板
    ctx.fillStyle = "#3a2a1e"; ctx.fillRect(W/2 - 26, 128, 52, 40);
    ctx.fillStyle = "#f4ead2"; ctx.font = "bold 26px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("西", W/2, 150);
    // 土俵の土台（一段高い台）
    const topY = BOSS_GROUND + 4;
    ctx.fillStyle = "#e3b877"; ctx.fillRect(40, topY, W - 80, H - topY);
    ctx.fillStyle = "#edc98d"; ctx.fillRect(60, topY - 10, W - 120, 18);
    // 俵（土俵の丸い縁）
    ctx.strokeStyle = "#d8a94c"; ctx.lineWidth = 10; ctx.setLineDash([16, 7]);
    ctx.beginPath(); ctx.ellipse(W/2, topY + 24, 300, 34, 0, Math.PI, 0); ctx.stroke();
    ctx.setLineDash([]);
    // 仕切り線（白）
    ctx.strokeStyle = "#f5f1e4"; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(W/2 - 46, topY + 30); ctx.lineTo(W/2 - 46, topY + 46);
    ctx.moveTo(W/2 + 46, topY + 30); ctx.lineTo(W/2 + 46, topY + 46); ctx.stroke();
  }

  // ===== ボス：こうよう（子供力士）=====
  function drawSumoBoss(b) {
    const cx = b.x + b.w/2, by = b.y + b.h, W2 = b.w, H2 = b.h;
    // 四股のジャンプ中：着地地点の影（近づくほど濃く・大きく）＝どこに落ちるか分かる
    if (b.shiko) {
      const above = Math.max(0, BOSS_GROUND - by);
      const prog = 1 - Math.min(1, above / 130);
      ctx.fillStyle = "rgba(0,0,0," + (0.1 + prog * 0.24).toFixed(2) + ")";
      ctx.beginPath(); ctx.ellipse(cx, BOSS_GROUND + 2, W2 * (0.3 + prog * 0.3), 5 + prog * 3, 0, 0, 7); ctx.fill();
    }
    ctx.save();
    ctx.translate(cx, by);
    const sq = b.squash;
    ctx.scale(1 + (1 - sq) * 0.35, sq);
    if (!b.alive) ctx.globalAlpha = Math.max(0, 1 - b.dyingT / 90);
    const dir = b.face;
    const flash = b.hurtFlash > 0 && Math.floor(b.hurtFlash / 4) % 2 === 0;
    const raging = b.raging;
    const skin = flash ? "#ffdccb" : (raging ? "#f4b892" : "#f6cfa4");
    const skinD = flash ? "#f6c4b0" : (raging ? "#dc9a70" : "#e6b184");
    const lean = b.charging ? dir * 6 : 0;                 // 突進中は前のめり
    const crouch = b.shikoWind > 0;                        // 四股の前のしゃがみ（ため）
    const stance = (b.windup > 0 || crouch) ? (crouch ? 13 : 6) : 0;   // しゃがみは深く腰を落とす
    // 怒りモードの赤いオーラ（メラメラ）
    if (raging && b.alive) {
      ctx.save();
      ctx.globalAlpha = 0.34 + Math.sin(b.t*0.3)*0.12;
      ctx.fillStyle = "#ff4b2c";
      ctx.beginPath(); ctx.ellipse(0, -H2*0.5, W2*0.7, H2*0.72, 0, 0, 7); ctx.fill();
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = "#ff7a3c";
      for (let i = 0; i < 5; i++) { const a = b.t*0.2 + i*1.3; ctx.beginPath(); ctx.arc(Math.cos(a)*W2*0.55, -H2*0.5 + Math.sin(a)*H2*0.5, 3.5, 0, 7); ctx.fill(); }
      ctx.restore();
    }
    // 影
    ctx.fillStyle = "rgba(0,0,0,0.15)";
    ctx.beginPath(); ctx.ellipse(0, 2, W2*0.6, 8, 0, 0, 7); ctx.fill();
    // 足（構え／しゃがみ／ジャンプ中は大きく開く）
    const legSpread = (b.windup > 0 || crouch || b.shiko) ? W2*0.46 : W2*0.28;
    const footY = b.shiko ? -10 : -5;                      // ジャンプ中は足を少し引き上げる
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.ellipse(-legSpread, footY, 12, 8, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(legSpread, footY, 12, 8, 0, 0, 7); ctx.fill();
    ctx.fillStyle = skinD;
    ctx.beginPath(); ctx.ellipse(-legSpread, -18 + stance, 15, 16, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(legSpread, -18 + stance, 15, 16, 0, 0, 7); ctx.fill();
    // まわし（白いふんどし）
    ctx.fillStyle = flash ? "#ffffff" : "#f7f4ea";
    roundRectPath(-W2*0.42, -H2*0.52, W2*0.84, H2*0.30, 6); ctx.fill();
    ctx.fillStyle = "#e7e1cf"; ctx.fillRect(-6 + lean*0.5, -H2*0.52, 12, H2*0.30);   // 前垂れ
    // 体（ぽっちゃり胴）
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.ellipse(lean*0.4, -H2*0.52, W2*0.46, H2*0.34, 0, 0, 7); ctx.fill();
    // おへそ
    ctx.strokeStyle = skinD; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(lean*0.4, -H2*0.44, 2.5, 0, 7); ctx.stroke();
    // 腕（突進中は前に突き出す）
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.ellipse(-W2*0.5 + lean, -H2*0.55 - stance*0.5, 11, 9, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(W2*0.5 + lean, -H2*0.55 - stance*0.5, 11, 9, 0, 0, 7); ctx.fill();
    // 頭
    const hy = -H2*0.86 - stance*0.3;
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.ellipse(lean, hy, W2*0.36, W2*0.34, 0, 0, 7); ctx.fill();
    // 髪（黒・短髪）
    ctx.fillStyle = "#241a14";
    ctx.beginPath(); ctx.ellipse(lean, hy - W2*0.14, W2*0.37, W2*0.22, 0, Math.PI, 0); ctx.fill();
    ctx.beginPath(); ctx.moveTo(lean - W2*0.37, hy - W2*0.05);
    ctx.quadraticCurveTo(lean - W2*0.2, hy - W2*0.02, lean - W2*0.05, hy - W2*0.1);
    ctx.quadraticCurveTo(lean + W2*0.1, hy - W2*0.02, lean + W2*0.37, hy - W2*0.05);
    ctx.lineTo(lean + W2*0.37, hy - W2*0.16); ctx.lineTo(lean - W2*0.37, hy - W2*0.16); ctx.closePath(); ctx.fill();
    if (b.alive) {
      // めがね
      const ex = W2*0.15, ey = hy + 2;
      ctx.strokeStyle = "#222"; ctx.lineWidth = 2.4; ctx.fillStyle = "#fff";
      ctx.beginPath(); ctx.roundRect ? ctx.roundRect(lean - ex - 9 + dir*1.5, ey - 6, 16, 12, 4) : ctx.rect(lean - ex - 9 + dir*1.5, ey - 6, 16, 12); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.roundRect ? ctx.roundRect(lean + ex - 7 + dir*1.5, ey - 6, 16, 12, 4) : ctx.rect(lean + ex - 7 + dir*1.5, ey - 6, 16, 12); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(lean - ex + 7 + dir*1.5, ey); ctx.lineTo(lean + ex - 7 + dir*1.5, ey); ctx.stroke();
      // 目
      ctx.fillStyle = "#241a14";
      ctx.beginPath(); ctx.arc(lean - ex + dir*1.5, ey, 2.6, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(lean + ex + 1 + dir*1.5, ey, 2.6, 0, 7); ctx.fill();
      // 笑った口
      ctx.strokeStyle = "#a85a3e"; ctx.lineWidth = 2.4; ctx.lineCap = "round";
      ctx.beginPath(); ctx.arc(lean + dir*1.5, hy + W2*0.16, 7, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();
      // ほっぺ
      ctx.fillStyle = raging ? "rgba(230,80,60,0.6)" : "rgba(244,150,120,0.5)";
      ctx.beginPath(); ctx.arc(lean - W2*0.24, hy + W2*0.12, 4, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(lean + W2*0.24, hy + W2*0.12, 4, 0, 7); ctx.fill();
      if (raging) {
        // 怒り眉＋汗
        ctx.strokeStyle = "#7a2a1a"; ctx.lineWidth = 3; ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(lean - W2*0.28 + dir*1.5, hy - 9); ctx.lineTo(lean - W2*0.06 + dir*1.5, hy - 3);
        ctx.moveTo(lean + W2*0.28 + dir*1.5, hy - 9); ctx.lineTo(lean + W2*0.06 + dir*1.5, hy - 3);
        ctx.stroke();
        ctx.fillStyle = "#bfe3ff";
        ctx.beginPath(); ctx.ellipse(lean + W2*0.34, hy + 2, 3, 5, 0, 0, 7); ctx.fill();
        // 怒りマーク（💢）
        ctx.strokeStyle = "#e0342f"; ctx.lineWidth = 2; ctx.lineCap = "round";
        const mx = lean - W2*0.36, my = hy - W2*0.16;
        ctx.beginPath();
        ctx.moveTo(mx-4,my); ctx.lineTo(mx+4,my); ctx.moveTo(mx,my-4); ctx.lineTo(mx,my+4);
        ctx.moveTo(mx-3,my-3); ctx.lineTo(mx+3,my+3); ctx.moveTo(mx+3,my-3); ctx.lineTo(mx-3,my+3);
        ctx.stroke();
      }
    } else {
      // やられ目（＞＜）＋めがねずれ
      ctx.strokeStyle = "#241a14"; ctx.lineWidth = 2.4; ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(lean - W2*0.22, hy - 4); ctx.lineTo(lean - W2*0.06, hy + 2); ctx.lineTo(lean - W2*0.22, hy + 8);
      ctx.moveTo(lean + W2*0.22, hy - 4); ctx.lineTo(lean + W2*0.06, hy + 2); ctx.lineTo(lean + W2*0.22, hy + 8);
      ctx.stroke();
    }
    ctx.restore();
  }

  // ===== あわバリア（アイテムのシャボン玉）=====
  function drawBubbles() {
    for (const bb of bubbles) {
      if (bb.got) continue;
      if (bb.x + bb.w < camX - 40 || bb.x > camX + W + 40) continue;
      bb.t += 0.08;
      const cx = bb.x + bb.w/2, cy = bb.y + bb.h/2 + Math.sin(bb.t)*3, r = bb.w/2;
      ctx.save();
      ctx.globalAlpha = 0.4 + Math.abs(Math.sin(bb.t))*0.25;
      ctx.fillStyle = "#dff5ff"; ctx.beginPath(); ctx.arc(cx, cy, r + 3, 0, 7); ctx.fill();
      ctx.restore();
      ctx.fillStyle = "rgba(180,235,255,0.28)"; ctx.beginPath(); ctx.arc(cx, cy, r, 0, 7); ctx.fill();
      ctx.strokeStyle = "rgba(120,200,245,0.9)"; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.arc(cx, cy, r, 0, 7); ctx.stroke();
      ctx.strokeStyle = "rgba(255,180,220,0.55)"; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(cx, cy, r - 3, 0.6, 2.2); ctx.stroke();
      ctx.fillStyle = "rgba(255,255,255,0.85)"; ctx.beginPath(); ctx.ellipse(cx - r*0.35, cy - r*0.4, 3, 5, -0.5, 0, 7); ctx.fill();
    }
  }

  // ===== メガロドン戦の背景（真ん中で割れた船＋左右＆中央の海）=====
  function drawDeepSeaBackdrop() {
    // 遠くの海（水平線）
    ctx.fillStyle = "#6fb4d6"; ctx.fillRect(0, 246, W, 26);
    ctx.fillStyle = "#4f9fc4"; ctx.fillRect(0, 272, W, 20);
    // 海（左どなり／中央の割れ目／右どなり・落ちると水没）
    const sea = ctx.createLinearGradient(0, BOSS_GROUND, 0, H);
    sea.addColorStop(0, "#2f9fd0"); sea.addColorStop(1, "#0e6690");
    ctx.fillStyle = sea;
    const seaZones = [[0, LDECK_L], [GAP_L, GAP_R], [RDECK_R, W]];
    for (const [a, c] of seaZones) ctx.fillRect(a, BOSS_GROUND, c - a, H - BOSS_GROUND);
    // 波がしら（各海）
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    for (const [a, c] of seaZones) {
      for (let i = 0; i < 6; i++) {
        const wx = a + ((i*17 + elapsed*0.5) % Math.max(14, c - a - 8));
        ctx.fillRect(wx, BOSS_GROUND + 6 + (i*11) % 46, 6, 2);
      }
    }
    // 立ちのぼる泡（割れ目＝サメがいる）
    for (let i = 0; i < 6; i++) {
      const bx = GAP_L + 14 + (i*20) % (GAP_R - GAP_L - 20);
      const by = H - ((elapsed*1.0 + i*40) % (H - BOSS_GROUND));
      ctx.fillStyle = "rgba(210,240,255,0.4)"; ctx.beginPath(); ctx.arc(bx, by, 2 + i%3, 0, 7); ctx.fill();
    }
    // 左右の船体（外の端＝船首/船尾、中央側＝割れた断面）
    drawHullHalf(LDECK_L, LDECK_R, "right");   // 左半分：右が割れ目
    drawHullHalf(RDECK_L, RDECK_R, "left");    // 右半分：左が割れ目
    // 折れかけたマスト（左デッキ）＋帆
    const mx = (LDECK_L + LDECK_R) / 2;
    ctx.strokeStyle = "#5a3b20"; ctx.lineWidth = 8; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(mx, BOSS_GROUND); ctx.lineTo(mx - 24, 120); ctx.stroke();
    ctx.fillStyle = "#e7dcc0";
    ctx.beginPath(); ctx.moveTo(mx - 22, 134); ctx.quadraticCurveTo(mx - 80, 168, mx - 18, 202); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#c94d4d"; ctx.fillRect(mx - 26, 116, 5, 6);
  }
  // 割れた船の片側（brokenAt="right"→右が割れた断面・左が船首 / "left"→左が断面・右が船尾）
  function drawHullHalf(x0, x1, brokenAt) {
    const deckTop = BOSS_GROUND + 2, yBot = H - 6, rightBreak = brokenAt === "right";
    // 船体（デッキの下・大半は板で隠れるが下と外側に見える）
    ctx.fillStyle = "#8a5a2c"; ctx.fillRect(x0, deckTop, x1 - x0, yBot - deckTop);
    ctx.fillStyle = "#6b4420"; ctx.fillRect(x0, deckTop, x1 - x0, 7);
    ctx.strokeStyle = "rgba(70,45,20,0.4)"; ctx.lineWidth = 2;
    for (let yy = deckTop + 16; yy < yBot - 4; yy += 12) { ctx.beginPath(); ctx.moveTo(x0+2, yy); ctx.lineTo(x1-2, yy); ctx.stroke(); }
    // 船首／船尾（外側の端を三角にとがらせて海へ突き出す＝船っぽく）
    ctx.fillStyle = "#8a5a2c";
    ctx.beginPath();
    if (rightBreak) { ctx.moveTo(x0, deckTop); ctx.lineTo(x0 - 28, deckTop + 22); ctx.lineTo(x0, yBot); }
    else            { ctx.moveTo(x1, deckTop); ctx.lineTo(x1 + 28, deckTop + 22); ctx.lineTo(x1, yBot); }
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#6b4420";
    if (rightBreak) ctx.fillRect(x0 - 26, deckTop + 3, 28, 6); else ctx.fillRect(x1 - 2, deckTop + 3, 28, 6);
    // 割れた断面（割れ目に向かってギザギザの板が突き出す）
    const bx = rightBreak ? x1 : x0, jdir = rightBreak ? 1 : -1;
    const segs = 7, segH = (yBot - deckTop) / segs;
    for (let k = 0; k < segs; k++) {
      const yy = deckTop + k*segH, jag = (k % 2 === 0 ? 22 : 9) * jdir;
      ctx.fillStyle = k % 2 === 0 ? "#8a5a2c" : "#7a4d24";
      ctx.beginPath(); ctx.moveTo(bx, yy); ctx.lineTo(bx + jag, yy + segH*0.5); ctx.lineTo(bx, yy + segH); ctx.closePath(); ctx.fill();
    }
    // 断面の明るい木肌（割れたての木）
    ctx.fillStyle = "#b98a52"; ctx.fillRect(rightBreak ? x1 - 3 : x0, deckTop, 3, yBot - deckTop);
  }

  // ===== カニ（地上の速い敵）=====
  function drawCrab(e) {

  // ===== カモメ（飛ぶ敵）=====

  // 水中にもぐっているとき（割れ目）のサメのヒレ＋泡（予告）
  function drawSharkFin(b) {
    const fx = b.diveCx || GAP_CX, fy = SEA_Y;
    ctx.fillStyle = "rgba(20,55,80,0.4)";                  // 水中の影
    ctx.beginPath(); ctx.ellipse(fx, fy + 20, 46, 14, 0, 0, 7); ctx.fill();
    ctx.fillStyle = "#6b8494";                             // 背びれ
    ctx.beginPath();
    ctx.moveTo(fx - 20, fy);
    ctx.quadraticCurveTo(fx + 2, fy - 6, fx + 6, fy - 34);
    ctx.quadraticCurveTo(fx + 10, fy - 6, fx + 22, fy);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.55)"; ctx.lineWidth = 2;  // 波紋
    ctx.beginPath(); ctx.moveTo(fx - 36, fy); ctx.quadraticCurveTo(fx, fy + 6, fx + 36, fy); ctx.stroke();
    // 立ちのぼる泡
    for (let i = 0; i < 4; i++) {
      const by = fy + 8 - ((elapsed*1.2 + i*22) % 60);
      ctx.fillStyle = "rgba(210,240,255,0.5)";
      ctx.beginPath(); ctx.arc(fx - 16 + i*11 + Math.sin(elapsed*0.05+i)*4, by, 2 + i%2, 0, 7); ctx.fill();
    }
  }

  // ボスのカモメ（上を飛び、もぐっている間に卵を落とす）
  function drawBossGull(g) {
    if (!g) return;
    ctx.save();
    ctx.translate(g.x, g.y);
    const dir = g.vx > 0 ? 1 : -1, flap = Math.sin(elapsed*0.25)*11;
    ctx.fillStyle = "#f4f6f8";
    ctx.beginPath(); ctx.moveTo(0, -2); ctx.quadraticCurveTo(-15, -6 - flap, -24, 2 - flap*0.4); ctx.quadraticCurveTo(-11, 2, 0, 5); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(0, -2); ctx.quadraticCurveTo(15, -6 - flap, 24, 2 - flap*0.4); ctx.quadraticCurveTo(11, 2, 0, 5); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#c9d2d8";
    ctx.beginPath(); ctx.arc(-22, 2 - flap*0.4, 2.6, 0, 7); ctx.arc(22, 2 - flap*0.4, 2.6, 0, 7); ctx.fill();
    ctx.fillStyle = "#fafcff";
    ctx.beginPath(); ctx.ellipse(0, 2, 11, 8, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(dir*9, -3, 6.5, 0, 7); ctx.fill();
    ctx.fillStyle = "#f3a71e";
    ctx.beginPath(); ctx.moveTo(dir*14, -3); ctx.lineTo(dir*24, -1); ctx.lineTo(dir*14, 1); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#222"; ctx.beginPath(); ctx.arc(dir*10, -4, 1.7, 0, 7); ctx.fill();
    ctx.restore();
  }

  // ===== ボス：メガロドン（巨大ザメ）=====
  function drawMegaBoss(b) {
    if (b.gull) drawBossGull(b.gull);                        // カモメは常に上を飛ぶ
    if (b.alive && b.mode === "dive") { drawSharkFin(b); return; }
    const cx = b.x + b.w/2, by = b.y + b.h, W2 = b.w, H2 = b.h;
    ctx.save();
    ctx.translate(cx, by);
    const sq = b.squash;
    ctx.scale(1 + (1 - sq) * 0.3, sq);
    if (!b.alive) ctx.globalAlpha = Math.max(0, 1 - b.dyingT / 90);
    ctx.scale(b.face, 1);                       // 頭が進行方向を向く
    const flash = b.hurtFlash > 0 && Math.floor(b.hurtFlash / 4) % 2 === 0;
    const body = flash ? "#d7e6ee" : "#7f97a6";
    const bodyD = flash ? "#c2d4de" : "#6b8494";
    const belly = flash ? "#ffffff" : "#eef3f5";
    const bite = (b.mode === "bite" || b.mode === "jump" || b.mode === "charge") ? 1 : 0;   // 攻撃中は口を開く
    const midY = -H2*0.5;
    // 影
    ctx.fillStyle = "rgba(0,0,0,0.15)"; ctx.beginPath(); ctx.ellipse(0, 2, W2*0.55, 8, 0, 0, 7); ctx.fill();
    // 尾びれ（後方）
    ctx.fillStyle = body;
    ctx.beginPath(); ctx.moveTo(-W2*0.42, midY); ctx.lineTo(-W2*0.6, midY - H2*0.5); ctx.lineTo(-W2*0.5, midY); ctx.lineTo(-W2*0.6, midY + H2*0.42); ctx.closePath(); ctx.fill();
    // 背びれ
    ctx.beginPath(); ctx.moveTo(-W2*0.05, midY - H2*0.42); ctx.lineTo(W2*0.12, midY - H2*0.92); ctx.lineTo(W2*0.2, midY - H2*0.42); ctx.closePath(); ctx.fill();
    // 胸びれ
    ctx.beginPath(); ctx.moveTo(W2*0.1, midY + H2*0.2); ctx.lineTo(W2*0.02, midY + H2*0.72); ctx.lineTo(W2*0.26, midY + H2*0.34); ctx.closePath(); ctx.fill();
    // 胴体＋頭
    ctx.fillStyle = body;
    ctx.beginPath(); ctx.ellipse(0, midY, W2*0.46, H2*0.42, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.moveTo(W2*0.1, midY - H2*0.4); ctx.quadraticCurveTo(W2*0.62, midY - H2*0.28, W2*0.6, midY); ctx.quadraticCurveTo(W2*0.62, midY + H2*0.3, W2*0.1, midY + H2*0.42); ctx.closePath(); ctx.fill();
    // お腹（白）
    ctx.fillStyle = belly; ctx.beginPath(); ctx.ellipse(W2*0.05, midY + H2*0.22, W2*0.4, H2*0.2, 0, 0, 7); ctx.fill();
    // えら
    ctx.strokeStyle = bodyD; ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) { ctx.beginPath(); ctx.arc(W2*0.12 - i*7, midY, H2*0.22, -0.9, 0.9); ctx.stroke(); }
    // 口＋歯
    const mouthOpen = Math.max(0, bite) * H2*0.34;
    ctx.fillStyle = "#8a2f38";
    ctx.beginPath(); ctx.moveTo(W2*0.6, midY + H2*0.02); ctx.lineTo(W2*0.24, midY + H2*0.12 + mouthOpen); ctx.lineTo(W2*0.24, midY + H2*0.12); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#fff";
    for (let i = 0; i < 6; i++) {
      const tx = W2*0.28 + i*W2*0.05;
      ctx.beginPath(); ctx.moveTo(tx, midY + H2*0.1); ctx.lineTo(tx + 4, midY + H2*0.02); ctx.lineTo(tx + 8, midY + H2*0.1); ctx.closePath(); ctx.fill();
      if (mouthOpen > 4) { ctx.beginPath(); ctx.moveTo(tx, midY + H2*0.12 + mouthOpen); ctx.lineTo(tx + 4, midY + H2*0.2 + mouthOpen); ctx.lineTo(tx + 8, midY + H2*0.12 + mouthOpen); ctx.closePath(); ctx.fill(); }
    }
    // 目
    if (b.alive) {
      ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(W2*0.34, midY - H2*0.14, 5, 0, 7); ctx.fill();
      ctx.fillStyle = "#141414"; ctx.beginPath(); ctx.arc(W2*0.35, midY - H2*0.14, 3, 0, 7); ctx.fill();
      ctx.strokeStyle = bodyD; ctx.lineWidth = 3; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(W2*0.26, midY - H2*0.26); ctx.lineTo(W2*0.4, midY - H2*0.16); ctx.stroke();
    } else {
      ctx.strokeStyle = "#141414"; ctx.lineWidth = 2.6; ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(W2*0.3, midY - H2*0.22); ctx.lineTo(W2*0.4, midY - H2*0.12);
      ctx.moveTo(W2*0.4, midY - H2*0.22); ctx.lineTo(W2*0.3, midY - H2*0.12);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawParticles() {
    for (const pt of particles) {
      ctx.globalAlpha = Math.max(0, Math.min(1, pt.life/20));
      ctx.fillStyle = pt.color;
      if (pt.oneUp) {
        ctx.font = "bold 14px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillStyle = "#2f7d32"; ctx.fillText("1UP", pt.x + 1, pt.y + 1);
        ctx.fillStyle = "#fff"; ctx.fillText("1UP", pt.x, pt.y);
      } else if (pt.coin) {
        ctx.beginPath(); ctx.arc(pt.x, pt.y, 8, 0, 7); ctx.fill();
      } else {
        ctx.fillRect(pt.x-2, pt.y-2, 4, 4);
      }
    }
    ctx.globalAlpha = 1;
  }

  // ===== まるりん本人の描画 =====
  function drawPlayer() {
    const p = player;
    const playing = state === "play" || state === "boss" || cutsceneActive;   // ムービー中も動く
    if (p.invuln > 10 && Math.floor(p.invuln/4) % 2 === 0 && playing) return; // 点滅（被弾時のみ）

    const cx = p.x + p.w/2;
    const cy = p.y + p.h/2;
    const run = playing && Math.abs(p.vx) > 0.5 && p.onGround;
    const airborne = !p.onGround && playing;
    const legPhase = Math.sin(p.animT * 0.4);

    // パワーアップ時の点滅（取得直後）
    if (p.powerAnim > 0 && Math.floor(p.powerAnim/3) % 2 === 0) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.fillStyle = "rgba(255,220,120,0.55)";
      ctx.beginPath(); ctx.arc(0, 0, 30, 0, 7); ctx.fill();
      ctx.restore();
    }

    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(p.face, 1);

    // ジャンプ/やられ時の潰れ ＋ パワーアップで一回り大きく
    const pscale = p.powered ? 1.35 : 1;
    let sx = pscale, sy = pscale;
    if (state === "dead") { /* そのまま */ }
    else { sy = p.squash * pscale; sx = (1 + (1 - p.squash)*0.5) * pscale; }
    ctx.scale(sx, sy);

    const bodyR = 17;

    // 影
    if (playing) {
      ctx.save(); ctx.scale(1/sx, 1/sy);
      ctx.fillStyle = "rgba(0,0,0,0.18)";
      ctx.beginPath(); ctx.ellipse(0, 18, 15, 4, 0, 0, 7); ctx.fill();
      ctx.restore();
    }

    // 後ろ足（クリーム色）
    ctx.fillStyle = "#f6e2c0";
    const footSwing = run ? legPhase*6 : (airborne ? -3 : 0);
    ctx.beginPath(); ctx.ellipse(-6, 15 - footSwing*0.3, 6, 5, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(7, 15 + footSwing*0.3, 6, 5, 0, 0, 7); ctx.fill();

    // はね（はねまるりん）：背中の白い羽（滑空中はパタパタ速く動く）
    if (p.wing) {
      const wf = p.gliding ? Math.sin(p.glideT*0.6)*0.55 : Math.sin(p.animT*0.15)*0.22;
      for (const s of [-1, 1]) {
        ctx.save();
        ctx.translate(s*12, -4);
        ctx.rotate(s*(0.55 + wf));
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.beginPath(); ctx.ellipse(0, 0, 6, 13, 0, 0, 7); ctx.fill();
        ctx.strokeStyle = "rgba(150,200,240,0.75)"; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.ellipse(0, 0, 6, 13, 0, 0, 7); ctx.stroke();
        ctx.restore();
      }
    }

    // 体（グレーの丸／たねまるりんは黄金色）
    ctx.fillStyle = p.seed ? "#eac352" : "#b8bcc4";
    ctx.beginPath(); ctx.ellipse(0, 0, bodyR, bodyR+2, 0, 0, 7); ctx.fill();
    // 体の陰影
    ctx.fillStyle = p.seed ? "#d9ad3a" : "#a7abb4";
    ctx.beginPath(); ctx.ellipse(-6, -2, bodyR*0.7, bodyR*0.85, 0, 0, 7); ctx.fill();

    // 耳（クリーム色＋少し濃い内側）※実物に合わせて
    ctx.fillStyle = "#efe1c6";
    ctx.beginPath(); ctx.ellipse(-9, -15, 5, 6, -0.3, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(9, -15, 5, 6, 0.3, 0, 7); ctx.fill();
    ctx.fillStyle = "#e2d0ac";
    ctx.beginPath(); ctx.ellipse(-9, -14, 2.4, 3, -0.3, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(9, -14, 2.4, 3, 0.3, 0, 7); ctx.fill();

    // お腹＆顔の白いエリア
    ctx.fillStyle = "#fbf3e2";
    ctx.beginPath(); ctx.ellipse(3, 3, 13, 15, 0, 0, 7); ctx.fill();

    // ほっぺ（薄ピンク）
    ctx.fillStyle = "#f7d3ca";
    ctx.beginPath(); ctx.arc(-2, 2, 3.2, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(12, 2, 3.2, 0, 7); ctx.fill();

    // 目（両目とも青いキラキラ）※実物に合わせて
    // 青いキラキラの土台
    ctx.fillStyle = "#4fb4ea";
    ctx.beginPath(); ctx.arc(2, -4, 5.4, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(13, -4, 4.8, 0, 7); ctx.fill();
    // 黒目
    ctx.fillStyle = "#15151a";
    ctx.beginPath(); ctx.arc(2, -4, 4.2, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(13, -4, 3.6, 0, 7); ctx.fill();
    // ハイライト
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(3.4, -5.2, 1.4, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(14, -5, 1.2, 0, 7); ctx.fill();

    // 鼻（大きめの黒・つやっと）※実物に合わせて
    ctx.fillStyle = "#161619";
    ctx.beginPath(); ctx.ellipse(8, 1, 4.6, 3.9, 0, 0, 7); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.6)";
    ctx.beginPath(); ctx.arc(6.6, -0.4, 1.3, 0, 7); ctx.fill();

    // 口（にっこり）
    ctx.strokeStyle = "#3a3128"; ctx.lineWidth = 1.4; ctx.lineCap = "round";
    ctx.beginPath();
    if (state === "clear" || playing) {
      ctx.moveTo(8, 4); ctx.quadraticCurveTo(5, 8, 2, 5.5);
      ctx.moveTo(8, 4); ctx.quadraticCurveTo(11, 8, 14, 5.5);
    } else {
      ctx.moveTo(4, 6); ctx.lineTo(12, 6);
    }
    ctx.stroke();

    // 前足（両手：体の左右に小さく。走ると少しだけ振る／クリアでバンザイ）※実物寄せ
    const swing = run ? legPhase * 2 : 0;   // 走行中だけ交互にほんの少し
    const lift  = airborne ? -2 : (state === "clear" ? -6 - Math.sin(p.winPose*0.2)*3 : 0);
    const lhx = -13, rhx = 15, hy = 8;
    ctx.fillStyle = "#f6e2c0";
    ctx.beginPath(); ctx.ellipse(lhx, hy + lift - swing, 3.3, 4.2, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(rhx, hy + lift + swing, 3.3, 4.2, 0, 0, 7); ctx.fill();
    ctx.fillStyle = "#f0bd98";  // ピーチの肉球
    ctx.beginPath(); ctx.arc(lhx, hy + lift - swing + 1, 1.5, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(rhx, hy + lift + swing + 1, 1.5, 0, 7); ctx.fill();

    ctx.restore();

    // あわバリア（シャボン玉）：まるりんを包む半透明の泡
    if (p.shield && playing) {
      const rr = (p.powered ? 30 : 25) + Math.sin(elapsed * 0.2) * 1.5;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.fillStyle = "rgba(175,230,255,0.18)";
      ctx.beginPath(); ctx.arc(0, 0, rr, 0, 7); ctx.fill();
      ctx.strokeStyle = "rgba(150,220,255,0.9)"; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(0, 0, rr, 0, 7); ctx.stroke();
      ctx.fillStyle = "rgba(255,255,255,0.75)";
      ctx.beginPath(); ctx.ellipse(-rr*0.4, -rr*0.45, 3.5, 6.5, -0.5, 0, 7); ctx.fill();
      ctx.restore();
    }

    // スタン中：頭の上でくるくる回る星（四股を受けた）
    if (p.stun > 0 && playing) {
      ctx.save();
      ctx.translate(cx, cy - (p.powered ? 30 : 24));
      const n = 3;
      for (let i = 0; i < n; i++) {
        const a = elapsed * 0.16 + i * (Math.PI * 2 / n);
        const sx = Math.cos(a) * 11, sy = Math.sin(a) * 4;
        ctx.fillStyle = "#ffe14d";
        ctx.save(); ctx.translate(sx, sy); ctx.rotate(a);
        ctx.beginPath();
        for (let k = 0; k < 5; k++) {
          const ang = k * (Math.PI * 2 / 5) - Math.PI / 2;
          const r1 = 4, r2 = 1.8;
          ctx.lineTo(Math.cos(ang) * r1, Math.sin(ang) * r1);
          ctx.lineTo(Math.cos(ang + Math.PI/5) * r2, Math.sin(ang + Math.PI/5) * r2);
        }
        ctx.closePath(); ctx.fill();
        ctx.restore();
      }
      ctx.restore();
    }

    // クリア時のジャンプ演出
  }

  // ---------- HUD ----------
  function drawHUD() {
    ctx.save();
    // 上部バー
    ctx.fillStyle = "rgba(0,0,0,0.28)";
    ctx.fillRect(0, 0, W, 34);
    ctx.textAlign = "left"; ctx.textBaseline = "middle";
    ctx.font = "bold 16px 'Segoe UI', sans-serif";

    // まるりんアイコン + ライフ
    ctx.fillStyle = "#fff";
    ctx.fillText("🐹 x " + lives, 14, 18);

    // コイン
    ctx.fillStyle = "#ffcf33";
    ctx.beginPath(); ctx.arc(150, 17, 8, 0, 7); ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.fillText("x " + coinsGot, 164, 18);

    // パワーアップ表示
    if (player.wing) {
      ctx.fillStyle = "#cdeaff";
      ctx.font = "bold 13px 'Segoe UI', sans-serif";
      ctx.fillText("🪶 はねまるりん", 250, 18);
      ctx.font = "bold 16px 'Segoe UI', sans-serif";
    } else if (player.seed) {
      ctx.fillStyle = "#ffd34d";
      ctx.font = "bold 13px 'Segoe UI', sans-serif";
      ctx.fillText("🌻 たねまるりん", 250, 18);
      ctx.font = "bold 16px 'Segoe UI', sans-serif";
    } else if (player.powered) {
      ctx.fillStyle = "#ffd34d";
      ctx.font = "bold 14px 'Segoe UI', sans-serif";
      ctx.fillText("🌰 パワーアップ中！", 250, 18);
      ctx.font = "bold 16px 'Segoe UI', sans-serif";
    }
    // あわバリア中（重ねて表示）
    if (player.shield) {
      ctx.textAlign = "left"; ctx.font = "15px 'Segoe UI', sans-serif"; ctx.fillStyle = "#eaf7ff";
      ctx.fillText("🫧", 206, 18);
      ctx.font = "bold 16px 'Segoe UI', sans-serif";
    }

    // スコア
    ctx.textAlign = "right";
    ctx.fillText("SCORE " + String(score).padStart(6, "0"), W - 14, 18);

    // 進捗バー / ボスの体力
    ctx.textAlign = "center";
    if (inBoss && bosses.length) {
      // 各ボスの名前＋ハート（1〜2体）
      const n = bosses.length;
      bosses.forEach((b, i) => {
        const bx = n === 1 ? (W/2 - 62) : (255 + i * 190);
        ctx.textAlign = "left";
        ctx.font = "bold 12px 'Segoe UI', sans-serif";
        ctx.fillStyle = b.alive ? "#fff" : "rgba(255,255,255,0.45)";
        ctx.fillText(b.name, bx, 11);
        const maxH = Math.round(b.maxHp / b.hpPerHeart);
        const curH = Math.ceil(b.hp / b.hpPerHeart);
        for (let h = 0; h < maxH; h++) {
          ctx.fillStyle = (b.alive && h < curH) ? "#e0453f" : "rgba(255,255,255,0.28)";
          ctx.beginPath(); ctx.arc(bx + 8 + h * 15, 24, 6, 0, 7); ctx.fill();
        }
      });
      ctx.textAlign = "center";
      ctx.font = "bold 16px 'Segoe UI', sans-serif";
    } else {
      const prog = Math.min(1, (player.x) / (goal ? goal.x : LEVEL_W));
      ctx.fillStyle = "rgba(255,255,255,0.25)";
      ctx.fillRect(W/2 - 90, 14, 180, 7);
      ctx.fillStyle = "#66cc44";
      ctx.fillRect(W/2 - 90, 14, 180*prog, 7);
      ctx.font = "12px sans-serif"; ctx.fillStyle="#fff";
      ctx.fillText("🚩", W/2 + 90 + 6, 18);
    }
    ctx.restore();

    // ボス出現の演出（数秒だけ）：ボスの名前を大きく出す
    if (state === "boss" && bosses.some(b => b.alive) && elapsed < 120) {
      ctx.save();
      ctx.globalAlpha = elapsed < 80 ? 1 : (120 - elapsed) / 40;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      const name = bossTitle();
      ctx.font = "bold 34px 'Segoe UI', sans-serif";
      const bw = Math.max(360, ctx.measureText(name).width + 90);
      ctx.fillStyle = "rgba(120,0,0,0.42)";
      ctx.fillRect(W/2 - bw/2, H/2 - 44, bw, 60);
      ctx.fillStyle = "#ffe38a"; ctx.font = "16px 'Segoe UI', sans-serif";
      ctx.fillText("しゅつげん！", W/2, H/2 + 30);
      ctx.fillStyle = "#ffdd55"; ctx.font = "bold 34px 'Segoe UI', sans-serif";
      ctx.fillText(name, W/2, H/2 - 12);
      ctx.restore();
    }

    // ステージ開始時に名前を数秒だけ表示
    if (state === "play" && elapsed < 150) {
      ctx.save();
      ctx.globalAlpha = elapsed < 110 ? 1 : (150 - elapsed) / 40;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.fillRect(W/2 - 170, H/2 - 34, 340, 54);
      ctx.fillStyle = "#fff"; ctx.font = "bold 28px 'Segoe UI', sans-serif";
      ctx.fillText(STAGES[stageIndex].name, W/2, H/2 - 6);
      ctx.restore();
    }
  }

  function drawCenterText(title, sub) {
    ctx.save();
    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = "#fff"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.font = "bold 40px sans-serif"; ctx.fillText(title, W/2, H/2 - 10);
    ctx.font = "18px sans-serif"; ctx.fillText(sub, W/2, H/2 + 34);
    ctx.restore();
  }

  function drawGameOver() {
    ctx.save();
    ctx.fillStyle = "rgba(20,0,0,0.7)"; ctx.fillRect(0,0,W,H);
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillStyle="#e94560"; ctx.font="bold 46px sans-serif";
    ctx.fillText("ゲームオーバー", W/2, H/2 - 30);
    ctx.fillStyle="#fff"; ctx.font="20px sans-serif";
    ctx.fillText("スコア: " + score, W/2, H/2 + 20);
    ctx.font="16px sans-serif"; ctx.fillStyle="#ffd34d";
    ctx.fillText("Rキー / 画面タップ でメニューへ（つづきから選べるよ）", W/2, H/2 + 56);
    ctx.restore();
  }

  function drawClear() {
    ctx.save();
    ctx.fillStyle = "rgba(0,20,40,0.62)"; ctx.fillRect(0,0,W,H);

  // ===== ストーリー・ムービーの描画 =====
  function drawStory() {
    const scenes = STORIES[story.key].scenes;
    const idx = Math.min(story.scene, scenes.length - 1);
    const sc = scenes[idx];
    sc.act(story.t, sc.dur);                       // 背景＋まるりんの演技を描く
    if (story.t < 14) { ctx.fillStyle = "rgba(0,0,0," + (1 - story.t/14).toFixed(3) + ")"; ctx.fillRect(0, 0, W, H); }  // フェードイン
    drawStoryText(sc.lines, idx, scenes.length);
  }
  function drawStoryText(lines, idx, total) {
    const boxH = 100, by = H - boxH - 10, bx = 12, bw = W - 24;
    ctx.save();
    ctx.fillStyle = "rgba(16,20,28,0.85)"; roundRectPath(bx, by, bw, boxH, 14); ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.22)"; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = "#fff"; ctx.textAlign = "left"; ctx.textBaseline = "middle"; ctx.font = "20px 'Segoe UI',sans-serif";
    lines.forEach((ln, i) => ctx.fillText(ln, bx + 22, by + 30 + i * 30));
    const last = idx === total - 1;
    const blink = 0.5 + 0.5 * Math.sin(story.t * 0.15);
    ctx.globalAlpha = blink; ctx.fillStyle = "#ffd34d"; ctx.textAlign = "right"; ctx.font = "bold 14px 'Segoe UI',sans-serif";
    ctx.fillText(last ? (STORIES[story.key].endHint || "タップで つぎへ ▶") : "タップ／ジャンプで つぎへ ▶", bx + bw - 16, by + boxH - 14);
    ctx.globalAlpha = 1;
    for (let i = 0; i < total; i++) { ctx.fillStyle = i === idx ? "#ffd34d" : "rgba(255,255,255,0.35)"; ctx.beginPath(); ctx.arc(W/2 - (total-1)*7 + i*14, by - 10, 3.2, 0, 7); ctx.fill(); }
    ctx.restore();
  }
  // まるりんをムービー内に配置して通常描画（moving=trueで歩き／走りアニメ）
  function storyMaru(footCx, footY, face, moving) {
    const p = player;
    p.x = footCx - p.w/2; p.y = footY - p.h;
    p.face = face; p.onGround = true; p.vx = moving ? face * 2 : 0; p.animT++;
    drawPlayer();
  }
  // ムービー用の小物
  function storyHouse(cx, groundY, w, doorOpen) {
    const h = w * 0.8, x = cx - w/2, y = groundY - h;
    ctx.fillStyle = "#f2e4c8"; ctx.fillRect(x, y, w, h);
    ctx.fillStyle = "#d9713a"; ctx.beginPath(); ctx.moveTo(x - 10, y); ctx.lineTo(cx, y - w*0.4); ctx.lineTo(x + w + 10, y); ctx.closePath(); ctx.fill();
    ctx.fillStyle = doorOpen ? "#2e2015" : "#9c6b3f"; ctx.fillRect(cx - 17, groundY - 48, 34, 48);
    if (!doorOpen) { ctx.fillStyle = "#ffd34d"; ctx.beginPath(); ctx.arc(cx + 9, groundY - 24, 2.6, 0, 7); ctx.fill(); }
    ctx.fillStyle = "#8fc3e6"; ctx.fillRect(x + 16, y + 18, 28, 28); ctx.fillRect(x + w - 44, y + 18, 28, 28);
    ctx.strokeStyle = "#7a5c3a"; ctx.lineWidth = 3; ctx.strokeRect(x + 16, y + 18, 28, 28); ctx.strokeRect(x + w - 44, y + 18, 28, 28);
  }
  function storyTownSilhouette(alpha) {
    ctx.save(); ctx.globalAlpha = alpha; ctx.fillStyle = "#b98a63";
    let bx = -10;
    while (bx < W) {
      const bw = 44 + ((bx * 37) % 40), bh = 46 + ((bx * 53) % 64);
      ctx.fillRect(bx, STORY_GROUND - bh, bw, bh);
      ctx.beginPath(); ctx.moveTo(bx - 4, STORY_GROUND - bh); ctx.lineTo(bx + bw/2, STORY_GROUND - bh - 16); ctx.lineTo(bx + bw + 4, STORY_GROUND - bh); ctx.closePath(); ctx.fill();
      bx += bw + 20;

  // いない子を表す「点線の男の子のシルエット」
  function storyMissingKid(cx, groundY, label) {
    ctx.save();

    ctx.lineWidth = 2.2; ctx.lineJoin = "round"; ctx.lineCap = "round";
    ctx.strokeStyle = "rgba(255,255,255,0.72)";

    // 頭
    ctx.beginPath(); ctx.arc(cx, headCy, headR, 0, 7); ctx.fill(); ctx.stroke();
    // 胴（少しふっくら）
    const tTop = headCy + headR + 2, tBot = groundY - 24, tw = 24;
    ctx.beginPath(); roundRectPath(cx - tw/2, tTop, tw, tBot - tTop, 8); ctx.fill(); ctx.stroke();

    // 脚
    ctx.beginPath(); ctx.moveTo(cx - 7, tBot); ctx.lineTo(cx - 8, groundY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + 7, tBot); ctx.lineTo(cx + 8, groundY); ctx.stroke();
    ctx.restore();
    // 名前（点線の下に小さく）
    ctx.fillStyle = "rgba(255,255,255,0.85)"; ctx.font = "12px 'Segoe UI',sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";

  // シーン1：くさはらから南流山のおうちに帰宅（夕方）

  // シーン3：ふたりを探して冒険に出発（夕焼けの道を走る）
  function sceneSetOut(f, dur) {
    const g = ctx.createLinearGradient(0, 0, 0, H);

  // シーン4：街のみんなが狂暴になって襲ってくる
  function sceneRampage(f, dur) {
    const g = ctx.createLinearGradient(0, 0, 0, H);

    drawCat(cat1); storyAngry(cat1.x + 26, STORY_GROUND - 46);

  // シーン5：ぶじに会えるのか——？（たそがれ・遠くを見つめる）
  function sceneCliff(f, dur) {
