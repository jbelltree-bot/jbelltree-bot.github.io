    ctx.beginPath(); ctx.moveTo(-30, 0); ctx.lineTo(-42, -14); ctx.lineTo(-24, -2); ctx.closePath(); ctx.fill(); // 尾翼
    ctx.fillStyle = "#d3dbe2";
    ctx.beginPath(); ctx.moveTo(-2, 2); ctx.lineTo(-16, 16); ctx.lineTo(8, 4); ctx.closePath(); ctx.fill();      // 主翼
    ctx.fillStyle = "#5aa0d0";
    for (let i = -1; i < 5; i++) ctx.fillRect(i*8, -3, 4, 4);           // 窓
    ctx.fillStyle = "#e0453f"; ctx.fillRect(24, -3, 9, 6);             // 機首
    ctx.restore();
  }

  // はね（はねまるりんアイテム）
  function drawFeathers() {
    for (const f of feathers) {
      if (f.got) continue;
      if (f.x + f.w < camX - 40 || f.x > camX + W + 40) continue;
      f.t += 0.08;
      const cx = f.x + f.w/2, cy = f.y + f.h/2 + Math.sin(f.t)*3;
      ctx.save();
      ctx.globalAlpha = 0.5 + Math.abs(Math.sin(f.t))*0.3;
      ctx.fillStyle = "#eaf5ff";
      ctx.beginPath(); ctx.arc(cx, cy, f.w/2 + 2, 0, 7); ctx.fill();
      ctx.restore();
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(Math.sin(f.t*0.5)*0.15 - 0.2);
      ctx.fillStyle = "#ffffff";
      ctx.beginPath(); ctx.ellipse(0, 0, 6, 14, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#cfe8fb";
      ctx.beginPath(); ctx.ellipse(2.4, 0, 2.6, 12, 0, 0, 7); ctx.fill();
      ctx.strokeStyle = "#9cc7e6"; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.moveTo(0, -13); ctx.lineTo(0, 13); ctx.stroke();
      ctx.restore();
    }
  }

  // フランスパン（1UP）
  function drawBreads() {
    for (const br of breads) {
      if (br.got) continue;
      if (br.x + br.w < camX - 40 || br.x > camX + W + 40) continue;
      const cx = br.x + br.w/2, cy = br.y + br.h/2;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(-0.18);
      // 本体（こんがりバゲット）
      ctx.fillStyle = "#d19a41";
      ctx.beginPath(); ctx.ellipse(0, 0, 17, 8, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#e7b96a";
      ctx.beginPath(); ctx.ellipse(-2, -1.5, 14, 5.5, 0, 0, 7); ctx.fill();
      // 両端の焼き色濃いめ
      ctx.fillStyle = "#b9822f";
      ctx.beginPath(); ctx.ellipse(-15, 0, 3, 6, 0, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.ellipse(15, 0, 3, 6, 0, 0, 7); ctx.fill();
      // 斜めの切れ込み
      ctx.strokeStyle = "#8a5a20"; ctx.lineWidth = 1.4; ctx.lineCap = "round";
      for (let i = -2; i <= 2; i++) { ctx.beginPath(); ctx.moveTo(i*6 - 2, -4); ctx.lineTo(i*6 + 2, 4); ctx.stroke(); }
      ctx.restore();
      // 1UP 表示
      ctx.fillStyle = "#2f7d32"; ctx.font = "bold 9px 'Segoe UI', sans-serif";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("1UP", cx, br.y - 6);
    }
  }

  // 車（地上の速い敵）
  function drawCar(e) {
    ctx.save();
    const cx = e.x + e.w/2, by = e.y + e.h;
    ctx.translate(cx, by);
    if (!e.alive) { ctx.scale(1.05, 0.3); ctx.globalAlpha = 0.7; }
    const dir = e.vx > 0 ? 1 : -1;
    const bob = Math.sin(e.t*0.4)*0.8;
    ctx.fillStyle = "#d33b3b"; ctx.fillRect(-23, -16 + bob, 46, 15);   // 車体
    ctx.fillStyle = "#e05555";                                         // キャビン
    ctx.beginPath();
    ctx.moveTo(-13, -16 + bob); ctx.lineTo(-8, -27 + bob);
    ctx.lineTo(11, -27 + bob); ctx.lineTo(16, -16 + bob); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#bfe0f2";                                         // 窓
    ctx.beginPath(); ctx.moveTo(-9, -17 + bob); ctx.lineTo(-6, -25 + bob);
    ctx.lineTo(1, -25 + bob); ctx.lineTo(1, -17 + bob); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(3, -17 + bob); ctx.lineTo(3, -25 + bob);
    ctx.lineTo(9, -25 + bob); ctx.lineTo(13, -17 + bob); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#ffe9a8";                                         // ヘッドライト
    ctx.beginPath(); ctx.arc(dir*20, -8 + bob, 2.4, 0, 7); ctx.fill();
    ctx.fillStyle = "#222";                                            // タイヤ
    ctx.beginPath(); ctx.arc(-13, -1, 5, 0, 7); ctx.arc(13, -1, 5, 0, 7); ctx.fill();
    ctx.fillStyle = "#888";
    ctx.beginPath(); ctx.arc(-13, -1, 2, 0, 7); ctx.arc(13, -1, 2, 0, 7); ctx.fill();
    ctx.restore();
  }

  // ネコ（地上の敵）
  function drawCat(e) {
    ctx.save();
    const cx = e.x + e.w/2, by = e.y + e.h;
    ctx.translate(cx, by);
    if (!e.alive) { ctx.scale(1.1, 0.25); ctx.globalAlpha = 0.7; }
    const dir = e.vx > 0 ? 1 : -1;
    const wob = Math.sin(e.t*0.25)*2;
    // しっぽ
    ctx.strokeStyle = "#6b6b6b"; ctx.lineWidth = 4; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(-dir*12, -8); ctx.quadraticCurveTo(-dir*22, -14, -dir*17, -26); ctx.stroke();
    // 体
    ctx.fillStyle = "#7d7d7d";
    ctx.beginPath(); ctx.ellipse(0, -9, 14, 9, 0, 0, 7); ctx.fill();
    // 頭
    ctx.beginPath(); ctx.arc(dir*11, -16, 9, 0, 7); ctx.fill();
    // 耳
    ctx.beginPath(); ctx.moveTo(dir*5, -22); ctx.lineTo(dir*7, -31); ctx.lineTo(dir*13, -23); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(dir*14, -23); ctx.lineTo(dir*18, -31); ctx.lineTo(dir*19, -21); ctx.closePath(); ctx.fill();
    // 足
    ctx.fillStyle = "#5f5f5f";
    ctx.beginPath(); ctx.ellipse(-6 + wob, 0, 4, 3, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(6 - wob, 0, 4, 3, 0, 0, 7); ctx.fill();
    if (e.alive) {
      ctx.fillStyle = "#eef05a";
      ctx.beginPath(); ctx.arc(dir*8, -17, 2.6, 0, 7); ctx.arc(dir*15, -17, 2.6, 0, 7); ctx.fill();
      ctx.fillStyle = "#111"; ctx.fillRect(dir*8 - 0.7, -19.5, 1.4, 5); ctx.fillRect(dir*15 - 0.7, -19.5, 1.4, 5);
      ctx.fillStyle = "#e79aa0"; ctx.beginPath(); ctx.arc(dir*11.5, -13, 1.6, 0, 7); ctx.fill();
      // ひげ
      ctx.strokeStyle = "rgba(255,255,255,0.7)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(dir*13, -13); ctx.lineTo(dir*22, -15); ctx.moveTo(dir*13, -11); ctx.lineTo(dir*22, -10); ctx.stroke();
    }
    ctx.restore();
  }

  // カラス（飛ぶ敵）
  function drawCrow(e) {
    ctx.save();
    const cx = e.x + e.w/2, cy = e.y + e.h/2;
    ctx.translate(cx, cy);
    if (!e.alive) { ctx.scale(1.1, 0.3); ctx.globalAlpha = 0.7; }
    const dir = e.vx > 0 ? 1 : -1;
    const flap = Math.sin(e.t*0.3)*10;
    // 翼
    ctx.fillStyle = "#23262b";
    ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(-18, -2 - flap); ctx.lineTo(-4, 6); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(18, -2 - flap); ctx.lineTo(4, 6); ctx.closePath(); ctx.fill();
    // 尾
    ctx.beginPath(); ctx.moveTo(-dir*8, 0); ctx.lineTo(-dir*18, 5); ctx.lineTo(-dir*8, 7); ctx.closePath(); ctx.fill();
    // 体
    ctx.fillStyle = "#2b2f35";
    ctx.beginPath(); ctx.ellipse(0, 0, 12, 9, 0, 0, 7); ctx.fill();
    // 頭
    ctx.beginPath(); ctx.arc(dir*10, -4, 7, 0, 7); ctx.fill();
    // くちばし
    ctx.fillStyle = "#f0a51e";
    ctx.beginPath(); ctx.moveTo(dir*15, -5); ctx.lineTo(dir*27, -2); ctx.lineTo(dir*15, 1); ctx.closePath(); ctx.fill();
    if (e.alive) {
      ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(dir*11, -5, 2.4, 0, 7); ctx.fill();
      ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(dir*12, -5, 1.3, 0, 7); ctx.fill();
    }
    ctx.restore();
  }

  function drawEnemies() {
    for (const e of enemies) {
      if (e.x + e.w < camX - 40 || e.x > camX + W + 40) continue;
      if (e.kind === "cat")  { drawCat(e);  continue; }
      if (e.kind === "crow") { drawCrow(e); continue; }
      if (e.kind === "car")  { drawCar(e);  continue; }
      if (e.kind === "crab") { drawCrab(e); continue; }
      if (e.kind === "gull") { drawGull(e); continue; }
      if (e.kind === "puffer") { drawPuffer(e); continue; }
      if (e.kind === "jelly") { drawJelly(e); continue; }
      ctx.save();
      const cx = e.x + e.w/2, by = e.y + e.h;
      ctx.translate(cx, by);
      if (!e.alive) { ctx.scale(1.1, 0.25); ctx.globalAlpha = 0.7; }
      // クリ栗風の敵（くるみ）
      const wob = Math.sin(e.t*0.25)*3;
      // 体
      ctx.fillStyle = "#8a5a34";
      ctx.beginPath(); ctx.ellipse(0, -e.h*0.45, e.w*0.5, e.h*0.5, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#a56b3e";
      ctx.beginPath(); ctx.ellipse(0, -e.h*0.5, e.w*0.38, e.h*0.36, 0, 0, 7); ctx.fill();
      // 足
      ctx.fillStyle = "#4a3220";
      ctx.beginPath(); ctx.ellipse(-8+wob, 0, 6, 4, 0, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.ellipse(8-wob, 0, 6, 4, 0, 0, 7); ctx.fill();
      // 目
      if (e.alive) {
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(-6,-e.h*0.55,4,0,7); ctx.arc(6,-e.h*0.55,4,0,7); ctx.fill();
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(-6+ (e.vx>0?1:-1),-e.h*0.55,2,0,7); ctx.arc(6+(e.vx>0?1:-1),-e.h*0.55,2,0,7); ctx.fill();
        // 怒り眉
        ctx.strokeStyle="#3a2414"; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(-10,-e.h*0.72); ctx.lineTo(-3,-e.h*0.63);
        ctx.moveTo(10,-e.h*0.72); ctx.lineTo(3,-e.h*0.63); ctx.stroke();
      }
      ctx.restore();
    }
  }

  // 角丸長方形のパス
  function roundRectPath(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ボス戦の背景（駅の中）
  function drawBossBackdrop() {
    if (STAGES[stageIndex].boss === "sumo") { drawSumoBackdrop(); return; }
    if (STAGES[stageIndex].boss === "mega") { drawDeepSeaBackdrop(); return; }
    if (STAGES[stageIndex].boss !== "penguins") return;
    // 奥の壁と柱
    ctx.fillStyle = "#cdd9e4"; ctx.fillRect(0, 150, W, 130);
    ctx.fillStyle = "rgba(150,165,180,0.45)";
    ctx.fillRect(90, 150, 26, 210); ctx.fillRect(W - 116, 150, 26, 210);
    ctx.fillRect(W/2 - 13, 150, 26, 210);
    // 改札機（奥）
    ctx.fillStyle = "#dfe3e6";
    for (let i = 0; i < 5; i++) { const gx = 150 + i*110; ctx.fillRect(gx, 300, 26, 58); ctx.fillStyle = "#f2c200"; ctx.fillRect(gx, 300, 26, 8); ctx.fillStyle = "#dfe3e6"; }
    // 駅名看板
    ctx.fillStyle = "#2f7d32"; ctx.fillRect(W/2 - 112, 96, 224, 34);
    ctx.fillStyle = "#fff"; ctx.font = "bold 18px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("みなみながれやま駅", W/2, 113);
    ctx.fillStyle = "#ffd34d"; ctx.font = "11px 'Segoe UI', sans-serif";
    ctx.fillText("Minami-nagareyama", W/2, 126);
  }

  // ボスの描画（種類ごとに振り分け）
  function drawBosses() {
    for (const b of bosses) {
      if (b.kind === "pegi" || b.kind === "nisepegi") drawPenguinBoss(b);
      else if (b.kind === "sumo") drawSumoBoss(b);
      else if (b.kind === "mega") drawMegaBoss(b);
      else drawKuriBoss(b);
    }
  }

  // にせぺぎが投げるキュウリ／こうようがまく塩
  function drawCukes() {
    for (const cu of cukes) {
      if (cu.kind === "salt") {   // 塩の一つかみ（白い粒のかたまり）
        ctx.save();
        ctx.translate(cu.x, cu.y);
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        const dots = [[0,0],[-5,-2],[5,-1],[-2,4],[3,4],[-6,3],[6,3],[0,-5]];
        for (const [dx, dy] of dots) { ctx.beginPath(); ctx.arc(dx + Math.sin(cu.t*0.4)*1.5, dy, 2.4, 0, 7); ctx.fill(); }
        ctx.fillStyle = "#e7e0cf";
        for (const [dx, dy] of [[-3,0],[4,2],[-1,-3]]) { ctx.beginPath(); ctx.arc(dx, dy, 1.6, 0, 7); ctx.fill(); }
        ctx.restore();
        continue;
      }
      ctx.save();
      ctx.translate(cu.x, cu.y);
      ctx.rotate(cu.t * 0.18);
      ctx.fillStyle = "#4e8a2b";
      ctx.beginPath(); ctx.ellipse(0, 0, 13, 7, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#6cae3e";
      ctx.beginPath(); ctx.ellipse(0, 0, 12, 6, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#8cc655";
      ctx.beginPath(); ctx.ellipse(-1, -1.5, 8.5, 3, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#3f7a24";
      for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.arc(i*5, 1.5, 1, 0, 7); ctx.fill(); }
      ctx.fillStyle = "#5a8f2f"; ctx.fillRect(11, -1.5, 4, 3);   // へた
      ctx.restore();
    }
  }

  // ===== ボス：ペギ／にせぺぎ（ペンギン）=====
  function drawPenguinBoss(b) {
    const green = b.kind === "nisepegi";
    const body = green ? "#c8d27c" : "#aed4e7";
    const line = green ? "#93925f" : "#8a9aa2";
    const belly = green ? "#f3efd4" : "#fdfbf3";
    const flashBody = green ? "#eef0d8" : "#e6f2f8";
    const cx = b.x + b.w/2, by = b.y + b.h, W2 = b.w, H2 = b.h;
    ctx.save();
    ctx.translate(cx, by);
    const sq = b.squash;
    ctx.scale(1 + (1 - sq) * 0.35, sq);
    if (!b.alive) ctx.globalAlpha = Math.max(0, 1 - b.dyingT / 90);
    const flash = b.hurtFlash > 0 && Math.floor(b.hurtFlash / 4) % 2 === 0;
    // 影
    ctx.fillStyle = "rgba(0,0,0,0.12)";
    ctx.beginPath(); ctx.ellipse(0, 2, W2*0.6, 7, 0, 0, 7); ctx.fill();
    // 足
    ctx.fillStyle = "#efc04a"; ctx.strokeStyle = "#cf9f2e"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(-W2*0.26, -3, 8, 5, 0, 0, 7); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(W2*0.26, -3, 8, 5, 0, 0, 7); ctx.fill(); ctx.stroke();
    // ペギの頭のワンポイントのギザギザ（体の後ろ）
    if (!green) {
      const ty = -H2 + 5;
      ctx.fillStyle = "#9fc6da"; ctx.strokeStyle = line; ctx.lineWidth = 2; ctx.lineJoin = "round";
      ctx.beginPath();
      ctx.moveTo(-13, ty + 8); ctx.lineTo(-8, ty - 2); ctx.lineTo(-3, ty + 6);
      ctx.lineTo(2, ty - 4); ctx.lineTo(7, ty + 6); ctx.lineTo(12, ty - 2); ctx.lineTo(15, ty + 8);
      ctx.closePath(); ctx.fill(); ctx.stroke();
    }
    // 体（まるい）
    ctx.fillStyle = flash ? flashBody : body;
    ctx.strokeStyle = line; ctx.lineWidth = 3;
    roundRectPath(-W2/2, -H2, W2, H2, Math.min(W2, H2) * 0.46);
    ctx.fill(); ctx.stroke();
    // お腹
    ctx.fillStyle = belly;
    ctx.beginPath(); ctx.ellipse(0, -H2*0.30, W2*0.34, H2*0.30, 0, 0, 7); ctx.fill();
    if (b.alive) {
      const dir = b.face;
      // 目（やや横長）
      ctx.fillStyle = "#33312a";
      ctx.beginPath(); ctx.ellipse(-W2*0.16 + dir*1.5, -H2*0.55, 4.6, 3.4, 0, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.ellipse(W2*0.16 + dir*1.5, -H2*0.55, 4.6, 3.4, 0, 0, 7); ctx.fill();
      // くちばし（小さな楕円・両方同じ）
      ctx.fillStyle = "#e6bf5c"; ctx.strokeStyle = "#c39f42"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.ellipse(dir*1.5, -H2*0.42, 6, 3.6, 0, 0, 7); ctx.fill(); ctx.stroke();
    } else {
      // やられ目（＞＜）
      ctx.strokeStyle = "#33312a"; ctx.lineWidth = 2.4; ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(-W2*0.24, -H2*0.6); ctx.lineTo(-W2*0.08, -H2*0.52); ctx.lineTo(-W2*0.24, -H2*0.44);
      ctx.moveTo(W2*0.24, -H2*0.6); ctx.lineTo(W2*0.08, -H2*0.52); ctx.lineTo(W2*0.24, -H2*0.44);
      ctx.stroke();
    }
    ctx.restore();
  }

  // ===== ボス：クリだいおう =====

  // ===== 相撲場（土俵）の背景 =====
  function drawSumoBackdrop() {
    // 奥の板壁
    ctx.fillStyle = "#c9a877"; ctx.fillRect(0, 120, W, 150);
    ctx.strokeStyle = "rgba(120,90,55,0.35)"; ctx.lineWidth = 2;
    for (let x = 40; x < W; x += 80) { ctx.beginPath(); ctx.moveTo(x, 120); ctx.lineTo(x, 270); ctx.stroke(); }
    // 青いのぼり（場内の案内幕）
    ctx.fillStyle = "#2a4f9c";
    for (let i = 0; i < 6; i++) { ctx.fillRect(30 + i*130, 150, 22, 92); }
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    for (let i = 0; i < 6; i++) { ctx.fillRect(37 + i*130, 158, 8, 76); }
    // 吊り屋根（紫の屋形）＋房
    ctx.fillStyle = "#5a2352";
    ctx.beginPath(); ctx.moveTo(W/2 - 250, 70); ctx.lineTo(W/2 + 250, 70);
    ctx.lineTo(W/2 + 200, 110); ctx.lineTo(W/2 - 200, 110); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#6d2b63"; ctx.fillRect(W/2 - 210, 100, 420, 16);
    ctx.fillStyle = "#e9c84a"; ctx.fillRect(W/2 - 210, 100, 420, 4);
    // 四隅の房（東西南北の色）
    const tas = [[W/2 - 190, "#e04a3f"], [W/2 - 64, "#f2f2f2"], [W/2 + 64, "#3f7dd0"], [W/2 + 190, "#2f9e57"]];
    for (const [tx, tc] of tas) {
      ctx.fillStyle = "#caa63e"; ctx.fillRect(tx - 2, 110, 4, 14);
      ctx.fillStyle = tc; ctx.beginPath(); ctx.moveTo(tx, 124); ctx.lineTo(tx - 7, 150); ctx.lineTo(tx + 7, 150); ctx.closePath(); ctx.fill();
    }
    // 「西」の看板
    ctx.fillStyle = "#3a2a1e"; ctx.fillRect(W/2 - 26, 128, 52, 40);
    ctx.fillStyle = "#f4ead2"; ctx.font = "bold 26px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("西", W/2, 150);
    // 土俵の土台（一段高い台）
    const topY = BOSS_GROUND + 4;
    ctx.fillStyle = "#e3b877"; ctx.fillRect(40, topY, W - 80, H - topY);
    ctx.fillStyle = "#edc98d"; ctx.fillRect(60, topY - 10, W - 120, 18);
    // 俵（土俵の丸い縁）
    ctx.strokeStyle = "#d8a94c"; ctx.lineWidth = 10; ctx.setLineDash([16, 7]);
    ctx.beginPath(); ctx.ellipse(W/2, topY + 24, 300, 34, 0, Math.PI, 0); ctx.stroke();
    ctx.setLineDash([]);
    // 仕切り線（白）
    ctx.strokeStyle = "#f5f1e4"; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(W/2 - 46, topY + 30); ctx.lineTo(W/2 - 46, topY + 46);
    ctx.moveTo(W/2 + 46, topY + 30); ctx.lineTo(W/2 + 46, topY + 46); ctx.stroke();
  }

  // ===== ボス：こうよう（子供力士）=====
  function drawSumoBoss(b) {
    const cx = b.x + b.w/2, by = b.y + b.h, W2 = b.w, H2 = b.h;
    ctx.save();
    ctx.translate(cx, by);
    const sq = b.squash;
    ctx.scale(1 + (1 - sq) * 0.35, sq);
    if (!b.alive) ctx.globalAlpha = Math.max(0, 1 - b.dyingT / 90);
    const dir = b.face;
    const flash = b.hurtFlash > 0 && Math.floor(b.hurtFlash / 4) % 2 === 0;
    const skin = flash ? "#ffdccb" : "#f6cfa4";
    const skinD = flash ? "#f6c4b0" : "#e6b184";
    const lean = b.charging ? dir * 6 : 0;                 // 突進中は前のめり
    const stance = b.windup > 0 ? 6 : 0;                   // しこの構えは腰を落とす
    // 影
    ctx.fillStyle = "rgba(0,0,0,0.15)";
    ctx.beginPath(); ctx.ellipse(0, 2, W2*0.6, 8, 0, 0, 7); ctx.fill();
    // 足（しこ中は開く）
    const legSpread = b.windup > 0 ? W2*0.42 : W2*0.28;
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.ellipse(-legSpread, -5, 12, 8, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(legSpread, -5, 12, 8, 0, 0, 7); ctx.fill();
    ctx.fillStyle = skinD;
    ctx.beginPath(); ctx.ellipse(-legSpread, -18 + stance, 15, 16, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(legSpread, -18 + stance, 15, 16, 0, 0, 7); ctx.fill();
    // まわし（白いふんどし）
    ctx.fillStyle = flash ? "#ffffff" : "#f7f4ea";
    roundRectPath(-W2*0.42, -H2*0.52, W2*0.84, H2*0.30, 6); ctx.fill();
    ctx.fillStyle = "#e7e1cf"; ctx.fillRect(-6 + lean*0.5, -H2*0.52, 12, H2*0.30);   // 前垂れ
    // 体（ぽっちゃり胴）
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.ellipse(lean*0.4, -H2*0.52, W2*0.46, H2*0.34, 0, 0, 7); ctx.fill();
    // おへそ
    ctx.strokeStyle = skinD; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(lean*0.4, -H2*0.44, 2.5, 0, 7); ctx.stroke();
    // 腕（突進中は前に突き出す）
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.ellipse(-W2*0.5 + lean, -H2*0.55 - stance*0.5, 11, 9, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(W2*0.5 + lean, -H2*0.55 - stance*0.5, 11, 9, 0, 0, 7); ctx.fill();
    // 頭
    const hy = -H2*0.86 - stance*0.3;
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.ellipse(lean, hy, W2*0.36, W2*0.34, 0, 0, 7); ctx.fill();
    // 髪（黒・短髪）
    ctx.fillStyle = "#241a14";
    ctx.beginPath(); ctx.ellipse(lean, hy - W2*0.14, W2*0.37, W2*0.22, 0, Math.PI, 0); ctx.fill();
    ctx.beginPath(); ctx.moveTo(lean - W2*0.37, hy - W2*0.05);
    ctx.quadraticCurveTo(lean - W2*0.2, hy - W2*0.02, lean - W2*0.05, hy - W2*0.1);
    ctx.quadraticCurveTo(lean + W2*0.1, hy - W2*0.02, lean + W2*0.37, hy - W2*0.05);
    ctx.lineTo(lean + W2*0.37, hy - W2*0.16); ctx.lineTo(lean - W2*0.37, hy - W2*0.16); ctx.closePath(); ctx.fill();
    if (b.alive) {
      // めがね
      const ex = W2*0.15, ey = hy + 2;
      ctx.strokeStyle = "#222"; ctx.lineWidth = 2.4; ctx.fillStyle = "#fff";
      ctx.beginPath(); ctx.roundRect ? ctx.roundRect(lean - ex - 9 + dir*1.5, ey - 6, 16, 12, 4) : ctx.rect(lean - ex - 9 + dir*1.5, ey - 6, 16, 12); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.roundRect ? ctx.roundRect(lean + ex - 7 + dir*1.5, ey - 6, 16, 12, 4) : ctx.rect(lean + ex - 7 + dir*1.5, ey - 6, 16, 12); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(lean - ex + 7 + dir*1.5, ey); ctx.lineTo(lean + ex - 7 + dir*1.5, ey); ctx.stroke();
      // 目
      ctx.fillStyle = "#241a14";
      ctx.beginPath(); ctx.arc(lean - ex + dir*1.5, ey, 2.6, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(lean + ex + 1 + dir*1.5, ey, 2.6, 0, 7); ctx.fill();
      // 笑った口
      ctx.strokeStyle = "#a85a3e"; ctx.lineWidth = 2.4; ctx.lineCap = "round";
      ctx.beginPath(); ctx.arc(lean + dir*1.5, hy + W2*0.16, 7, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();
      // ほっぺ
      ctx.fillStyle = "rgba(244,150,120,0.5)";
      ctx.beginPath(); ctx.arc(lean - W2*0.24, hy + W2*0.12, 4, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(lean + W2*0.24, hy + W2*0.12, 4, 0, 7); ctx.fill();
    } else {
      // やられ目（＞＜）＋めがねずれ
      ctx.strokeStyle = "#241a14"; ctx.lineWidth = 2.4; ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(lean - W2*0.22, hy - 4); ctx.lineTo(lean - W2*0.06, hy + 2); ctx.lineTo(lean - W2*0.22, hy + 8);
      ctx.moveTo(lean + W2*0.22, hy - 4); ctx.lineTo(lean + W2*0.06, hy + 2); ctx.lineTo(lean + W2*0.22, hy + 8);
      ctx.stroke();
    }
    ctx.restore();
  }

  // ===== あわバリア（アイテムのシャボン玉）=====
  function drawBubbles() {
    for (const bb of bubbles) {
      if (bb.got) continue;
      if (bb.x + bb.w < camX - 40 || bb.x > camX + W + 40) continue;
      bb.t += 0.08;
      const cx = bb.x + bb.w/2, cy = bb.y + bb.h/2 + Math.sin(bb.t)*3, r = bb.w/2;
      ctx.save();
      ctx.globalAlpha = 0.4 + Math.abs(Math.sin(bb.t))*0.25;
      ctx.fillStyle = "#dff5ff"; ctx.beginPath(); ctx.arc(cx, cy, r + 3, 0, 7); ctx.fill();
      ctx.restore();
      ctx.fillStyle = "rgba(180,235,255,0.28)"; ctx.beginPath(); ctx.arc(cx, cy, r, 0, 7); ctx.fill();
      ctx.strokeStyle = "rgba(120,200,245,0.9)"; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.arc(cx, cy, r, 0, 7); ctx.stroke();
      ctx.strokeStyle = "rgba(255,180,220,0.55)"; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(cx, cy, r - 3, 0.6, 2.2); ctx.stroke();
      ctx.fillStyle = "rgba(255,255,255,0.85)"; ctx.beginPath(); ctx.ellipse(cx - r*0.35, cy - r*0.4, 3, 5, -0.5, 0, 7); ctx.fill();
    }
  }

  // ===== ステージ4：ハワイの装飾 =====
  function drawHawaiiDecor() {
    const Lc = camX - 500, R = camX + W + 80;
    const put = (x, fn) => { if (x > Lc && x < R) fn(); };
    // 前半：ビーチ
    put(320,  () => palmTree(320, 1.0));
    put(720,  () => beachParasol(720));
    put(1120, () => palmTree(1120, 0.85));
    put(1500, () => starfishDecor(1520));
    put(1780, () => surfboard(1780));
    put(2050, () => palmTree(2050, 1.05));
    put(2450, () => beachSign(2450));
    put(2780, () => palmTree(2780, 0.9));
    // 後半：海の中
    put(3250, () => coralCluster(3250));
    put(3560, () => seaweed(3560));
    put(3900, () => sunkenShipDecor(3900));
    put(4300, () => coralCluster(4300));
    put(4660, () => seaweed(4660));
    put(5050, () => coralCluster(5050));
    put(5360, () => seaweed(5360));
    // 泳ぐ小魚
    for (let i = 0; i < 8; i++) {
      const fx = 3300 + i * 300;
      put(fx, () => smallFish(fx + Math.sin(elapsed*0.02 + i)*26, GROUND_Y - 130 - (i%3)*36, i%2 ? "#ffb347" : "#5ec6e8"));
    }
    // 立ちのぼる泡（後半）
    for (let i = 0; i < 11; i++) {
      const bx = 3200 + i * 240;
      if (bx < Lc || bx > R) continue;
      const by = GROUND_Y - ((elapsed*1.2 + i*70) % 300);
      ctx.fillStyle = "rgba(220,245,255,0.4)";
      ctx.beginPath(); ctx.arc(bx + Math.sin(elapsed*0.04+i)*8, by, 3 + (i%3), 0, 7); ctx.fill();
    }
  }

  function palmTree(x, sc) {
    sc = sc || 1;
    ctx.save(); ctx.translate(x, GROUND_Y); ctx.scale(sc, sc);
    ctx.strokeStyle = "#a9764a"; ctx.lineWidth = 12; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(-10, -70, -18, -120); ctx.stroke();
    ctx.strokeStyle = "#8a5f38"; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(-2, -20); ctx.quadraticCurveTo(-12, -70, -18, -116); ctx.stroke();
    const hx = -18, hy = -120;
    const fronds = [[-1.5,-0.2],[-0.9,-0.9],[0,-1.1],[0.9,-0.9],[1.5,-0.2],[1.2,0.4]];
    ctx.fillStyle = "#3aa63e";
    for (const [dx, dy] of fronds) { ctx.save(); ctx.translate(hx, hy); ctx.rotate(Math.atan2(dy, dx)); ctx.beginPath(); ctx.ellipse(30, 0, 32, 9, 0, 0, 7); ctx.fill(); ctx.restore(); }
    ctx.fillStyle = "#2e8b39";
    for (const [dx, dy] of fronds) { ctx.save(); ctx.translate(hx, hy); ctx.rotate(Math.atan2(dy, dx)); ctx.beginPath(); ctx.ellipse(26, 0, 24, 4, 0, 0, 7); ctx.fill(); ctx.restore(); }
    ctx.fillStyle = "#6b4423";
    ctx.beginPath(); ctx.arc(hx - 6, hy + 6, 5, 0, 7); ctx.arc(hx + 6, hy + 8, 5, 0, 7); ctx.arc(hx + 1, hy + 12, 5, 0, 7); ctx.fill();
    ctx.restore();
  }
  function beachParasol(x) {
    const baseY = GROUND_Y;
    ctx.fillStyle = "#f2f2f2"; ctx.fillRect(x - 30, baseY - 6, 90, 6);
    ctx.strokeStyle = "#cfcfcf"; ctx.lineWidth = 4; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(x + 20, baseY - 4); ctx.lineTo(x + 20, baseY - 78); ctx.stroke();
    const cx = x + 20, cy = baseY - 78;
    for (let i = 0; i < 8; i++) { ctx.fillStyle = i % 2 ? "#e94560" : "#fff"; ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, 46, Math.PI + i*Math.PI/8, Math.PI + (i+1)*Math.PI/8); ctx.closePath(); ctx.fill(); }
    ctx.fillStyle = "#c9354d"; ctx.beginPath(); ctx.arc(cx, cy, 4, 0, 7); ctx.fill();
    ballDecor(x - 46, baseY - 12);
  }
  function ballDecor(x, y) {
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(x, y, 11, 0, 7); ctx.fill();
    const cols = ["#e94560","#ffd34d","#3aa8e0"];
    for (let i = 0; i < 3; i++) { ctx.fillStyle = cols[i]; ctx.beginPath(); ctx.moveTo(x, y); ctx.arc(x, y, 11, i*2.1, i*2.1 + 0.7); ctx.closePath(); ctx.fill(); }
  }
  function surfboard(x) {
    ctx.save(); ctx.translate(x, GROUND_Y - 4); ctx.rotate(-0.22);
    ctx.fillStyle = "#ffcf33"; ctx.beginPath(); ctx.ellipse(0, -46, 12, 48, 0, 0, 7); ctx.fill();
    ctx.fillStyle = "#e94560"; ctx.fillRect(-3, -92, 6, 92);
    ctx.strokeStyle = "#c9354d"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, -90); ctx.lineTo(0, -4); ctx.stroke();
    ctx.restore();
  }
  function starfishDecor(x) {
    ctx.save(); ctx.translate(x, GROUND_Y - 10); ctx.fillStyle = "#f2913d";
    ctx.beginPath();
    for (let i = 0; i < 10; i++) { const a = -Math.PI/2 + i*Math.PI/5, r = i % 2 ? 5 : 13; const px = Math.cos(a)*r, py = Math.sin(a)*r*0.9; i ? ctx.lineTo(px, py) : ctx.moveTo(px, py); }
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#e07a26";

  // ===== ボス：メガロドン（巨大ザメ）=====
  function drawMegaBoss(b) {
    const cx = b.x + b.w/2, by = b.y + b.h, W2 = b.w, H2 = b.h;
    ctx.save();
    ctx.translate(cx, by);
    const sq = b.squash;
    ctx.scale(1 + (1 - sq) * 0.3, sq);
    if (!b.alive) ctx.globalAlpha = Math.max(0, 1 - b.dyingT / 90);
    ctx.scale(b.face, 1);                       // 頭が進行方向を向く
    const flash = b.hurtFlash > 0 && Math.floor(b.hurtFlash / 4) % 2 === 0;
    const body = flash ? "#d7e6ee" : "#7f97a6";
    const bodyD = flash ? "#c2d4de" : "#6b8494";
    const belly = flash ? "#ffffff" : "#eef3f5";
    const bite = b.charging ? 1 : (b.windup > 0 ? -0.4 : 0);
    const midY = -H2*0.5;
    // 影
    ctx.fillStyle = "rgba(0,0,0,0.15)"; ctx.beginPath(); ctx.ellipse(0, 2, W2*0.55, 8, 0, 0, 7); ctx.fill();
    // 尾びれ（後方）
    ctx.fillStyle = body;
    ctx.beginPath(); ctx.moveTo(-W2*0.42, midY); ctx.lineTo(-W2*0.6, midY - H2*0.5); ctx.lineTo(-W2*0.5, midY); ctx.lineTo(-W2*0.6, midY + H2*0.42); ctx.closePath(); ctx.fill();
    // 背びれ
    ctx.beginPath(); ctx.moveTo(-W2*0.05, midY - H2*0.42); ctx.lineTo(W2*0.12, midY - H2*0.92); ctx.lineTo(W2*0.2, midY - H2*0.42); ctx.closePath(); ctx.fill();
    // 胸びれ
    ctx.beginPath(); ctx.moveTo(W2*0.1, midY + H2*0.2); ctx.lineTo(W2*0.02, midY + H2*0.72); ctx.lineTo(W2*0.26, midY + H2*0.34); ctx.closePath(); ctx.fill();
    // 胴体＋頭
    ctx.fillStyle = body;
    ctx.beginPath(); ctx.ellipse(0, midY, W2*0.46, H2*0.42, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.moveTo(W2*0.1, midY - H2*0.4); ctx.quadraticCurveTo(W2*0.62, midY - H2*0.28, W2*0.6, midY); ctx.quadraticCurveTo(W2*0.62, midY + H2*0.3, W2*0.1, midY + H2*0.42); ctx.closePath(); ctx.fill();
    // お腹（白）
    ctx.fillStyle = belly; ctx.beginPath(); ctx.ellipse(W2*0.05, midY + H2*0.22, W2*0.4, H2*0.2, 0, 0, 7); ctx.fill();
    // えら
    ctx.strokeStyle = bodyD; ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) { ctx.beginPath(); ctx.arc(W2*0.12 - i*7, midY, H2*0.22, -0.9, 0.9); ctx.stroke(); }
    // 口＋歯
    const mouthOpen = Math.max(0, bite) * H2*0.34;
    ctx.fillStyle = "#8a2f38";
    ctx.beginPath(); ctx.moveTo(W2*0.6, midY + H2*0.02); ctx.lineTo(W2*0.24, midY + H2*0.12 + mouthOpen); ctx.lineTo(W2*0.24, midY + H2*0.12); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#fff";
    for (let i = 0; i < 6; i++) {
      const tx = W2*0.28 + i*W2*0.05;
      ctx.beginPath(); ctx.moveTo(tx, midY + H2*0.1); ctx.lineTo(tx + 4, midY + H2*0.02); ctx.lineTo(tx + 8, midY + H2*0.1); ctx.closePath(); ctx.fill();
      if (mouthOpen > 4) { ctx.beginPath(); ctx.moveTo(tx, midY + H2*0.12 + mouthOpen); ctx.lineTo(tx + 4, midY + H2*0.2 + mouthOpen); ctx.lineTo(tx + 8, midY + H2*0.12 + mouthOpen); ctx.closePath(); ctx.fill(); }
    }
    // 目
    if (b.alive) {
      ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(W2*0.34, midY - H2*0.14, 5, 0, 7); ctx.fill();
      ctx.fillStyle = "#141414"; ctx.beginPath(); ctx.arc(W2*0.35, midY - H2*0.14, 3, 0, 7); ctx.fill();
      ctx.strokeStyle = bodyD; ctx.lineWidth = 3; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(W2*0.26, midY - H2*0.26); ctx.lineTo(W2*0.4, midY - H2*0.16); ctx.stroke();
    } else {
      ctx.strokeStyle = "#141414"; ctx.lineWidth = 2.6; ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(W2*0.3, midY - H2*0.22); ctx.lineTo(W2*0.4, midY - H2*0.12);
      ctx.moveTo(W2*0.4, midY - H2*0.22); ctx.lineTo(W2*0.3, midY - H2*0.12);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawParticles() {
    for (const pt of particles) {
      ctx.globalAlpha = Math.max(0, Math.min(1, pt.life/20));
      ctx.fillStyle = pt.color;
      if (pt.oneUp) {
        ctx.font = "bold 14px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillStyle = "#2f7d32"; ctx.fillText("1UP", pt.x + 1, pt.y + 1);
        ctx.fillStyle = "#fff"; ctx.fillText("1UP", pt.x, pt.y);
      } else if (pt.coin) {
        ctx.beginPath(); ctx.arc(pt.x, pt.y, 8, 0, 7); ctx.fill();
      } else {
        ctx.fillRect(pt.x-2, pt.y-2, 4, 4);
      }

    ctx.globalAlpha = 1;
  }

  // ===== まるりん本人の描画 =====
  function drawPlayer() {
    const p = player;
    const playing = state === "play" || state === "boss";
    if (p.invuln > 10 && Math.floor(p.invuln/4) % 2 === 0 && playing) return; // 点滅（被弾時のみ）

    const cx = p.x + p.w/2;
    const cy = p.y + p.h/2;
    const run = playing && Math.abs(p.vx) > 0.5 && p.onGround;
    const airborne = !p.onGround && playing;
    const legPhase = Math.sin(p.animT * 0.4);

    // パワーアップ時の点滅（取得直後）
    if (p.powerAnim > 0 && Math.floor(p.powerAnim/3) % 2 === 0) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.fillStyle = "rgba(255,220,120,0.55)";
      ctx.beginPath(); ctx.arc(0, 0, 30, 0, 7); ctx.fill();
      ctx.restore();
    }

    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(p.face, 1);

    // ジャンプ/やられ時の潰れ ＋ パワーアップで一回り大きく
    const pscale = p.powered ? 1.35 : 1;
    let sx = pscale, sy = pscale;
    if (state === "dead") { /* そのまま */ }
    else { sy = p.squash * pscale; sx = (1 + (1 - p.squash)*0.5) * pscale; }
    ctx.scale(sx, sy);

    const bodyR = 17;

    // 影
    if (playing) {
      ctx.save(); ctx.scale(1/sx, 1/sy);
      ctx.fillStyle = "rgba(0,0,0,0.18)";
      ctx.beginPath(); ctx.ellipse(0, 18, 15, 4, 0, 0, 7); ctx.fill();
      ctx.restore();
    }

    // 後ろ足（クリーム色）
    ctx.fillStyle = "#f6e2c0";
    const footSwing = run ? legPhase*6 : (airborne ? -3 : 0);
    ctx.beginPath(); ctx.ellipse(-6, 15 - footSwing*0.3, 6, 5, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(7, 15 + footSwing*0.3, 6, 5, 0, 0, 7); ctx.fill();

    // はね（はねまるりん）：背中の白い羽（滑空中はパタパタ速く動く）
    if (p.wing) {
      const wf = p.gliding ? Math.sin(p.glideT*0.6)*0.55 : Math.sin(p.animT*0.15)*0.22;
      for (const s of [-1, 1]) {
        ctx.save();
        ctx.translate(s*12, -4);
        ctx.rotate(s*(0.55 + wf));
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.beginPath(); ctx.ellipse(0, 0, 6, 13, 0, 0, 7); ctx.fill();
        ctx.strokeStyle = "rgba(150,200,240,0.75)"; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.ellipse(0, 0, 6, 13, 0, 0, 7); ctx.stroke();
        ctx.restore();
      }
    }

    // 体（グレーの丸／たねまるりんは黄金色）
    ctx.fillStyle = p.seed ? "#eac352" : "#b8bcc4";
    ctx.beginPath(); ctx.ellipse(0, 0, bodyR, bodyR+2, 0, 0, 7); ctx.fill();
    // 体の陰影
    ctx.fillStyle = p.seed ? "#d9ad3a" : "#a7abb4";
    ctx.beginPath(); ctx.ellipse(-6, -2, bodyR*0.7, bodyR*0.85, 0, 0, 7); ctx.fill();

    // 耳（クリーム色＋少し濃い内側）※実物に合わせて
    ctx.fillStyle = "#efe1c6";
    ctx.beginPath(); ctx.ellipse(-9, -15, 5, 6, -0.3, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(9, -15, 5, 6, 0.3, 0, 7); ctx.fill();
    ctx.fillStyle = "#e2d0ac";
    ctx.beginPath(); ctx.ellipse(-9, -14, 2.4, 3, -0.3, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(9, -14, 2.4, 3, 0.3, 0, 7); ctx.fill();

    // お腹＆顔の白いエリア
    ctx.fillStyle = "#fbf3e2";
    ctx.beginPath(); ctx.ellipse(3, 3, 13, 15, 0, 0, 7); ctx.fill();

    // ほっぺ（薄ピンク）
    ctx.fillStyle = "#f7d3ca";
    ctx.beginPath(); ctx.arc(-2, 2, 3.2, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(12, 2, 3.2, 0, 7); ctx.fill();

    // 目（両目とも青いキラキラ）※実物に合わせて
    // 青いキラキラの土台
    ctx.fillStyle = "#4fb4ea";
    ctx.beginPath(); ctx.arc(2, -4, 5.4, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(13, -4, 4.8, 0, 7); ctx.fill();
    // 黒目
    ctx.fillStyle = "#15151a";
    ctx.beginPath(); ctx.arc(2, -4, 4.2, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(13, -4, 3.6, 0, 7); ctx.fill();
    // ハイライト
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(3.4, -5.2, 1.4, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(14, -5, 1.2, 0, 7); ctx.fill();

    // 鼻（大きめの黒・つやっと）※実物に合わせて
    ctx.fillStyle = "#161619";
    ctx.beginPath(); ctx.ellipse(8, 1, 4.6, 3.9, 0, 0, 7); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.6)";
    ctx.beginPath(); ctx.arc(6.6, -0.4, 1.3, 0, 7); ctx.fill();

    // 口（にっこり）
    ctx.strokeStyle = "#3a3128"; ctx.lineWidth = 1.4; ctx.lineCap = "round";
    ctx.beginPath();
    if (state === "clear" || playing) {
      ctx.moveTo(8, 4); ctx.quadraticCurveTo(5, 8, 2, 5.5);
      ctx.moveTo(8, 4); ctx.quadraticCurveTo(11, 8, 14, 5.5);
    } else {
      ctx.moveTo(4, 6); ctx.lineTo(12, 6);
    }
    ctx.stroke();

    // 前足（両手：体の左右に小さく。走ると少しだけ振る／クリアでバンザイ）※実物寄せ
    const swing = run ? legPhase * 2 : 0;   // 走行中だけ交互にほんの少し
    const lift  = airborne ? -2 : (state === "clear" ? -6 - Math.sin(p.winPose*0.2)*3 : 0);
    const lhx = -13, rhx = 15, hy = 8;
    ctx.fillStyle = "#f6e2c0";
    ctx.beginPath(); ctx.ellipse(lhx, hy + lift - swing, 3.3, 4.2, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(rhx, hy + lift + swing, 3.3, 4.2, 0, 0, 7); ctx.fill();
    ctx.fillStyle = "#f0bd98";  // ピーチの肉球
    ctx.beginPath(); ctx.arc(lhx, hy + lift - swing + 1, 1.5, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(rhx, hy + lift + swing + 1, 1.5, 0, 7); ctx.fill();

    ctx.restore();

    // あわバリア（シャボン玉）：まるりんを包む半透明の泡
    if (p.shield && playing) {
      const rr = (p.powered ? 30 : 25) + Math.sin(elapsed * 0.2) * 1.5;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.fillStyle = "rgba(175,230,255,0.18)";
      ctx.beginPath(); ctx.arc(0, 0, rr, 0, 7); ctx.fill();
      ctx.strokeStyle = "rgba(150,220,255,0.9)"; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(0, 0, rr, 0, 7); ctx.stroke();
      ctx.fillStyle = "rgba(255,255,255,0.75)";
      ctx.beginPath(); ctx.ellipse(-rr*0.4, -rr*0.45, 3.5, 6.5, -0.5, 0, 7); ctx.fill();
      ctx.restore();
    }

    // クリア時のジャンプ演出
  }

  // ---------- HUD ----------
  function drawHUD() {
    ctx.save();
    // 上部バー
    ctx.fillStyle = "rgba(0,0,0,0.28)";
    ctx.fillRect(0, 0, W, 34);
    ctx.textAlign = "left"; ctx.textBaseline = "middle";
    ctx.font = "bold 16px 'Segoe UI', sans-serif";

    // まるりんアイコン + ライフ
    ctx.fillStyle = "#fff";
    ctx.fillText("🐹 x " + lives, 14, 18);

    // コイン
    ctx.fillStyle = "#ffcf33";
    ctx.beginPath(); ctx.arc(150, 17, 8, 0, 7); ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.fillText("x " + coinsGot, 164, 18);

    // パワーアップ表示
    if (player.wing) {
      ctx.fillStyle = "#cdeaff";
      ctx.font = "bold 13px 'Segoe UI', sans-serif";
      ctx.fillText("🪶 はねまるりん", 250, 18);
      ctx.font = "bold 16px 'Segoe UI', sans-serif";
    } else if (player.seed) {
      ctx.fillStyle = "#ffd34d";
      ctx.font = "bold 13px 'Segoe UI', sans-serif";
      ctx.fillText("🌻 たねまるりん", 250, 18);
      ctx.font = "bold 16px 'Segoe UI', sans-serif";
    } else if (player.powered) {
      ctx.fillStyle = "#ffd34d";
      ctx.font = "bold 14px 'Segoe UI', sans-serif";
      ctx.fillText("🌰 パワーアップ中！", 250, 18);
      ctx.font = "bold 16px 'Segoe UI', sans-serif";
    }
    // あわバリア中（重ねて表示）
    if (player.shield) {
      ctx.textAlign = "left"; ctx.font = "15px 'Segoe UI', sans-serif"; ctx.fillStyle = "#eaf7ff";
      ctx.fillText("🫧", 206, 18);
      ctx.font = "bold 16px 'Segoe UI', sans-serif";
    }

    // スコア
    ctx.textAlign = "right";
    ctx.fillText("SCORE " + String(score).padStart(6, "0"), W - 14, 18);

    // 進捗バー / ボスの体力
    ctx.textAlign = "center";
    if (inBoss && bosses.length) {
      // 各ボスの名前＋ハート（1〜2体）
      const n = bosses.length;
      bosses.forEach((b, i) => {
        const bx = n === 1 ? (W/2 - 62) : (255 + i * 190);
        ctx.textAlign = "left";
        ctx.font = "bold 12px 'Segoe UI', sans-serif";
        ctx.fillStyle = b.alive ? "#fff" : "rgba(255,255,255,0.45)";
        ctx.fillText(b.name, bx, 11);
        const maxH = Math.round(b.maxHp / b.hpPerHeart);
        const curH = Math.ceil(b.hp / b.hpPerHeart);
        for (let h = 0; h < maxH; h++) {
          ctx.fillStyle = (b.alive && h < curH) ? "#e0453f" : "rgba(255,255,255,0.28)";
          ctx.beginPath(); ctx.arc(bx + 8 + h * 15, 24, 6, 0, 7); ctx.fill();
        }
      });
      ctx.textAlign = "center";
      ctx.font = "bold 16px 'Segoe UI', sans-serif";
    } else {
      const prog = Math.min(1, (player.x) / (goal ? goal.x : LEVEL_W));
      ctx.fillStyle = "rgba(255,255,255,0.25)";
      ctx.fillRect(W/2 - 90, 14, 180, 7);
      ctx.fillStyle = "#66cc44";
      ctx.fillRect(W/2 - 90, 14, 180*prog, 7);
      ctx.font = "12px sans-serif"; ctx.fillStyle="#fff";
      ctx.fillText("🚩", W/2 + 90 + 6, 18);
    }
    ctx.restore();

    // ボス出現の演出（数秒だけ）：ボスの名前を大きく出す
    if (state === "boss" && bosses.some(b => b.alive) && elapsed < 120) {
      ctx.save();
      ctx.globalAlpha = elapsed < 80 ? 1 : (120 - elapsed) / 40;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      const name = bossTitle();
      ctx.font = "bold 34px 'Segoe UI', sans-serif";
      const bw = Math.max(360, ctx.measureText(name).width + 90);
      ctx.fillStyle = "rgba(120,0,0,0.42)";
      ctx.fillRect(W/2 - bw/2, H/2 - 44, bw, 60);
      ctx.fillStyle = "#ffe38a"; ctx.font = "16px 'Segoe UI', sans-serif";
      ctx.fillText("しゅつげん！", W/2, H/2 + 30);
      ctx.fillStyle = "#ffdd55"; ctx.font = "bold 34px 'Segoe UI', sans-serif";
      ctx.fillText(name, W/2, H/2 - 12);
      ctx.restore();
    }

    // ステージ開始時に名前を数秒だけ表示
    if (state === "play" && elapsed < 150) {
      ctx.save();
      ctx.globalAlpha = elapsed < 110 ? 1 : (150 - elapsed) / 40;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.fillRect(W/2 - 170, H/2 - 34, 340, 54);
      ctx.fillStyle = "#fff"; ctx.font = "bold 28px 'Segoe UI', sans-serif";
      ctx.fillText(STAGES[stageIndex].name, W/2, H/2 - 6);
      ctx.restore();
    }
  }

  function drawCenterText(title, sub) {
    ctx.save();
    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = "#fff"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.font = "bold 40px sans-serif"; ctx.fillText(title, W/2, H/2 - 10);
    ctx.font = "18px sans-serif"; ctx.fillText(sub, W/2, H/2 + 34);
    ctx.restore();
  }

  function drawGameOver() {
    ctx.save();
    ctx.fillStyle = "rgba(20,0,0,0.7)"; ctx.fillRect(0,0,W,H);
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillStyle="#e94560"; ctx.font="bold 46px sans-serif";
    ctx.fillText("ゲームオーバー", W/2, H/2 - 30);
    ctx.fillStyle="#fff"; ctx.font="20px sans-serif";
    ctx.fillText("スコア: " + score, W/2, H/2 + 20);
    ctx.font="16px sans-serif"; ctx.fillStyle="#ffd34d";
    ctx.fillText("Rキー / 画面タップ でメニューへ（つづきから選べるよ）", W/2, H/2 + 56);
    ctx.restore();
  }

  function drawClear() {
    ctx.save();
    ctx.fillStyle = "rgba(0,20,40,0.62)"; ctx.fillRect(0,0,W,H);
    ctx.textAlign="center"; ctx.textBaseline="middle";
    // 紙吹雪
    for (let i=0;i<40;i++){
      const t = elapsed*2 + i*37;
      const x = (i*61 + t*0.6) % W;
      const y = (t*1.2 + i*40) % H;
      ctx.fillStyle = ["#e94560","#ffd34d","#66cc44","#3aa8e0","#fff"][i%5];
      ctx.fillRect(x, y, 6, 6);
    }
    ctx.fillStyle="#ffd34d"; ctx.font="bold 50px sans-serif";
    ctx.fillText("クリア！ 🎉", W/2, H/2 - 40);
    ctx.fillStyle="#fff"; ctx.font="22px sans-serif";
    ctx.fillText("まるりん、ゴール！", W/2, H/2 + 6);
    ctx.font="18px sans-serif";
    ctx.fillText("スコア: " + score, W/2, H/2 + 40);
    ctx.font="15px sans-serif"; ctx.fillStyle="#ffd34d";
    ctx.fillText("Rキー / 画面タップ でメニューへ", W/2, H/2 + 72);
    ctx.restore();
  }

  function drawStageClear() {
    ctx.save();
    ctx.fillStyle = "rgba(0,20,40,0.55)"; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    // 紙吹雪
    for (let i = 0; i < 30; i++) {
      const t = elapsed*2 + i*37;
      const x = (i*71 + t*0.6) % W;
      const y = (t*1.2 + i*40) % H;
      ctx.fillStyle = ["#e94560","#ffd34d","#66cc44","#3aa8e0","#fff"][i%5];
      ctx.fillRect(x, y, 6, 6);
    }
    ctx.fillStyle = "#ffd34d"; ctx.font = "bold 44px sans-serif";
    ctx.fillText("ステージ" + (stageIndex + 1) + " クリア！ 🎉", W/2, H/2 - 22);
    const next = STAGES[stageIndex + 1];
    ctx.fillStyle = "#fff"; ctx.font = "20px sans-serif";
    ctx.fillText("つぎは「" + (next ? next.name : "") + "」へ！", W/2, H/2 + 24);
    ctx.restore();
  }

  // ---------- ループ ----------
  let lastInnerH = 0;
  function loop() {
    // 見えている高さが変わったら追従（回転・アドレスバー開閉に確実に対応）
    // ただし一時的な異常値は無視して、まれなレイアウト崩れを防ぐ
    const ih = window.innerHeight;
    if (ih > 120 && ih !== lastInnerH) { lastInnerH = ih; fitViewport(); }
    update();
    draw();
    requestAnimationFrame(loop);
  }

  // つづきからボタンの表示更新（セーブがあれば有効・何ステージからか表示）
  function updateContinueUI() {
    if (!contBtn) return;
    if (hasSave) {
      contBtn.disabled = false; contBtn.classList.remove("disabled");
      contNote.textContent = "つづき：ステージ" + (continueStage + 1) + " から";
      contNote.style.visibility = "visible";
    } else {
      contBtn.disabled = true; contBtn.classList.add("disabled");
      contNote.textContent = "はじめてだね！";
      contNote.style.visibility = "visible";
    }
  }
  updateContinueUI();

  // スタート画面（メニュー）を表示する
  function showMenu() {
    stopBGM();
    state = "menu";
    document.body.classList.remove("playing");
    updateContinueUI();
    overlay.classList.remove("hidden");
  }

  function beginPlay(startIndex) {
    ac(); primeAudio(); // ユーザー操作でオーディオ解禁
    overlay.classList.add("hidden");
    document.body.classList.add("playing");
    resetGameAt(startIndex);
  }

  newBtn.addEventListener("click", () => beginPlay(0));
  contBtn.addEventListener("click", () => { if (!contBtn.disabled) beginPlay(continueStage); });

  // ゲームオーバー/クリア時は画面タップでメニューへ（もう一度／つづきを選べる）
  canvas.addEventListener("pointerdown", (e) => {
    if (state === "gameover" || state === "clear") { e.preventDefault(); showMenu(); }
  });

  // 実際に見えている高さに合わせる（スマホでアドレスバー分がはみ出さないように）
  function fitViewport() {
    const h = window.innerHeight;
    // 一時的におかしな値（0や極端に小さい値）は無視して、ズレを防ぐ
    if (h && h > 120) document.documentElement.style.setProperty("--app-h", h + "px");
  }
  window.addEventListener("resize", fitViewport);
  window.addEventListener("orientationchange", () => setTimeout(fitViewport, 250));
  fitViewport();

  // 初期化
  detectTouch();
  bindTouch();
  buildLevel();
  draw();
  loop();
})();
</script>
</body>
</html>
