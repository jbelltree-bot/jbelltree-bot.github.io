      }
    }
  }

  // メガロドン専用の動き：海にもぐる→そこから噛みつき→近いデッキへジャンプ→突進→ランダムな海へ飛び込む
  const MEGA_MID_X = GAP_CX - 59;   // 割れ目の中央（サメの左端x）
  const MEGA_ZONES = [60, GAP_CX, 740];   // もぐる海の中心x：左の海・中央の割れ目・右の海（ランダム）
  function updateMega(b) {
    const p = player;
    const GMEGA = 0.6;
    updateGull(b);   // カモメ（もぐっている間、上から卵を落とす）

    if (b.mode === "dive") {
      // 今いる海（b.diveCx）にもぐって待つ（無敵）。時間が来たらそこから噛みつく。
      b.vulnerable = false;
      const cz = b.diveCx;
      b.x = cz - b.w/2; b.y = SEA_Y + 8; b.vx = 0; b.vy = 0;
      b.diveT--;
      if (b.diveT <= 0) {
        b.mode = "bite"; b.vulnerable = true;
        b.x = cz - b.w/2; b.y = SEA_Y - 14; b.vy = -14.5; b.vx = 0;
        b.face = (p.x + p.w/2 < cz) ? 1 : -1;   // まるりんの方へ噛みつく
        spawnParticles(cz, SEA_Y, "#ffffff", 16);
        spawnParticles(cz, SEA_Y, "#bfe1f0", 8);
      }
      return;
    }

    if (b.mode === "bite") {
      // その海からがぶっと飛び出して噛みつき、落ちてきたら次の行動へ
      b.vulnerable = true;
      b.vy += GMEGA; b.y += b.vy;
      if (b.vy > 0 && (b.y + b.h*0.5) >= SEA_Y) {
        const startCx = b.x + b.w/2;
        const pcx = p.x + p.w/2;
        const sharkSide = startCx < GAP_CX - 30 ? -1 : (startCx > GAP_CX + 30 ? 1 : 0);
        const playerSide = pcx < GAP_CX ? -1 : 1;
        const opposite = (sharkSide === -1 && playerSide === 1) || (sharkSide === 1 && playerSide === -1);
        // ハイジャンプするか？（反対側の海=50%でまるりん側へ／中央の海=50%で左右どちらかへ／それ以外は陸に上がる）
        let highJump = false, targetX = 0;
        if (opposite) {
          if (Math.random() < 0.5) { highJump = true; targetX = playerSide < 0 ? 50 : 750; }
        } else if (sharkSide === 0) {
          if (Math.random() < 0.5) { highJump = true; targetX = Math.random() < 0.5 ? 50 : 750; }
        }
        if (highJump) {
          // まるりん側／左右の海へハイジャンプで飛び込む（陸に上がらない）
          b.mode = "plunge"; b.vulnerable = true; b.onGround = false;
          b.vy = -15;                                   // 高く跳ぶ
          b.vx = Math.max(-16, Math.min(16, (targetX - startCx) / 50));
          b.face = b.vx >= 0 ? 1 : -1;
          spawnParticles(startCx, SEA_Y, "#bfe1f0", 14);
        } else {
          // 近いデッキに上がって突進（従来）
          let toLeft;
          if (startCx < GAP_L) toLeft = true;
          else if (startCx > GAP_R) toLeft = false;
          else toLeft = Math.random() < 0.5;
          b.side = toLeft ? -1 : 1;
          const deckCx = toLeft ? (LDECK_L + LDECK_R)/2 : (RDECK_L + RDECK_R)/2;
          b.mode = "jump"; b.vy = -13;
          b.vx = Math.max(-13, Math.min(13, (deckCx - startCx) / 40));
          b.face = b.vx > 0 ? 1 : -1;
          spawnParticles(startCx, SEA_Y, "#bfe1f0", 10);
        }
      }
      megaHitChecks(b);
      return;
    }

    if (b.mode === "jump") {
      // 割れ目から左右のデッキへジャンプ
      b.vulnerable = true;
      b.vy += GMEGA; b.x += b.vx; b.y += b.vy;
      if (Math.abs(b.vx) > 0.4) b.face = b.vx > 0 ? 1 : -1;
      if (b.vy > 0) {
        for (const s of solids) {
          if (rectHit(b, s) && (b.y + b.h) - s.y < 40) {
            b.y = s.y - b.h; b.vy = 0; b.vx = 0; b.onGround = true;
            b.mode = "charge"; b.windup = 22;
            b.chargeDir = -b.side;                  // デッキの外側→割れ目へ突進
            b.face = b.chargeDir; break;
          }
        }
      }
      megaHitChecks(b);
      return;
    }

    if (b.mode === "charge") {
      // 構え → 突進。まるりんが反対デッキにいるときは割れ目を無視して同じ高さでまっすぐ突っ込む（cross）
      b.vulnerable = true;
      if (b.windup > 0) {
        b.windup--; b.vx = 0;
        if (b.windup === 0) {
          // 突進の種類を決める：まるりんが反対デッキ かつ 50%の確率 → クロスチャージ
          // （残り50%は従来通り割れ目へ突進して潜る＝ワンパターン防止）
          const pcx = player.x + player.w/2, bcx = b.x + b.w/2;
          const bossLeft = bcx < GAP_CX;
          const playerLeft = pcx < GAP_L, playerRight = pcx > GAP_R;
          const opposite = (bossLeft && playerRight) || (!bossLeft && playerLeft);
          b.cross = opposite && (Math.random() < 0.8);   // 反対デッキのときは80%でクロスチャージ
          b.chargeDir = b.cross ? (pcx < bcx ? -1 : 1) : -b.side;
          b.face = b.chargeDir;
          b.chargeT = b.cross ? 200 : 60;
        }
      } else {
        b.vx = b.chargeDir * (b.cross ? 10 : 7.4); b.x += b.vx; b.chargeT--;
        const nx = b.x + b.w/2;
        if (b.cross) {
          // 割れ目を無視してまっすぐ。突っ切った反対側の外の海まで来たら飛び込む
          const reachedFar = (b.chargeDir < 0 && nx < LDECK_L + 6) || (b.chargeDir > 0 && nx > RDECK_R - 6);
          if (reachedFar || b.chargeT <= 0 || nx < 24 || nx > W - 24) { crossPlunge(b); }
        } else {
          // 通常：割れ目に達したら or 足元の床が切れたら or 時間切れ → ランダムな海へ
          if ((nx > GAP_L && nx < GAP_R) || !isSolidAt(nx, BOSS_GROUND + 4) || b.chargeT <= 0) {
            startPlunge(b);
          }
        }
      }
      megaHitChecks(b);
      return;
    }

    if (b.mode === "plunge") {
      // 突進のあと、ランダムな海へアーチを描いて飛び込む
      b.vulnerable = true;
      b.vy += GMEGA; b.x += b.vx; b.y += b.vy;
      if (Math.abs(b.vx) > 0.4) b.face = b.vx > 0 ? 1 : -1;
      const cx = b.x + b.w/2;
      const overSea = (cx < LDECK_L) || (cx > GAP_L && cx < GAP_R) || (cx >= RDECK_R);
      if (b.vy > 0 && (b.y + b.h*0.5) >= SEA_Y && overSea) {
        // 着水 → その海にもぐる
        b.diveCx = MEGA_ZONES.reduce((a, z) => Math.abs(z - cx) < Math.abs(a - cx) ? z : a, MEGA_ZONES[0]);
        b.mode = "dive"; b.diveT = 55 + Math.floor(Math.random()*35); b.vulnerable = false; b.vy = 0;
        spawnParticles(b.diveCx, SEA_Y, "#ffffff", 12);
      } else if (b.y > H + 70 || b.x < -90 || b.x > W + 90) {
        forceDiveRandom(b);
      }
      megaHitChecks(b);
      return;
    }

    // 保険：想定外はランダムな海へ
    forceDiveRandom(b);
  }

  // 突進のあと、ランダムな海（左の海・中央の割れ目・右の海）へ飛び込む
  function startPlunge(b) {
    const startCx = b.x + b.w/2;
    const targetCx = MEGA_ZONES[Math.floor(Math.random() * MEGA_ZONES.length)];
    b.mode = "plunge"; b.vulnerable = true; b.onGround = false;
    b.vy = -12; b.vx = Math.max(-13, Math.min(13, (targetCx - startCx) / 42));
    b.face = b.vx >= 0 ? 1 : -1;
    spawnParticles(startCx, BOSS_GROUND, "#bfe1f0", 8);
  }
  // クロスチャージ後：突っ切った先の外側の海へ落ちてもぐる
  function crossPlunge(b) {
    const cx = b.x + b.w/2;
    b.diveCx = cx < GAP_CX ? 60 : 740;   // 左の海 or 右の海
    b.mode = "plunge"; b.cross = false; b.vulnerable = true; b.onGround = false;
    b.vy = 1; b.vx = Math.max(-13, Math.min(13, (b.diveCx - cx) / 24));
    b.face = b.vx >= 0 ? 1 : -1;
    spawnParticles(cx, BOSS_GROUND, "#bfe1f0", 8);
  }
  // 保険：すぐランダムな海へもぐる
  function forceDiveRandom(b) {
    b.diveCx = MEGA_ZONES[Math.floor(Math.random() * MEGA_ZONES.length)];
    b.mode = "dive"; b.diveT = 55; b.vulnerable = false;
    b.x = b.diveCx - b.w/2; b.y = SEA_Y + 8; b.vx = 0; b.vy = 0;
  }

  // メガロドンとの当たり判定（水上のときだけ：踏み or 被弾、種）
  function megaHitChecks(b) {
    if (!b.vulnerable) return;
    const p = player;
    if (rectHit(p, b)) {
      const fromAbove = p.vy > 0 && (p.y + p.h) - b.y < b.h * 0.7 + Math.max(0, p.vy);
      if (fromAbove) {
        if (b.invuln <= 0) damageBoss(b, false);
        const timed = jumpKey() || jumpBuffer > 0;
        p.vy = timed ? -15 : -10; p.bounceLock = 12; jumpBuffer = 0; p.squash = 0.7;
        p.invuln = Math.max(p.invuln, 8);
      } else if (p.invuln <= 0) {
        hurtPlayer();
      }
    }
    if (b.invuln <= 0) {
      for (const sd of seeds) {
        if (rectHit({ x: sd.x - 5, y: sd.y - 5, w: 10, h: 10 }, b)) { damageBoss(b, true); sd.life = 0; break; }
      }
    }
  }

  // カモメ：ずっと上を飛び、メガロドンがもぐっている間だけ卵を落とす
  function updateGull(b) {
    const g = b.gull;
    if (!g) return;
    g.x += g.vx;
    if (g.x < 50) { g.x = 50; g.vx = Math.abs(g.vx); }
    if (g.x > W - 50) { g.x = W - 50; g.vx = -Math.abs(g.vx); }
    if (b.mode === "dive") {
      g.dropCd--;
      if (g.dropCd <= 0) {
        cukes.push({ x: g.x, y: g.y + 14, vx: g.vx * 0.4, vy: 1.2, t: 0, kind: "egg" });
        g.dropCd = 59 + Math.floor(Math.random() * 40);   // 卵を落とす間隔（2026-07-07に頻度1.5倍へ）
      }
    }
  }

  // ---------- PK戦（ポルトガルのボス戦・クリウド） ----------
  // まるりん vs クリウド。3本ずつ・攻守交互。まるりんが蹴るターンと守るターンを繰り返す。
  const PKX = {
    goalL: 250, goalR: 550, goalTop: 150, goalH: 120,
    spotX: 400, spotY: 392,
    courseX: [312, 400, 488], courseY: 214,   // 左・真ん中・右のコース着弾点
    keepY: 250
  };
  const PK_TOTAL = 3;   // 3本ずつ

  function setupPK() {
    inBoss = true;
    clovisPhase2 = false;   // PKからやり直すときは第2ラウンドフラグを解除
    LEVEL_W = W; LEVEL_H = H; camX = 0;
    solids = []; coins = []; nuts = []; flowers = []; feathers = []; breads = [];
    enemies = []; questionBlocks = []; seeds = []; goal = null; particles = [];
    cukes = []; hazards = []; bosses = []; balls = []; barrels = [];
    elapsed = 0;
    const bb = BOSS_BGM[stageIndex]; if (bb) { try { bb.currentTime = 0; } catch (e) {} }
    pk = {
      kick: 0, my: 0, foe: 0, myRes: [], foeRes: [],
      sub: "intro", t: 0, cursor: 1, dive: 1, keeperDir: 1, kickerDir: 1,
      outcome: null,
      ball: { x: PKX.spotX, y: PKX.spotY, sx: PKX.spotX, sy: PKX.spotY, tx: PKX.spotX, ty: PKX.spotY, fly: false },
      keeperT: 0, diverT: 0, lrPrev: 0, jumpPrev: true
    };
  }

  // PK勝利 → クリウドとの直接対決（第2ラウンド／通常のボスバトル）へ
  function startClovisBrawl() {
    pk = null;
    clovisPhase2 = true;
    setupBossArena();     // 平らなピッチ＋クリウド（サッカーのストライカー）を配置
    player.invuln = 70;
    state = "boss";
    startBGM();
  }

  function pkStartKick() {
    pk.t = 0; pk.outcome = null; pk.cursor = 1;
    pk.ball.x = PKX.spotX; pk.ball.y = PKX.spotY; pk.ball.fly = false;
    pk.keeperT = 0; pk.diverT = 0;
    pk.sub = (pk.kick % 2 === 0) ? "aim" : "dready";   // 偶数=まるりんが蹴る／奇数=まるりんが守る
  }

  function pkAfterKick() {
    pk.t = 0; pk.outcome = null;
    // 3本ずつ終わって（合計6本）同点でなければ決着。同点ならサドンデス（1本ずつ）
    if (pk.kick >= PK_TOTAL * 2 && pk.kick % 2 === 0 && pk.my !== pk.foe) {
      pk.sub = (pk.my > pk.foe) ? "win" : "lose"; pk.t = 0; return;
    }
    pkStartKick();
  }

  function updatePK() {
    pk.t++;
    const lr = left() ? -1 : right() ? 1 : 0;
    const lrEdge = (lr !== 0 && pk.lrPrev === 0) ? lr : 0;
    pk.lrPrev = lr;
    const j = jumpKey();
    const jEdge = j && !pk.jumpPrev;
    pk.jumpPrev = j;
    const moveCursor = () => { if (lrEdge) { pk.cursor = Math.max(0, Math.min(2, pk.cursor + lrEdge)); sfx.block(); } };

    switch (pk.sub) {
      case "intro":
        if (pk.t > 96) pkStartKick();
        break;

      // ===== まるりんが蹴る（クリウド＝キーパー）=====
      case "aim":
        moveCursor();
        if (jEdge) {
          pk.keeperDir = Math.floor(Math.random() * 3);
          pk.sub = "ashot"; pk.t = 0;
          pk.ball.fly = true;
          pk.ball.sx = PKX.spotX; pk.ball.sy = PKX.spotY;
          pk.ball.tx = PKX.courseX[pk.cursor]; pk.ball.ty = PKX.courseY;
          sfx.jump();
        }
        break;
      case "ashot": {
        const dur = 26, k = Math.min(1, pk.t / dur);
        pk.ball.x = pk.ball.sx + (pk.ball.tx - pk.ball.sx) * k;
        pk.ball.y = pk.ball.sy + (pk.ball.ty - pk.ball.sy) * k - Math.sin(k * Math.PI) * 44;
        pk.keeperT = Math.min(1, pk.t / 14);
        if (pk.t >= dur) {
          const scored = pk.cursor !== pk.keeperDir;
          pk.outcome = scored ? "goal" : "save";
          pk.myRes.push(scored ? "goal" : "miss");
          if (scored) { pk.my++; sfx.win(); score += 500; spawnParticles(pk.ball.tx, pk.ball.ty, "#ffffff", 16); }
          else sfx.stomp();
          pk.sub = "ares"; pk.t = 0;
        }
        break;
      }
      case "ares":
        if (pk.t > 54) { pk.kick++; pkAfterKick(); }
        break;

      // ===== まるりんが守る（クリウド＝キッカー）=====
      case "dready":
        moveCursor();
        if (pk.t > 48) { pk.kickerDir = Math.floor(Math.random() * 3); pk.sub = "dwind"; pk.t = 0; }
        break;
      case "dwind":
        moveCursor();
        if (pk.t > 34) {   // 予備動作の長さ＝反応できる時間（合図pk.t>8〜ここ＝約26フレーム。ver7.8で反応しやすく延長）
          pk.dive = pk.cursor;
          pk.sub = "dshot"; pk.t = 0;
          pk.ball.fly = true;
          pk.ball.sx = PKX.spotX; pk.ball.sy = PKX.spotY;
          pk.ball.tx = PKX.courseX[pk.kickerDir]; pk.ball.ty = PKX.courseY;
          sfx.jump();
        }
        break;
      case "dshot": {
        const dur = 24, k = Math.min(1, pk.t / dur);
        pk.ball.x = pk.ball.sx + (pk.ball.tx - pk.ball.sx) * k;
        pk.ball.y = pk.ball.sy + (pk.ball.ty - pk.ball.sy) * k - Math.sin(k * Math.PI) * 40;
        pk.diverT = Math.min(1, pk.t / 12);
        if (pk.t >= dur) {
          const saved = pk.dive === pk.kickerDir;
          pk.outcome = saved ? "save" : "goal";
          pk.foeRes.push(saved ? "save" : "goal");
          if (saved) { sfx.win(); score += 500; spawnParticles(pk.ball.tx, pk.ball.ty, "#7fd4ff", 16); }
          else { pk.foe++; sfx.stomp(); }
          pk.sub = "dres"; pk.t = 0;
        }
        break;
      }
      case "dres":
        if (pk.t > 54) { pk.kick++; pkAfterKick(); }
        break;

      // ===== 決着 =====
      case "win":
        if (pk.t === 2) sfx.win();
        // PK勝利 → 「ケンカで決着付けようや」の吹き出しのあと、第2ラウンド（直接対決）へ
        if (pk.t > 170) { startClovisBrawl(); }
        break;
      case "lose":
        if (pk.t === 2) { playVoice("sad"); stopBGM(); }
        if (pk.t > 130) {
          lives--;
          if (lives > 0) { setupPK(); startBGM(); }
          else { pk = null; state = "gameover"; }
        }
        break;
    }
  }

  // 次のステージへ（パワーアップ状態は引き継ぐ）
  function advanceStage() {
    const keepPowered = player.powered, keepSeed = player.seed, keepWing = player.wing;
    loadStage(stageIndex + 1);
    saveProgress(stageIndex);       // 新しいステージに到達したので記録
    buildLevel();
    if (keepPowered) setPowered(true);
    player.seed = keepSeed; player.wing = keepWing;
    // このステージの前にストーリー（紙芝居）があれば先に見せる
    if (STORIES[stageIndex]) { startStory(stageIndex); return; }
    stageBgm().currentTime = 0;
    startBGM();
    state = "play";
  }

  // ---------- ストーリー（ステージ間のムービー：今のまるりんが動く）----------
  // 自然にステージを進めたとき、次のステージに入る前に一度だけ見せる。各シーンは自動再生。
  // タップ／ジャンプで次のシーンへスキップできる。まるりんは通常のキャラ描画(drawPlayer)をそのまま動かす。
  const STORY_GROUND = 300;   // ムービー内の地面の高さ
  const STORIES = {

      scenes: [

        { dur: 240, act: sceneScream,       lines: ["「まるりーん！！」", "そーちゃんと しーちゃんが さけびます。"] },
        { dur: 230, act: sceneWorldEnd,     lines: ["まるりんは、いじげんへ きえて いった——。"] },
        { dur: 480, act: sceneToBeContinued,lines: ["まるりんの ぼうけんは、まだ つづく。"] }
      ]
    }

  function startStory(key) {
    // まるりんの「ステージ開始状態」を退避（ムービー後に戻す）
    const p = player;
    story = { key, scene: 0, t: 0, saved: {
      x:p.x, y:p.y, vx:p.vx, vy:p.vy, face:p.face, onGround:p.onGround, animT:p.animT,
      powered:p.powered, seed:p.seed, wing:p.wing, w:p.w, h:p.h, squash:p.squash } };
    // ムービー中は素の（ちびの）まるりんで演技
    p.powered = false; p.seed = false; p.wing = false; p.w = 28; p.h = 30; p.squash = 1; p.invuln = 0; p.stun = 0;
    p.powerAnim = 0; p.gliding = false; p.glideUsed = false;
    particles = [];
    cutsceneActive = true;
    // ストーリー中はそのストーリー指定のBGM（無ければステージ1）を流す
    const bi = STORIES[key].bgm ?? 0;
    stopBGM();
    try { bgm = BGM[bi]; BGM[bi].currentTime = 0; BGM[bi].play().catch(() => {}); } catch (e) {}
    document.body.classList.add("storymode");
    state = "story";
  }
  function nextScene() {
    if (!story) return;
    const def = STORIES[story.key];
    story.scene++; story.t = 0; particles = [];
    if (story.scene >= def.scenes.length) { if (def.isEnding) finishEnding(); else endStory(); }
  }
  function endStory() {
    // 退避したまるりんの状態を復元（ステージ2の開始位置へ）
    const s = story.saved, p = player;
    p.x = s.x; p.y = s.y; p.vx = s.vx; p.vy = s.vy; p.face = s.face; p.onGround = s.onGround; p.animT = s.animT;
    p.w = s.w; p.h = s.h; p.squash = s.squash; p.stun = 0;
    if (s.powered) setPowered(true); p.seed = s.seed; p.wing = s.wing;
    p.invuln = 90;
    story = null; cutsceneActive = false;
    document.body.classList.remove("storymode");
    elapsed = 0;                       // ステージ名バナー（elapsed<150）を出すためリセット
    stageBgm().currentTime = 0; startBGM();
    state = "play";
  }
  function advanceStory() {   // タップ／キーで次のシーンへ（開いた直後の誤操作は無視）
    if (!story || story.t < 8) return;
    beep(680, 0.05, "square", 0.05);
    nextScene();
  }
  // 世界編フィナーレ（ドランプ撃破後のエンディング・ムービー）を開始
  function startEnding() {
    const p = player;
    story = { key: "ending", scene: 0, t: 0, saved: {
      x:p.x, y:p.y, vx:p.vx, vy:p.vy, face:p.face, onGround:p.onGround, animT:p.animT,
      powered:p.powered, seed:p.seed, wing:p.wing, w:p.w, h:p.h, squash:p.squash } };
    p.powered = false; p.seed = false; p.wing = false; p.w = 28; p.h = 30; p.squash = 1; p.invuln = 0; p.stun = 0;
    p.powerAnim = 0; p.gliding = false; p.glideUsed = false;
    particles = []; cukes = []; sps = []; jets = []; bigBoom = 0; bosses = []; inBoss = false;
    cutsceneActive = true;
    stopBGM();
    try { bgm = ENDING_BGM; ENDING_BGM.currentTime = 0; ENDING_BGM.play().catch(() => {}); } catch (e) {}
    document.body.classList.add("storymode");
    state = "story";
  }
  // エンディング終了 → 全クリアメニューへ（エンディング曲はそのまま流す）
  function finishEnding() {
    story = null; cutsceneActive = false;
    document.body.classList.remove("storymode");
    state = "clear";
  }

  function updateParticles() {
    for (const pt of particles) {
      pt.x += pt.vx; pt.y += pt.vy; pt.vy += pt.coin ? 0.4 : 0.35; pt.life--;
    }
    particles = particles.filter(pt => pt.life > 0);
  }

  function resetGameAt(startIndex) {
    lives = 3; score = 0; coinsGot = 0;
    inBoss = false; bosses = []; cukes = []; pk = null;
    loadStage(startIndex || 0);
    saveProgress(stageIndex);       // 今いるステージを記録
    buildLevel();
    stageBgm().currentTime = 0;
    startBGM();
    state = "play";
  }
  function resetGame() { resetGameAt(0); }

  // ---------- 描画 ----------
  function draw() {
    if (state === "story") { drawStory(); return; }      // ステージ間の紙芝居は専用画面
    if (state === "boss" && pk) { drawPK(); return; }   // ポルトガル：PK戦は専用画面
    if (inBoss && STAGES[stageIndex].boss === "penguins") {
      // 駅構内（ボス戦）：やわらかい室内色
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#e2e9ef");
      g.addColorStop(1, "#eef2f6");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    } else if (inBoss && STAGES[stageIndex].boss === "sumo") {
      // 相撲場の館内（ボス戦）：あたたかい木の色
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#f0e2c6");
      g.addColorStop(1, "#f6ecd6");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    } else if (inBoss && STAGES[stageIndex].boss === "mega") {
      // メガロドン戦：船の上（どんよりした海の空）
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#3f6076");
      g.addColorStop(0.5, "#5f8ea6");
      g.addColorStop(1, "#83b3c8");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      drawClouds();
    } else if (inBoss && STAGES[stageIndex].boss === "zagat") {
      // ザガット戦：青空の遺跡（寝釈迦仏のある広場）
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#4aa8e0");
      g.addColorStop(0.6, "#addcf0");
      g.addColorStop(1, "#e7f5fb");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      drawClouds();
    } else if (theme === "thailand") {
      // タイランド：あたたかい南国の空
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#f0a94e");
      g.addColorStop(0.5, "#f6cf86");
      g.addColorStop(1, "#fdf0cf");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      drawClouds();
    } else if (theme === "portugal") {
      // ポルトガル：さわやかな海辺の青空
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#4aa6e4");
      g.addColorStop(0.55, "#a6d8f2");
      g.addColorStop(1, "#eaf6fc");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      drawClouds();
    } else if (theme === "america") {
      // アメリカ：広い青空
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#3f7fd0");
      g.addColorStop(0.55, "#9cc4ee");
      g.addColorStop(1, "#e8f2fb");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      drawClouds();
    } else if (theme === "hawaii") {
      // 前半＝ビーチの空／後半＝海の中（カメラ位置でクロスフェード）
      const t = Math.max(0, Math.min(1, (camX + W/2 - 2720) / 620));
      let g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#4fb4ea");
      g.addColorStop(0.6, "#a9e0f5");
      g.addColorStop(1, "#eaf6fb");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      if (t < 0.92) drawClouds();
      if (t > 0) {
        ctx.save(); ctx.globalAlpha = t;
        const u = ctx.createLinearGradient(0, 0, 0, H);
        u.addColorStop(0, "#1a86b8");
        u.addColorStop(0.55, "#137aa8");
        u.addColorStop(1, "#0c5a82");
        ctx.fillStyle = u; ctx.fillRect(0, 0, W, H);
        // 光のすじ
        ctx.fillStyle = "rgba(200,240,255,0.12)";
        for (let i = 0; i < 4; i++) {
          const rx = 120 + i * 190 - (camX * 0.2) % 190;
          ctx.beginPath(); ctx.moveTo(rx, 0); ctx.lineTo(rx + 30, 0); ctx.lineTo(rx + 80, H); ctx.lineTo(rx + 50, H); ctx.closePath(); ctx.fill();
        }
        ctx.restore();
      }
    } else if (theme === "town") {
      // 街の空（少しやわらかい水色）
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#9fd8f2");
      g.addColorStop(0.55, "#cdeaf6");
      g.addColorStop(1, "#eef7fb");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      drawClouds();
      drawSkyline();
    } else if (theme === "narita") {
      // 成田：やわらかい青空＋緑の木立
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#8fcdf0");
      g.addColorStop(0.55, "#c6e7f4");
      g.addColorStop(1, "#eaf6ef");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      drawClouds();
      drawHills();
    } else {
      // 空グラデーション（くさはら）
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#8fd3ff");
      g.addColorStop(0.6, "#bfe9ff");
      g.addColorStop(1, "#e8f8ff");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      drawClouds();
      drawHills();
    }

    ctx.save();
    let shkx = 0, shky = 0;
    if (screenShake > 0) { const m = Math.min(screenShake, 12) * 0.7; shkx = (Math.random()-0.5) * m * 2; shky = (Math.random()-0.5) * m * 2; }
    ctx.translate(-Math.round(camX) + shkx, shky);

    if (inBoss) drawBossBackdrop();
    else if (theme === "town") drawTownDecor();
    else if (theme === "narita") drawNaritaDecor();
    else if (theme === "hawaii") drawHawaiiDecor();
    else if (theme === "thailand") drawThaiDecor();
    else if (theme === "portugal") drawPortugalDecor();
    else if (theme === "america") drawAmericaDecor();
    drawSolids();
    drawCoins();
    drawNuts();
    drawFlowers();
    drawFeathers();
    drawBubbles();
    drawBreads();
    if (goal) drawGoal(goal);
    drawSeeds();
    drawEnemies();
    drawBalls();
    drawBarrels();
    if (jets.length) drawJets();
    if (bosses.length) drawBosses();
    if (sps.length) drawDrampSPs();
    drawCukes();
    drawHazards();
    drawParticles();
    if (state !== "gameover") drawPlayer();

    ctx.restore();

    drawHUD();
    if (inBoss && bosses[0] && bosses[0].kind === "dramp" && bosses[0].phase === 2 && bosses[0].alive) drawMissileTimer(bosses[0]);
    if (bigBoom > 0) drawBigBoom();

    if (state === "pause")      drawCenterText("ポーズ中", "Pキーで再開");
    if (state === "gameover")   drawGameOver();
    if (state === "clear")      drawClear();
    if (state === "stageclear") drawStageClear();
  }

  function drawClouds() {
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    const cs = [[120,70,40],[360,110,55],[620,60,46],[520,150,38],[730,120,50]];
    for (const [bx,by,r] of cs) {
      const x = (bx - camX*0.3) % (W+300);
      const px = x < -150 ? x + W + 300 : x;
      cloud(px, by, r);
    }
  }
  function cloud(x, y, r) {
    ctx.beginPath();
    ctx.arc(x, y, r*0.6, 0, 7); ctx.arc(x+r*0.6, y+6, r*0.5, 0, 7);
    ctx.arc(x-r*0.6, y+8, r*0.45, 0, 7); ctx.arc(x+r*0.2, y-r*0.3, r*0.5, 0, 7);
    ctx.fill();
  }
  function drawHills() {
    ctx.fillStyle = "#7ec850";
    for (let i = -1; i < 8; i++) {
      const x = i*220 - (camX*0.5) % 220;
      ctx.beginPath();
      ctx.ellipse(x+110, H-60, 150, 90, 0, Math.PI, 0);
      ctx.fill();
    }
  }

  // ===== ステージ2：南流山の街 =====
  const GROUND_Y = 360; // 地面の上端

  // 遠くのビル群（パララックス）
  function drawSkyline() {
    const cols = ["#b9c6d6", "#c7d3e0", "#aeb9c9"];
    for (let i = -1; i < 12; i++) {
      const bw = 92;
      let x = i*140 - (camX*0.4) % 140;
      const h = 90 + ((i*53) % 60 + 60) % 60;
      ctx.fillStyle = cols[((i%3)+3)%3];
      ctx.fillRect(x, GROUND_Y - h, bw, h);
      ctx.fillStyle = "rgba(255,255,255,0.35)";
      for (let wy = GROUND_Y - h + 12; wy < GROUND_Y - 10; wy += 18)
        for (let wx = x + 8; wx < x + bw - 10; wx += 18)
          ctx.fillRect(wx, wy, 8, 10);
    }
  }

  // 看板付きの建物（ヤオコー・コーナンなど）
  function signBuilding(x, w, h, wall, roof, label, bg, fg) {
    const top = GROUND_Y - h;
    ctx.fillStyle = wall; ctx.fillRect(x, top, w, h);
    ctx.fillStyle = roof; ctx.fillRect(x, top, w, 12);
    // 入口
    ctx.fillStyle = "rgba(120,150,180,0.55)";
    ctx.fillRect(x + w/2 - 26, GROUND_Y - 52, 52, 52);
    // 窓
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    for (let wy = top + 22; wy < GROUND_Y - 60; wy += 24)
      for (let wx = x + 12; wx < x + w - 16; wx += 26)
        ctx.fillRect(wx, wy, 16, 16);
    // 看板
    ctx.font = "bold 17px 'Segoe UI', sans-serif";
    const sw = Math.max(80, ctx.measureText(label).width + 28);
    const sx = x + (w - sw)/2, sy = top - 32;
    ctx.fillStyle = bg; ctx.fillRect(sx, sy, sw, 28);
    ctx.strokeStyle = "rgba(0,0,0,0.15)"; ctx.strokeRect(sx + 0.5, sy + 0.5, sw - 1, 27);
    ctx.fillStyle = fg; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(label, x + w/2, sy + 14);
  }

  function sevenEleven(x) {
    const w = 200, h = 138, top = GROUND_Y - h;
    ctx.fillStyle = "#f4f4f4"; ctx.fillRect(x, top, w, h);
    ctx.fillStyle = "rgba(150,190,210,0.6)"; ctx.fillRect(x + 14, GROUND_Y - 72, w - 28, 72);
    // 看板（白地・オレンジ/緑/赤の帯）
    const sw = 184, sx = x + (w - sw)/2, sy = top - 36, sh = 32;
    ctx.fillStyle = "#fff"; ctx.fillRect(sx, sy, sw, sh);
    ctx.fillStyle = "#e7541f"; ctx.fillRect(sx, sy, sw, 5);
    ctx.fillStyle = "#159a4a"; ctx.fillRect(sx, sy + sh - 10, sw, 5);
    ctx.fillStyle = "#d3202a"; ctx.fillRect(sx, sy + sh - 5, sw, 5);
    ctx.font = "bold 17px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillStyle = "#e7541f"; ctx.fillText("7", sx + 24, sy + 15);
    ctx.fillStyle = "#159a4a"; ctx.fillText("ELEVEN", sx + sw/2 + 12, sy + 15);
  }

  function bus(x, baseY) {
    ctx.fillStyle = "#4a9d5b"; ctx.fillRect(x, baseY - 34, 78, 34);
    ctx.fillStyle = "#dff0e2";
    ctx.fillRect(x + 6, baseY - 26, 60, 12);
    ctx.fillStyle = "#2b2b2b";
    ctx.beginPath(); ctx.arc(x + 18, baseY, 7, 0, 7); ctx.arc(x + 60, baseY, 7, 0, 7); ctx.fill();
  }
  function taxi(x, baseY) {
    ctx.fillStyle = "#f2c200"; ctx.fillRect(x, baseY - 24, 62, 24);
    ctx.fillStyle = "#f2c200"; ctx.fillRect(x + 12, baseY - 36, 38, 14);
    ctx.fillStyle = "#bfe0f0"; ctx.fillRect(x + 15, baseY - 33, 32, 10);
    ctx.fillStyle = "#333"; ctx.fillRect(x + 22, baseY - 40, 18, 5); // 行灯
    ctx.fillStyle = "#2b2b2b";
    ctx.beginPath(); ctx.arc(x + 15, baseY, 6, 0, 7); ctx.arc(x + 48, baseY, 6, 0, 7); ctx.fill();
  }
  function rotary(x) {
    // 舗装
    ctx.fillStyle = "#c9cdd3"; ctx.fillRect(x - 10, GROUND_Y - 6, 330, 6);
    // 案内サイン
    ctx.fillStyle = "#1c66b0"; ctx.fillRect(x + 60, GROUND_Y - 120, 8, 120);
    ctx.fillStyle = "#1c66b0"; ctx.fillRect(x + 18, GROUND_Y - 126, 132, 28);
    ctx.fillStyle = "#fff"; ctx.font = "bold 14px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("駅前ロータリー", x + 84, GROUND_Y - 112);
    bus(x + 20, GROUND_Y - 6);
    taxi(x + 230, GROUND_Y - 6);
  }

  // つくばエクスプレスの電車
  function txTrain(x) {
    const w = 250, top = GROUND_Y - 88;
    ctx.fillStyle = "#d7dbe0"; ctx.fillRect(x - 10, GROUND_Y - 12, w + 20, 12); // ホーム
    ctx.fillStyle = "#f5f6f8"; ctx.fillRect(x, top, w, 76);
    ctx.strokeStyle = "#c2c7cd"; ctx.strokeRect(x + 0.5, top + 0.5, w - 1, 75);
    ctx.fillStyle = "#e11f2e"; ctx.fillRect(x, top + 42, w, 8);  // 赤帯
    ctx.fillStyle = "#1b62c4"; ctx.fillRect(x, top + 50, w, 4);  // 青帯
    ctx.fillStyle = "#2b3a4a";
    for (let i = 0; i < 5; i++) ctx.fillRect(x + 16 + i*46, top + 14, 34, 20); // 窓
    ctx.fillStyle = "#c9d2da"; ctx.fillRect(x + w/2 - 12, top + 12, 24, 60);   // ドア
    ctx.fillStyle = "#e11f2e"; ctx.font = "bold 15px 'Segoe UI', sans-serif"; ctx.textAlign = "left"; ctx.textBaseline = "middle";
    ctx.fillText("TX", x + 10, top + 63);
    ctx.fillStyle = "#444"; ctx.font = "11px 'Segoe UI', sans-serif";
    ctx.fillText("つくばエクスプレス", x + 36, top + 64);
  }

  // 駅名標「南流山」
  function stationSign(x) {
    const w = 186, h = 56, top = GROUND_Y - 150;
    ctx.fillStyle = "#8a9099"; ctx.fillRect(x + 20, top + h, 6, GROUND_Y - (top + h));
    ctx.fillStyle = "#8a9099"; ctx.fillRect(x + w - 26, top + h, 6, GROUND_Y - (top + h));
    ctx.fillStyle = "#fff"; ctx.fillRect(x, top, w, h);
    ctx.strokeStyle = "#333"; ctx.strokeRect(x + 0.5, top + 0.5, w - 1, h - 1);
    ctx.fillStyle = "#e11f2e"; ctx.fillRect(x, top, w, 8); // TXライン色
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillStyle = "#111"; ctx.font = "bold 21px 'Segoe UI', sans-serif";
    ctx.fillText("南流山", x + w/2, top + 28);
    ctx.fillStyle = "#444"; ctx.font = "11px 'Segoe UI', sans-serif";
    ctx.fillText("Minami-nagareyama", x + w/2, top + 46);
    ctx.fillStyle = "#666"; ctx.font = "10px sans-serif";
    ctx.textAlign = "left";  ctx.fillText("← 流山セントラルパーク", x + 4, top + h + 11);
    ctx.textAlign = "right"; ctx.fillText("三郷中央 →", x + w - 4, top + h + 11);
  }

  function drawTownDecor() {
    const Lc = camX - 360, R = camX + W + 80;
    const put = (x, fn) => { if (x > Lc && x < R) fn(); };
    put(700,  () => sevenEleven(700));
    put(1800, () => signBuilding(1800, 220, 150, "#f2f2f2", "#e0342f", "ヤオコー", "#e0342f", "#fff"));
    put(2700, () => signBuilding(2700, 230, 160, "#eef0f2", "#f07a1a", "コーナン", "#f07a1a", "#fff"));
    put(3700, () => rotary(3700));
    put(4600, () => txTrain(4600));
    put(5300, () => stationSign(5300));
  }

  // ===== ひまわり（たねまるりんアイテム）=====
  function drawFlowers() {
    for (const f of flowers) {
      if (f.got) continue;
      if (f.x + f.w < camX - 40 || f.x > camX + W + 40) continue;
      f.t += 0.08;
      const cx = f.x + f.w/2, cy = f.y + f.h/2 + Math.sin(f.t)*3;
      ctx.save();
      ctx.globalAlpha = 0.5 + Math.abs(Math.sin(f.t))*0.3;
      ctx.fillStyle = "#fff6c0";
      ctx.beginPath(); ctx.arc(cx, cy, f.w/2 + 2, 0, 7); ctx.fill();
      ctx.restore();
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(Math.sin(f.t*0.5)*0.12);
      ctx.fillStyle = "#ffcf33";
      for (let i = 0; i < 10; i++) {
        ctx.save(); ctx.rotate(i*Math.PI/5);
        ctx.beginPath(); ctx.ellipse(0, -13, 4, 8, 0, 0, 7); ctx.fill();
        ctx.restore();
      }
      ctx.fillStyle = "#7a4a20"; ctx.beginPath(); ctx.arc(0, 0, 8, 0, 7); ctx.fill();
      ctx.fillStyle = "#5a3414";
      for (let i = 0; i < 6; i++) { const a = i*1.05; ctx.beginPath(); ctx.arc(Math.cos(a)*3, Math.sin(a)*3, 1.3, 0, 7); ctx.fill(); }
      ctx.restore();
    }
  }

  // ===== 種の飛び道具 =====
  function drawSeeds() {
    for (const sd of seeds) {
      ctx.save();
      ctx.translate(sd.x, sd.y);
      ctx.rotate(sd.t * 0.5);
      ctx.fillStyle = "#3a2b1a";
      ctx.beginPath(); ctx.ellipse(0, 0, 4.5, 6.5, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#d9c9a0";
      ctx.beginPath(); ctx.ellipse(-1, -1, 1.6, 3, 0, 0, 7); ctx.fill();
      ctx.restore();
    }
  }

  function drawSolids() {
    for (const s of solids) {
      if (s.x + s.w < camX - 40 || s.x > camX + W + 40) continue;
      if (s.type === "ground" && inBoss && STAGES[stageIndex].boss === "mega") {
        // メガロドン戦：地面は木のいかだ（デッキ）
        const topEdge = !isSolidAt(s.x, s.y - TILE);
        ctx.fillStyle = "#8a5e34"; ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.fillStyle = "#7a4f2b";
        for (let py = s.y + 4; py < s.y + s.h; py += 12) ctx.fillRect(s.x, py, s.w, 2);   // 板の目
        ctx.strokeStyle = "rgba(60,40,20,0.35)"; ctx.lineWidth = 1;
        ctx.strokeRect(s.x + 0.5, s.y + 0.5, s.w - 1, s.h - 1);
        if (topEdge) { ctx.fillStyle = "#a5794a"; ctx.fillRect(s.x, s.y, s.w, 5); }
      } else if (s.type === "ground" && inBoss && STAGES[stageIndex].boss === "zagat") {
        // ザガット戦：石畳の広場
        ctx.fillStyle = "#cfccc4"; ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.strokeStyle = "rgba(120,115,105,0.5)"; ctx.lineWidth = 1;
        ctx.strokeRect(s.x + 0.5, s.y + 0.5, s.w - 1, s.h - 1);          // 目地
        ctx.fillStyle = "#c3c0b7";
        for (let i=0;i<2;i++) for(let j=0;j<2;j++) ctx.fillRect(s.x+8+i*18, s.y+12+j*14, 8, 5);
        if (!isSolidAt(s.x, s.y - TILE)) { ctx.fillStyle = "#dedbd3"; ctx.fillRect(s.x, s.y, s.w, 5); }
      } else if (s.type === "ground" && theme === "thailand") {
        // タイランド：赤茶けた大地
        ctx.fillStyle = "#a3623a"; ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.fillStyle = "#93552f";
        for (let i=0;i<3;i++) for(let j=0;j<3;j++) ctx.fillRect(s.x+4+i*13, s.y+13+j*10, 7, 5);
        if (!isSolidAt(s.x, s.y - TILE)) {
          ctx.fillStyle = "#6faf3f"; ctx.fillRect(s.x, s.y, s.w, 8);      // 草
          ctx.fillStyle = "#82c74f"; ctx.fillRect(s.x, s.y, s.w, 4);
        }
      } else if (s.type === "ground" && theme === "portugal") {
        // ポルトガル：白い石畳＋青いアズレージョのふち
        ctx.fillStyle = "#e7e2d6"; ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.strokeStyle = "rgba(150,140,120,0.45)"; ctx.lineWidth = 1;
        ctx.strokeRect(s.x + 0.5, s.y + 0.5, s.w - 1, s.h - 1);
        ctx.fillStyle = "#d8d2c2";
        for (let i = 0; i < 2; i++) for (let j = 0; j < 2; j++) ctx.fillRect(s.x + 8 + i*18, s.y + 12 + j*14, 9, 6);
        if (!isSolidAt(s.x, s.y - TILE)) {
          ctx.fillStyle = "#2f6fb0"; ctx.fillRect(s.x, s.y, s.w, 6);       // 青タイルのふち
          ctx.fillStyle = "#5b9bd8";
          for (let bx = s.x + 3; bx < s.x + s.w - 3; bx += 12) ctx.fillRect(bx, s.y + 1, 6, 4);
        }
      } else if (s.type === "ground" && theme === "america") {
        // アメリカ：乾いた土＋緑の草（国立公園ぽい）
        ctx.fillStyle = "#a5794a"; ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.fillStyle = "#946a3f";
        for (let i=0;i<3;i++) for(let j=0;j<3;j++) ctx.fillRect(s.x+4+i*13, s.y+13+j*10, 7, 5);
        if (!isSolidAt(s.x, s.y - TILE)) {
          ctx.fillStyle = "#5aa03a"; ctx.fillRect(s.x, s.y, s.w, 9);
          ctx.fillStyle = "#6cbd46"; ctx.fillRect(s.x, s.y, s.w, 4);
        }
      } else if (s.type === "ground" && theme === "hawaii") {
        // ハワイ：砂浜／海底の砂
        const underwater = s.x + s.w/2 > 3000;
        ctx.fillStyle = underwater ? "#d8c48c" : "#e8d49c";
        ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.fillStyle = underwater ? "#cbb87f" : "#dcc88c";           // 砂つぶ
        for (let i=0;i<3;i++) for(let j=0;j<3;j++) ctx.fillRect(s.x+4+i*13, s.y+13+j*10, 6, 4);
        if (!isSolidAt(s.x, s.y - TILE)) {
          ctx.fillStyle = underwater ? "#e4d4a2" : "#f3e6bd"; ctx.fillRect(s.x, s.y, s.w, 6);
        }
      } else if (s.type === "ground") {
        // 土＋草
        ctx.fillStyle = "#7a4a24";
        ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.fillStyle = "#8a5a2c";
        for (let i=0;i<3;i++) for(let j=0;j<3;j++){
          ctx.fillRect(s.x+3+i*13, s.y+13+j*10, 8, 6);
        }
        if (!isSolidAt(s.x, s.y - TILE)) {
          ctx.fillStyle = "#57b83a"; ctx.fillRect(s.x, s.y, s.w, 10);
          ctx.fillStyle = "#66cc44"; ctx.fillRect(s.x, s.y, s.w, 5);
        }
      } else if (s.type === "brick") {
        ctx.fillStyle = "#b5651d"; ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.fillStyle = "#8a4a12";
        ctx.fillRect(s.x, s.y+TILE/2-1, s.w, 2);
        ctx.fillRect(s.x+TILE/2-1, s.y, 2, TILE/2);
        ctx.fillRect(s.x+TILE/4-1, s.y+TILE/2, 2, TILE/2);
        ctx.fillRect(s.x+3*TILE/4-1, s.y+TILE/2, 2, TILE/2);
        ctx.strokeStyle = "rgba(0,0,0,.15)"; ctx.strokeRect(s.x+0.5, s.y+0.5, s.w-1, s.h-1);
      } else if (s.type === "question") {
        const t = Math.sin(elapsed*0.12)*2;
        ctx.fillStyle = "#e8a92a"; ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.fillStyle = "#f7c948"; ctx.fillRect(s.x+3, s.y+3, s.w-6, s.h-6);
        ctx.fillStyle = "#7a5a12";
        ctx.font = "bold 24px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.fillText("?", s.x+TILE/2, s.y+TILE/2 + t*0.5);
        // 角の鋲
        ctx.fillStyle="#7a5a12";
        [[6,6],[TILE-8,6],[6,TILE-8],[TILE-8,TILE-8]].forEach(([dx,dy])=>ctx.fillRect(s.x+dx,s.y+dy,3,3));
      }
    }
  }
  function isSolidAt(x, y) {
    for (const s of solids) if (x >= s.x && x < s.x+s.w && y >= s.y && y < s.y+s.h) return true;
    return false;
  }

  function drawCoins() {
    for (const c of coins) {
      if (c.got) continue;
      c.t += 0.1;
      const wob = Math.abs(Math.cos(c.t)) ;
      const cx = c.x + c.w/2, cy = c.y + c.h/2;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(0.3 + 0.7*wob, 1);
      ctx.fillStyle = "#ffcf33";
      ctx.beginPath(); ctx.arc(0,0,c.w/2,0,7); ctx.fill();
      ctx.fillStyle = "#ffe58a";
      ctx.beginPath(); ctx.arc(0,0,c.w/2-4,0,7); ctx.fill();
      ctx.strokeStyle = "#e0a800"; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(0,0,c.w/2-2,0,7); ctx.stroke();
      ctx.restore();
    }
  }

  function drawNuts() {
    for (const n of nuts) {
      if (n.got) continue;
      if (n.x + n.w < camX - 40 || n.x > camX + W + 40) continue;
      n.t += 0.08;
      const cx = n.x + n.w/2, cy = n.y + n.h/2 + Math.sin(n.t)*3;
      // きらめき台座
      ctx.save();
      ctx.globalAlpha = 0.5 + Math.abs(Math.sin(n.t))*0.3;
      ctx.fillStyle = "#fff6c0";
      ctx.beginPath(); ctx.arc(cx, cy, n.w/2 + 3, 0, 7); ctx.fill();
      ctx.restore();
      // どんぐり（ナッツ）本体
      ctx.save();
      ctx.translate(cx, cy);
      // 実
      ctx.fillStyle = "#d69a52";
      ctx.beginPath(); ctx.ellipse(0, 3, 9, 11, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#e8b370";
      ctx.beginPath(); ctx.ellipse(-2, 2, 5, 7, 0, 0, 7); ctx.fill();
      // 帽子
      ctx.fillStyle = "#8a5a2c";
      ctx.beginPath(); ctx.ellipse(0, -6, 10, 5, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#6f4620";
      ctx.beginPath(); ctx.arc(0, -10, 2, 0, 7); ctx.fill();
      ctx.fillRect(-1.2, -13, 2.4, 4);
      // 帽子の網目
      ctx.strokeStyle = "#6f4620"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(-8,-6); ctx.lineTo(8,-6);
      ctx.moveTo(-6,-4); ctx.lineTo(6,-4); ctx.stroke();
      ctx.restore();
    }
  }

  function drawGoal(gl) {
    if (theme === "town") { drawGate(gl); return; }
    if (theme === "narita") { drawAirport(gl); return; }
    if (theme === "hawaii") { drawHawaiiGoal(gl); return; }
    if (theme === "portugal") { drawStadiumGoal(gl); return; }
    if (theme === "america") { drawWhiteHouseGoal(gl); return; }
    const x = gl.x;
    // ポール
    ctx.fillStyle = "#cfcfcf"; ctx.fillRect(x-3, gl.top, 6, TILE*6);
    ctx.fillStyle = "#ffd34d";
    ctx.beginPath(); ctx.arc(x, gl.top, 8, 0, 7); ctx.fill();
    // 旗
    const wave = Math.sin(elapsed*0.15)*4;
    ctx.fillStyle = "#e94560";
    ctx.beginPath();
    ctx.moveTo(x+3, gl.top+8);
    ctx.lineTo(x+52+wave, gl.top+22);
    ctx.lineTo(x+3, gl.top+36);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle="#fff"; ctx.font="bold 16px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("G", x+22, gl.top+22);
    // 台座
    ctx.fillStyle="#5a8f3a";
    ctx.fillRect(x-TILE, gl.top+TILE*6, TILE*2, TILE);
  }

  // ゴール：サッカースタジアム（ポルトガル）
  function drawStadiumGoal(gl) {
    const x = gl.x, gy = GROUND_Y;
    // 照明塔（左右）
    for (const sx of [x - 60, x + 150]) {
      ctx.fillStyle = "#8a9099"; ctx.fillRect(sx, gy - 210, 6, 210);
      ctx.fillStyle = "#cfd6dc"; ctx.fillRect(sx - 20, gy - 226, 46, 20);
      ctx.fillStyle = "#fff7cc";
      for (let i = 0; i < 3; i++) for (let j = 0; j < 2; j++) ctx.fillRect(sx - 16 + i*14, gy - 223 + j*9, 10, 6);
    }
    // スタンド本体（すり鉢状）
    ctx.fillStyle = "#d7dde2";
    ctx.beginPath();
    ctx.moveTo(x - 70, gy); ctx.lineTo(x - 48, gy - 150); ctx.lineTo(x + 138, gy - 150); ctx.lineTo(x + 160, gy);
    ctx.closePath(); ctx.fill();
    // 観客席の段＋観客
    ctx.fillStyle = "#c2cad0";
    for (let i = 0; i < 4; i++) ctx.fillRect(x - 46 + i*3, gy - 140 + i*30, 182 - i*6, 12);
    ctx.fillStyle = "#8a97a2";
    for (let r = 0; r < 4; r++) for (let c = 0; c < 22; c++) { ctx.beginPath(); ctx.arc(x - 38 + c*8, gy - 132 + r*30, 2, 0, 7); ctx.fill(); }
    // 屋根の帯（青）
    ctx.fillStyle = "#2f6fb0"; ctx.fillRect(x - 50, gy - 152, 190, 8);
    // 入口アーチ（暗い開口）＝まるりんが入る所
    ctx.fillStyle = "#20303a"; roundRectPath(x - 18, gy - 86, 76, 86, 10); ctx.fill();
    ctx.fillStyle = "#2b4150"; roundRectPath(x - 10, gy - 78, 60, 78, 8); ctx.fill();
    // 入口の看板
    ctx.fillStyle = "#0a6b3b"; roundRectPath(x - 28, gy - 118, 96, 26, 6); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.font = "bold 15px 'Segoe UI',sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("STADIUM", x + 20, gy - 105);
    // サッカーボールのエンブレム
    const bx = x + 20, by = gy - 140;
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(bx, by, 11, 0, 7); ctx.fill();
    ctx.strokeStyle = "#c9ccd2"; ctx.lineWidth = 1.2; ctx.beginPath(); ctx.arc(bx, by, 11, 0, 7); ctx.stroke();
    ctx.fillStyle = "#20242c"; pentagon(bx, by, 4.6);
    // ポルトガル国旗（屋根に）
    ctx.fillStyle = "#0a6b3b"; ctx.fillRect(x + 116, gy - 180, 15, 11);
    ctx.fillStyle = "#d21e2b"; ctx.fillRect(x + 131, gy - 180, 17, 11);
    ctx.fillStyle = "#f5d20c"; ctx.beginPath(); ctx.arc(x + 131, gy - 174.5, 3, 0, 7); ctx.fill();
    ctx.strokeStyle = "#8a9099"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(x + 116, gy - 180); ctx.lineTo(x + 116, gy - 152); ctx.stroke();
    // ゴール案内の矢印
    ctx.fillStyle = "#ffd34d"; ctx.font = "bold 13px 'Segoe UI',sans-serif"; ctx.textAlign = "center";
    ctx.fillText("GOAL", x + 20, gy - 20);
  }

  // ゴール：南流山駅の改札
  function drawGate(gl) {
    const x = gl.x;
    // 駅舎の壁
    ctx.fillStyle = "#ece6d8"; ctx.fillRect(x - 44, gl.top + 42, 190, GROUND_Y - (gl.top + 42));
    // 屋根・駅名看板
    ctx.fillStyle = "#3777bd"; ctx.fillRect(x - 54, gl.top + 14, 210, 36);
    ctx.fillStyle = "#fff"; ctx.font = "bold 19px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("南流山駅", x + 50, gl.top + 32);
    // 「改札口→」表示
    const chY = GROUND_Y - 74;
    ctx.fillStyle = "#2f7d32"; ctx.fillRect(x - 16, chY - 28, 104, 22);
    ctx.fillStyle = "#fff"; ctx.font = "bold 14px 'Segoe UI', sans-serif";
    ctx.fillText("改札口 →", x + 36, chY - 17);
    // 改札機 2台
    for (let i = 0; i < 2; i++) {
      const gx = x - 6 + i*72;
      ctx.fillStyle = "#dfe3e6"; ctx.fillRect(gx, chY, 28, 74);
      ctx.fillStyle = "#f2c200"; ctx.fillRect(gx, chY, 28, 10);       // 黄色い天面
      ctx.fillStyle = "#33aa55"; ctx.fillRect(gx + 5, chY + 20, 18, 9); // 通れる緑ランプ
      ctx.fillStyle = "#2b6cb0"; ctx.fillRect(gx + 6, chY + 36, 16, 22); // 読み取り部
    }
  }

  // ===== ステージ3：成田 =====
  function drawNaritaDecor() {
    const Lc = camX - 460, R = camX + W + 80;
    const put = (x, fn) => { if (x > Lc && x < R) fn(); };
    put(300,  () => naritaStation(300));
    put(1700, () => pagoda(1700));
    put(3100, () => signBuilding(3100, 240, 150, "#f4eef4", "#e5007e", "イオン成田", "#e5007e", "#fff"));
    put(4500, () => airportRoadSign(4500));
  }

  // 成田駅
  function naritaStation(x) {
    const w = 210, h = 132, top = GROUND_Y - h;
    ctx.fillStyle = "#e8ddc8"; ctx.fillRect(x, top, w, h);            // 壁
    ctx.fillStyle = "#7a5230"; ctx.fillRect(x - 6, top - 14, w + 12, 18); // 屋根
    ctx.fillStyle = "rgba(120,140,160,0.5)"; ctx.fillRect(x + w/2 - 34, GROUND_Y - 60, 68, 60); // 入口
    ctx.fillStyle = "rgba(255,255,255,0.55)";
    for (let wy = top + 20; wy < GROUND_Y - 66; wy += 24)
      for (let wx = x + 14; wx < x + w - 18; wx += 30)
        ctx.fillRect(wx, wy, 20, 16);
    const sw = 128, sx = x + (w - sw)/2, sy = top - 46;
    ctx.fillStyle = "#0a5c3a"; ctx.fillRect(sx, sy, sw, 30);          // 駅名看板（JR系グリーン）
    ctx.fillStyle = "#fff"; ctx.font = "bold 19px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("成田駅", x + w/2, sy + 15);
  }

  // 成田山 三重塔（朱塗り）
  function pagoda(x) {
    const cx = x + 60, baseY = GROUND_Y;
    ctx.fillStyle = "#cfc4a8"; ctx.fillRect(x + 22, baseY - 12, 76, 12); // 基壇
    const tiers = [
      { roofW: 96, bodyW: 36, bodyTop: baseY - 60, bodyH: 48 }, // 下層
      { roofW: 78, bodyW: 30, bodyTop: baseY - 104, bodyH: 44 }, // 中層
      { roofW: 62, bodyW: 24, bodyTop: baseY - 146, bodyH: 42 }  // 上層
    ];
    for (let i = 2; i >= 0; i--) {  // 上から描いて下の屋根を手前に
      const t = tiers[i], ry = t.bodyTop;
      ctx.fillStyle = "#c0392b"; ctx.fillRect(cx - t.bodyW/2, t.bodyTop, t.bodyW, t.bodyH); // 胴
      ctx.fillStyle = "#9e2f24"; ctx.fillRect(cx - t.bodyW/2, t.bodyTop, 4, t.bodyH);        // 柱の陰
      ctx.fillStyle = "#7a2f25";                                                              // 屋根
      ctx.beginPath();
      ctx.moveTo(cx - t.roofW/2, ry + 10);
      ctx.quadraticCurveTo(cx - t.roofW/2 - 4, ry - 4, cx - t.roofW/2 + 10, ry - 6);
      ctx.lineTo(cx + t.roofW/2 - 10, ry - 6);
      ctx.quadraticCurveTo(cx + t.roofW/2 + 4, ry - 4, cx + t.roofW/2, ry + 10);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#efe6cf"; ctx.fillRect(cx - t.roofW/2 + 6, ry + 7, t.roofW - 12, 3);  // 軒先の白
    }
    const topY = tiers[2].bodyTop;                 // 相輪（金）
    ctx.strokeStyle = "#d4af37"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(cx, topY - 6); ctx.lineTo(cx, topY - 30); ctx.stroke();
    ctx.fillStyle = "#d4af37"; ctx.beginPath(); ctx.arc(cx, topY - 32, 3, 0, 7); ctx.fill();
    ctx.fillStyle = "#5b3a1a"; ctx.fillRect(x + 32, baseY - 13, 56, 15);   // 立て札
    ctx.fillStyle = "#fff"; ctx.font = "9px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("成田山 三重塔", x + 60, baseY - 6);
  }

  // 「成田空港 →」の道路案内標識
  function airportRoadSign(x) {
    ctx.fillStyle = "#8a9099"; ctx.fillRect(x + 40, GROUND_Y - 120, 8, 120);
    ctx.fillStyle = "#1b7a3a"; ctx.fillRect(x - 6, GROUND_Y - 134, 140, 34);
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.strokeRect(x - 4, GROUND_Y - 132, 136, 30);
    ctx.fillStyle = "#fff"; ctx.font = "bold 15px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("成田空港 ✈ →", x + 64, GROUND_Y - 117);
  }

  // ゴール：成田空港
  function drawAirport(gl) {
    const x = gl.x;
    const tw = 230, th = 122, top = GROUND_Y - th;
    ctx.fillStyle = "#eef2f6"; ctx.fillRect(x - 44, top, tw, th);      // ターミナル
    ctx.fillStyle = "#cdd7e0"; ctx.fillRect(x - 44, top, tw, 16);      // 屋根
    ctx.fillStyle = "#8fc4e6";                                         // ガラス張りの窓
    for (let wy = top + 26; wy < GROUND_Y - 18; wy += 22)
      ctx.fillRect(x - 34, wy, tw - 20, 14);
    ctx.fillStyle = "#dfe6ec"; ctx.fillRect(x + tw - 78, top - 70, 16, 70); // 管制塔
    ctx.fillStyle = "#3a4652"; ctx.fillRect(x + tw - 86, top - 84, 32, 18);
    ctx.fillStyle = "#8fc4e6"; ctx.fillRect(x + tw - 82, top - 80, 24, 8);
    const sw = 200, sx = x - 30, sy = top - 48;                        // 看板
    ctx.fillStyle = "#0a2e6b"; ctx.fillRect(sx, sy, sw, 36);
    ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "bold 18px 'Segoe UI', sans-serif"; ctx.fillText("✈ 成田空港", sx + sw/2, sy + 13);
    ctx.font = "9px 'Segoe UI', sans-serif"; ctx.fillText("NARITA AIRPORT", sx + sw/2, sy + 27);
    const py = top - 46 + Math.sin(elapsed*0.05)*6;                    // 飛行機（ふわふわ）
    drawPlane(x + 46, py);
    // ゴールのぼり
    const wave = Math.sin(elapsed*0.15)*4;
    ctx.fillStyle = "#cfcfcf"; ctx.fillRect(x - 3, gl.top, 6, TILE*3);
    ctx.fillStyle = "#e94560";
    ctx.beginPath();
    ctx.moveTo(x + 3, gl.top); ctx.lineTo(x + 48 + wave, gl.top + 13); ctx.lineTo(x + 3, gl.top + 26);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.font = "bold 14px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("G", x + 20, gl.top + 13);
  }

  function drawPlane(x, y) {
    ctx.save(); ctx.translate(x, y);
    ctx.fillStyle = "#ffffff";
    ctx.beginPath(); ctx.ellipse(0, 0, 34, 9, 0, 0, 7); ctx.fill();     // 胴体
    ctx.beginPath(); ctx.moveTo(-30, 0); ctx.lineTo(-42, -14); ctx.lineTo(-24, -2); ctx.closePath(); ctx.fill(); // 尾翼
    ctx.fillStyle = "#d3dbe2";
    ctx.beginPath(); ctx.moveTo(-2, 2); ctx.lineTo(-16, 16); ctx.lineTo(8, 4); ctx.closePath(); ctx.fill();      // 主翼
    ctx.fillStyle = "#5aa0d0";
    for (let i = -1; i < 5; i++) ctx.fillRect(i*8, -3, 4, 4);           // 窓
    ctx.fillStyle = "#e0453f"; ctx.fillRect(24, -3, 9, 6);             // 機首
    ctx.restore();
  }

  // はね（はねまるりんアイテム）
  function drawFeathers() {
    for (const f of feathers) {
      if (f.got) continue;
      if (f.x + f.w < camX - 40 || f.x > camX + W + 40) continue;
      f.t += 0.08;
      const cx = f.x + f.w/2, cy = f.y + f.h/2 + Math.sin(f.t)*3;
      ctx.save();
      ctx.globalAlpha = 0.5 + Math.abs(Math.sin(f.t))*0.3;
      ctx.fillStyle = "#eaf5ff";
      ctx.beginPath(); ctx.arc(cx, cy, f.w/2 + 2, 0, 7); ctx.fill();
      ctx.restore();
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(Math.sin(f.t*0.5)*0.15 - 0.2);
      ctx.fillStyle = "#ffffff";
      ctx.beginPath(); ctx.ellipse(0, 0, 6, 14, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#cfe8fb";
      ctx.beginPath(); ctx.ellipse(2.4, 0, 2.6, 12, 0, 0, 7); ctx.fill();
      ctx.strokeStyle = "#9cc7e6"; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.moveTo(0, -13); ctx.lineTo(0, 13); ctx.stroke();
      ctx.restore();
    }
  }

  // フランスパン（1UP）
  function drawBreads() {
    for (const br of breads) {
      if (br.got) continue;
      if (br.x + br.w < camX - 40 || br.x > camX + W + 40) continue;
      const cx = br.x + br.w/2, cy = br.y + br.h/2;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(-0.18);
      // 本体（こんがりバゲット）
      ctx.fillStyle = "#d19a41";
      ctx.beginPath(); ctx.ellipse(0, 0, 17, 8, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#e7b96a";
      ctx.beginPath(); ctx.ellipse(-2, -1.5, 14, 5.5, 0, 0, 7); ctx.fill();
      // 両端の焼き色濃いめ
      ctx.fillStyle = "#b9822f";
      ctx.beginPath(); ctx.ellipse(-15, 0, 3, 6, 0, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.ellipse(15, 0, 3, 6, 0, 0, 7); ctx.fill();
      // 斜めの切れ込み
      ctx.strokeStyle = "#8a5a20"; ctx.lineWidth = 1.4; ctx.lineCap = "round";
      for (let i = -2; i <= 2; i++) { ctx.beginPath(); ctx.moveTo(i*6 - 2, -4); ctx.lineTo(i*6 + 2, 4); ctx.stroke(); }
      ctx.restore();
      // 1UP 表示
      ctx.fillStyle = "#2f7d32"; ctx.font = "bold 9px 'Segoe UI', sans-serif";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("1UP", cx, br.y - 6);
    }
  }

  // 車（地上の速い敵）
  function drawCar(e) {
    ctx.save();
    const cx = e.x + e.w/2, by = e.y + e.h;
    ctx.translate(cx, by);
    if (!e.alive) { ctx.scale(1.05, 0.3); ctx.globalAlpha = 0.7; }
    const dir = e.vx > 0 ? 1 : -1;
    const bob = Math.sin(e.t*0.4)*0.8;
    ctx.fillStyle = "#d33b3b"; ctx.fillRect(-23, -16 + bob, 46, 15);   // 車体
    ctx.fillStyle = "#e05555";                                         // キャビン
    ctx.beginPath();
    ctx.moveTo(-13, -16 + bob); ctx.lineTo(-8, -27 + bob);
    ctx.lineTo(11, -27 + bob); ctx.lineTo(16, -16 + bob); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#bfe0f2";                                         // 窓
    ctx.beginPath(); ctx.moveTo(-9, -17 + bob); ctx.lineTo(-6, -25 + bob);
    ctx.lineTo(1, -25 + bob); ctx.lineTo(1, -17 + bob); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(3, -17 + bob); ctx.lineTo(3, -25 + bob);
    ctx.lineTo(9, -25 + bob); ctx.lineTo(13, -17 + bob); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#ffe9a8";                                         // ヘッドライト
    ctx.beginPath(); ctx.arc(dir*20, -8 + bob, 2.4, 0, 7); ctx.fill();
    ctx.fillStyle = "#222";                                            // タイヤ
    ctx.beginPath(); ctx.arc(-13, -1, 5, 0, 7); ctx.arc(13, -1, 5, 0, 7); ctx.fill();
    ctx.fillStyle = "#888";
    ctx.beginPath(); ctx.arc(-13, -1, 2, 0, 7); ctx.arc(13, -1, 2, 0, 7); ctx.fill();
    ctx.restore();
  }

  // ネコ（地上の敵）
  function drawCat(e) {
    ctx.save();
    const cx = e.x + e.w/2, by = e.y + e.h;
    ctx.translate(cx, by);
    if (!e.alive) { ctx.scale(1.1, 0.25); ctx.globalAlpha = 0.7; }
    const dir = e.vx > 0 ? 1 : -1;
    const wob = Math.sin(e.t*0.25)*2;
    // しっぽ
    ctx.strokeStyle = "#6b6b6b"; ctx.lineWidth = 4; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(-dir*12, -8); ctx.quadraticCurveTo(-dir*22, -14, -dir*17, -26); ctx.stroke();
    // 体
    ctx.fillStyle = "#7d7d7d";
    ctx.beginPath(); ctx.ellipse(0, -9, 14, 9, 0, 0, 7); ctx.fill();
    // 頭
    ctx.beginPath(); ctx.arc(dir*11, -16, 9, 0, 7); ctx.fill();
    // 耳
    ctx.beginPath(); ctx.moveTo(dir*5, -22); ctx.lineTo(dir*7, -31); ctx.lineTo(dir*13, -23); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(dir*14, -23); ctx.lineTo(dir*18, -31); ctx.lineTo(dir*19, -21); ctx.closePath(); ctx.fill();
    // 足
    ctx.fillStyle = "#5f5f5f";
    ctx.beginPath(); ctx.ellipse(-6 + wob, 0, 4, 3, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(6 - wob, 0, 4, 3, 0, 0, 7); ctx.fill();
    if (e.alive) {
      ctx.fillStyle = "#eef05a";
      ctx.beginPath(); ctx.arc(dir*8, -17, 2.6, 0, 7); ctx.arc(dir*15, -17, 2.6, 0, 7); ctx.fill();
      ctx.fillStyle = "#111"; ctx.fillRect(dir*8 - 0.7, -19.5, 1.4, 5); ctx.fillRect(dir*15 - 0.7, -19.5, 1.4, 5);
      ctx.fillStyle = "#e79aa0"; ctx.beginPath(); ctx.arc(dir*11.5, -13, 1.6, 0, 7); ctx.fill();
      // ひげ
      ctx.strokeStyle = "rgba(255,255,255,0.7)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(dir*13, -13); ctx.lineTo(dir*22, -15); ctx.moveTo(dir*13, -11); ctx.lineTo(dir*22, -10); ctx.stroke();
    }
    ctx.restore();
  }

  // カラス（飛ぶ敵）
  function drawCrow(e) {
    ctx.save();
    const cx = e.x + e.w/2, cy = e.y + e.h/2;
    ctx.translate(cx, cy);
    if (!e.alive) { ctx.scale(1.1, 0.3); ctx.globalAlpha = 0.7; }
    const dir = e.vx > 0 ? 1 : -1;
    const flap = Math.sin(e.t*0.3)*10;
    // 翼
    ctx.fillStyle = "#23262b";
    ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(-18, -2 - flap); ctx.lineTo(-4, 6); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(18, -2 - flap); ctx.lineTo(4, 6); ctx.closePath(); ctx.fill();
    // 尾
    ctx.beginPath(); ctx.moveTo(-dir*8, 0); ctx.lineTo(-dir*18, 5); ctx.lineTo(-dir*8, 7); ctx.closePath(); ctx.fill();
    // 体
    ctx.fillStyle = "#2b2f35";
    ctx.beginPath(); ctx.ellipse(0, 0, 12, 9, 0, 0, 7); ctx.fill();
    // 頭
    ctx.beginPath(); ctx.arc(dir*10, -4, 7, 0, 7); ctx.fill();
    // くちばし
    ctx.fillStyle = "#f0a51e";
    ctx.beginPath(); ctx.moveTo(dir*15, -5); ctx.lineTo(dir*27, -2); ctx.lineTo(dir*15, 1); ctx.closePath(); ctx.fill();
    if (e.alive) {
      ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(dir*11, -5, 2.4, 0, 7); ctx.fill();
      ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(dir*12, -5, 1.3, 0, 7); ctx.fill();
    }
    ctx.restore();
  }

  function drawEnemies() {
    for (const e of enemies) {
      if (e.x + e.w < camX - 40 || e.x > camX + W + 40) continue;
      if (e.kind === "cat")  { drawCat(e);  continue; }
      if (e.kind === "crow") { drawCrow(e); continue; }
      if (e.kind === "car")  { drawCar(e);  continue; }
      if (e.kind === "crab") { drawCrab(e); continue; }
      if (e.kind === "gull") { drawGull(e); continue; }
      if (e.kind === "puffer") { drawPuffer(e); continue; }
      if (e.kind === "jelly") { drawJelly(e); continue; }
      if (e.kind === "monkey") { drawMonkey(e); continue; }
      if (e.kind === "snake") { drawSnake(e); continue; }
      if (e.kind === "rooster") { drawRooster(e); continue; }
      if (e.kind === "sardine") { drawSardine(e); continue; }
      if (e.kind === "octopus") { drawOctopus(e); continue; }
      if (e.kind === "gator") { drawGator(e); continue; }
      if (e.kind === "eagle") { drawEagle(e); continue; }
      if (e.kind === "football") { drawFootball(e); continue; }
      if (e.kind === "bison") { drawBison(e); continue; }
      ctx.save();
      const cx = e.x + e.w/2, by = e.y + e.h;
      ctx.translate(cx, by);
      if (!e.alive) { ctx.scale(1.1, 0.25); ctx.globalAlpha = 0.7; }
      // クリ栗風の敵（くるみ）
      const wob = Math.sin(e.t*0.25)*3;
      // 体
      ctx.fillStyle = "#8a5a34";
      ctx.beginPath(); ctx.ellipse(0, -e.h*0.45, e.w*0.5, e.h*0.5, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#a56b3e";
      ctx.beginPath(); ctx.ellipse(0, -e.h*0.5, e.w*0.38, e.h*0.36, 0, 0, 7); ctx.fill();
      // 足
      ctx.fillStyle = "#4a3220";
      ctx.beginPath(); ctx.ellipse(-8+wob, 0, 6, 4, 0, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.ellipse(8-wob, 0, 6, 4, 0, 0, 7); ctx.fill();
      // 目
      if (e.alive) {
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(-6,-e.h*0.55,4,0,7); ctx.arc(6,-e.h*0.55,4,0,7); ctx.fill();
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(-6+ (e.vx>0?1:-1),-e.h*0.55,2,0,7); ctx.arc(6+(e.vx>0?1:-1),-e.h*0.55,2,0,7); ctx.fill();
        // 怒り眉
        ctx.strokeStyle="#3a2414"; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(-10,-e.h*0.72); ctx.lineTo(-3,-e.h*0.63);
        ctx.moveTo(10,-e.h*0.72); ctx.lineTo(3,-e.h*0.63); ctx.stroke();
      }
      ctx.restore();
    }
  }

  // 角丸長方形のパス
  function roundRectPath(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ドランプ大統領（アメリカ・パロディのカリカチュア）
  function drawDrampBoss(b) {
    const cx = b.x + b.w/2, footY = b.y + b.h;
    if (b.phase === 1) {
      // 演壇（バルコニー）＋手すり＋星条旗の垂れ幕
      ctx.fillStyle = "#d8d8cc"; ctx.fillRect(cx - 60, footY, 120, 42);
      ctx.fillStyle = "#c2c2b4"; ctx.fillRect(cx - 60, footY, 120, 6);
      ctx.fillStyle = "#eeeee6"; ctx.fillRect(cx - 60, footY + 8, 120, 5);
      for (let i = -55; i < 60; i += 12) ctx.fillRect(cx + i, footY + 8, 3, 24);
      ctx.fillStyle = "#2b4aa0"; ctx.fillRect(cx - 42, footY + 5, 22, 20);
      ctx.fillStyle = "#e0323a"; for (let i = 0; i < 3; i++) ctx.fillRect(cx - 18, footY + 5 + i*7, 54, 3.5);
    } else {
      ctx.fillStyle = "rgba(0,0,0,0.18)"; ctx.beginPath(); ctx.ellipse(cx, footY, 30, 6, 0, 0, 7); ctx.fill();
      if (b.raging && b.alive) {
        ctx.save();
        const pl = 0.5 + 0.5 * Math.sin(b.t * 0.3);
        ctx.globalAlpha = 0.22 + pl * 0.18; ctx.fillStyle = "#ff5a4a";
        ctx.beginPath(); ctx.ellipse(cx, footY - 46, 40, 56, 0, 0, 7); ctx.fill();
        ctx.restore();
        ctx.font = "20px 'Segoe UI',sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("💢", cx + b.face * 28, footY - 92);
      }
    }
    ctx.save();
    if (b.hurtFlash > 0 && Math.floor(b.hurtFlash/4) % 2 === 0) ctx.globalAlpha = 0.4;
    ctx.translate(cx, footY); ctx.scale(1, Math.max(0.15, b.squash)); ctx.translate(-cx, -footY);
    ctx.save(); ctx.translate(cx, footY); ctx.scale(b.face, 1); ctx.translate(-cx, -footY);
    const bob = Math.sin(b.t * 0.1) * 1.5;
    // 脚（濃紺スーツのズボン）
    ctx.fillStyle = "#22314a";
    ctx.fillRect(cx - 15, footY - 30, 12, 30); ctx.fillRect(cx + 3, footY - 30, 12, 30);
    // 靴
    ctx.fillStyle = "#111"; ctx.beginPath(); ctx.ellipse(cx - 9, footY - 1, 9, 4, 0, 0, 7); ctx.ellipse(cx + 9, footY - 1, 9, 4, 0, 0, 7); ctx.fill();
    // ジャケット（濃紺）
    ctx.fillStyle = "#26374f"; roundRectPath(cx - 22, footY - 66, 44, 40, 6); ctx.fill();
    // 白いシャツ（前）
    ctx.fillStyle = "#f4f4f0"; ctx.beginPath(); ctx.moveTo(cx - 7, footY - 66); ctx.lineTo(cx + 7, footY - 66); ctx.lineTo(cx + 5, footY - 30); ctx.lineTo(cx - 5, footY - 30); ctx.closePath(); ctx.fill();
    // 赤い長いネクタイ
    ctx.fillStyle = "#d8232a"; ctx.beginPath(); ctx.moveTo(cx - 4, footY - 62); ctx.lineTo(cx + 4, footY - 62); ctx.lineTo(cx + 3, footY - 34); ctx.lineTo(cx, footY - 28); ctx.lineTo(cx - 3, footY - 34); ctx.closePath(); ctx.fill();
    // ジャケットの襟
    ctx.fillStyle = "#1e2c40"; ctx.beginPath(); ctx.moveTo(cx - 8, footY - 66); ctx.lineTo(cx, footY - 50); ctx.lineTo(cx - 14, footY - 52); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx + 8, footY - 66); ctx.lineTo(cx, footY - 50); ctx.lineTo(cx + 14, footY - 52); ctx.closePath(); ctx.fill();
    // 腕
    ctx.fillStyle = "#26374f"; ctx.fillRect(cx - 28, footY - 64, 8, 26); ctx.fillRect(cx + 20, footY - 64, 8, 26);
    ctx.fillStyle = "#e8b98c"; ctx.beginPath(); ctx.arc(cx - 24, footY - 36, 4, 0, 7); ctx.arc(cx + 24, footY - 36, 4, 0, 7); ctx.fill();
    // 頭（日焼けオレンジ）
    ctx.fillStyle = "#e8a86a"; ctx.beginPath(); ctx.arc(cx, footY - 78 + bob, 15, 0, 7); ctx.fill();
    // 目・眉・口
    ctx.fillStyle = "#3a2a1a"; ctx.beginPath(); ctx.arc(cx - 5, footY - 80 + bob, 1.8, 0, 7); ctx.arc(cx + 5, footY - 80 + bob, 1.8, 0, 7); ctx.fill();
    ctx.strokeStyle = "#c8935a"; ctx.lineWidth = 1.4; ctx.beginPath(); ctx.moveTo(cx - 8, footY - 84 + bob); ctx.lineTo(cx - 2, footY - 83 + bob); ctx.moveTo(cx + 2, footY - 83 + bob); ctx.lineTo(cx + 8, footY - 84 + bob); ctx.stroke();
    ctx.strokeStyle = "#8a5a3a"; ctx.lineWidth = 1.6; ctx.beginPath(); ctx.moveTo(cx - 4, footY - 72 + bob); ctx.lineTo(cx + 4, footY - 72 + bob); ctx.stroke();
    // 金髪（横分けのボリューム）
    ctx.fillStyle = "#e8cf6a";
    ctx.beginPath();
    ctx.moveTo(cx - 15, footY - 82 + bob);
    ctx.quadraticCurveTo(cx - 18, footY - 96 + bob, cx - 4, footY - 95 + bob);
    ctx.quadraticCurveTo(cx + 10, footY - 96 + bob, cx + 16, footY - 88 + bob);
    ctx.quadraticCurveTo(cx + 10, footY - 90 + bob, cx + 2, footY - 89 + bob);
    ctx.quadraticCurveTo(cx - 8, footY - 88 + bob, cx - 15, footY - 82 + bob);
    ctx.closePath(); ctx.fill();
    // ゴルフクラブ（振りかぶり→振り下ろし）※flip中なので前方＝＋x
    if (b.mode === "golfwind" || b.swingT > 0) {
      const hx = cx + 16, hy = footY - 44;
      const ang = b.mode === "golfwind" ? -2.0 : (-0.2 + (16 - b.swingT) * 0.1);   // 頭の上へ振りかぶる→前下へ振り抜く
      ctx.save(); ctx.translate(hx, hy); ctx.rotate(ang);
      ctx.strokeStyle = "#2f343c"; ctx.lineWidth = 4; ctx.lineCap = "round"; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(52, 0); ctx.stroke();
      ctx.fillStyle = "#c9ccd2"; ctx.beginPath(); ctx.ellipse(54, 3, 10, 6, 0.4, 0, 7); ctx.fill();   // クラブヘッド（銀）
      ctx.restore();
      // 手（クラブを握る）
      ctx.fillStyle = "#e8b98c"; ctx.beginPath(); ctx.arc(hx, hy, 4.5, 0, 7); ctx.fill();
    }
    // ハンバーガーを食べる（マイクラのパン食べ風：かじるモーション＋だんだん小さく＋口が開く）
    if (b.mode === "burgereat") {
      const prog = 1 - b.windup / 64;                          // 0→1（食べ進む）
      const chew = Math.max(0, Math.sin(b.windup * 0.5));       // かじるリズム（0..1）
      const sc = Math.max(0.28, 1 - 0.66 * prog);              // だんだん小さく
      const mthX = cx + 3, mthY = footY - 70 + bob;            // 口の位置
      const bxp = cx + 13 - chew * 9;                          // かじる瞬間に口へ引き寄せる
      const byp = footY - 69 + bob;
      // 口（かじる瞬間に大きく開く）
      ctx.fillStyle = "#5a1e18"; ctx.beginPath(); ctx.ellipse(mthX, mthY, 2.6, 1.6 + chew * 3.4, 0, 0, 7); ctx.fill();
      // バーガーを持つ前腕（体→バーガー）
      ctx.strokeStyle = "#26374f"; ctx.lineWidth = 7; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(cx + 20, footY - 50); ctx.lineTo(bxp + 5, byp + 5); ctx.stroke();
      ctx.fillStyle = "#e8b98c"; ctx.beginPath(); ctx.arc(bxp + 5, byp + 5, 4, 0, 7); ctx.fill();
      // ハンバーガー本体（小さくなりながら・少し傾ける）
      ctx.save(); ctx.translate(bxp, byp); ctx.scale(sc, sc); ctx.rotate(-0.12 - chew * 0.1);
      ctx.fillStyle = "#e0a94a"; ctx.beginPath(); ctx.ellipse(0, -4, 9, 5, 0, Math.PI, 0); ctx.fill();       // 上バンズ
      ctx.fillStyle = "#fff"; for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.arc(i * 3, -6, 0.8, 0, 7); ctx.fill(); }  // ごま
      ctx.fillStyle = "#6cae3e"; ctx.fillRect(-9, -1, 18, 1.6);                                              // レタス
      ctx.fillStyle = "#b5442f"; ctx.fillRect(-8, 0, 16, 2.4);                                               // パティ
      ctx.fillStyle = "#f4c542"; ctx.fillRect(-8, 2, 16, 1.2);                                               // チーズ
      ctx.fillStyle = "#d99a3c"; ctx.beginPath(); ctx.ellipse(0, 4, 9, 4, 0, 0, Math.PI); ctx.fill();        // 下バンズ
      // かじり跡（口側を丸くえぐる）
      if (prog > 0.12) { ctx.fillStyle = "#e8a86a"; for (let i = 0; i < 2; i++) { ctx.beginPath(); ctx.arc(-6 - i * 3, -1 + i * 3, 2.4 + prog * 3, 0, 7); ctx.fill(); } }
      ctx.restore();
      // ほおばりモグモグの効果線
      ctx.fillStyle = "#c8935a"; ctx.beginPath(); ctx.arc(cx - 9, footY - 72 + bob + chew, 1.2, 0, 7); ctx.arc(cx + 12, footY - 74 + bob - chew, 1.2, 0, 7); ctx.fill();
    }
    // 演説シャウト：口を大きく開ける
    if (b.mode === "shoutwind" || b.shoutT > 0) {
      ctx.fillStyle = "#5a1e1e"; ctx.beginPath(); ctx.ellipse(cx + 2, footY - 71 + bob, 4, 5.5, 0, 0, 7); ctx.fill();
    }
    ctx.restore();
    ctx.restore();
    // 吹き出し・演出（flip外＝ワールド座標）
    if (b.mode === "shoutwind" || b.shoutT > 0) {
      ctx.fillStyle = "#fff"; ctx.font = "bold 15px 'Segoe UI',sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.strokeStyle = "#e0323a"; ctx.lineWidth = 3;
      ctx.strokeText("フェイクニュースだ！", cx, footY - 104 + bob);
      ctx.fillText("フェイクニュースだ！", cx, footY - 104 + bob);
    }
    if (b.mode === "burgereat" && b.windup <= 22) {
      ctx.fillStyle = "#3fae4a"; ctx.font = "bold 18px 'Segoe UI',sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("＋❤", cx + 26, footY - 96 - (24 - b.windup) * 0.6);
    }
  }

  // ドランプのSP（護衛・黒服サングラス・拳銃）

      ctx.fillStyle = "#23242a"; roundRectPath(cx - 11, footY - 38, 22, 24, 4); ctx.fill();
      ctx.fillStyle = "#e8e8e8"; ctx.beginPath(); ctx.moveTo(cx - 4, footY - 38); ctx.lineTo(cx + 4, footY - 38); ctx.lineTo(cx + 3, footY - 18); ctx.lineTo(cx - 3, footY - 18); ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#111"; ctx.fillRect(cx - 1.5, footY - 38, 3, 18);

      ctx.fillStyle = "#23242a"; ctx.fillRect(cx + 9, footY - 36, 6, 14);
