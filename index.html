<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>まるりんワールド</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #1a1a2e;
    font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
    color: #fff;
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    touch-action: none;
    overscroll-behavior: none;
  }
  #wrap {
    height: var(--app-h, 100vh);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 6px;
  }
  h1 {
    font-size: 22px;
    letter-spacing: 2px;
    text-shadow: 2px 2px 0 #e94560;
  }
  #stage {
    position: relative;
    box-shadow: 0 10px 40px rgba(0,0,0,.6);
    border-radius: 8px;
    overflow: hidden;
    /* 画面に見えている高さを基準に、上下が切れないよう少し余裕をもたせる */
    width: min(100vw, calc(var(--app-h, 100vh) * 1.72), 960px);
  }
  /* dvh対応ブラウザ（最近のiPad/iPhone）は、ブラウザ管理の安定した単位を使う */
  @supports (height: 100dvh) {
    #wrap  { height: 100dvh; }
    #stage { width: min(100vw, calc(100dvh * 1.72), 960px); }
  }
  canvas { display: block; image-rendering: pixelated; width: 100%; height: auto;
    touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
  #stage { touch-action: none; }

  /* ===== タッチ操作 ===== */
  #touch-controls {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 20;
    pointer-events: none;
  }
  body.has-touch.playing #touch-controls { display: block; }
  body.storymode #touch-controls { display: none !important; }
  #touch-controls .side {
    position: absolute;
    bottom: max(18px, env(safe-area-inset-bottom));
    pointer-events: none;
  }
  #touch-controls .side.left  { left:  max(16px, env(safe-area-inset-left)); }
  #touch-controls .side.right { right: max(16px, env(safe-area-inset-right)); }

  /* 十字キー */
  #dpad {
    position: relative;
    width: 150px; height: 150px;
    pointer-events: none;
    opacity: 0.9;
  }
  .dbtn {
    position: absolute;
    width: 50px; height: 50px;
    background: rgba(40,40,70,0.55);
    border: 2px solid rgba(255,255,255,0.35);
    color: #fff; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    pointer-events: auto;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  .dbtn.up    { top: 0;    left: 50px; border-radius: 10px 10px 0 0; }
  .dbtn.down  { bottom: 0; left: 50px; border-radius: 0 0 10px 10px; }
  .dbtn.left  { left: 0;   top: 50px;  border-radius: 10px 0 0 10px; }
  .dbtn.right { right: 0;  top: 50px;  border-radius: 0 10px 10px 0; }
  .dbtn.pressed { background: rgba(233,69,96,0.8); }

  /* A / B ボタン */
  #abtns {
    position: relative;
    width: 190px; height: 150px;
    pointer-events: none;
  }
  .rbtn {
    position: absolute;
    border-radius: 50%;
    color: #fff; font-weight: bold;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    line-height: 1;
    pointer-events: auto;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    box-shadow: 0 4px 0 rgba(0,0,0,0.35);
  }
  .rbtn small { font-size: 10px; font-weight: normal; opacity: .85; margin-top: 2px; }
  .rbtn.a {
    width: 86px; height: 86px; font-size: 30px;
    right: 8px; bottom: 6px;
    background: rgba(233,69,96,0.85);
    border: 3px solid rgba(255,255,255,0.5);
  }
  .rbtn.b {
    width: 72px; height: 72px; font-size: 24px;
    left: 6px; bottom: 42px;
    background: rgba(58,168,224,0.85);
    border: 3px solid rgba(255,255,255,0.5);
  }
  .rbtn.pressed { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.35); filter: brightness(1.2); }

  body.has-touch h1 { font-size: 16px; }
  body.has-touch #hint { display: none; }
  @media (max-height: 520px) {
    body.has-touch h1 { display: none; }
    #wrap { gap: 0; padding: 0; }
  }

  /* 縦向きのときに「横にしてね」案内 */
  #rotate {
    display: none;
    position: fixed; inset: 0; z-index: 50;
    background: #14142a;
    color: #fff; text-align: center;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; padding: 30px;
  }
  #rotate .ico { font-size: 64px; animation: roticon 2.2s ease-in-out infinite; }
  #rotate h2 { font-size: 24px; text-shadow: 2px 2px 0 #e94560; }
  #rotate p { font-size: 16px; line-height: 1.7; opacity: .9; }
  @keyframes roticon {
    0%, 35% { transform: rotate(0deg); }
    55%, 100% { transform: rotate(90deg); }
  }
  @media (orientation: portrait) {
    body.has-touch #rotate { display: flex; }
  }
  #overlay {
    position: absolute; inset: 0;
    display: flex;
    background: rgba(20,20,40,.82);
    text-align: center; padding: 16px;
    /* 内容が画面より高いときはスクロールできるように（上下が切れない） */
    overflow-y: auto; -webkit-overflow-scrolling: touch; touch-action: pan-y;
  }
  #overlay .inner {
    margin: auto;   /* 収まるときは中央、はみ出すときは上詰め＋スクロール */
    display: flex; flex-direction: column; align-items: center;
    gap: 12px; max-width: 660px; width: 100%;
  }
  /* SUPER MARURIN WORLD ロゴ（スーパーマリオワールド風） */
  #overlay .logo { display: flex; flex-direction: column; align-items: center; gap: 4px;
    font-family: 'Arial Black', 'Segoe UI', sans-serif; user-select: none; }
  #overlay .logo .super { font-size: 34px; }
  #overlay .logo .main { display: flex; flex-wrap: wrap; justify-content: center; gap: 2px 24px; font-size: 58px; }
  #overlay .logo .word { display: inline-flex; }
  #overlay .logo span { display: inline-block; font-weight: 900; line-height: 1;
    -webkit-text-stroke: 3px #000; paint-order: stroke fill;
    text-shadow: 3px 4px 0 rgba(0,0,0,.45); transform: rotate(-3deg); }
  #overlay .logo .super span:nth-child(even),
  #overlay .logo .word span:nth-child(even) { transform: rotate(3deg); }
  #overlay .menu { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; margin-top: 6px; }
  #overlay #contNote { font-size: 13px; opacity: .85; }
  #overlay #version { margin-top: 6px; font-size: 15px; font-weight: bold; color: #ffe38a;
    letter-spacing: 1px; background: rgba(0,0,0,.32); padding: 4px 14px; border-radius: 14px; }
  #overlay button {
    font-size: 18px; padding: 12px 30px; border: none; border-radius: 30px;
    background: #e94560; color: #fff; cursor: pointer; font-weight: bold;
    box-shadow: 0 4px 0 #a82a42; transition: transform .05s; flex: none;
  }
  #overlay button:active { transform: translateY(3px); box-shadow: 0 1px 0 #a82a42; }
  #overlay button.disabled, #overlay button:disabled { opacity: .4; cursor: default; box-shadow: 0 4px 0 #6a1a2a; }
  #overlay button.disabled:active { transform: none; box-shadow: 0 4px 0 #6a1a2a; }
  /* 背の低い画面（横向きスマホ・アプリ内ブラウザ）では小さめに表示して収める */
  @media (max-height: 540px) {
    #overlay { padding: 8px; }
    #overlay .inner { gap: 10px; }
    #overlay .logo .super { font-size: 22px; }
    #overlay .logo .main { font-size: 36px; gap: 2px 16px; }
    #overlay .logo span { -webkit-text-stroke-width: 2px; text-shadow: 2px 3px 0 rgba(0,0,0,.45); }
    #overlay button { font-size: 15px; padding: 8px 22px; box-shadow: 0 3px 0 #a82a42; }
  }
  .hidden { display: none !important; }
  #hint { font-size: 12px; opacity: .55; }
  .keycap {
    display: inline-block; background:#2d2d4a; border:1px solid #4a4a7a;
    border-radius:5px; padding:2px 8px; margin:0 2px; font-size:13px;
  }
</style>
</head>
<body>
<div id="wrap">
  <h1>🐹 まるりんワールド 🐹</h1>
  <div id="stage">
    <canvas id="game" width="800" height="450"></canvas>
    <div id="overlay">
     <div class="inner">
      <div class="logo" aria-label="SUPER MARURIN WORLD">

        </div>
        <div class="main">
          <span class="word"><span style="color:#4caf27">M</span><span style="color:#29b6e8">A</span><span style="color:#ffcb05">R</span><span style="color:#e4322b">U</span><span style="color:#4caf27">R</span><span style="color:#29b6e8">I</span><span style="color:#ffcb05">N</span></span>
          <span class="word"><span style="color:#4caf27">W</span><span style="color:#ffcb05">O</span><span style="color:#29b6e8">R</span><span style="color:#4caf27">L</span><span style="color:#e4322b">D</span></span>
        </div>
      </div>
      <div class="menu">
        <button id="newBtn">はじめから</button>
        <button id="contBtn">つづきから</button>
      </div>
      <div id="contNote"></div>
      <div id="version">ver</div>
     </div>
    </div>
  </div>
  <div id="hint">P：ポーズ ／ R：リスタート</div>
</div>

<!-- 縦向きのときの案内（横向きにすると自動で消えます） -->
<div id="rotate">
  <div class="ico">📱</div>
  <h2>画面を横にしてね</h2>
  <p>まるりんワールドは<b>横向き</b>で遊べます🐹<br>スマホ・タブレットを横に回してください</p>
</div>

<!-- スマホ・タブレット用タッチ操作 -->
<div id="touch-controls">
  <div class="side left">
    <div id="dpad">
      <button class="dbtn up"    data-act="up"    aria-label="上">▲</button>
      <button class="dbtn left"  data-act="left"  aria-label="左">◀</button>
      <button class="dbtn right" data-act="right" aria-label="右">▶</button>
      <button class="dbtn down"  data-act="down"  aria-label="下">▼</button>
    </div>
  </div>
  <div class="side right">
    <div id="abtns">
      <button class="rbtn b" data-act="dash" aria-label="ダッシュ">B<small>ダッシュ</small></button>
      <button class="rbtn a" data-act="jump" aria-label="ジャンプ">A<small>ジャンプ</small></button>
    </div>
  </div>
</div>

  // ---------- 入力 ----------
  const keys = {};

  // タッチボタンの割り当て（A=ジャンプ, B=ダッシュ, 十字キー=移動）
  function applyTouch(act, v) {
    if (act === "left")       touch.left = v;
    else if (act === "right") touch.right = v;
    else if (act === "down")  touch.down = v;
    else if (act === "up" || act === "jump") touch.up = v;   // ▲ / A ボタン
    else if (act === "dash")  touch.dash = v;                // B ボタン
  }
  function bindTouch() {
    // どのポインタ（指/マウス）がどのボタンを押しているか記録
    const active = new Map();   // pointerId -> element
    document.querySelectorAll("#touch-controls [data-act]").forEach(el => {
      const act = el.dataset.act;
      el.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        active.set(e.pointerId, el);
        applyTouch(act, true); el.classList.add("pressed"); ac(); primeAudio();
      });
      el.addEventListener("contextmenu", (e) => e.preventDefault());
    });
    // 指/マウスをどこで離しても確実に解除（ボタン外で離しても押しっぱなしにならない）
    const clear = (e) => {
      const el = active.get(e.pointerId);
      if (el) { applyTouch(el.dataset.act, false); el.classList.remove("pressed"); active.delete(e.pointerId); }
    };
    window.addEventListener("pointerup", clear);
    window.addEventListener("pointercancel", clear);
    // 保険：タブ切替やフォーカス喪失で全ボタンを解除
    const clearAll = () => {
      active.clear();
      touch.left = touch.right = touch.up = touch.down = touch.dash = false;
      document.querySelectorAll("#touch-controls .pressed").forEach(e => e.classList.remove("pressed"));
    };
    window.addEventListener("blur", clearAll);
    document.addEventListener("visibilitychange", () => { if (document.hidden) clearAll(); });
  }
  function detectTouch() {
    if (matchMedia("(pointer: coarse)").matches || "ontouchstart" in window || navigator.maxTouchPoints > 0) {
      document.body.classList.add("has-touch");
    }

  // 拡大すると十字ボタンが画面外に出て操作できなくなるのを防ぐ。
  function blockZoomGestures() {
    // ピンチ拡大（Safariのgestureイベント）
    ["gesturestart", "gesturechange", "gestureend"].forEach(ev =>
      document.addEventListener(ev, e => e.preventDefault(), { passive: false }));
    // ダブルタップ拡大（素早い2回タップ）。ボタンやメニュー以外の場所だけ止める。
    let lastEnd = 0;
    document.addEventListener("touchend", (e) => {
      const now = Date.now();
      const onControl = e.target.closest && e.target.closest("#touch-controls, #overlay");
      if (now - lastEnd < 350 && !onControl) e.preventDefault();
      lastEnd = now;
    }, { passive: false });
    document.addEventListener("dblclick", e => e.preventDefault(), { passive: false });
  }

  // ---------- サウンド (WebAudio) ----------

  function beep(freq, dur, type = "square", vol = 0.08) {
    try {
      const a = ac();
      const o = a.createOscillator(), g = a.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.value = vol;
      o.connect(g); g.connect(a.destination);
      const t = a.currentTime;
      o.start(t);
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.stop(t + dur);
    } catch (e) {}
  }

    // 目的の曲以外はすべて止める（二重再生の防止）
    BGM.forEach(a => { if (a !== want) { try { a.pause(); } catch (e) {} } });
    BOSS_BGM.forEach(a => { if (a && a !== want) { try { a.pause(); } catch (e) {} } });
    bgm = want;
    try { bgm.play().catch(() => {}); } catch (e) {}
  }
  function stopBGM()  {
    BGM.forEach(a => { try { a.pause(); } catch (e) {} });
    BOSS_BGM.forEach(a => { if (a) { try { a.pause(); } catch (e) {} } });
  }

  // iOS等で最初のタッチ/クリック時に音声を解禁しておく
  let audioPrimed = false;
  function primeAudio() {
    if (audioPrimed) return;
    audioPrimed = true;
    // ステージ2以降のBGM＋ボスBGMも先に解禁（ステージ1は開始時に鳴るので除外）
    // ミュートしたまま一瞬だけ再生して解禁 → 他の曲が一瞬鳴る二重再生を防ぐ
    [VOICE.get, VOICE.sad].concat(BGM.slice(1), BOSS_BGM.filter(Boolean)).forEach(a => {
      try {
        a.muted = true;
        a.play().then(() => { a.pause(); a.currentTime = 0; a.muted = false; }).catch(() => { a.muted = false; });
      } catch (e) { a.muted = false; }
    });
  }

  // ---------- 物理ヘルパー ----------
  function rectHit(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function moveAndCollide() {
    const p = player;
    // 横移動
    p.x += p.vx;
    for (const s of solids) {
      if (rectHit(p, s)) {
        if (p.vx > 0) p.x = s.x - p.w;
        else if (p.vx < 0) p.x = s.x + s.w;
        p.vx = 0;
      }
    }
    // 縦移動（滑空中は重力をほぼ効かせない：ぷかぷか）
    if (!p.gliding) p.vy += GRAVITY;
    if (p.vy > 18) p.vy = 18;
    p.y += p.vy;
    p.onGround = false;
    for (const s of solids) {
      if (rectHit(p, s)) {
        if (p.vy > 0) { p.y = s.y - p.h; p.vy = 0; p.onGround = true; }
        else if (p.vy < 0) {
          p.y = s.y + s.h; p.vy = 0;
          // 下から叩いた
          if (s.type === "question" && !s.used) hitQuestion(s);
          else if (s.type === "brick") {
            if (p.powered) {
              s.dead = true; sfx.stomp(); score += 50;
              spawnParticles(s.x+TILE/2, s.y+TILE/2, "#b5651d", 12);
            } else { sfx.block(); spawnParticles(s.x+TILE/2, s.y+TILE/2, "#c98a3a", 4); }
          }
          else sfx.block();
        }
      }
    }
    // 壊れたブロックを除去
    if (solids.some(s => s.dead)) solids = solids.filter(s => !s.dead);

    // 場外・落下
    if (p.x < 0) { p.x = 0; p.vx = 0; }
    if (p.x + p.w > LEVEL_W) { p.x = LEVEL_W - p.w; p.vx = 0; }
    if (p.y > LEVEL_H + 80) killPlayer();
  }

  function hitQuestion(b) {
    b.used = true; b.type = "brick";
    if (b.prize === "bread") {
      // 1UP：フランスパンがブロックの上に出てくる
      sfx.power();
      breads.push({ x: b.x + 4, y: b.y - TILE + 8, w: 32, h: 20, vx: 1.3, vy: -1, got: false, t: 0 });
      spawnParticles(b.x + TILE/2, b.y, "#e7b96a", 8);
      return;
    }
    sfx.coin();
    score += 100; coinsGot++;
    spawnParticles(b.x + TILE/2, b.y, "#ffd34d", 8);
    // コインがポップするアニメ
    particles.push({ x: b.x+TILE/2, y: b.y-8, vx: 0, vy: -6, life: 26, color: "#ffd34d", coin: true });
  }

  function spawnParticles(x, y, color, n) {
    for (let i = 0; i < n; i++) {
      particles.push({
        x, y, vx: (Math.random()-0.5)*5, vy: -Math.random()*5-1,
        life: 24 + Math.random()*14, color
      });
    }
  }

  function killPlayer() {
    if (!player.alive) return;
    player.alive = false;
    sfx.hurt();
    playVoice("sad");   // 落下・被弾でやられたとき
    stopBGM();
    lives--;
    state = "dead";
    player.vy = -10; player.deadT = 0;
  }

  // ---------- 更新 ----------
  function update() {
    elapsed++;
    if (state === "play") updatePlay();
    else if (state === "boss") {
      if (pk) { updatePK(); }               // ポルトガル：PK戦
      else {
        updatePlay(); updateBossOnly();
        // ボス戦開始から10秒（約600フレーム）でナッツを1回だけ出す（ちびまるりんでの再戦をやさしく）
        if (inBoss && !bossNutSpawned && elapsed >= 600) { bossNutSpawned = true; spawnBossNut(); }
      }
    }
    else if (state === "dead") updateDead();
    else if (state === "story") {
      if (story) {
        story.t++;
        const scenes = STORIES[story.key].scenes;
        if (story.t >= scenes[story.scene].dur) nextScene();
      }
    }
    else if (state === "clear") { player.winPose++; }
    else if (state === "stageclear") {
      player.winPose++;
      stageClearT++;
      if (stageClearT > 150) advanceStage();   // 約2.5秒で自動的に次のステージへ
    }
    updateParticles();
    if (screenShake > 0) screenShake--;
    if (bigBoom > 0) bigBoom--;
  }

  function updatePlay() {
    const p = player;
    p.animT++;
    // スタン中（こうようの四股を受けた）：操作を受け付けず、その場で固まる（重力と衝突だけ）
    if (p.stun > 0) {
      p.stun--;
      if (p.invuln > 0) p.invuln--;
      p.squash += (1 - p.squash) * 0.2;
      p.vx *= 0.7;
      moveAndCollide();
      return;
    }
    // 横入力（Bボタン/Shiftでダッシュ）
    const dashing = running();
    // Bボタン（ダッシュ）を押した瞬間：たねまるりんは種を発射
    if (dashing && !dashPrev) fireSeed();
    dashPrev = dashing;
    if (p.seedCool > 0) p.seedCool--;
    // 滑空の更新（ぷかぷか上下しながらゆっくり降下）
    if (p.gliding) {
      p.glideT++; p.glideTimer--;
      p.vy = Math.sin(p.glideT * 0.16) * 1.3 + 0.35;
      if (p.glideTimer <= 0) p.gliding = false;
    }
    const accel = dashing ? MOVE * 1.35 : MOVE;
    const maxSp = dashing ? 7.6 : MAX_SPEED;
    if (left())  { p.vx -= accel; p.face = -1; }
    if (right()) { p.vx += accel; p.face = 1; }
    if (!left() && !right()) p.vx *= FRICTION;
    p.vx = Math.max(-maxSp, Math.min(maxSp, p.vx));
    if (Math.abs(p.vx) < 0.05) p.vx = 0;

    // コヨーテタイム
    if (p.onGround) p.coyote = COYOTE; else if (p.coyote > 0) p.coyote--;

    // ジャンプ
    if (jumpBuffer > 0) jumpBuffer--;
    if (p.bounceLock > 0) p.bounceLock--;
    if (jumpKey()) {
      if (!jumpHeld) {
        jumpBuffer = 8;                     // 押した瞬間（踏みつけ高ジャンプの受付）
        if (p.coyote > 0) {
          p.vy = -JUMP; p.coyote = 0; p.squash = 0.7; sfx.jump();
          spawnParticles(p.x + p.w/2, p.y + p.h, "#ffffff", 4);
        } else if (p.wing && !p.onGround && !p.gliding && !p.glideUsed) {
          // はねまるりん：ジャンプ中にもう一度Aで、少しの間ぷかぷか飛ぶ
          p.gliding = true; p.glideUsed = true; p.glideTimer = 78; p.glideT = 0;
          p.vy = -1.6; sfx.jump();
          spawnParticles(p.x + p.w/2, p.y + p.h/2, "#ffffff", 6);
        }
      }
      jumpHeld = true;
    } else {
      // 可変ジャンプ高さ（ただし踏みつけ高ジャンプ中は維持）
      if (p.bounceLock <= 0 && p.vy < -5) p.vy = -5;
      jumpHeld = false;
    }

    if (p.invuln > 0) p.invuln--;
    p.squash += (1 - p.squash) * 0.2;

    moveAndCollide();

    // 着地したら滑空をリセット（次のジャンプでまた飛べる）
    if (p.onGround) { p.gliding = false; p.glideUsed = false; }

    // コイン
    for (const c of coins) {
      if (!c.got && rectHit(p, c)) {
        c.got = true; coinsGot++; score += 100; sfx.coin();
        spawnParticles(c.x + c.w/2, c.y, "#ffd34d", 6);
      }
    }

    // ナッツ（パワーアップ）
    if (p.powerAnim > 0) p.powerAnim--;
    for (const n of nuts) {
      if (!n.got && rectHit(p, n)) {
        n.got = true; score += 300; sfx.power(); playVoice("get");
        p.powerAnim = 40;
        if (!p.powered) setPowered(true);
        spawnParticles(n.x + n.w/2, n.y + n.h/2, "#c98a3a", 10);
        spawnParticles(n.x + n.w/2, n.y + n.h/2, "#ffd34d", 6);
      }
    }

    // ひまわり（たねまるりんにパワーアップ）
    for (const f of flowers) {
      if (!f.got && rectHit(p, f)) {
        f.got = true; score += 500; sfx.power(); playVoice("get");
        p.powerAnim = 40;
        if (!p.powered) setPowered(true);
        p.seed = true; p.wing = false; p.gliding = false;
        spawnParticles(f.x + f.w/2, f.y + f.h/2, "#ffd34d", 12);
        spawnParticles(f.x + f.w/2, f.y + f.h/2, "#8a5a2c", 6);
      }
    }

    // はね（はねまるりんにパワーアップ）
    for (const f of feathers) {
      if (!f.got && rectHit(p, f)) {
        f.got = true; score += 500; sfx.power(); playVoice("get");
        p.powerAnim = 40;
        if (!p.powered) setPowered(true);
        p.wing = true; p.seed = false;
        spawnParticles(f.x + f.w/2, f.y + f.h/2, "#ffffff", 12);
        spawnParticles(f.x + f.w/2, f.y + f.h/2, "#bfe3ff", 8);
      }
    }

    // あわバリア：ダメージを1回だけ防ぐシャボン玉（どのサイズでも重ねてつけられる）
    for (const bb of bubbles) {
      if (!bb.got && rectHit(p, bb)) {
        bb.got = true; score += 500; sfx.power(); playVoice("get");
        p.powerAnim = 40; p.shield = true; p.shieldT = 0;
        spawnParticles(bb.x + bb.w/2, bb.y + bb.h/2, "#bfe9ff", 12);
        spawnParticles(bb.x + bb.w/2, bb.y + bb.h/2, "#ffffff", 6);
      }
    }

    // フランスパン（1UP）：ブロックから出て歩き、取るとライフ+1
    for (const br of breads) {
      if (br.got) continue;
      br.t++;
      // 横移動＋壁で反転
      br.x += br.vx;
      for (const s of solids) {
        if (rectHit(br, s)) {
          if (br.vx > 0) br.x = s.x - br.w; else br.x = s.x + s.w;
          br.vx *= -1; break;
        }
      }
      // 重力＋床
      br.vy += GRAVITY; if (br.vy > 12) br.vy = 12;
      br.y += br.vy;
      for (const s of solids) {
        if (rectHit(br, s) && br.vy > 0) { br.y = s.y - br.h; br.vy = 0; }
      }
      // まるりんが取ったら1UP
      if (rectHit(p, br)) {
        br.got = true; lives++; score += 500; sfx.win(); playVoice("get");
        spawnParticles(br.x + br.w/2, br.y, "#e7b96a", 12);
        particles.push({ x: br.x + br.w/2, y: br.y - 8, vx: 0, vy: -3, life: 55, color: "#fff", oneUp: true });
      }
    }
    breads = breads.filter(br => !br.got && br.y < LEVEL_H + 120);

    // 種の飛び道具の更新
    for (const sd of seeds) {
      sd.t++;
      sd.x += sd.vx;
      sd.life--;
      const box = { x: sd.x - 5, y: sd.y - 5, w: 10, h: 10 };
      // 壁・ブロックに当たったら消える
      for (const s of solids) { if (rectHit(box, s)) { sd.life = 0; break; } }
      // 敵に当てたら倒す
      for (const e of enemies) {
        if (e.alive && rectHit(box, e)) {
          e.alive = false; e.squash = 0.2; score += 200; sfx.stomp();
          spawnParticles(e.x + e.w/2, e.y, "#8a6d5a", 8);
          sd.life = 0; break;
        }
      }
    }
    seeds = seeds.filter(sd => sd.life > 0 && sd.x > camX - 60 && sd.x < camX + W + 120);

    // 敵
    for (const e of enemies) {
      if (!e.alive) continue;
      e.t++;
      if (e.fly) {
        // カラス：空を左右に往復＋上下にフワフワ
        e.x += e.vx;
        if (e.x < e.homeX - e.range) { e.x = e.homeX - e.range; e.vx *= -1; }
        else if (e.x > e.homeX + e.range) { e.x = e.homeX + e.range; e.vx *= -1; }
        e.y = e.baseY + Math.sin(e.t * 0.06) * 22;
      } else {
        e.x += e.vx;
        // 敵の床判定（簡易）：ブロックに当たったら反転
        let hitWall = false, hasFloor = false;
        for (const s of solids) {
          if (rectHit({x:e.x,y:e.y,w:e.w,h:e.h}, s)) {
            if (e.vx > 0) { e.x = s.x - e.w; hitWall = true; }
            else if (e.vx < 0) { e.x = s.x + s.w; hitWall = true; }
          }
        }
        // 足元に床があるか（端で落ちないように反転）
        const footX = e.vx > 0 ? e.x + e.w + 2 : e.x - 2;
        const footProbe = { x: footX, y: e.y + e.h + 2, w: 2, h: 4 };
        for (const s of solids) { if (rectHit(footProbe, s)) { hasFloor = true; break; } }
        if (hitWall || !hasFloor) e.vx *= -1;
      }
      if (e.canHop) {
        // ときどきぴょんと跳ねる（オンドリ・イワシ）
        e.hopCd--;
        if (e.onGround && e.hopCd <= 0) { e.vy = (e.kind === "sardine" ? -7.5 : -6.5); e.onGround = false; e.hopCd = 50 + Math.floor(Math.random()*60); }
        e.vy = (e.vy || 0) + GRAVITY; if (e.vy > 14) e.vy = 14;
        e.y += e.vy; e.onGround = false;
        for (const s of solids) {
          if (rectHit({ x: e.x, y: e.y, w: e.w, h: e.h }, s) && e.vy > 0 && (e.y + e.h) - s.y < 26) { e.y = s.y - e.h; e.vy = 0; e.onGround = true; }
        }
      }
      e.squash += (1 - e.squash) * 0.2;

      // プレイヤーとの衝突
      if (rectHit(p, e)) {
        const fromAbove = p.vy > 0 && (p.y + p.h) - e.y < 20;
        if (fromAbove) {
          e.alive = false; e.squash = 0.2;
          score += 200; sfx.stomp();
          // タイミングよくジャンプを押していれば高くジャンプ
          const timed = jumpKey() || jumpBuffer > 0;
          if (timed) {
            p.vy = -16; p.bounceLock = 14; jumpBuffer = 0; p.squash = 0.7;
            sfx.jump();
            spawnParticles(e.x + e.w/2, e.y - 6, "#ffffff", 6);
          } else {
            p.vy = -9;
          }
          spawnParticles(e.x + e.w/2, e.y, "#8a6d5a", 8);
        } else if (p.invuln <= 0) {
          hurtPlayer();
        }
      }
    }

    // タイランド：前からタイガーショット（上段）／グランドタイガーショット（下段）が飛んでくる
    if (tigerCd < 1e8 && !inBoss) {
      const nearGoal = goal && (p.x + p.w/2 > goal.x - 260);   // ゴール直前は撃たない（ボス戦へ）
      if (p.x > 7 * TILE && !nearGoal) {
        tigerCd--;
        if (tigerCd <= 0) { spawnTigerShot(); tigerCd = 120 + Math.floor(Math.random() * 90); }
      }
    }
    updateHazards();
    updateBalls();
    updateBarrels();

    // ゴール
    if (goal && p.x + p.w > goal.x - 10 && p.x < goal.x + 20 && p.y < goal.top + TILE*7) {
      if (p.x + p.w/2 > goal.x - 6) { winGame(); }
    }

    // カメラ
    const target = p.x + p.w/2 - W/2;
    camX += (target - camX) * 0.12;
    camX = Math.max(0, Math.min(LEVEL_W - W, camX));
  }

  function hurtPlayer() {
    const p = player;
    if (p.shield) {
      // あわバリアがはじけてダメージを防ぐ（ミスにならない・パワーアップは維持）
      p.shield = false; p.invuln = 90; p.powerAnim = 0;
      sfx.hurt();
      p.vy = -5; p.vx = -p.face * 3;
      spawnParticles(p.x + p.w/2, p.y + p.h/2, "#bfe9ff", 16);
      spawnParticles(p.x + p.w/2, p.y + p.h/2, "#ffffff", 8);
      return;
    }
    if (p.seed || p.wing) {
      // たね／はねまるりん → でかまるりんに戻る（ミスにならない）
      p.seed = false; p.wing = false; p.gliding = false;
      p.invuln = 90; p.powerAnim = 0;
      sfx.hurt(); playVoice("sad");
      p.vy = -6; p.vx = -p.face * 3;
      return;
    }
    if (p.powered) {
      // でかまるりん → ちびまるりんに戻る（ミスにならない）
      setPowered(false);
      p.invuln = 90;
      p.powerAnim = 0;
      sfx.hurt();
      playVoice("sad");   // 敵に当たったとき
      p.vy = -6; p.vx = -p.face * 3;
      return;
    }
    killPlayer();
  }

  function updateDead() {
    player.deadT++;
    player.vy += GRAVITY;
    player.y += player.vy;
    if (player.deadT > 90) {
      if (lives > 0) respawn();
      else state = "gameover";
    }
  }

  function respawn() {
    // パワーアップは解除
    player.powered = false; player.seed = false; player.w = 28; player.h = 30; player.powerAnim = 0;
    player.wing = false; player.gliding = false; player.glideUsed = false; player.shield = false;
    player.vx = 0; player.vy = 0;
    player.alive = true; player.deadT = 0;
    seeds = [];
    if (inBoss) {
      // ボス戦をやり直し（ボスも体力満タンで復活）
      if (STAGES[stageIndex].boss === "clovis") { if (clovisPhase2) setupBossArena(); else setupPK(); }
      else setupBossArena();
      startBGM();
      state = "boss";
      return;
    }
    // 通常：ステージを組み直して敵もアイテムも全部復活（プレイヤーも開始位置へ）
    buildLevel();
    player.invuln = 90;
    startBGM();
    state = "play";
  }

  function resetEnemies() {
    enemies = enemySpawns.map(s => makeEnemy(s.x, s.y, s));
  }

  // ゴール到達：ボスがいれば画面を切り替えてボス戦へ。いなければ従来どおりクリア
  function winGame() {
    if (state === "clear" || state === "stageclear" || state === "boss") return;
    if (STAGES[stageIndex].boss) { startBoss(); }
    else { stageCleared(); }
  }

  // ボス撃破 or ボス無しステージ：クリア処理
  function stageCleared() {
    inBoss = false; bosses = []; cukes = []; pk = null; sps = []; jets = [];
    player.winPose = 0;
    score += Math.max(0, 2000 - Math.floor(elapsed / 3));
    stopBGM();
    sfx.win();
    playVoice("get");   // クリア時
    if (STAGES[stageIndex].boss === "dramp") {
      startEnding();            // ドランプ撃破＝世界編フィナーレのムービーへ
    } else if (stageIndex < STAGES.length - 1) {
      state = "stageclear";     // まだ次のステージがある
      stageClearT = 0;
    } else {
      state = "clear";          // 全ステージクリア
    }
  }

  // ---------- ボス戦 ----------
  const BOSS_GROUND = 360;   // 闘技場の地面の上端
  // メガロドン戦（真ん中で割れた船：左右のデッキ＋中央の割れ目＋左右の端も海）
  const LDECK_L = 80,  LDECK_R = 320;   // 左のデッキ [80,320]
  const RDECK_L = 440, RDECK_R = 680;   // 右のデッキ [440,680]
  const GAP_L = 320, GAP_R = 440;       // 中央の割れ目（狭め・120px）
  const GAP_CX = (GAP_L + GAP_R) / 2;   // 割れ目の中央x（=380）
  const SEA_Y = 372;                    // 海の水面（サメのヒレが出る高さ）
  // デッキの外（[0,80] と [680,800]）も海＝落ちると水没

  // ボス登場時に出す名前
  function bossTitle() {
    const k = STAGES[stageIndex].boss;
    return k === "penguins" ? "ペギ＆ニセペギ" : k === "sumo" ? "こうよう" : k === "mega" ? "メガロドン" : k === "zagat" ? "ザガット" : k === "clovis" ? "クリウド" : k === "dramp" ? "ドランプ大統領" : "くりだいおう";
  }

  function startBoss() {
    inBoss = true;
    if (STAGES[stageIndex].boss === "dramp") drampPhase2 = false;   // ボスに初めて入るときは第1段階から
    if (STAGES[stageIndex].boss === "clovis") setupPK();   // ポルトガルはPK戦
    else setupBossArena();
    state = "boss";
    startBGM();               // ボス戦BGMに切り替え（あれば）
  }

  // 1画面の平らな闘技場を作り、プレイヤーとボスを配置
  function setupBossArena() {
    LEVEL_W = W; LEVEL_H = H; camX = 0;
    solids = []; coins = []; nuts = []; flowers = []; feathers = []; breads = [];
    enemies = []; questionBlocks = []; seeds = []; goal = null; particles = []; cukes = []; hazards = [];
    sps = []; jets = []; bigBoom = 0;
    const megaArena = STAGES[stageIndex].boss === "mega";
    for (let x = 0; x < W; x += TILE) {
      if (megaArena && !((x >= LDECK_L && x < LDECK_R) || (x >= RDECK_L && x < RDECK_R))) continue;   // デッキ以外は海（床なし）
      solids.push({ x, y: BOSS_GROUND, w: TILE, h: TILE, type: "ground" });
      solids.push({ x, y: BOSS_GROUND + TILE, w: TILE, h: TILE, type: "ground" });
    }
    const p = player;
    // メガロドン戦は中央が割れ目（海）なので左のデッキに立たせる
    p.x = (STAGES[stageIndex].boss === "mega") ? 150 : (W/2 - p.w/2);
    p.y = BOSS_GROUND - p.h; p.vx = 0; p.vy = 0;
    p.onGround = false; p.face = 1; p.invuln = 50;
    p.gliding = false; p.glideUsed = false; p.stun = 0;
    // ステージごとのボス編成
    const type = STAGES[stageIndex].boss;
    if (type === "penguins") {
      // にせぺぎ（左・投げ役）＋ ペギ（右・すばやい体当たり役）で挟み撃ち
      bosses = [ makeBoss("nisepegi", 120), makeBoss("pegi", W - 170) ];
    } else if (type === "sumo") {
      bosses = [ makeBoss("sumo", W - 180) ];
    } else if (type === "mega") {
      bosses = [ makeBoss("mega", 80) ];
    } else if (type === "zagat") {
      bosses = [ makeBoss("zagat", W - 150) ];
    } else if (type === "clovis") {
      bosses = [ makeBoss("clovis", W - 190) ];
    } else if (type === "dramp") {
      bosses = [ makeBoss("dramp", W/2 - 30) ];
      if (drampPhase2) startDrampPhase2(bosses[0]);   // やり直し時はSPをスキップして第2段階から
      else { drampSpWave = 1; spawnDrampSPs(2); }     // 1波目＝SP2人（倒すと2波目で3人）
    } else {
      bosses = [ makeBoss("kuri", W - 170) ];
    }
    const bb = BOSS_BGM[stageIndex];
    if (bb) { try { bb.currentTime = 0; } catch (e) {} }   // ボス曲を頭出し
    elapsed = 0;
    bossNutSpawned = false;   // このボス戦の10秒ナッツはまだ
  }

  // ボス戦の開始10秒後にナッツを出す（ちびまるりんでの再戦をやさしく）
  function spawnBossNut() {
    const megaBoss = STAGES[stageIndex].boss === "mega";
    const pcx = player.x + player.w/2;
    // メガロドンは中央が海なので、まるりんが今いるデッキの上に出す
    const nx = megaBoss ? (pcx < GAP_CX ? (LDECK_L + LDECK_R)/2 : (RDECK_L + RDECK_R)/2) : W/2;
    nuts.push({ x: nx - 14, y: BOSS_GROUND - 36, w: 28, h: 28, got: false, t: 0 });
    spawnParticles(nx, BOSS_GROUND - 22, "#ffd34d", 14);
    spawnParticles(nx, BOSS_GROUND - 22, "#c98a3a", 8);
    sfx.power();
  }

  function makeBoss(kind, x) {
    if (kind === "pegi") {
      // ペギ：すばやい・よくジャンプ・キュウリは投げない
      return { kind, name: "ペギ", x, y: BOSS_GROUND - 56, w: 48, h: 56,
        vx: -1, vy: 0, onGround: false, face: -1,
        hp: 2, maxHp: 2, stompDmg: 1, seedDmg: 1, hpPerHeart: 1,
        invuln: 0, hurtFlash: 0, t: Math.random()*40, squash: 1,
        jumpCd: 50 + Math.floor(Math.random()*30), speedBase: 2.6, throws: false, alive: true, dyingT: 0 };
    }
    if (kind === "nisepegi") {
      // にせぺぎ：のんびり・ジャンプしない・キュウリを山なりに投げる
      return { kind, name: "にせぺぎ", x, y: BOSS_GROUND - 56, w: 48, h: 56,
        vx: 1, vy: 0, onGround: false, face: 1,
        hp: 2, maxHp: 2, stompDmg: 1, seedDmg: 1, hpPerHeart: 1,
        invuln: 0, hurtFlash: 0, t: Math.random()*40, squash: 1,
        jumpCd: 1e9, throwCd: 70 + Math.floor(Math.random()*40), throwBase: 80, speedBase: 1.0, throws: true, alive: true, dyingT: 0 };
    }
    if (kind === "mega") {
      // メガロドン（巨大ザメ）：船のデッキの両脇の海にもぐり、水中から飛び出してデッキに乗り上げて攻撃。
      // もぐっている間は小魚を呼ぶ。飛び出して乗り上げた頭を踏む／種で当てる。
      // 踏み5回（8ダメージ×5=40）またはたね10発（4ダメージ×10=40）で撃破。ハート5個表示。
      // 反対デッキにまるりんがいると、割れ目を無視してまっすぐ突進してくる（cross）。
      return { kind, name: "メガロドン", x: GAP_CX - 59, y: SEA_Y - 40, w: 118, h: 72,
        vx: 0, vy: 0, onGround: false, face: 1,
        hp: 40, maxHp: 40, stompDmg: 8, seedDmg: 4, hpPerHeart: 8,
        invuln: 0, hurtFlash: 0, t: Math.random()*40, squash: 1,
        throws: false, alive: true, dyingT: 0,
        mode: "dive", side: -1, diveT: 60, windup: 0, chargeT: 0, chargeDir: 1, vulnerable: false, diveCx: GAP_CX,
        gull: { x: 120, y: 74, vx: 2.2, dropCd: 80 } };
    }
    if (kind === "zagat") {
      // ザガット（ムエタイの王者・オマージュ）：タイガーショット（上段）／グランドタイガーショット（下段）を
      // 前から撃ってくる。近づいてジャンプすると対空のタイガーアッパーカットで反撃。
      // 頭を踏む5回（8×5=40）またはたね8発（5×8=40）で撃破。ハート5個表示。
      return { kind, name: "ザガット", x, y: BOSS_GROUND - 96, w: 56, h: 96,
        vx: 0, vy: 0, onGround: false, face: -1,
        hp: 40, maxHp: 40, stompDmg: 8, seedDmg: 5, hpPerHeart: 8,
        invuln: 0, hurtFlash: 0, t: Math.random()*40, squash: 1,
        throws: false, alive: true, dyingT: 0,
        homeX: x, shotCd: 70, upperCd: 80, upperT: 0, nextLow: false, stepCd: 90,
        shotT: 0, shotLow: false };   // 撃つときの腕を伸ばすポーズ（下段はしゃがむ）
    }
    if (kind === "sumo") {
      // こうよう（子供力士）：ぶちかまし突進＋塩まき＋四股（地響きスタン）。踏み5回orたね5発で撃破。
      // HP半分以下で怒りモード（突進が速くなる＋ときどき2連続突進）。
      return { kind, name: "こうよう", x, y: BOSS_GROUND - 66, w: 66, h: 66,
        vx: -1, vy: 0, onGround: false, face: -1,
        hp: 5, maxHp: 5, stompDmg: 1, seedDmg: 1, hpPerHeart: 1,
        invuln: 0, hurtFlash: 0, t: Math.random()*40, squash: 1,
        jumpCd: 1e9, throwCd: 90 + Math.floor(Math.random()*40), throwBase: 110,
        charges: true, chargeCd: 150 + Math.floor(Math.random()*60), charging: false, chargeT: 0, windup: 0,
        shiko: false, shikoWind: 0, shikoCd: 180 + Math.floor(Math.random()*120), didDouble: false, raging: false,
        speedBase: 1.5, throws: true, alive: true, dyingT: 0 };
    }
    if (kind === "clovis") {
      // クリウド第2ラウンド（PKに勝つと発生）：サッカーのストライカー。
      // グラウンダーシュート（地を這うボール）／ドリブル突進／オーバーヘッド・ロブの3種で攻める。
      // 頭を踏む3回で撃破（たねでも削れる）。HP1で怒りモード（速い＋2連続）。
      return { kind, name: "クリウド", x, y: BOSS_GROUND - 114, w: 52, h: 114,
        vx: -1, vy: 0, onGround: false, face: -1,
        hp: 9, maxHp: 9, stompDmg: 3, seedDmg: 1, hpPerHeart: 3,   // 踏み3回／たね9発で撃破・ハート3個
        invuln: 0, hurtFlash: 0, t: Math.random()*40, squash: 1,
        throws: false, alive: true, dyingT: 0, raging: false,
        mode: "idle", actCd: 60, windup: 0, chargeT: 0, chargeDir: -1, shotDir: -1, didDouble: false, runup: 0, kickLeg: 0 };
    }
    if (kind === "dramp") {
      // ドランプ大統領（ステージ7・アメリカ／パロディ）＝2段階ボス。
      // 第1段階：高い演壇にいて無敵、SP3人が銃で守る（SPは踏んで倒す・タネは防弾で無効）。
      // 第2段階：暴走してミサイルボタン→30秒カウントダウン。戦闘機空爆/ハンバーガー/ゴルフ/突進で攻める。
      //          頭を3回踏んで倒す（30秒以内に倒せないとミサイル着弾＝負け）。HP1で怒りモード。
      return { kind, name: "ドランプ大統領", x, y: 96, w: 60, h: 92,
        vx: 0, vy: 0, onGround: false, face: -1,
        hp: 10, maxHp: 10, stompDmg: 2, seedDmg: 1, hpPerHeart: 2,   // 踏み5回／タネ10発・ハート5個
        invuln: 0, hurtFlash: 0, t: Math.random()*40, squash: 1,
        throws: false, alive: true, dyingT: 0,
        phase: 1, reachable: false, raging: false,
        mode: "idle", actCd: 60, windup: 0, chargeT: 0, chargeDir: -1, didDouble: false, runup: 0,
        burgerCd: 420, swingT: 0, shoutT: 0,   // バーガー回復のクールダウン／ゴルフのフォロースルー／演説シャウト
        missileT: 0, doomT: 0, balconyX: W/2 - 30, balconyY: 96 };
    }
    // クリだいおう（ステージ1）
    return { kind, name: "クリだいおう", x, y: BOSS_GROUND - 90, w: 96, h: 90,
      vx: -1.4, vy: 0, onGround: false, face: -1,
      hp: 15, maxHp: 15, stompDmg: 5, seedDmg: 3, hpPerHeart: 5,
      invuln: 0, hurtFlash: 0, t: Math.random()*40, squash: 1,
      jumpCd: 120, speedBase: 1.4, throws: false, alive: true, dyingT: 0 };
  }

  function damageBoss(b, seed) {
    b.hp -= seed ? b.seedDmg : b.stompDmg;
    b.invuln = seed ? 30 : 55;
    b.hurtFlash = b.invuln;
    b.squash = seed ? 0.8 : 0.6;
    sfx.stomp();
    const col = seed ? "#ffd34d" : (b.kind === "pegi" ? "#aed4e7" : (b.kind === "nisepegi" ? "#c8d27c" : (b.kind === "sumo" ? "#f6cfa4" : (b.kind === "mega" ? "#bfe1f0" : (b.kind === "zagat" ? "#ffb020" : "#a56b3e")))));
    spawnParticles(b.x + b.w/2, b.y + b.h*0.3, col, seed ? 6 : 10);
    if (b.hp <= 0) {
      b.hp = 0; b.alive = false; b.dyingT = 0; b.vx = 0;
      score += 1000; sfx.win(); playVoice("get");
    } else {
      score += seed ? 100 : 300;
    }
  }

  // にせぺぎがキュウリを、こうようが塩を山なりに投げる
  function throwCuke(b) {
    const p = player;
    const dir = (p.x + p.w/2) < (b.x + b.w/2) ? -1 : 1;
    const water = b.kind === "mega";
    const salt = b.kind === "sumo";
    const burger = b.kind === "dramp";
    const kind = water ? "water" : (salt ? "salt" : (burger ? "burger" : "cuke"));
    if (salt && b.raging) {
      // 怒りモード：塩を3つまく（扇状に近・中・遠へ）
      const specs = [[2.3, -9.0], [3.4, -8.2], [4.6, -7.2]];
      for (const s of specs) cukes.push({ x: b.x + b.w/2, y: b.y + 4, vx: dir * s[0], vy: s[1], t: 0, kind: "salt" });
    } else {
      cukes.push({ x: b.x + b.w/2, y: b.y + (salt ? 4 : 8), vx: dir * (water ? 2.6 + Math.random()*1.4 : 3.2 + Math.random()*1.6), vy: water ? -9.2 : (salt ? -8.4 : -7.6), t: 0, kind });
    }
    sfx.seed();
  }

  // こうようの四股：真上ジャンプ→着地の地響き。地上のまるりんは距離に関係なくスタン（ジャンプ中なら無事）
  function shikoImpact(b) {
    const p = player;
    const cx = b.x + b.w/2;
    b.squash = 0.45;
    screenShake = 26;                                   // 画面（地面）を揺らす
    sfx.stomp(); beep(90, 0.24, "sawtooth", 0.12);      // 重い地響き
    // 地上のまるりんをスタン（遠くてもスタン。空中＝ジャンプ中なら当たらない）
    if (p.onGround && p.stun <= 0) {
      p.stun = 45;
      spawnParticles(p.x + p.w/2, p.y + p.h, "#ffe38a", 12);
    }
    // 着地の土ぼこり＋左右に広がる地響きの波（見た目だけ）
    spawnParticles(cx, BOSS_GROUND, "#d8c9a0", 24);
    for (let i = 0; i < 6; i++) spawnParticles(cx + (Math.random()-0.5)*W*0.7, BOSS_GROUND, "#cabf9e", 2);
    cukes.push({ kind: "shock", x: cx - 18, y: BOSS_GROUND - 6, vx: -6, t: 0 });
    cukes.push({ kind: "shock", x: cx + 18, y: BOSS_GROUND - 6, vx: 6, t: 0 });
  }

  function updateCukes() {
    const p = player;
    for (const cu of cukes) {
      cu.t++;
      if (cu.kind === "shock") {   // 四股の地響きの波（見た目だけ・スタンは着地時に別途）
        cu.x += cu.vx; cu.vx *= 0.95;
        if (cu.t > 34 || cu.x < camX - 60 || cu.x > camX + W + 60) cu.dead = true;
        continue;
      }
      if (cu.kind === "tiger" || cu.kind === "gtiger") { stepTigerShot(cu, p); continue; }  // まっすぐ飛ぶ弾
      if (cu.kind === "bullet") {   // SPの銃弾（横に飛ぶ・ジャンプでよける・タネでは消せない）
        cu.x += cu.vx;
        const box = { x: cu.x - 6, y: cu.y - 4, w: 12, h: 8 };
        if (rectHit(p, box) && p.invuln <= 0) { cu.dead = true; hurtPlayer(); spawnParticles(cu.x, cu.y, "#ffd24a", 5); }
        if (cu.x < camX - 60 || cu.x > camX + W + 60) cu.dead = true;
        continue;
      }
      if (cu.kind === "shockwave") {   // 演説の衝撃波（地を這う・ジャンプでよける・タネ不可）
        cu.x += cu.vx;
        const box = { x: cu.x - 16, y: BOSS_GROUND - 22, w: 32, h: 22 };
        if (p.onGround && rectHit(p, box) && p.invuln <= 0) { hurtPlayer(); cu.dead = true; }
        if (cu.x < camX - 90 || cu.x > camX + W + 90) cu.dead = true;
        continue;
      }
      if (cu.kind === "golf") {   // ドランプのゴルフショット（山なりに飛んでバウンドして転がる）
        cu.vy += 0.42; cu.x += cu.vx; cu.y += cu.vy; cu.rot = (cu.rot || 0) + cu.vx * 0.14;
        if (cu.y > BOSS_GROUND - 8) {   // 地面でワンバウンド → 転がる
          cu.y = BOSS_GROUND - 8;
          if (cu.bounces < 2 && cu.vy > 1.5) { cu.vy = -cu.vy * 0.5; cu.vx *= 0.72; cu.bounces++; spawnParticles(cu.x, BOSS_GROUND - 4, "#dfe4ea", 4); beep(560, 0.03, "square", 0.04); }
          else { cu.vy = 0; }   // 転がりモード
        }
        const box = { x: cu.x - 8, y: cu.y - 8, w: 16, h: 16 };
        if (rectHit(p, box) && p.invuln <= 0) { cu.dead = true; hurtPlayer(); }
        else for (const sd of seeds) if (rectHit({ x: sd.x - 5, y: sd.y - 5, w: 10, h: 10 }, box)) { cu.dead = true; sd.life = 0; score += 50; sfx.stomp(); break; }
        if (cu.x < camX - 70 || cu.x > camX + W + 70) cu.dead = true;
        continue;
      }
      if (cu.kind === "bomb") {   // 戦闘機が落とす爆弾（着地で爆発・マーカーでよける）
        cu.vy += 0.4; cu.y += cu.vy;
        const box = { x: cu.x - 8, y: cu.y - 8, w: 16, h: 16 };
        let landed = false;
        for (const s of solids) if (rectHit(box, s)) { landed = true; break; }
        if (rectHit(p, box) && p.invuln <= 0) { cu.dead = true; hurtPlayer(); spawnParticles(cu.x, cu.y, "#ff7a1a", 12); screenShake = Math.max(screenShake, 10); }
        else if (landed || cu.y > BOSS_GROUND) { cu.dead = true; spawnParticles(cu.x, BOSS_GROUND - 4, "#ff7a1a", 16); spawnParticles(cu.x, BOSS_GROUND - 4, "#ffd24a", 10); screenShake = Math.max(screenShake, 12); beep(90, 0.18, "sawtooth", 0.1); }
        continue;
      }
      if (cu.kind === "missile") {   // 時間切れのミサイル（演出のみ・killPlayerは別途）
        cu.vy += 0.3; cu.y += cu.vy;
        if (cu.y > BOSS_GROUND - 10) { cu.dead = true; spawnParticles(cu.x, BOSS_GROUND - 10, "#ff5a1a", 40); spawnParticles(cu.x, BOSS_GROUND - 10, "#ffd24a", 30); screenShake = 40; bigBoom = 60; beep(45, 0.8, "sawtooth", 0.2); beep(80, 0.6, "square", 0.14); }
        continue;
      }
      if (cu.kind === "sball") {   // クリウドのグラウンダーシュート（地を這うボール・ジャンプでよける）
        cu.x += cu.vx; cu.rot = (cu.rot || 0) + cu.vx * 0.06;
        const box = { x: cu.x - 13, y: cu.y - 13, w: 26, h: 26 };
        if (rectHit(p, box) && p.invuln <= 0) { cu.dead = true; hurtPlayer(); }
        else for (const sd of seeds) {
          if (rectHit({ x: sd.x - 5, y: sd.y - 5, w: 10, h: 10 }, box)) { cu.dead = true; sd.life = 0; score += 50; sfx.stomp(); spawnParticles(cu.x, cu.y, "#ffffff", 8); break; }
        }
        if (cu.x < camX - 80 || cu.x > camX + W + 80) cu.dead = true;
        continue;
      }
      cu.vy += 0.42;                    // 山なりに落ちる
      cu.x += cu.vx; cu.y += cu.vy;
      const box = { x: cu.x - 10, y: cu.y - 6, w: 20, h: 12 };
      const puff = cu.kind === "salt" ? "#ffffff" : (cu.kind === "water" ? "#8fd0ee" : (cu.kind === "egg" ? "#f3e6c8" : (cu.kind === "lob" ? "#ffffff" : (cu.kind === "burger" ? "#e0a94a" : "#6cae3e"))));
      // 地面に落ちたら割れる
      for (const s of solids) { if (rectHit(box, s)) { cu.dead = true; spawnParticles(cu.x, cu.y, puff, 6); break; } }
      // たねで撃ち落とせる
      if (!cu.dead) for (const sd of seeds) {
        if (rectHit({ x: sd.x-5, y: sd.y-5, w: 10, h: 10 }, box)) { cu.dead = true; sd.life = 0; score += 50; sfx.stomp(); spawnParticles(cu.x, cu.y, cu.kind === "salt" ? "#ffffff" : (cu.kind === "water" ? "#8fd0ee" : (cu.kind === "egg" ? "#f3e6c8" : "#8cc655")), 8); break; }
      }
      // プレイヤーに当たると被弾
      if (!cu.dead && rectHit(p, box) && p.invuln <= 0) { cu.dead = true; hurtPlayer(); }
      if (cu.y > LEVEL_H + 40 || cu.x < -40 || cu.x > LEVEL_W + 40) cu.dead = true;
    }
    cukes = cukes.filter(cu => !cu.dead);
  }

  // タイガーショット（上段=tiger／下段=gtiger）：まっすぐ飛ぶ。ステージでもボス戦でも共通の当たり処理。
  const TIGER_HIGH_Y = 300;   // 上段の高さ（地上のまるりんの頭より上＝ジャンプすると当たる）
  const TIGER_LOW_Y  = 348;   // 下段の高さ（地面すれすれ＝ジャンプでよける）
  function stepTigerShot(cu, p) {
    cu.x += cu.vx;
    const high = cu.kind === "tiger";
    const box = high ? { x: cu.x - 15, y: cu.y - 13, w: 30, h: 24 }
                     : { x: cu.x - 16, y: cu.y - 10, w: 32, h: 20 };
    // タイガーショットはたねを貫通する（たねでは消せない）ので、種との判定はしない
    if (rectHit(p, box) && p.invuln <= 0) { cu.dead = true; hurtPlayer(); spawnParticles(cu.x, cu.y, "#ff7a1a", 8); return; }
    if (cu.x < camX - 100 || cu.x < -60 || cu.x > LEVEL_W + 80) cu.dead = true;
  }

  // ステージ中（タイランド）に前から飛んでくるタイガーショット
  function spawnTigerShot() {
    const high = Math.random() < 0.5;
    playVoice(high ? "tiger" : "gtiger");   // ステージでも撃った瞬間に掛け声（飛来の合図）
    hazards.push({ kind: high ? "tiger" : "gtiger", x: camX + W + 30,
                   y: high ? TIGER_HIGH_Y : TIGER_LOW_Y, vx: -3.4, t: 0 });
  }
  function updateHazards() {
    if (!hazards.length) return;
    const p = player;
    for (const h of hazards) { h.t++; stepTigerShot(h, p); }
    hazards = hazards.filter(h => !h.dead);
  }

  // ポルトガル：蹴れるサッカーボール。まるりんが触れると向いている方向へ蹴り出し、
  // 転がったボールが当たった敵を（まとめて）倒す。壁で跳ね返り、止まるとまた蹴れる。
  function updateBalls() {
    if (!balls.length) return;
    const p = player;
    for (const ball of balls) {
      // 重力
      ball.vy += GRAVITY; if (ball.vy > 16) ball.vy = 16;
      // 横移動＋壁で跳ね返る
      ball.x += ball.vx;
      for (const s of solids) {
        if (rectHit(ball, s)) {
          if (ball.vx > 0) { ball.x = s.x - ball.w; ball.vx = -Math.abs(ball.vx) * 0.5; }
          else if (ball.vx < 0) { ball.x = s.x + s.w; ball.vx = Math.abs(ball.vx) * 0.5; }
        }
      }
      // 縦移動＋床
      ball.y += ball.vy; ball.onGround = false;
      for (const s of solids) {
        if (rectHit(ball, s)) {
          if (ball.vy > 0) { ball.y = s.y - ball.h; ball.vy = 0; ball.onGround = true; }
          else if (ball.vy < 0) { ball.y = s.y + s.h; ball.vy = 0; }
        }
      }
      // ころがり摩擦（地面の上）
      if (ball.onGround) ball.vx *= 0.985;
      if (Math.abs(ball.vx) < 0.35) ball.vx = 0;
      ball.rot = (ball.rot || 0) + ball.vx * 0.08;
      // 場外（画面の左右・レベル外）で消える
      if (ball.x + ball.w < camX - 120 || ball.y > LEVEL_H + 120) { ball.dead = true; continue; }
      // まるりんが触れたら蹴る（ゆっくりのボールだけ＝連続で押せる）
      if (rectHit(p, ball) && Math.abs(ball.vx) < 2.2) {
        ball.vx = p.face * 8.4; ball.vy = -3.2; ball.onGround = false;
        sfx.stomp();
        spawnParticles(ball.x + ball.w/2, ball.y + ball.h, "#ffffff", 5);
      }
      // 転がっているボールは当たった敵・樽を倒す（ボウリングのようにまとめて）
      if (Math.abs(ball.vx) > 2.5) {
        for (const e of enemies) {
          if (e.alive && rectHit(ball, e)) {
            e.alive = false; e.squash = 0.2; score += 200; sfx.stomp();
            spawnParticles(e.x + e.w/2, e.y, "#c0d0e0", 8);
            ball.vx *= 0.92;
          }
        }
        for (const bl of barrels) {
          if (!bl.dead && rectHit(ball, bl)) {
            bl.dead = true; score += 100; sfx.stomp();
            spawnParticles(bl.x + bl.w/2, bl.y, "#7a3b1a", 10);
            ball.vx *= 0.9;
          }
        }
      }
    }
    balls = balls.filter(b => !b.dead);
  }

  // ポルトガル：ポルトワインの樽が前から転がってくる。蹴れない・当たると被弾（ジャンプでよける）。
  function spawnBarrel() {
    barrels.push({ x: camX + W + 40, y: GROUND_Y - 34, w: 34, h: 34, vx: -3.0, vy: 0, rot: 0 });
  }
  function updateBarrels() {
    // 出現（ステージ中だけ・ゴール手前では出さない）
    if (barrelCd < 1e8 && !inBoss) {
      const p = player;
      const nearGoal = goal && (p.x + p.w/2 > goal.x - 260);
      if (p.x > 7 * TILE && !nearGoal) {
        barrelCd--;
        if (barrelCd <= 0) { spawnBarrel(); barrelCd = 200 + Math.floor(Math.random() * 160); }
      }
    }
    if (!barrels.length) return;
    const p = player;
    for (const bl of barrels) {
      if (bl.dead) continue;   // ボールですでに壊れた樽はスキップ
      bl.vy += GRAVITY; if (bl.vy > 16) bl.vy = 16;
      bl.x += bl.vx; bl.y += bl.vy;
      for (const s of solids) {
        if (rectHit(bl, s) && bl.vy > 0 && (bl.y + bl.h) - s.y < 30) { bl.y = s.y - bl.h; bl.vy = 0; }
      }
      bl.rot += bl.vx * 0.05;
      // まるりんとの当たり：上から踏めば壊せる／横からは被弾
      if (rectHit(p, bl)) {
        const fromAbove = p.vy > 0 && (p.y + p.h) - bl.y < bl.h * 0.6 + Math.max(0, p.vy);
        if (fromAbove) {
          bl.dead = true; sfx.stomp(); score += 100;
          spawnParticles(bl.x + bl.w/2, bl.y, "#7a3b1a", 12);
          const timed = jumpKey() || jumpBuffer > 0;
          p.vy = timed ? -15 : -9; p.bounceLock = 12; jumpBuffer = 0; p.squash = 0.7;
          p.invuln = Math.max(p.invuln, 8);
        } else if (p.invuln <= 0) {
          bl.dead = true; spawnParticles(bl.x + bl.w/2, bl.y, "#7a3b1a", 10); hurtPlayer();
        }
      }
      // タネで壊せる
      if (!bl.dead) for (const sd of seeds) {
        if (rectHit({ x: sd.x - 5, y: sd.y - 5, w: 10, h: 10 }, bl)) {
          bl.dead = true; sd.life = 0; score += 100; sfx.stomp();
          spawnParticles(bl.x + bl.w/2, bl.y, "#7a3b1a", 10); break;
        }
      }
      if (bl.x + bl.w < camX - 140 || bl.y > LEVEL_H + 120) bl.dead = true;
    }
    barrels = barrels.filter(b => !b.dead);
  }

  function updateBossOnly() {
    const p = player;
    if (!bosses.length) return;

    for (const b of bosses) {
      b.t++;
      if (b.invuln > 0) b.invuln--;
      if (b.hurtFlash > 0) b.hurtFlash--;

      if (!b.alive) {
        // 撃破演出：つぶれて消える
        b.dyingT++;
        b.squash += (0.15 - b.squash) * 0.2;
        if (b.dyingT % 8 === 0) spawnParticles(b.x + b.w/2, b.y + b.h/2, "#ffd34d", 5);
        continue;
      }

      b.squash += (1 - b.squash) * 0.2;
      if (b.kind === "mega") { updateMega(b); continue; }
      if (b.kind === "zagat") { updateZagat(b); continue; }
      if (b.kind === "clovis") { updateClovis(b); continue; }
      if (b.kind === "dramp") { updateDramp(b); continue; }
      const phase = b.kind === "kuri" ? (b.hp <= 5 ? 2 : (b.hp <= 10 ? 1 : 0)) : 0;
      let speed = b.speedBase + phase * 0.7;
      // こうよう：構え（windup）→ 突進（charging）＋ 四股（真上ジャンプ→着地でスタン）＋ 怒りモード
      if (b.charges) {
        const raging = b.hp <= 2;   // HP半分以下（5の半分）で怒りモード
        b.raging = raging;
        if (b.shiko) {
          speed = 0;   // 四股でジャンプ中：横移動なし（着地は共通の重力処理→着地でスタン）
        } else if (b.shikoWind > 0) {
          b.shikoWind--; speed = 0;                     // ジャンプ前のしゃがみ（ため）
          if (b.shikoWind === 0) { b.vy = -14; b.shiko = true; b.onGround = false; sfx.jump(); }   // 真上にジャンプ
        } else if (b.windup > 0) {
          b.windup--; speed = 0;                       // しこの構え中は止まる
        } else if (b.charging) {
          speed = raging ? 8.8 : 6.2; b.chargeT--;      // 突進中は高速（怒りでさらに速い）
          if (b.chargeT <= 0) {
            if (raging && !b.didDouble && Math.random() < 0.5) {
              // 怒りモード：振り返ってもう一度突進（2連続）
              b.didDouble = true;
              b.vx = (p.x + p.w/2 < b.x + b.w/2) ? -1 : 1;
              b.windup = 9; b.chargeT = 46;             // 短い構え → 再突進（chargingは維持）
            } else {
              b.charging = false; b.didDouble = false;
              b.chargeCd = (raging ? 85 : 150) + Math.floor(Math.random()*90);
            }
          }
        } else {
          b.chargeCd--; b.shikoCd--;
          if (b.chargeCd <= 0 && b.onGround) {          // まるりんの方を向いて構える → 突進
            b.vx = (p.x + p.w/2 < b.x + b.w/2) ? -1 : 1;
            b.windup = 18; b.charging = true; b.chargeT = 46;
          } else if (b.shikoCd <= 0 && b.onGround) {    // 四股：ためて真上にジャンプ→着地で地響き
            b.shikoWind = 16; b.shikoCd = (raging ? 160 : 260) + Math.floor(Math.random()*120);
          }
        }
      }
      // 横移動＋壁で反転
      b.x += (b.vx > 0 ? 1 : -1) * speed;
      if (b.x < 16) { b.x = 16; b.vx = Math.abs(b.vx); }
      if (b.x + b.w > W - 16) { b.x = W - 16 - b.w; b.vx = -Math.abs(b.vx); }
      b.face = b.vx > 0 ? 1 : -1;
      // ジャンプ（にせぺぎはしない）
      const busy = b.charges && (b.charging || b.windup > 0 || b.shiko || b.shikoWind > 0);
      if (b.jumpCd < 1e8) {
        b.jumpCd--;
        if (b.onGround && b.jumpCd <= 0 && !busy) {
          b.vy = (b.kind === "pegi") ? -13.5 : (b.kind === "mega" ? -13.5 : (-12.5 - phase * 1.6));
          b.jumpCd = (b.kind === "pegi" ? 55 : (b.kind === "mega" ? 150 : 140 - phase * 30)) + Math.floor(Math.random()*30);
        }
      }
      // キュウリを投げる（にせぺぎ）／塩をまく（こうよう）／水しぶき（メガロドン）
      if (b.throws && b.onGround && !busy) {
        b.throwCd--;
        if (b.throwCd <= 0) { throwCuke(b); b.throwCd = (b.throwBase || 80) + Math.floor(Math.random()*50); }
      }
      // 重力＋床
      b.vy += GRAVITY; if (b.vy > 18) b.vy = 18;
      b.y += b.vy; b.onGround = false;
      for (const s of solids) {
        if (rectHit(b, s) && b.vy > 0 && (b.y + b.h) - s.y < 42) { b.y = s.y - b.h; b.vy = 0; b.onGround = true; }
      }
      // 四股の着地：ドスンと地響き → 地上のまるりんをスタン（遠くてもスタン。ジャンプ中は無事）
      if (b.kind === "sumo" && b.shiko && b.onGround) { b.shiko = false; shikoImpact(b); }
      // プレイヤーとの当たり（足がボスの上のほうにあれば踏みつけ。速い・小さいボスでも踏めるように寛容に）
      if (rectHit(p, b)) {
        const fromAbove = p.vy > 0 && (p.y + p.h) - b.y < b.h * 0.7 + Math.max(0, p.vy);
        if (fromAbove) {
          if (b.invuln <= 0) damageBoss(b, false);
          const timed = jumpKey() || jumpBuffer > 0;
          p.vy = timed ? -15 : -10; p.bounceLock = 12; jumpBuffer = 0; p.squash = 0.7;
          p.invuln = Math.max(p.invuln, 8);   // 踏んだ直後の誤爆被弾を防ぐ
        } else if (p.invuln <= 0) {
          hurtPlayer();
        }
      }
      // たね vs ボス
      if (b.invuln <= 0) {
        for (const sd of seeds) {
          if (rectHit({ x: sd.x - 5, y: sd.y - 5, w: 10, h: 10 }, b)) { damageBoss(b, true); sd.life = 0; break; }
        }
      }
    }

    // くっつき防止：生きてる2体が近すぎたら反転して離す
    const alive = bosses.filter(b => b.alive);
    if (alive.length === 2) {
      const [a, c] = alive;
      if (Math.abs((a.x + a.w/2) - (c.x + c.w/2)) < 90) {
        if (a.x < c.x) { a.vx = -Math.abs(a.vx); c.vx = Math.abs(c.vx); }
        else { a.vx = Math.abs(a.vx); c.vx = -Math.abs(c.vx); }
      }
    }

    updateCukes();

    // 全ボス撃破＆演出終了 → クリア
    if (bosses.every(b => !b.alive && b.dyingT > 90)) stageCleared();
  }

  // クリウド第2ラウンド（PK勝利後の直接対決）：3種のサッカー攻撃で攻める。
  // グラウンダーシュート（地を這うボール）／ドリブル突進／オーバーヘッド・ロブ。頭を3回踏むと撃破。
  function updateClovis(b) {
    const p = player;
    const raging = b.hp <= 3;   // 残りハート1つ（HP3以下）で怒りモード（速い＋2連続）
    b.raging = raging;
    const pcx = p.x + p.w/2, bcx = b.x + b.w/2;
    b.runup = (b.mode === "dribble" || b.mode === "dribwind") ? b.runup + 1 : 0;

    if (b.mode === "idle") {
      b.face = pcx < bcx ? -1 : 1;
      // 適度な間合いを保ちながら左右に動く
      const target = pcx < bcx ? pcx + 210 : pcx - 210;
      if (Math.abs(bcx - target) > 10) b.x += Math.sign(target - bcx) * (raging ? 2.5 : 1.8);
      b.actCd--;
      if (b.actCd <= 0 && b.onGround) chooseClovisAttack(b);
    } else if (b.mode === "grounder") {
      b.face = b.shotDir;
      b.kickLeg = Math.max(0, b.kickLeg - 0.1);
      b.windup--;
      if (b.windup === 0) { spawnGrounder(b); b.kickLeg = 1; }
      if (b.windup <= -16) endClovisAttack(b);
    } else if (b.mode === "lobwind") {
      b.windup--;
      if (b.windup <= 0) { spawnLob(b); b.mode = "lobrec"; b.windup = 26; b.kickLeg = 1; }
    } else if (b.mode === "lobrec") {
      b.kickLeg = Math.max(0, b.kickLeg - 0.08);
      b.windup--; if (b.windup <= 0) endClovisAttack(b);
    } else if (b.mode === "dribwind") {
      b.face = b.chargeDir;
      b.windup--; if (b.windup <= 0) { b.mode = "dribble"; b.chargeT = raging ? 78 : 62; }
    } else if (b.mode === "dribble") {
      b.face = b.chargeDir;
      b.x += b.chargeDir * (raging ? 8.4 : 6.6);
      b.chargeT--;
      if (b.chargeT <= 0) { b.mode = "dribrec"; b.windup = 22; }
    } else if (b.mode === "dribrec") {   // 突進の終わり＝スキ（ここを踏む）
      b.windup--;
      if (b.windup <= 0) {
        if (raging && !b.didDouble && Math.random() < 0.5) {
          b.didDouble = true; b.chargeDir = pcx < bcx ? -1 : 1; b.mode = "dribwind"; b.windup = 10;
        } else { b.didDouble = false; endClovisAttack(b); }
      }
    }

    // 壁で位置制限（突進中は跳ね返る）
    if (b.x < 16) { b.x = 16; if (b.mode === "dribble") b.chargeDir = 1; }
    if (b.x + b.w > W - 16) { b.x = W - 16 - b.w; if (b.mode === "dribble") b.chargeDir = -1; }

    // 重力＋床
    b.vy += GRAVITY; if (b.vy > 18) b.vy = 18;
    b.y += b.vy; b.onGround = false;
    for (const s of solids) {
      if (rectHit(b, s) && b.vy > 0 && (b.y + b.h) - s.y < 42) { b.y = s.y - b.h; b.vy = 0; b.onGround = true; }
    }

    // 踏みつけ／体当たり
    if (rectHit(p, b)) {
      const fromAbove = p.vy > 0 && (p.y + p.h) - b.y < b.h * 0.55 + Math.max(0, p.vy);
      if (fromAbove) {
        if (b.invuln <= 0) damageBoss(b, false);
        const timed = jumpKey() || jumpBuffer > 0;
        p.vy = timed ? -15 : -10; p.bounceLock = 12; jumpBuffer = 0; p.squash = 0.7;
        p.invuln = Math.max(p.invuln, 8);
      } else if (p.invuln <= 0) hurtPlayer();
    }
    // たね
    if (b.invuln <= 0) for (const sd of seeds) {
      if (rectHit({ x: sd.x - 5, y: sd.y - 5, w: 10, h: 10 }, b)) { damageBoss(b, true); sd.life = 0; break; }
    }
  }
  function chooseClovisAttack(b) {
    const p = player;
    b.face = (p.x + p.w/2 < b.x + b.w/2) ? -1 : 1;
    const r = Math.random();
    if (r < 0.4)      { b.mode = "grounder"; b.windup = 16; b.shotDir = b.face; }
    else if (r < 0.72){ b.mode = "lobwind";  b.windup = 22; }
    else              { b.mode = "dribwind"; b.windup = 16; b.chargeDir = b.face; }
  }
  function endClovisAttack(b) { b.mode = "idle"; b.windup = 0; b.actCd = (b.raging ? 34 : 66) + Math.floor(Math.random()*46); }
  function spawnGrounder(b) {
    const dir = b.shotDir || b.face;
    cukes.push({ kind: "sball", x: b.x + b.w/2 + dir*26, y: BOSS_GROUND - 13, vx: dir * (b.raging ? 7.6 : 6.1), t: 0, rot: 0 });
    sfx.stomp();
    spawnParticles(b.x + b.w/2 + dir*26, BOSS_GROUND - 6, "#ffffff", 5);
  }
  function spawnLob(b) {
    const p = player;
    const sx = b.x + b.w/2, sy = b.y + 12;
    const tx = Math.max(44, Math.min(W - 44, p.x + p.w/2));
    const T = 46, g = 0.42;
    const vy0 = (BOSS_GROUND - sy - 0.5*g*T*T) / T;   // T フレームで地面に落ちる山なり
    cukes.push({ kind: "lob", x: sx, y: sy, vx: (tx - sx)/T, vy: vy0, t: 0, markX: tx });
    sfx.seed();
  }

  // ===== ドランプ大統領（ステージ7・アメリカ）＝2段階ボス =====
  function spawnDrampSPs(n) {
    n = n || 3;
    sps = [];
    const xs = n === 2 ? [W*0.32, W*0.68] : [W*0.25, W*0.5, W*0.75];
    for (let i = 0; i < n; i++) {
      sps.push({ x: xs[i] - 16, y: BOSS_GROUND - 44, w: 32, h: 44, vx: (i % 2 ? 1 : -1) * 1.5, vy: 0, onGround: false, face: 1,
        alive: true, dyingT: 0, t: Math.random()*30, squash: 1, invuln: 0, hurtFlash: 0,
        shootCd: 50 + i*28 + Math.floor(Math.random()*40) });
    }
  }
  function spawnBullet(s) {
    const p = player;
    const dir = (p.x + p.w/2 < s.x + s.w/2) ? -1 : 1;
    s.face = dir;
    cukes.push({ kind: "bullet", x: s.x + s.w/2 + dir*16, y: s.y + 14, vx: dir * 6.4, t: 0 });
    beep(520, 0.04, "square", 0.05);
  }
  function updateDrampSPs() {
    const p = player;
    for (const s of sps) {
      if (!s.alive) { s.dyingT++; s.squash += (0.2 - s.squash) * 0.2; continue; }
      s.t++;
      if (s.invuln > 0) s.invuln--;
      if (s.hurtFlash > 0) s.hurtFlash--;
      s.squash += (1 - s.squash) * 0.2;
      s.x += s.vx;
      if (s.x < 16) { s.x = 16; s.vx = Math.abs(s.vx); }
      if (s.x + s.w > W - 16) { s.x = W - 16 - s.w; s.vx = -Math.abs(s.vx); }
      s.face = (p.x + p.w/2 < s.x + s.w/2) ? -1 : 1;
      s.vy += GRAVITY; if (s.vy > 18) s.vy = 18;
      s.y += s.vy; s.onGround = false;
      for (const sol of solids) if (rectHit(s, sol) && s.vy > 0 && (s.y + s.h) - sol.y < 42) { s.y = sol.y - s.h; s.vy = 0; s.onGround = true; }
      s.shootCd--;
      if (s.shootCd <= 0 && s.onGround) { spawnBullet(s); s.shootCd = 80 + Math.floor(Math.random()*70); }
      if (rectHit(p, s)) {
        const fromAbove = p.vy > 0 && (p.y + p.h) - s.y < s.h * 0.6 + Math.max(0, p.vy);
        if (fromAbove) {
          s.alive = false; s.dyingT = 0; s.squash = 0.3; sfx.stomp(); score += 300;
          spawnParticles(s.x + s.w/2, s.y + s.h*0.3, "#222", 12);
          const timed = jumpKey() || jumpBuffer > 0; p.vy = timed ? -15 : -10; p.bounceLock = 12; jumpBuffer = 0; p.squash = 0.7; p.invuln = Math.max(p.invuln, 8);
        } else if (p.invuln <= 0) hurtPlayer();
      }
      // タネは防弾チョッキで効かない（消えるだけ）
      for (const sd of seeds) if (rectHit({ x: sd.x - 5, y: sd.y - 5, w: 10, h: 10 }, s)) { sd.life = 0; spawnParticles(sd.x, sd.y, "#cfcfcf", 4); beep(280, 0.03, "square", 0.05); break; }
    }
  }
  function updateDramp(b) {
    if (b.phase === 1) {
      const p = player;
      // ドランプは演壇の上（無敵）。左右にゆれてまるりんの方を向く。
      b.face = (p.x + p.w/2 < b.x + b.w/2) ? -1 : 1;
      b.x = b.balconyX + Math.sin(b.t * 0.03) * 12;
      b.y = b.balconyY; b.onGround = true; b.invuln = 5;   // 無敵
      updateDrampSPs();
      if (sps.length && sps.every(s => !s.alive && s.dyingT > 24)) {
        if (drampSpWave < 2) { drampSpWave = 2; spawnDrampSPs(3); sfx.stomp(); }   // 2波目＝SP3人

      }

    }
    updateDrampPhase2(b);
  }
  function startDrampPhase2(b) {
    drampPhase2 = true;
    b.phase = 2; b.reachable = true; b.invuln = 40;
    b.x = W/2 - b.w/2; b.y = BOSS_GROUND - b.h; b.vx = 0; b.vy = 0; b.onGround = true;
    b.mode = "idle"; b.actCd = 46; b.missileT = 1200; b.doomT = 0;   // 20秒（60fps×20）
    b.burgerCd = 420; b.swingT = 0; b.shoutT = 0;   // 回復は約7秒後から1回だけ
    sps = [];
    screenShake = 22;
    sfx.stomp(); beep(70, 0.45, "sawtooth", 0.14);   // ミサイルボタンのブザー
  }
  function chooseDrampAttack(b) {
    const p = player; b.face = (p.x + p.w/2 < b.x + b.w/2) ? -1 : 1;
    // ハンバーガーを食べて回復（HPが減っているときだけ・20秒に1回くらい＝クールダウン制）
    if (b.burgerCd <= 0 && b.hp < b.maxHp) { b.mode = "burgereat"; b.windup = 64; return; }
    // 攻撃技：ゴルフ／演説シャウト（地を這う衝撃波）／戦闘機空爆／突進
    const r = Math.random();
    if (r < 0.34)      { b.mode = "golfwind";   b.windup = 22; }   // 振りかぶりを長めに＝スイングが分かる
    else if (r < 0.60) { b.mode = "shoutwind";  b.windup = 20; }   // 新技：演説の衝撃波
    else if (r < 0.80) { b.mode = "jetwind";    b.windup = 18; }
    else               { b.mode = "chargewind"; b.windup = 16; b.chargeDir = b.face; }
  }
  // 演説シャウト：左右に地を這う衝撃波（ジャンプでよける・タネ不可）
  function spawnShout(b) {
    for (const dir of [-1, 1]) cukes.push({ kind: "shockwave", x: b.x + b.w/2, y: BOSS_GROUND, vx: dir * (b.raging ? 6.2 : 5), t: 0 });
    beep(170, 0.18, "sawtooth", 0.12); beep(110, 0.22, "sawtooth", 0.1);
    screenShake = Math.max(screenShake, 10);
  }
  function endDrampAttack(b) { b.mode = "idle"; b.windup = 0; b.actCd = (b.raging ? 26 : 50) + Math.floor(Math.random()*36); }
  function spawnGolf(b) {
    const dir = b.face;
    // ゴルフスイングで高く打ち上げる → 山なりに飛んでワンバウンドして転がる（本物のゴルフっぽい弾道）
    cukes.push({ kind: "golf", x: b.x + b.w/2 + dir*24, y: BOSS_GROUND - 44,
      vx: dir * (b.raging ? 6.6 : 5.4), vy: -(b.raging ? 11 : 9.5), t: 0, rot: 0, bounces: 0 });
    beep(240, 0.06, "square", 0.06); beep(760, 0.05, "square", 0.05);   // スパーン！というインパクト音
    spawnParticles(b.x + b.w/2 + dir*24, BOSS_GROUND - 40, "#ffffff", 6);
  }
  function spawnJet(b) {
    const p = player;
    const fromLeft = Math.random() < 0.5;
    jets.push({ x: fromLeft ? -70 : W + 70, y: 102 + Math.random()*22, vx: fromLeft ? 7 : -7,
      dropX: Math.max(44, Math.min(W - 44, p.x + p.w/2)), dropped: false, t: 0 });
    beep(300, 0.3, "sawtooth", 0.08);
  }
  function updateJets() {
    for (const j of jets) {
      j.t++; j.x += j.vx;
      if (!j.dropped && ((j.vx > 0 && j.x >= j.dropX) || (j.vx < 0 && j.x <= j.dropX))) {
        j.dropped = true;
        cukes.push({ kind: "bomb", x: j.x, y: j.y + 12, vx: 0, vy: 1.6, t: 0, markX: j.dropX });
      }
      if (j.x < -90 || j.x > W + 90) j.dead = true;
    }
    jets = jets.filter(j => !j.dead);
  }
  function drampMissileHit(b) {
    b.doomT = 90;   // 着弾の大爆発を見せてからゲームオーバー
    screenShake = 30;
    cukes.push({ kind: "missile", x: player.x + player.w/2, y: -60, vx: 0, vy: 13, t: 0 });
    beep(60, 0.7, "sawtooth", 0.16);
  }
  function updateDrampPhase2(b) {
    const p = player;
    if (b.doomT > 0) { b.doomT--; if (b.doomT === 0) killPlayer(); updateJets(); return; }
    b.missileT--;
    if (b.missileT <= 0) { drampMissileHit(b); return; }
    const raging = b.hp <= 2; b.raging = raging;
    const pcx = p.x + p.w/2, bcx = b.x + b.w/2;
    b.runup = (b.mode === "charge" || b.mode === "chargewind") ? b.runup + 1 : 0;
    if (b.burgerCd > 0) b.burgerCd--;
    if (b.swingT > 0) b.swingT--;
    if (b.shoutT > 0) b.shoutT--;

    if (b.mode === "idle") {
      b.face = pcx < bcx ? -1 : 1;
      const target = pcx < bcx ? pcx + 200 : pcx - 200;
      if (Math.abs(bcx - target) > 10) b.x += Math.sign(target - bcx) * (raging ? 2.5 : 1.8);
      b.actCd--; if (b.actCd <= 0 && b.onGround) chooseDrampAttack(b);
    } else if (b.mode === "burgereat") {
      b.windup--;
      // かじるたびにパンくずが飛ぶ（マイクラの食事っぽく）
      if (b.windup > 8 && b.windup % 10 === 0) { spawnParticles(b.x + b.w * (b.face > 0 ? 0.7 : 0.3), b.y + 16, "#d9a24a", 4); sfx.stomp && beep(300 + Math.random()*80, 0.04, "square", 0.05); }
      if (b.windup === 26) {   // 食べ終わりに1ライフ（ハート1個ぶん）回復
        b.hp = Math.min(b.maxHp, b.hp + b.hpPerHeart);
        b.burgerCd = 100000;   // このボス戦ではもう食べない（20秒に1回くらい）
        beep(420, 0.09, "square", 0.09); beep(640, 0.09, "square", 0.07);
        spawnParticles(b.x + b.w/2, b.y + 8, "#7ee07e", 16);
      }
      if (b.windup <= 0) { b.mode = "rec"; b.windup = 12; }
    } else if (b.mode === "golfwind") {
      b.windup--; if (b.windup <= 0) { spawnGolf(b); b.swingT = 16; b.mode = "rec"; b.windup = 18; }
    } else if (b.mode === "shoutwind") {
      b.windup--; if (b.windup <= 0) { spawnShout(b); b.shoutT = 22; b.mode = "rec"; b.windup = 20; }
    } else if (b.mode === "jetwind") {
      b.windup--; if (b.windup <= 0) { spawnJet(b); b.mode = "rec"; b.windup = 28; }
    } else if (b.mode === "chargewind") {
      b.face = b.chargeDir; b.windup--; if (b.windup <= 0) { b.mode = "charge"; b.chargeT = raging ? 72 : 56; }
    } else if (b.mode === "charge") {
      b.face = b.chargeDir; b.x += b.chargeDir * (raging ? 8.4 : 6.8); b.chargeT--;
      if (b.chargeT <= 0) { b.mode = "rec"; b.windup = 22; }
    } else if (b.mode === "rec") {
      b.windup--; if (b.windup <= 0) endDrampAttack(b);
    }
    if (b.x < 16) { b.x = 16; if (b.mode === "charge") b.chargeDir = 1; }
    if (b.x + b.w > W - 16) { b.x = W - 16 - b.w; if (b.mode === "charge") b.chargeDir = -1; }
    b.vy += GRAVITY; if (b.vy > 18) b.vy = 18; b.y += b.vy; b.onGround = false;
    for (const s of solids) if (rectHit(b, s) && b.vy > 0 && (b.y + b.h) - s.y < 42) { b.y = s.y - b.h; b.vy = 0; b.onGround = true; }
    if (rectHit(p, b)) {
      const fromAbove = p.vy > 0 && (p.y + p.h) - b.y < b.h * 0.55 + Math.max(0, p.vy);
      if (fromAbove) {
        if (b.invuln <= 0) damageBoss(b, false);
        const timed = jumpKey() || jumpBuffer > 0; p.vy = timed ? -15 : -10; p.bounceLock = 12; jumpBuffer = 0; p.squash = 0.7; p.invuln = Math.max(p.invuln, 8);
      } else if (p.invuln <= 0) hurtPlayer();
    }
    if (b.invuln <= 0) for (const sd of seeds) if (rectHit({ x: sd.x - 5, y: sd.y - 5, w: 10, h: 10 }, b)) { damageBoss(b, true); sd.life = 0; break; }
    updateJets();
  }

  // ザガット（ステージ5ボス）：立ち位置は右。タイガーショット（上段）／グランドタイガーショット（下段）を
  // 交互に撃ち、近くでジャンプされるとタイガーアッパーカットで対空。頭を踏むかたねで撃破。
  function updateZagat(b) {
    const p = player;
    const pcx = p.x + p.w/2, bcx = b.x + b.w/2;
    b.face = (pcx < bcx) ? -1 : 1;

    // 重力＋床
    b.vy += GRAVITY; if (b.vy > 18) b.vy = 18;
    b.y += b.vy; b.onGround = false;
    for (const s of solids) {
      if (rectHit(b, s) && b.vy > 0 && (b.y + b.h) - s.y < 46) { b.y = s.y - b.h; b.vy = 0; b.onGround = true; }
    }
    if (b.shotT > 0) b.shotT--;
    // 前後に動く（まるりんの方を向いたまま間合いを詰めたり離れたり＝ムエタイの足さばき）※撃つポーズ中は止まる
    if (b.upperT <= 0 && b.shotT <= 0 && b.onGround) {
      if (b.approach === undefined) b.approach = true;
      b.stepCd--;
      if (b.stepCd <= 0) { b.approach = !b.approach; b.stepCd = 40 + Math.floor(Math.random() * 45); }
      const toPlayer = (pcx < bcx) ? -1 : 1;
      const gap = Math.abs(pcx - bcx);
      let mv = 0;
      if (b.approach && gap > 120) mv = toPlayer;         // 詰める（近すぎない範囲で）
      else if (!b.approach && gap < 360) mv = -toPlayer;  // 離れる（離れすぎない範囲で）
      b.x += mv * 1.8;
      if (b.x < 70) b.x = 70;
      if (b.x + b.w > W - 20) b.x = W - 20 - b.w;
    }

    if (b.upperCd > 0) b.upperCd--;

    // タイガーアッパーカット：ときどきランダムに繰り出す（高く飛び上がる）
    if (b.upperT <= 0 && b.upperCd <= 0 && b.onGround) {
      b.upperT = 40; b.upperCd = 150 + Math.floor(Math.random() * 130); b.squash = 0.7;
      b.vy = -15; b.onGround = false;
      playVoice("upper"); sfx.jump();
    }
    if (b.upperT > 0) {
      b.upperT--;
      const uf = b.face;
      const hb = { x: uf < 0 ? b.x - 30 : b.x + b.w - 26, y: b.y - 34, w: 56, h: b.h * 0.7 + 34 };
      if (rectHit(p, hb) && p.invuln <= 0) hurtPlayer();
      if (b.upperT === 20) spawnParticles(uf < 0 ? b.x : b.x + b.w, b.y - 6, "#ffd34d", 8);
    } else {
      // タイガーショット（上段）／グランドタイガーショット（下段）を交互に撃つ
      b.shotCd--;
      if (b.shotCd <= 0 && b.onGround) {
        const low = b.nextLow; b.nextLow = !b.nextLow;
        const dir = b.face;
        playVoice(low ? "gtiger" : "tiger");   // 撃った瞬間に掛け声（上段・下段どちらも）
        cukes.push({ kind: low ? "gtiger" : "tiger",
          x: bcx + dir * (b.w / 2 + 6), y: low ? TIGER_LOW_Y : TIGER_HIGH_Y,
          vx: dir * 4.0, t: 0 });
        sfx.seed(); b.squash = 0.82;
        b.shotT = 20; b.shotLow = low;   // 腕を伸ばすポーズ（下段はしゃがみ）
        b.shotCd = 70 + Math.floor(Math.random() * 60);
      }
    }

    // 踏みつけ／被弾
    if (rectHit(p, b)) {
      const fromAbove = p.vy > 0 && (p.y + p.h) - b.y < b.h * 0.5 + Math.max(0, p.vy);
      if (b.upperT > 0) {
        if (p.invuln <= 0) hurtPlayer();          // アッパー中は踏めない（触れると被弾）
      } else if (fromAbove) {
        if (b.invuln <= 0) damageBoss(b, false);

        p.vy = timed ? -15 : -10; p.bounceLock = 12; jumpBuffer = 0; p.squash = 0.7;

    }

    if (b.invuln <= 0) {
