  // ===== ストーリー：成田空港から飛行機で世界へ（ステージ4ハワイの前）=====
  function storyCloud(x, y, s) {
    ctx.fillStyle = "rgba(255,255,255,0.92)";

  function storyClouds(f, speed) {
    const xs = [100, 340, 560, 730], ys = [70, 140, 210, 100], ss = [1, 0.7, 1.1, 0.8];
    for (let i = 0; i < 4; i++) {
      let x = xs[i] - (f * speed) % (W + 140);
      if (x < -140) x += W + 140;

  }
  // 飛行機（右向き・胴体中心cx,cy）
  function storyPlaneBody(cx, cy, sc) {
    ctx.save(); ctx.translate(cx, cy); ctx.scale(sc, sc);

    ctx.fillStyle = "#e0554f";

    ctx.beginPath(); ctx.moveTo(-58, 0); ctx.lineTo(-84, -4); ctx.lineTo(-60, 6); ctx.closePath(); ctx.fill();

  // 飛行中の飛行機＋屋根に乗って手をふるまるりん

  function storyControlTower(x, groundY) {

  // シーン3：飛行機に乗って飛び立つ（斜め上へ上昇）

  // シーン4：海を越えて新しい国へ（島が見えてくる）

  function storyKid(cx, groundY, label, shirt, f, mode, initial, hscale) {

    ctx.beginPath(); ctx.moveTo(x + 8, gy - 140); ctx.lineTo(x + 22, gy - 178); ctx.stroke();
    ctx.fillStyle = "rgba(255,220,120,0.5)"; ctx.beginPath(); ctx.arc(x + 24, gy - 184, 11, 0, 7); ctx.fill();
    ctx.fillStyle = "#ffd34d"; ctx.beginPath(); ctx.arc(x + 24, gy - 184, 6, 0, 7); ctx.fill();
  }
  function route66Sign(x, gy) {
    ctx.fillStyle = "#777"; ctx.fillRect(x - 2, gy - 90, 4, 90);
    ctx.fillStyle = "#fff"; roundRectPath(x - 20, gy - 122, 40, 38, 6); ctx.fill();
    ctx.strokeStyle = "#222"; ctx.lineWidth = 2; roundRectPath(x - 20, gy - 122, 40, 38, 6); ctx.stroke();
    ctx.fillStyle = "#222"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "bold 9px 'Segoe UI',sans-serif"; ctx.fillText("ROUTE", x, gy - 112);
    ctx.font = "bold 16px 'Segoe UI',sans-serif"; ctx.fillText("66", x, gy - 97);
  }
  function usTaxi(x, gy) {
    const y = gy - 22;
    ctx.fillStyle = "#111"; ctx.beginPath(); ctx.arc(x - 15, y + 6, 6, 0, 7); ctx.arc(x + 15, y + 6, 6, 0, 7); ctx.fill();
    ctx.fillStyle = "#888"; ctx.beginPath(); ctx.arc(x - 15, y + 6, 2.5, 0, 7); ctx.arc(x + 15, y + 6, 2.5, 0, 7); ctx.fill();
    ctx.fillStyle = "#f2c200"; roundRectPath(x - 26, y - 14, 52, 20, 5); ctx.fill();
    ctx.fillStyle = "#f7d64a"; roundRectPath(x - 14, y - 26, 30, 16, 4); ctx.fill();
    ctx.fillStyle = "#bfe6ff"; ctx.fillRect(x - 11, y - 23, 12, 11); ctx.fillRect(x + 3, y - 23, 10, 11);
    ctx.fillStyle = "#111"; for (let i = 0; i < 8; i++) ctx.fillRect(x - 26 + i*6.5, y - 2, 3.2, 3);   // チェッカー帯
    ctx.fillStyle = "#111"; ctx.fillRect(x - 5, y - 31, 10, 5);
    ctx.fillStyle = "#f2c200"; ctx.fillRect(x - 4, y - 30, 8, 3);   // TAXIサイン
  }
  function fireHydrant(x, gy) {
    ctx.fillStyle = "#d8232a";
    ctx.fillRect(x - 6, gy - 22, 12, 22);
    ctx.beginPath(); ctx.arc(x, gy - 24, 6, Math.PI, 0); ctx.fill();
    ctx.fillStyle = "#b01d24"; ctx.fillRect(x - 9, gy - 16, 3, 6); ctx.fillRect(x + 6, gy - 16, 3, 6);
    ctx.fillStyle = "#8a1419"; ctx.beginPath(); ctx.arc(x, gy - 24, 2.5, 0, 7); ctx.fill();
    ctx.fillStyle = "#d8232a"; ctx.fillRect(x - 8, gy - 2, 16, 2);
  }
  function drawAmericaDecor() {
    const gy = GROUND_Y;
    // 星条旗の三角ガーランド（上部・街に張った飾り）
    const y0 = 46;
    ctx.strokeStyle = "rgba(255,255,255,0.55)"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(camX - 40, y0); ctx.lineTo(camX + W + 40, y0); ctx.stroke();
    const startC = Math.floor((camX - 40) / 30) * 30;
    for (let x = startC; x < camX + W + 40; x += 30) {
      ctx.fillStyle = ["#e0323a", "#f4f4f4", "#2b4aa0"][((x / 30) | 0) % 3];
      ctx.beginPath(); ctx.moveTo(x, y0); ctx.lineTo(x + 30, y0); ctx.lineTo(x + 15, y0 + 16); ctx.closePath(); ctx.fill();
    }
    // 遠くのビル群（ゆっくり動く遠景＝パララックス0.4倍）
    const par = camX * 0.6;
    for (let i = 0; i < 60; i++) {
      const bx = i * 150 + par;   // translate(-camX)後の画面移動＝0.4倍（遠く・ゆっくり）
      if (bx < camX - 160 || bx > camX + W + 60) continue;
      const bw = 60 + (i*37 % 42), bh = 90 + (i*53 % 120);
      ctx.fillStyle = i % 2 ? "#8fa6bd" : "#9db2c7";
      ctx.fillRect(bx, gy - bh, bw, bh);
      ctx.fillStyle = "rgba(255,255,255,0.45)";
      for (let wy = gy - bh + 8; wy < gy - 10; wy += 14) for (let wx = bx + 6; wx < bx + bw - 6; wx += 14) ctx.fillRect(wx, wy, 6, 7);
    }
    const onScreen = (x, m = 170) => x > camX - m && x < camX + W + m;
    if (onScreen(820)) statueOfLiberty(820, gy);
    for (const fx of [360, 1300, 2200, 3100, 4100, 5000]) if (onScreen(fx)) usFlag(fx, gy - 150);
    for (const rx of [1700, 3600]) if (onScreen(rx)) route66Sign(rx, gy);
    for (const tx of [560, 2500, 4300]) if (onScreen(tx)) usTaxi(tx, gy);          // イエローキャブ
    for (const hx of [240, 1500, 2900, 3900, 4900]) if (onScreen(hx)) fireHydrant(hx, gy);   // 消火栓
  }
  // ゴール：ホワイトハウス（アメリカ）
  function drawWhiteHouseGoal(gl) {
    const x = gl.x, gy = GROUND_Y;
    ctx.fillStyle = "#5aa03a"; ctx.fillRect(x - 92, gy - 6, 184, 6);   // 芝
    ctx.fillStyle = "#f4f4ee"; ctx.fillRect(x - 70, gy - 80, 140, 80); // 本館
    ctx.fillStyle = "#e6e6dc"; ctx.fillRect(x - 70, gy - 80, 140, 6);
    // 中央の張り出し
    ctx.fillStyle = "#f8f8f2"; ctx.fillRect(x - 30, gy - 104, 60, 104);
    // 破風（三角）
    ctx.fillStyle = "#eeeee6"; ctx.beginPath(); ctx.moveTo(x - 36, gy - 104); ctx.lineTo(x, gy - 126); ctx.lineTo(x + 36, gy - 104); ctx.closePath(); ctx.fill();
    // 円柱
    ctx.fillStyle = "#ffffff"; ctx.strokeStyle = "#d8d8cc"; ctx.lineWidth = 1;
    for (let i = -2; i <= 2; i++) { ctx.fillRect(x + i*12 - 2, gy - 104, 5, 104); ctx.strokeRect(x + i*12 - 2, gy - 104, 5, 104); }
    // 窓
    ctx.fillStyle = "#3a5a7a";
    for (let i = 0; i < 3; i++) { ctx.fillRect(x - 66 + i*15, gy - 62, 9, 16); ctx.fillRect(x + 36 + i*12, gy - 62, 9, 16); }
    // ドア
    ctx.fillStyle = "#2b4a6a"; ctx.fillRect(x - 9, gy - 30, 18, 30);
    // 屋根のドーム＋旗ポール
    ctx.fillStyle = "#eeeee6"; ctx.beginPath(); ctx.arc(x, gy - 104, 16, Math.PI, 0); ctx.fill();
    ctx.fillStyle = "#c9b46a"; ctx.beginPath(); ctx.arc(x, gy - 120, 4, 0, 7); ctx.fill();
    usFlag(x + 60, gy - 118);
    // GOALバナー
    ctx.fillStyle = "rgba(20,40,80,0.85)"; roundRectPath(x - 34, gy - 150, 68, 22, 6); ctx.fill();
    ctx.fillStyle = "#ffd34d"; ctx.font = "bold 14px 'Segoe UI',sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("GOAL", x, gy - 139);
  }

  function drawStageClear() {
    ctx.save();
    ctx.fillStyle = "rgba(0,20,40,0.55)"; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    // 紙吹雪
    for (let i = 0; i < 30; i++) {
      const t = elapsed*2 + i*37;
      const x = (i*71 + t*0.6) % W;
      const y = (t*1.2 + i*40) % H;
      ctx.fillStyle = ["#e94560","#ffd34d","#66cc44","#3aa8e0","#fff"][i%5];
      ctx.fillRect(x, y, 6, 6);
    }
    ctx.fillStyle = "#ffd34d"; ctx.font = "bold 44px sans-serif";
    ctx.fillText("ステージ" + (stageIndex + 1) + " クリア！ 🎉", W/2, H/2 - 22);
    const next = STAGES[stageIndex + 1];
    ctx.fillStyle = "#fff"; ctx.font = "20px sans-serif";
    ctx.fillText("つぎは「" + (next ? next.name : "") + "」へ！", W/2, H/2 + 24);
    ctx.restore();
  }

  // ---------- ループ ----------
  let lastInnerH = 0;
  function loop() {
    // 見えている高さが変わったら追従（回転・アドレスバー開閉に確実に対応）
    // ただし一時的な異常値は無視して、まれなレイアウト崩れを防ぐ
    const ih = window.innerHeight;
    if (ih > 120 && ih !== lastInnerH) { lastInnerH = ih; fitViewport(); }
    update();
    draw();
    requestAnimationFrame(loop);
  }

  // つづきからボタンの表示更新（セーブがあれば有効・何ステージからか表示）
  function updateContinueUI() {
    if (!contBtn) return;
    if (hasSave) {
      contBtn.disabled = false; contBtn.classList.remove("disabled");
      contNote.textContent = "つづき：ステージ" + (continueStage + 1) + " から";
      contNote.style.visibility = "visible";
    } else {
      contBtn.disabled = true; contBtn.classList.add("disabled");
      contNote.textContent = "はじめてだね！";
      contNote.style.visibility = "visible";
    }
  }
  updateContinueUI();

  // スタート画面（メニュー）を表示する
  function showMenu() {
    stopBGM();
    state = "menu";
    document.body.classList.remove("playing");
    updateContinueUI();
    overlay.classList.remove("hidden");
  }

  function beginPlay(startIndex) {
    ac(); primeAudio(); // ユーザー操作でオーディオ解禁
    overlay.classList.add("hidden");
    document.body.classList.add("playing");
    resetGameAt(startIndex);
  }

  newBtn.addEventListener("click", () => beginPlay(0));
  contBtn.addEventListener("click", () => { if (!contBtn.disabled) beginPlay(continueStage); });

  // ゲームオーバー/クリア時は画面タップでメニューへ（もう一度／つづきを選べる）
  canvas.addEventListener("pointerdown", (e) => {
    if (state === "story") { e.preventDefault(); advanceStory(); return; }
    if (state === "gameover" || state === "clear") { e.preventDefault(); showMenu(); }
  });

  // 実際に見えている高さに合わせる（スマホでアドレスバー分がはみ出さないように）
  function fitViewport() {
    const h = window.innerHeight;
    // 一時的におかしな値（0や極端に小さい値）は無視して、ズレを防ぐ
    if (h && h > 120) document.documentElement.style.setProperty("--app-h", h + "px");
  }
  window.addEventListener("resize", fitViewport);
  window.addEventListener("orientationchange", () => setTimeout(fitViewport, 250));
  fitViewport();

  // 初期化
  detectTouch();
  blockZoomGestures();
  bindTouch();
  buildLevel();
  draw();
  loop();
})();
</script>
</body>
</html>
