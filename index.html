<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>まるりんワールド</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #1a1a2e;
    font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
    color: #fff;
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    touch-action: none;
    overscroll-behavior: none;
  }
  #wrap {
    height: var(--app-h, 100vh);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 6px;
  }
  h1 {
    font-size: 22px;
    letter-spacing: 2px;
    text-shadow: 2px 2px 0 #e94560;
  }
  #stage {
    position: relative;
    box-shadow: 0 10px 40px rgba(0,0,0,.6);
    border-radius: 8px;
    overflow: hidden;
    /* 画面に見えている高さを基準に、上下が切れないよう少し余裕をもたせる */
    width: min(100vw, calc(var(--app-h, 100vh) * 1.72), 960px);
  }
  /* dvh対応ブラウザ（最近のiPad/iPhone）は、ブラウザ管理の安定した単位を使う */
  @supports (height: 100dvh) {
    #wrap  { height: 100dvh; }
    #stage { width: min(100vw, calc(100dvh * 1.72), 960px); }
  }
  canvas { display: block; image-rendering: pixelated; width: 100%; height: auto; }

  /* ===== タッチ操作 ===== */
  #touch-controls {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 20;
    pointer-events: none;
  }
  body.has-touch.playing #touch-controls { display: block; }
  #touch-controls .side {
    position: absolute;
    bottom: max(18px, env(safe-area-inset-bottom));
    pointer-events: none;
  }
  #touch-controls .side.left  { left:  max(16px, env(safe-area-inset-left)); }
  #touch-controls .side.right { right: max(16px, env(safe-area-inset-right)); }

  /* 十字キー */
  #dpad {
    position: relative;
    width: 150px; height: 150px;
    pointer-events: none;
    opacity: 0.9;
  }
  .dbtn {
    position: absolute;
    width: 50px; height: 50px;
    background: rgba(40,40,70,0.55);
    border: 2px solid rgba(255,255,255,0.35);
    color: #fff; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    pointer-events: auto;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  .dbtn.up    { top: 0;    left: 50px; border-radius: 10px 10px 0 0; }
  .dbtn.down  { bottom: 0; left: 50px; border-radius: 0 0 10px 10px; }
  .dbtn.left  { left: 0;   top: 50px;  border-radius: 10px 0 0 10px; }
  .dbtn.right { right: 0;  top: 50px;  border-radius: 0 10px 10px 0; }
  .dbtn.pressed { background: rgba(233,69,96,0.8); }

  /* A / B ボタン */
  #abtns {
    position: relative;
    width: 190px; height: 150px;
    pointer-events: none;
  }
  .rbtn {
    position: absolute;
    border-radius: 50%;
    color: #fff; font-weight: bold;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    line-height: 1;
    pointer-events: auto;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    box-shadow: 0 4px 0 rgba(0,0,0,0.35);
  }
  .rbtn small { font-size: 10px; font-weight: normal; opacity: .85; margin-top: 2px; }
  .rbtn.a {
    width: 86px; height: 86px; font-size: 30px;
    right: 8px; bottom: 6px;
    background: rgba(233,69,96,0.85);
    border: 3px solid rgba(255,255,255,0.5);
  }
  .rbtn.b {
    width: 72px; height: 72px; font-size: 24px;
    left: 6px; bottom: 42px;
    background: rgba(58,168,224,0.85);
    border: 3px solid rgba(255,255,255,0.5);
  }
  .rbtn.pressed { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.35); filter: brightness(1.2); }

  body.has-touch h1 { font-size: 16px; }
  body.has-touch #hint { display: none; }
  @media (max-height: 520px) {
    body.has-touch h1 { display: none; }
    #wrap { gap: 0; padding: 0; }
  }

  /* 縦向きのときに「横にしてね」案内 */
  #rotate {
    display: none;
    position: fixed; inset: 0; z-index: 50;
    background: #14142a;
    color: #fff; text-align: center;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; padding: 30px;
  }
  #rotate .ico { font-size: 64px; animation: roticon 2.2s ease-in-out infinite; }
  #rotate h2 { font-size: 24px; text-shadow: 2px 2px 0 #e94560; }
  #rotate p { font-size: 16px; line-height: 1.7; opacity: .9; }
  @keyframes roticon {
    0%, 35% { transform: rotate(0deg); }
    55%, 100% { transform: rotate(90deg); }
  }
  @media (orientation: portrait) {
    body.has-touch #rotate { display: flex; }
  }
  #overlay {
    position: absolute; inset: 0;
    display: flex;
    background: rgba(20,20,40,.82);
    text-align: center; padding: 16px;
    /* 内容が画面より高いときはスクロールできるように（上下が切れない） */
    overflow-y: auto; -webkit-overflow-scrolling: touch; touch-action: pan-y;
  }
  #overlay .inner {
    margin: auto;   /* 収まるときは中央、はみ出すときは上詰め＋スクロール */
    display: flex; flex-direction: column; align-items: center;
    gap: 12px; max-width: 660px; width: 100%;
  }
  /* SUPER MARURIN WORLD ロゴ（スーパーマリオワールド風） */
  #overlay .logo { display: flex; flex-direction: column; align-items: center; gap: 4px;
    font-family: 'Arial Black', 'Segoe UI', sans-serif; user-select: none; }
  #overlay .logo .super { font-size: 34px; }
  #overlay .logo .main { display: flex; flex-wrap: wrap; justify-content: center; gap: 2px 24px; font-size: 58px; }
  #overlay .logo .word { display: inline-flex; }
  #overlay .logo span { display: inline-block; font-weight: 900; line-height: 1;
    -webkit-text-stroke: 3px #000; paint-order: stroke fill;
    text-shadow: 3px 4px 0 rgba(0,0,0,.45); transform: rotate(-3deg); }
  #overlay .logo .super span:nth-child(even),
  #overlay .logo .word span:nth-child(even) { transform: rotate(3deg); }
  #overlay .menu { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; margin-top: 6px; }
  #overlay #contNote { font-size: 13px; opacity: .85; }
  #overlay button {
    font-size: 18px; padding: 12px 30px; border: none; border-radius: 30px;
    background: #e94560; color: #fff; cursor: pointer; font-weight: bold;
    box-shadow: 0 4px 0 #a82a42; transition: transform .05s; flex: none;
  }
  #overlay button:active { transform: translateY(3px); box-shadow: 0 1px 0 #a82a42; }
  #overlay button.disabled, #overlay button:disabled { opacity: .4; cursor: default; box-shadow: 0 4px 0 #6a1a2a; }
  #overlay button.disabled:active { transform: none; box-shadow: 0 4px 0 #6a1a2a; }
  /* 背の低い画面（横向きスマホ・アプリ内ブラウザ）では小さめに表示して収める */
  @media (max-height: 540px) {
    #overlay { padding: 8px; }
    #overlay .inner { gap: 10px; }
    #overlay .logo .super { font-size: 22px; }
    #overlay .logo .main { font-size: 36px; gap: 2px 16px; }
    #overlay .logo span { -webkit-text-stroke-width: 2px; text-shadow: 2px 3px 0 rgba(0,0,0,.45); }
    #overlay button { font-size: 15px; padding: 8px 22px; box-shadow: 0 3px 0 #a82a42; }
  }
  .hidden { display: none !important; }
  #hint { font-size: 12px; opacity: .55; }
  .keycap {
    display: inline-block; background:#2d2d4a; border:1px solid #4a4a7a;
    border-radius:5px; padding:2px 8px; margin:0 2px; font-size:13px;
  }
</style>
</head>
<body>
<div id="wrap">
  <h1>🐹 まるりんワールド 🐹</h1>
  <div id="stage">
    <canvas id="game" width="800" height="450"></canvas>
    <div id="overlay">
     <div class="inner">
      <div class="logo" aria-label="SUPER MARURIN WORLD">
        <div class="super">
          <span style="color:#e4322b">S</span><span style="color:#29b6e8">U</span><span style="color:#ffcb05">P</span><span style="color:#4caf27">E</span><span style="color:#e4322b">R</span>
        </div>
        <div class="main">
          <span class="word"><span style="color:#4caf27">M</span><span style="color:#29b6e8">A</span><span style="color:#ffcb05">R</span><span style="color:#e4322b">U</span><span style="color:#4caf27">R</span><span style="color:#29b6e8">I</span><span style="color:#ffcb05">N</span></span>
          <span class="word"><span style="color:#4caf27">W</span><span style="color:#ffcb05">O</span><span style="color:#29b6e8">R</span><span style="color:#4caf27">L</span><span style="color:#e4322b">D</span></span>
        </div>
      </div>
      <div class="menu">
        <button id="newBtn">はじめから</button>
        <button id="contBtn">つづきから</button>
      </div>
      <div id="contNote"></div>
     </div>
    </div>
  </div>
  <div id="hint">P：ポーズ ／ R：リスタート</div>
</div>

<!-- 縦向きのときの案内（横向きにすると自動で消えます） -->
<div id="rotate">
  <div class="ico">📱</div>
  <h2>画面を横にしてね</h2>
  <p>まるりんワールドは<b>横向き</b>で遊べます🐹<br>スマホ・タブレットを横に回してください</p>
</div>

<!-- スマホ・タブレット用タッチ操作 -->
<div id="touch-controls">
  <div class="side left">
    <div id="dpad">
      <button class="dbtn up"    data-act="up"    aria-label="上">▲</button>
      <button class="dbtn left"  data-act="left"  aria-label="左">◀</button>
      <button class="dbtn right" data-act="right" aria-label="右">▶</button>
      <button class="dbtn down"  data-act="down"  aria-label="下">▼</button>
    </div>
  </div>
  <div class="side right">
    <div id="abtns">
      <button class="rbtn b" data-act="dash" aria-label="ダッシュ">B<small>ダッシュ</small></button>
      <button class="rbtn a" data-act="jump" aria-label="ジャンプ">A<small>ジャンプ</small></button>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  const overlay = document.getElementById("overlay");
  const newBtn = document.getElementById("newBtn");
  const contBtn = document.getElementById("contBtn");
  const contNote = document.getElementById("contNote");

  // ---------- 定数 ----------
  const TILE = 40;             // タイルサイズ
  const GRAVITY = 0.75;
  const MOVE = 0.9;            // 加速
  const MAX_SPEED = 5.2;
  const FRICTION = 0.80;
  const JUMP = 14.2;
  const COYOTE = 6;           // ジャンプ猶予フレーム

  // ---------- レベルデザイン ----------
  // X=床/地面ブロック  #=硬いブロック  ?=はてなブロック(コイン)  o=コイン
  // N=ナッツ(でかまるりん)  F=ひまわり(たねまるりん・種の飛び道具)  H=はね(はねまるりん・滑空)  U=1UP(フランスパン)
  // e=クリの敵  E=動かないクリ  c=ネコ(地上)  b=カラス(飛ぶ)  v=車(地上・速い)
  // P=プレイヤー開始  G=ゴール  -=空
  const STAGES = [
    {
      name: "ステージ1 くさはら",
      theme: "grass",
      boss: "kuri",
      level: [
        "------------------------------------------------------------------------------------------------------------------------------------------------------",
        "------------------------------------------------------------------------------------------------------------------------------------------------------",
        "------------------------------------------------------------------------------------------------------------------------------------------------------",
        "--------------------o-o-o-------------------------o-o-o-------------o-o-o---------------------------o-o-o-----------------------------------------G---",
        "---------------------------------------------------------------------------------------------------------------------------------------------B--------",
        "----------------N-------------------------------------------------------o-o------------------------------N----------------------o-o-o------#####------",
        "----P---------------?-----------------------U-------------?-------------####--------------?-----------------------------?-----------------------------",
        "----------------------------####--------------------------------------------------------------------------------####----------------------------------",
        "-------------------------e----------------------#####--e------------------------e---------e-####--------------e--------------------------E------------",
        "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXXXXXXXX",
        "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXXXXXXXX",
      ]
    },
    {
      name: "ステージ2 南流山",
      theme: "town",
      boss: "penguins",
      level: [
        "------------------------------------------------------------------------------------------------------------------------------------------------------",
        "------------------------------------------------------------------------------------------------------------------------------------------------------",
        "------------------------------------------------------------------------------------------------------------------------------------------------------",
        "------------------------o-o-o---------------o-o-o-----------------------------------------------o-o-o---------------------------------------------G---",
        "---------------------------------------------------------------------------------------------------------------------------------------------N--------",
        "------------------N---------------------------------------------------------------------o-o---------N-----------------------o-o-o----------#####------",
        "----P-----------------------?----------------b------F-------####--?-------------U-----------------------------?----b-------------------F--------------",
        "-------------------------------------------------------------------------------------b--####----------------------------------------------------------",
        "------------------------c-----------------------#####-------c-----------------------------------c-------------------####c-------------------c---------",
        "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXX",
        "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXX",
      ]
    },
    {
      name: "ステージ3 成田",
      theme: "narita",
      boss: "sumo",
      level: [
        "------------------------------------------------------------------------------------------------------------------------------------------------------",
        "------------------------------------------------------------------------------------------------------------------------------------------------------",
        "------------------------------------------------------------------------------------------------------------------------------------------------------",
        "------------------------o-o-o-------------------o-o-o-----------------------------------------------o-o-o-----------------------------------------G---",
        "---------------------------------------------------------------------------------------------------------------------------------------------N--------",
        "----------------N-------------------------------------------------------------------o-o-o-------------------------------N---o-o-o----------#####------",
        "----P---------------------?-------------H---------b-----------####------------?-----------------U---------------------?-------------------------------",
        "--------------------------------------#####-----------------------------------------------------------------------------------------------------------",
        "----------------------v---------------------v-------------v-------------------------#####-v-----------------------v-####------------------v-----------",
        "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXXXX",
        "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXXXX",
      ]
    },
    {
      name: "ステージ4 ハワイ",
      theme: "hawaii",
      boss: "mega",
      level: [
        "------------------------------------------------------------------------------------------------------------------------------------------------------",
        "------------------------------------------------------------------------------------------------------------------------------------------------------",
        "------------------------------------------------------------------------------------------------------------------------------------------------------",
        "--------------------o-o-o---------------------------------------o-o---------------------o-o-o-----------------------------------------------------G---",
        "---------------------------------------------------------------------------------------------------------------------------------------------A--------",
        "----------------N---------------------------o-o-o---------------------------------------------------A-------------------o-o-o--------------#####------",
        "----P-------------------?---------------g-----------F-----?-----####------------U---------------?---j-------------------------?-j---------------------",
        "--------------------------------------------#####---------------------g-------------------f-------------####--------f---------------------------------",
        "----------------------k---------------------------k-----------------------------------#####-----------------------------####--------------k-----------",
        "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXX",
        "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXX--XXXXXXXXXXXXXXXXXX",
      ]
    }
  ];
  let stageIndex = 0;
  let LEVEL, ROWS, COLS, LEVEL_W, LEVEL_H, theme;
  function loadStage(i) {
    stageIndex = i;
    LEVEL = STAGES[i].level;
    theme = STAGES[i].theme;
    ROWS = LEVEL.length;
    COLS = LEVEL[0].length;
    LEVEL_W = COLS * TILE;
    LEVEL_H = ROWS * TILE;
  }
  loadStage(0);

  // ---------- ゲーム状態 ----------
  let solids, coins, enemies, questionBlocks, goal, player, nuts, flowers, feathers, breads, seeds, bubbles;
  let enemySpawns = [];
  let camX = 0;
  let score = 0, coinsGot = 0, lives = 3;
  let state = "menu"; // menu, play, dead, clear, stageclear, pause, boss
  let elapsed = 0;
  let particles = [];
  let stageClearT = 0;
  let bosses = [];      // ボス戦のボス（1〜2体）
  let cukes = [];       // にせぺぎが投げるキュウリ
  let inBoss = false;   // ボス戦中かどうか（ミス時のやり直し判定用）

  // つづきから用：到達したステージを保存（ゲームオーバーしたステージからやり直せる）
  let continueStage = 0, hasSave = false;
  try {
    const s = localStorage.getItem("maruring_stage");
    if (s !== null) { hasSave = true; continueStage = Math.min(STAGES.length - 1, Math.max(0, parseInt(s, 10) || 0)); }
  } catch (e) {}
  function saveProgress(i) {
    continueStage = i; hasSave = true;
    try { localStorage.setItem("maruring_stage", String(i)); } catch (e) {}
    updateContinueUI();
  }

  function buildLevel() {
    solids = [];
    coins = [];
    enemies = [];
    nuts = [];
    flowers = [];
    feathers = [];
    breads = [];
    seeds = [];
    bubbles = [];
    questionBlocks = [];
    enemySpawns = [];
    goal = null;
    let start = { x: 2 * TILE, y: 6 * TILE };
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const ch = LEVEL[r][c];
        const x = c * TILE, y = r * TILE;
        if (ch === "X") solids.push({ x, y, w: TILE, h: TILE, type: "ground" });
        else if (ch === "#") solids.push({ x, y, w: TILE, h: TILE, type: "brick" });
        else if (ch === "?") {
          const b = { x, y, w: TILE, h: TILE, type: "question", used: false };
          solids.push(b); questionBlocks.push(b);
        }
        else if (ch === "U") {   // 1UP（フランスパン）が出るはてなブロック
          const b = { x, y, w: TILE, h: TILE, type: "question", used: false, prize: "bread" };
          solids.push(b); questionBlocks.push(b);
        }
        else if (ch === "o") coins.push({ x: x + 8, y: y + 8, w: 24, h: 24, got: false, t: Math.random() * 6 });
        else if (ch === "N") nuts.push({ x: x + 6, y: y + 6, w: 28, h: 28, got: false, t: Math.random() * 6 });
        else if (ch === "F") flowers.push({ x: x + 4, y: y + 4, w: 32, h: 32, got: false, t: Math.random() * 6 });
        else if (ch === "H") feathers.push({ x: x + 4, y: y + 4, w: 30, h: 32, got: false, t: Math.random() * 6 });
        else if (ch === "A") bubbles.push({ x: x + 4, y: y + 4, w: 32, h: 32, got: false, t: Math.random() * 6 });  // あわバリア
        else if (ch === "B") breads.push({ x: x + 4, y: y + 10, w: 32, h: 20, vx: 0, vy: 0, got: false, t: 0 });  // 置きフランスパン（1UP）
        else if (ch === "e") { enemySpawns.push({ x, y, kind: "kuri" }); enemies.push(makeEnemy(x, y, { kind: "kuri" })); }
        else if (ch === "E") { enemySpawns.push({ x, y, kind: "kuri", slow: true }); enemies.push(makeEnemy(x, y, { kind: "kuri", slow: true })); }
        else if (ch === "c") { enemySpawns.push({ x, y, kind: "cat" }); enemies.push(makeEnemy(x, y, { kind: "cat" })); }
        else if (ch === "b") { enemySpawns.push({ x, y, kind: "crow" }); enemies.push(makeEnemy(x, y, { kind: "crow" })); }
        else if (ch === "v") { enemySpawns.push({ x, y, kind: "car" }); enemies.push(makeEnemy(x, y, { kind: "car" })); }
        else if (ch === "k") { enemySpawns.push({ x, y, kind: "crab" }); enemies.push(makeEnemy(x, y, { kind: "crab" })); }
        else if (ch === "g") { enemySpawns.push({ x, y, kind: "gull" }); enemies.push(makeEnemy(x, y, { kind: "gull" })); }
        else if (ch === "f") { enemySpawns.push({ x, y, kind: "puffer" }); enemies.push(makeEnemy(x, y, { kind: "puffer" })); }
        else if (ch === "j") { enemySpawns.push({ x, y, kind: "jelly" }); enemies.push(makeEnemy(x, y, { kind: "jelly" })); }
        else if (ch === "P") start = { x, y };
        else if (ch === "G") goal = { x: x + TILE / 2, y: y, top: y };
      }
    }
    // ゴールが無ければ最後に置く
    if (!goal) goal = { x: LEVEL_W - 60, y: 3 * TILE, top: 3 * TILE };

    player = {
      x: start.x, y: start.y, w: 28, h: 30,
      vx: 0, vy: 0, onGround: false, face: 1,
      coyote: 0, animT: 0, invuln: 0, squash: 1, alive: true, winPose: 0,
      powered: false, seed: false, powerAnim: 0, bounceLock: 0, seedCool: 0,
      wing: false, gliding: false, glideTimer: 0, glideT: 0, glideUsed: false,
      shield: false, shieldT: 0
    };
    camX = 0; elapsed = 0; particles = [];
  }

  // パワーアップ状態に応じてサイズを設定（足元を基準に高さを変える）
  function setPowered(on) {
    const p = player;
    const wasBottom = p.y + p.h;
    p.powered = on;
    p.w = on ? 36 : 28;
    p.h = on ? 40 : 30;
    p.y = wasBottom - p.h; // 足の位置を保つ
  }

  function makeEnemy(x, y, opts) {
    opts = opts || {};
    const kind = opts.kind || "kuri";
    if (kind === "crow") {
      // カラス：空を飛ぶ。左右に動きつつ上下にフワフワ。
      const baseY = y + 2;
      return { kind, x: x + 3, y: baseY, w: 34, h: 24, vx: opts.slow ? -0.9 : -1.5,
               alive: true, t: Math.random()*6, squash: 1, fly: true, baseY, homeX: x + 3, range: 130 };
    }
    if (kind === "car") {
      // 車：地上を速く走る（他の敵より速い）
      return { kind, x: x + 2, y: y + TILE - 28, w: 46, h: 28, vx: -2.8,
               alive: true, t: Math.random()*6, squash: 1, car: true };
    }
    if (kind === "gull") {
      // カモメ：空を飛ぶ（カラスと同じ動き・白い海鳥）
      const baseY = y + 2;
      return { kind, x: x + 3, y: baseY, w: 36, h: 22, vx: opts.slow ? -1.0 : -1.7,
               alive: true, t: Math.random()*6, squash: 1, fly: true, baseY, homeX: x + 3, range: 140 };
    }
    if (kind === "puffer") {
      // フグ：水中をゆっくり左右に漂う（ふくらむ）
      const baseY = y + 2;
      return { kind, x: x + 3, y: baseY, w: 32, h: 30, vx: -0.9,
               alive: true, t: Math.random()*6, squash: 1, fly: true, baseY, homeX: x + 3, range: 90 };
    }
    if (kind === "jelly") {
      // クラゲ：ふわふわ上下に漂う（ほとんど横に動かない）
      const baseY = y + 2;
      return { kind, x: x + 3, y: baseY, w: 30, h: 34, vx: -0.5,
               alive: true, t: Math.random()*6, squash: 1, fly: true, baseY, homeX: x + 3, range: 60 };
    }
    if (kind === "crab") {
      // カニ：地面を横に速く歩く
      return { kind, x: x + 4, y: y + TILE - 22, w: 36, h: 22, vx: opts.slow ? 0 : -1.9,
               alive: true, t: Math.random()*6, squash: 1, slow: !!opts.slow };
    }
    // 地上の敵（kuri=クリ / cat=ネコ）
    const speed = opts.slow ? 0 : (kind === "cat" ? -1.5 : -1.1);
    return { kind, x: x + 4, y: y + TILE - 26, w: 32, h: 26, vx: speed,
             alive: true, t: Math.random()*6, squash: 1, slow: !!opts.slow };
  }

  // ---------- 入力 ----------
  const keys = {};
  const DOWN = {};
  window.addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();
    if ([" ", "arrowup", "arrowdown", "arrowleft", "arrowright"].includes(k)) e.preventDefault();
    keys[k] = true;
    if (!DOWN[k]) { DOWN[k] = true; onPress(k); }
  });
  window.addEventListener("keyup", (e) => { const k = e.key.toLowerCase(); keys[k] = false; DOWN[k] = false; });

  function onPress(k) {
    if (k === "p" && (state === "play" || state === "pause")) {
      state = state === "play" ? "pause" : "play";
      if (state === "pause") stopBGM(); else startBGM();
    }
    if (k === "r") {
      if (state === "gameover" || state === "clear") showMenu();
      else if (state === "play" || state === "boss" || state === "pause") resetGameAt(0);
    }
  }
  // タッチ入力の状態
  const touch = { left: false, right: false, up: false, down: false, dash: false };

  function left()  { return keys["arrowleft"]  || keys["a"] || touch.left; }
  function right() { return keys["arrowright"] || keys["d"] || touch.right; }
  function jumpKey(){ return keys[" "] || keys["arrowup"] || keys["w"] || touch.up; }
  function running(){ return keys["shift"] || touch.dash; }
  let jumpHeld = false;
  let jumpBuffer = 0;   // ジャンプ押下の猶予（踏みつけ高ジャンプのタイミング判定用）
  let dashPrev = false; // Bボタン（ダッシュ）の押した瞬間を検出して種を発射

  // たねまるりん：Bボタンを押した瞬間に種を前へ飛ばす
  function fireSeed() {
    const p = player;
    if (!p.seed || p.seedCool > 0 || seeds.length >= 3) return;
    p.seedCool = 16;
    seeds.push({
      x: p.face > 0 ? p.x + p.w : p.x - 8,
      y: p.y + p.h * 0.35,
      vx: p.face * 7, life: 46, t: 0
    });
    sfx.seed();
    p.squash = 0.8;
    spawnParticles(p.face > 0 ? p.x + p.w : p.x, p.y + p.h*0.4, "#ffd34d", 3);
  }

  // タッチボタンの割り当て（A=ジャンプ, B=ダッシュ, 十字キー=移動）
  function applyTouch(act, v) {
    if (act === "left")       touch.left = v;
    else if (act === "right") touch.right = v;
    else if (act === "down")  touch.down = v;
    else if (act === "up" || act === "jump") touch.up = v;   // ▲ / A ボタン
    else if (act === "dash")  touch.dash = v;                // B ボタン
  }
  function bindTouch() {
    // どのポインタ（指/マウス）がどのボタンを押しているか記録
    const active = new Map();   // pointerId -> element
    document.querySelectorAll("#touch-controls [data-act]").forEach(el => {
      const act = el.dataset.act;
      el.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        active.set(e.pointerId, el);
        applyTouch(act, true); el.classList.add("pressed"); ac(); primeAudio();
      });
      el.addEventListener("contextmenu", (e) => e.preventDefault());
    });
    // 指/マウスをどこで離しても確実に解除（ボタン外で離しても押しっぱなしにならない）
    const clear = (e) => {
      const el = active.get(e.pointerId);
      if (el) { applyTouch(el.dataset.act, false); el.classList.remove("pressed"); active.delete(e.pointerId); }
    };
    window.addEventListener("pointerup", clear);
    window.addEventListener("pointercancel", clear);
    // 保険：タブ切替やフォーカス喪失で全ボタンを解除
    const clearAll = () => {
      active.clear();
      touch.left = touch.right = touch.up = touch.down = touch.dash = false;
      document.querySelectorAll("#touch-controls .pressed").forEach(e => e.classList.remove("pressed"));
    };
    window.addEventListener("blur", clearAll);
    document.addEventListener("visibilitychange", () => { if (document.hidden) clearAll(); });
  }
  function detectTouch() {
    if (matchMedia("(pointer: coarse)").matches || "ontouchstart" in window || navigator.maxTouchPoints > 0) {
      document.body.classList.add("has-touch");
    }
  }

  // ---------- サウンド (WebAudio) ----------
  let audio = null;
  function ac() { if (!audio) audio = new (window.AudioContext || window.webkitAudioContext)(); return audio; }
  function beep(freq, dur, type = "square", vol = 0.08) {
    try {
      const a = ac();
      const o = a.createOscillator(), g = a.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.value = vol;
      o.connect(g); g.connect(a.destination);
      const t = a.currentTime;
      o.start(t);
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.stop(t + dur);
    } catch (e) {}
  }
  const sfx = {
    jump:  () => beep(520, 0.14, "square", 0.06),
    coin:  () => { beep(880, 0.08, "square", 0.07); setTimeout(()=>beep(1320,0.12,"square",0.07),70); },
    stomp: () => beep(200, 0.12, "sawtooth", 0.08),
    hurt:  () => { beep(300,0.15,"sawtooth",0.1); setTimeout(()=>beep(160,0.25,"sawtooth",0.1),120); },
    block: () => beep(660, 0.09, "square", 0.06),
    power: () => { [392,523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,0.12,"square",0.08), i*70)); },
    seed:  () => { beep(880,0.05,"square",0.05); setTimeout(()=>beep(1200,0.06,"square",0.05),40); },
    win:   () => { [523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,0.18,"triangle",0.08), i*140)); }
  };

  // ---------- まるりんボイス & BGM（音声ファイル） ----------
  const VOICE = {
    get: new Audio("audio/voice_get.wav"),  // 001: ナッツ取得・クリア
    sad: new Audio("audio/voice_sad.wav")   // 003: 被弾・落下・ゲームオーバー
  };
  VOICE.get.volume = 0.85;
  VOICE.sad.volume = 0.85;
  function playVoice(name) {
    try { const a = VOICE[name]; a.currentTime = 0; a.play().catch(() => {}); } catch (e) {}
  }

  const BGM = [
    new Audio("audio/bgm_stage1.mp3"),   // ステージ1
    new Audio("audio/bgm_stage2.mp3"),   // ステージ2
    new Audio("audio/bgm_stage3.mp3"),   // ステージ3
    new Audio("audio/bgm_stage4.mp3")    // ステージ4（ハワイ・サンシャインビーチ）
  ];
  BGM.forEach(a => { a.loop = true; a.volume = 0.15; });  // 小さめ・ループ
  // ボス戦BGM（ステージ別。無いステージはnull＝通常BGMのまま）
  const BOSS_BGM = [
    new Audio("audio/bgm_boss1.mp3"),  // ステージ1ボス（クリだいおう）
    new Audio("audio/bgm_boss1.mp3"),  // ステージ2ボス（ペンギン）※ボス1と同じ曲
    new Audio("audio/bgm_boss3.mp3"),  // ステージ3ボス（こうよう）※太鼓連打
    new Audio("audio/bgm_boss1.mp3")   // ステージ4ボス（メガロドン）※仮：ボス1と同じ曲（あとで差し替え）
  ];
  BOSS_BGM.forEach(a => { if (a) { a.loop = true; a.volume = 0.2; } });
  let bgm = BGM[0];                           // 今鳴らしているBGM
  function stageBgm() { return BGM[Math.min(stageIndex, BGM.length - 1)]; }
  function currentBgm() {
    if (inBoss && BOSS_BGM[stageIndex]) return BOSS_BGM[stageIndex];  // ボス戦中はボスBGM
    return stageBgm();
  }
  function startBGM() {
    const want = currentBgm();
    // 目的の曲以外はすべて止める（二重再生の防止）
    BGM.forEach(a => { if (a !== want) { try { a.pause(); } catch (e) {} } });
    BOSS_BGM.forEach(a => { if (a && a !== want) { try { a.pause(); } catch (e) {} } });
    bgm = want;
    try { bgm.play().catch(() => {}); } catch (e) {}
  }
  function stopBGM()  {
    BGM.forEach(a => { try { a.pause(); } catch (e) {} });
    BOSS_BGM.forEach(a => { if (a) { try { a.pause(); } catch (e) {} } });
  }

  // iOS等で最初のタッチ/クリック時に音声を解禁しておく
  let audioPrimed = false;
  function primeAudio() {
    if (audioPrimed) return;
    audioPrimed = true;
    // ステージ2以降のBGM＋ボスBGMも先に解禁（ステージ1は開始時に鳴るので除外）
    // ミュートしたまま一瞬だけ再生して解禁 → 他の曲が一瞬鳴る二重再生を防ぐ
    [VOICE.get, VOICE.sad].concat(BGM.slice(1), BOSS_BGM.filter(Boolean)).forEach(a => {
      try {
        a.muted = true;
        a.play().then(() => { a.pause(); a.currentTime = 0; a.muted = false; }).catch(() => { a.muted = false; });
      } catch (e) { a.muted = false; }
    });
  }

  // ---------- 物理ヘルパー ----------
  function rectHit(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function moveAndCollide() {
    const p = player;
    // 横移動
    p.x += p.vx;
    for (const s of solids) {
      if (rectHit(p, s)) {
        if (p.vx > 0) p.x = s.x - p.w;
        else if (p.vx < 0) p.x = s.x + s.w;
        p.vx = 0;
      }
    }
    // 縦移動（滑空中は重力をほぼ効かせない：ぷかぷか）
    if (!p.gliding) p.vy += GRAVITY;
    if (p.vy > 18) p.vy = 18;
    p.y += p.vy;
    p.onGround = false;
    for (const s of solids) {
      if (rectHit(p, s)) {
        if (p.vy > 0) { p.y = s.y - p.h; p.vy = 0; p.onGround = true; }
        else if (p.vy < 0) {
          p.y = s.y + s.h; p.vy = 0;
          // 下から叩いた
          if (s.type === "question" && !s.used) hitQuestion(s);
          else if (s.type === "brick") {
            if (p.powered) {
              s.dead = true; sfx.stomp(); score += 50;
              spawnParticles(s.x+TILE/2, s.y+TILE/2, "#b5651d", 12);
            } else { sfx.block(); spawnParticles(s.x+TILE/2, s.y+TILE/2, "#c98a3a", 4); }
          }
          else sfx.block();
        }
      }
    }
    // 壊れたブロックを除去
    if (solids.some(s => s.dead)) solids = solids.filter(s => !s.dead);

    // 場外・落下
    if (p.x < 0) { p.x = 0; p.vx = 0; }
    if (p.x + p.w > LEVEL_W) { p.x = LEVEL_W - p.w; p.vx = 0; }
    if (p.y > LEVEL_H + 80) killPlayer();
  }

  function hitQuestion(b) {
    b.used = true; b.type = "brick";
    if (b.prize === "bread") {
      // 1UP：フランスパンがブロックの上に出てくる
      sfx.power();
      breads.push({ x: b.x + 4, y: b.y - TILE + 8, w: 32, h: 20, vx: 1.3, vy: -1, got: false, t: 0 });
      spawnParticles(b.x + TILE/2, b.y, "#e7b96a", 8);
      return;
    }
    sfx.coin();
    score += 100; coinsGot++;
    spawnParticles(b.x + TILE/2, b.y, "#ffd34d", 8);
    // コインがポップするアニメ
    particles.push({ x: b.x+TILE/2, y: b.y-8, vx: 0, vy: -6, life: 26, color: "#ffd34d", coin: true });
  }

  function spawnParticles(x, y, color, n) {
    for (let i = 0; i < n; i++) {
      particles.push({
        x, y, vx: (Math.random()-0.5)*5, vy: -Math.random()*5-1,
        life: 24 + Math.random()*14, color
      });
    }
  }

  function killPlayer() {
    if (!player.alive) return;
    player.alive = false;
    sfx.hurt();
    playVoice("sad");   // 落下・被弾でやられたとき
    stopBGM();
    lives--;
    state = "dead";
    player.vy = -10; player.deadT = 0;
  }

  // ---------- 更新 ----------
  function update() {
    elapsed++;
    if (state === "play") updatePlay();
    else if (state === "boss") { updatePlay(); updateBossOnly(); }
    else if (state === "dead") updateDead();
    else if (state === "clear") { player.winPose++; }
    else if (state === "stageclear") {
      player.winPose++;
      stageClearT++;
      if (stageClearT > 150) advanceStage();   // 約2.5秒で自動的に次のステージへ
    }
    updateParticles();
  }

  function updatePlay() {
    const p = player;
    p.animT++;
    // 横入力（Bボタン/Shiftでダッシュ）
    const dashing = running();
    // Bボタン（ダッシュ）を押した瞬間：たねまるりんは種を発射
    if (dashing && !dashPrev) fireSeed();
    dashPrev = dashing;
    if (p.seedCool > 0) p.seedCool--;
    // 滑空の更新（ぷかぷか上下しながらゆっくり降下）
    if (p.gliding) {
      p.glideT++; p.glideTimer--;
      p.vy = Math.sin(p.glideT * 0.16) * 1.3 + 0.35;
      if (p.glideTimer <= 0) p.gliding = false;
    }
    const accel = dashing ? MOVE * 1.35 : MOVE;
    const maxSp = dashing ? 7.6 : MAX_SPEED;
    if (left())  { p.vx -= accel; p.face = -1; }
    if (right()) { p.vx += accel; p.face = 1; }
    if (!left() && !right()) p.vx *= FRICTION;
    p.vx = Math.max(-maxSp, Math.min(maxSp, p.vx));
    if (Math.abs(p.vx) < 0.05) p.vx = 0;

    // コヨーテタイム
    if (p.onGround) p.coyote = COYOTE; else if (p.coyote > 0) p.coyote--;

    // ジャンプ
    if (jumpBuffer > 0) jumpBuffer--;
    if (p.bounceLock > 0) p.bounceLock--;
    if (jumpKey()) {
      if (!jumpHeld) {
        jumpBuffer = 8;                     // 押した瞬間（踏みつけ高ジャンプの受付）
        if (p.coyote > 0) {
          p.vy = -JUMP; p.coyote = 0; p.squash = 0.7; sfx.jump();
          spawnParticles(p.x + p.w/2, p.y + p.h, "#ffffff", 4);
        } else if (p.wing && !p.onGround && !p.gliding && !p.glideUsed) {
          // はねまるりん：ジャンプ中にもう一度Aで、少しの間ぷかぷか飛ぶ
          p.gliding = true; p.glideUsed = true; p.glideTimer = 78; p.glideT = 0;
          p.vy = -1.6; sfx.jump();
          spawnParticles(p.x + p.w/2, p.y + p.h/2, "#ffffff", 6);
        }
      }
      jumpHeld = true;
    } else {
      // 可変ジャンプ高さ（ただし踏みつけ高ジャンプ中は維持）
      if (p.bounceLock <= 0 && p.vy < -5) p.vy = -5;
      jumpHeld = false;
    }

    if (p.invuln > 0) p.invuln--;
    p.squash += (1 - p.squash) * 0.2;

    moveAndCollide();

    // 着地したら滑空をリセット（次のジャンプでまた飛べる）
    if (p.onGround) { p.gliding = false; p.glideUsed = false; }

    // コイン
    for (const c of coins) {
      if (!c.got && rectHit(p, c)) {
        c.got = true; coinsGot++; score += 100; sfx.coin();
        spawnParticles(c.x + c.w/2, c.y, "#ffd34d", 6);
      }
    }

    // ナッツ（パワーアップ）
    if (p.powerAnim > 0) p.powerAnim--;
    for (const n of nuts) {
      if (!n.got && rectHit(p, n)) {
        n.got = true; score += 300; sfx.power(); playVoice("get");
        p.powerAnim = 40;
        if (!p.powered) setPowered(true);
        spawnParticles(n.x + n.w/2, n.y + n.h/2, "#c98a3a", 10);
        spawnParticles(n.x + n.w/2, n.y + n.h/2, "#ffd34d", 6);
      }
    }

    // ひまわり（たねまるりんにパワーアップ）
    for (const f of flowers) {
      if (!f.got && rectHit(p, f)) {
        f.got = true; score += 500; sfx.power(); playVoice("get");
        p.powerAnim = 40;
        if (!p.powered) setPowered(true);
        p.seed = true; p.wing = false; p.gliding = false;
        spawnParticles(f.x + f.w/2, f.y + f.h/2, "#ffd34d", 12);
        spawnParticles(f.x + f.w/2, f.y + f.h/2, "#8a5a2c", 6);
      }
    }

    // はね（はねまるりんにパワーアップ）
    for (const f of feathers) {
      if (!f.got && rectHit(p, f)) {
        f.got = true; score += 500; sfx.power(); playVoice("get");
        p.powerAnim = 40;
        if (!p.powered) setPowered(true);
        p.wing = true; p.seed = false;
        spawnParticles(f.x + f.w/2, f.y + f.h/2, "#ffffff", 12);
        spawnParticles(f.x + f.w/2, f.y + f.h/2, "#bfe3ff", 8);
      }
    }

    // あわバリア：ダメージを1回だけ防ぐシャボン玉（どのサイズでも重ねてつけられる）
    for (const bb of bubbles) {
      if (!bb.got && rectHit(p, bb)) {
        bb.got = true; score += 500; sfx.power(); playVoice("get");
        p.powerAnim = 40; p.shield = true; p.shieldT = 0;
        spawnParticles(bb.x + bb.w/2, bb.y + bb.h/2, "#bfe9ff", 12);
        spawnParticles(bb.x + bb.w/2, bb.y + bb.h/2, "#ffffff", 6);
      }
    }

    // フランスパン（1UP）：ブロックから出て歩き、取るとライフ+1
    for (const br of breads) {
      if (br.got) continue;
      br.t++;
      // 横移動＋壁で反転
      br.x += br.vx;
      for (const s of solids) {
        if (rectHit(br, s)) {
          if (br.vx > 0) br.x = s.x - br.w; else br.x = s.x + s.w;
          br.vx *= -1; break;
        }
      }
      // 重力＋床
      br.vy += GRAVITY; if (br.vy > 12) br.vy = 12;
      br.y += br.vy;
      for (const s of solids) {
        if (rectHit(br, s) && br.vy > 0) { br.y = s.y - br.h; br.vy = 0; }
      }
      // まるりんが取ったら1UP
      if (rectHit(p, br)) {
        br.got = true; lives++; score += 500; sfx.win(); playVoice("get");
        spawnParticles(br.x + br.w/2, br.y, "#e7b96a", 12);
        particles.push({ x: br.x + br.w/2, y: br.y - 8, vx: 0, vy: -3, life: 55, color: "#fff", oneUp: true });
      }
    }
    breads = breads.filter(br => !br.got && br.y < LEVEL_H + 120);

    // 種の飛び道具の更新
    for (const sd of seeds) {
      sd.t++;
      sd.x += sd.vx;
      sd.life--;
      const box = { x: sd.x - 5, y: sd.y - 5, w: 10, h: 10 };
      // 壁・ブロックに当たったら消える
      for (const s of solids) { if (rectHit(box, s)) { sd.life = 0; break; } }
      // 敵に当てたら倒す
      for (const e of enemies) {
        if (e.alive && rectHit(box, e)) {
          e.alive = false; e.squash = 0.2; score += 200; sfx.stomp();
          spawnParticles(e.x + e.w/2, e.y, "#8a6d5a", 8);
          sd.life = 0; break;
        }
      }
    }
    seeds = seeds.filter(sd => sd.life > 0 && sd.x > camX - 60 && sd.x < camX + W + 120);

    // 敵
    for (const e of enemies) {
      if (!e.alive) continue;
      e.t++;
      if (e.fly) {
        // カラス：空を左右に往復＋上下にフワフワ
        e.x += e.vx;
        if (e.x < e.homeX - e.range) { e.x = e.homeX - e.range; e.vx *= -1; }
        else if (e.x > e.homeX + e.range) { e.x = e.homeX + e.range; e.vx *= -1; }
        e.y = e.baseY + Math.sin(e.t * 0.06) * 22;
      } else {
        e.x += e.vx;
        // 敵の床判定（簡易）：ブロックに当たったら反転
        let hitWall = false, hasFloor = false;
        for (const s of solids) {
          if (rectHit({x:e.x,y:e.y,w:e.w,h:e.h}, s)) {
            if (e.vx > 0) { e.x = s.x - e.w; hitWall = true; }
            else if (e.vx < 0) { e.x = s.x + s.w; hitWall = true; }
          }
        }
        // 足元に床があるか（端で落ちないように反転）
        const footX = e.vx > 0 ? e.x + e.w + 2 : e.x - 2;
        const footProbe = { x: footX, y: e.y + e.h + 2, w: 2, h: 4 };
        for (const s of solids) { if (rectHit(footProbe, s)) { hasFloor = true; break; } }
        if (hitWall || !hasFloor) e.vx *= -1;
      }
      e.squash += (1 - e.squash) * 0.2;

      // プレイヤーとの衝突
      if (rectHit(p, e)) {
        const fromAbove = p.vy > 0 && (p.y + p.h) - e.y < 20;
        if (fromAbove) {
          e.alive = false; e.squash = 0.2;
          score += 200; sfx.stomp();
          // タイミングよくジャンプを押していれば高くジャンプ
          const timed = jumpKey() || jumpBuffer > 0;
          if (timed) {
            p.vy = -16; p.bounceLock = 14; jumpBuffer = 0; p.squash = 0.7;
            sfx.jump();
            spawnParticles(e.x + e.w/2, e.y - 6, "#ffffff", 6);
          } else {
            p.vy = -9;
          }
          spawnParticles(e.x + e.w/2, e.y, "#8a6d5a", 8);
        } else if (p.invuln <= 0) {
          hurtPlayer();
        }
      }
    }

    // ゴール
    if (goal && p.x + p.w > goal.x - 10 && p.x < goal.x + 20 && p.y < goal.top + TILE*7) {
      if (p.x + p.w/2 > goal.x - 6) { winGame(); }
    }

    // カメラ
    const target = p.x + p.w/2 - W/2;
    camX += (target - camX) * 0.12;
    camX = Math.max(0, Math.min(LEVEL_W - W, camX));
  }

  function hurtPlayer() {
    const p = player;
    if (p.shield) {
      // あわバリアがはじけてダメージを防ぐ（ミスにならない・パワーアップは維持）
      p.shield = false; p.invuln = 90; p.powerAnim = 0;
      sfx.hurt();
      p.vy = -5; p.vx = -p.face * 3;
      spawnParticles(p.x + p.w/2, p.y + p.h/2, "#bfe9ff", 16);
      spawnParticles(p.x + p.w/2, p.y + p.h/2, "#ffffff", 8);
      return;
    }
    if (p.seed || p.wing) {
      // たね／はねまるりん → でかまるりんに戻る（ミスにならない）
      p.seed = false; p.wing = false; p.gliding = false;
      p.invuln = 90; p.powerAnim = 0;
      sfx.hurt(); playVoice("sad");
      p.vy = -6; p.vx = -p.face * 3;
      return;
    }
    if (p.powered) {
      // でかまるりん → ちびまるりんに戻る（ミスにならない）
      setPowered(false);
      p.invuln = 90;
      p.powerAnim = 0;
      sfx.hurt();
      playVoice("sad");   // 敵に当たったとき
      p.vy = -6; p.vx = -p.face * 3;
      return;
    }
    killPlayer();
  }

  function updateDead() {
    player.deadT++;
    player.vy += GRAVITY;
    player.y += player.vy;
    if (player.deadT > 90) {
      if (lives > 0) respawn();
      else state = "gameover";
    }
  }

  function respawn() {
    // パワーアップは解除
    player.powered = false; player.seed = false; player.w = 28; player.h = 30; player.powerAnim = 0;
    player.wing = false; player.gliding = false; player.glideUsed = false; player.shield = false;
    player.vx = 0; player.vy = 0;
    player.alive = true; player.deadT = 0;
    seeds = [];
    if (inBoss) {
      // ボス戦をやり直し（ボスも体力満タンで復活）
      setupBossArena();
      startBGM();
      state = "boss";
      return;
    }
    // 通常：ステージを組み直して敵もアイテムも全部復活（プレイヤーも開始位置へ）
    buildLevel();
    player.invuln = 90;
    startBGM();
    state = "play";
  }

  function resetEnemies() {
    enemies = enemySpawns.map(s => makeEnemy(s.x, s.y, s));
  }

  // ゴール到達：ボスがいれば画面を切り替えてボス戦へ。いなければ従来どおりクリア
  function winGame() {
    if (state === "clear" || state === "stageclear" || state === "boss") return;
    if (STAGES[stageIndex].boss) { startBoss(); }
    else { stageCleared(); }
  }

  // ボス撃破 or ボス無しステージ：クリア処理
  function stageCleared() {
    inBoss = false; bosses = []; cukes = [];
    player.winPose = 0;
    score += Math.max(0, 2000 - Math.floor(elapsed / 3));
    stopBGM();
    sfx.win();
    playVoice("get");   // クリア時
    if (stageIndex < STAGES.length - 1) {
      state = "stageclear";     // まだ次のステージがある
      stageClearT = 0;
    } else {
      state = "clear";          // 全ステージクリア
    }
  }

  // ---------- ボス戦 ----------
  const BOSS_GROUND = 360;   // 闘技場の地面の上端

  // ボス登場時に出す名前
  function bossTitle() {
    const k = STAGES[stageIndex].boss;
    return k === "penguins" ? "ペギ＆ニセペギ" : k === "sumo" ? "こうよう" : k === "mega" ? "メガロドン" : "くりだいおう";
  }

  function startBoss() {
    inBoss = true;
    setupBossArena();
    state = "boss";
    startBGM();               // ボス戦BGMに切り替え（あれば）
  }

  // 1画面の平らな闘技場を作り、プレイヤーとボスを配置
  function setupBossArena() {
    LEVEL_W = W; LEVEL_H = H; camX = 0;
    solids = []; coins = []; nuts = []; flowers = []; feathers = []; breads = [];
    enemies = []; questionBlocks = []; seeds = []; goal = null; particles = []; cukes = [];
    for (let x = 0; x < W; x += TILE) {
      solids.push({ x, y: BOSS_GROUND, w: TILE, h: TILE, type: "ground" });
      solids.push({ x, y: BOSS_GROUND + TILE, w: TILE, h: TILE, type: "ground" });
    }
    const p = player;
    p.x = W/2 - p.w/2; p.y = BOSS_GROUND - p.h; p.vx = 0; p.vy = 0;
    p.onGround = false; p.face = 1; p.invuln = 50;
    p.gliding = false; p.glideUsed = false;
    // ステージごとのボス編成
    const type = STAGES[stageIndex].boss;
    if (type === "penguins") {
      // にせぺぎ（左・投げ役）＋ ペギ（右・すばやい体当たり役）で挟み撃ち
      bosses = [ makeBoss("nisepegi", 120), makeBoss("pegi", W - 170) ];
    } else if (type === "sumo") {
      bosses = [ makeBoss("sumo", W - 180) ];
    } else if (type === "mega") {
      bosses = [ makeBoss("mega", W - 200) ];
    } else {
      bosses = [ makeBoss("kuri", W - 170) ];
    }
    const bb = BOSS_BGM[stageIndex];
    if (bb) { try { bb.currentTime = 0; } catch (e) {} }   // ボス曲を頭出し
    elapsed = 0;
  }

  function makeBoss(kind, x) {
    if (kind === "pegi") {
      // ペギ：すばやい・よくジャンプ・キュウリは投げない
      return { kind, name: "ペギ", x, y: BOSS_GROUND - 56, w: 48, h: 56,
        vx: -1, vy: 0, onGround: false, face: -1,
        hp: 2, maxHp: 2, stompDmg: 1, seedDmg: 1, hpPerHeart: 1,
        invuln: 0, hurtFlash: 0, t: Math.random()*40, squash: 1,
        jumpCd: 50 + Math.floor(Math.random()*30), speedBase: 2.6, throws: false, alive: true, dyingT: 0 };
    }
    if (kind === "nisepegi") {
      // にせぺぎ：のんびり・ジャンプしない・キュウリを山なりに投げる
      return { kind, name: "にせぺぎ", x, y: BOSS_GROUND - 56, w: 48, h: 56,
        vx: 1, vy: 0, onGround: false, face: 1,
        hp: 2, maxHp: 2, stompDmg: 1, seedDmg: 1, hpPerHeart: 1,
        invuln: 0, hurtFlash: 0, t: Math.random()*40, squash: 1,
        jumpCd: 1e9, throwCd: 70 + Math.floor(Math.random()*40), throwBase: 80, speedBase: 1.0, throws: true, alive: true, dyingT: 0 };
    }
    if (kind === "mega") {
      // メガロドン（巨大ザメ）：海面バトル。もぐって突進かみつき＋水しぶきを飛ばす＋ときどき飛び出す。
      // 踏み6回（4ダメージ×6=24）またはたね8発（3ダメージ×8=24）で撃破。ハート6個表示。
      return { kind, name: "メガロドン", x, y: BOSS_GROUND - 72, w: 118, h: 72,
        vx: -1, vy: 0, onGround: false, face: -1,
        hp: 24, maxHp: 24, stompDmg: 4, seedDmg: 3, hpPerHeart: 4,
        invuln: 0, hurtFlash: 0, t: Math.random()*40, squash: 1,
        jumpCd: 150, throwCd: 80 + Math.floor(Math.random()*40), throwBase: 120,
        charges: true, chargeCd: 170 + Math.floor(Math.random()*70), charging: false, chargeT: 0, windup: 0,
        speedBase: 1.7, throws: true, alive: true, dyingT: 0 };
    }
    if (kind === "sumo") {
      // こうよう（子供力士）：ぶちかまし突進＋塩まき。踏み5回orたね5発で撃破
      return { kind, name: "こうよう", x, y: BOSS_GROUND - 66, w: 66, h: 66,
        vx: -1, vy: 0, onGround: false, face: -1,
        hp: 5, maxHp: 5, stompDmg: 1, seedDmg: 1, hpPerHeart: 1,
        invuln: 0, hurtFlash: 0, t: Math.random()*40, squash: 1,
        jumpCd: 1e9, throwCd: 90 + Math.floor(Math.random()*40), throwBase: 110,
        charges: true, chargeCd: 150 + Math.floor(Math.random()*60), charging: false, chargeT: 0, windup: 0,
        speedBase: 1.5, throws: true, alive: true, dyingT: 0 };
    }
    // クリだいおう（ステージ1）
    return { kind, name: "クリだいおう", x, y: BOSS_GROUND - 90, w: 96, h: 90,
      vx: -1.4, vy: 0, onGround: false, face: -1,
      hp: 15, maxHp: 15, stompDmg: 5, seedDmg: 3, hpPerHeart: 5,
      invuln: 0, hurtFlash: 0, t: Math.random()*40, squash: 1,
      jumpCd: 120, speedBase: 1.4, throws: false, alive: true, dyingT: 0 };
  }

  function damageBoss(b, seed) {
    b.hp -= seed ? b.seedDmg : b.stompDmg;
    b.invuln = seed ? 30 : 55;
    b.hurtFlash = b.invuln;
    b.squash = seed ? 0.8 : 0.6;
    sfx.stomp();
    const col = seed ? "#ffd34d" : (b.kind === "pegi" ? "#aed4e7" : (b.kind === "nisepegi" ? "#c8d27c" : (b.kind === "sumo" ? "#f6cfa4" : (b.kind === "mega" ? "#bfe1f0" : "#a56b3e"))));
    spawnParticles(b.x + b.w/2, b.y + b.h*0.3, col, seed ? 6 : 10);
    if (b.hp <= 0) {
      b.hp = 0; b.alive = false; b.dyingT = 0; b.vx = 0;
      score += 1000; sfx.win(); playVoice("get");
    } else {
      score += seed ? 100 : 300;
    }
  }

  // にせぺぎがキュウリを、こうようが塩を山なりに投げる
  function throwCuke(b) {
    const p = player;
    const dir = (p.x + p.w/2) < (b.x + b.w/2) ? -1 : 1;
    const water = b.kind === "mega";
    const salt = b.kind === "sumo";
    const kind = water ? "water" : (salt ? "salt" : "cuke");
    cukes.push({ x: b.x + b.w/2, y: b.y + (salt ? 4 : 8), vx: dir * (water ? 2.6 + Math.random()*1.4 : 3.2 + Math.random()*1.6), vy: water ? -9.2 : (salt ? -8.4 : -7.6), t: 0, kind });
    sfx.seed();
  }

  function updateCukes() {
    const p = player;
    for (const cu of cukes) {
      cu.t++;
      cu.vy += 0.42;                    // 山なりに落ちる
      cu.x += cu.vx; cu.y += cu.vy;
      const box = { x: cu.x - 10, y: cu.y - 6, w: 20, h: 12 };
      const puff = cu.kind === "salt" ? "#ffffff" : (cu.kind === "water" ? "#8fd0ee" : "#6cae3e");
      // 地面に落ちたら割れる
      for (const s of solids) { if (rectHit(box, s)) { cu.dead = true; spawnParticles(cu.x, cu.y, puff, 6); break; } }
      // たねで撃ち落とせる
      if (!cu.dead) for (const sd of seeds) {
        if (rectHit({ x: sd.x-5, y: sd.y-5, w: 10, h: 10 }, box)) { cu.dead = true; sd.life = 0; score += 50; sfx.stomp(); spawnParticles(cu.x, cu.y, cu.kind === "salt" ? "#ffffff" : (cu.kind === "water" ? "#8fd0ee" : "#8cc655"), 8); break; }
      }
      // プレイヤーに当たると被弾
      if (!cu.dead && rectHit(p, box) && p.invuln <= 0) { cu.dead = true; hurtPlayer(); }
      if (cu.y > LEVEL_H + 40 || cu.x < -40 || cu.x > LEVEL_W + 40) cu.dead = true;
    }
    cukes = cukes.filter(cu => !cu.dead);
  }

  function updateBossOnly() {
    const p = player;
    if (!bosses.length) return;

    for (const b of bosses) {
      b.t++;
      if (b.invuln > 0) b.invuln--;
      if (b.hurtFlash > 0) b.hurtFlash--;

      if (!b.alive) {
        // 撃破演出：つぶれて消える
        b.dyingT++;
        b.squash += (0.15 - b.squash) * 0.2;
        if (b.dyingT % 8 === 0) spawnParticles(b.x + b.w/2, b.y + b.h/2, "#ffd34d", 5);
        continue;
      }

      b.squash += (1 - b.squash) * 0.2;
      const phase = b.kind === "kuri" ? (b.hp <= 5 ? 2 : (b.hp <= 10 ? 1 : 0)) : 0;
      let speed = b.speedBase + phase * 0.7;
      // こうよう／メガロドン：構え（windup）→ 突進（charging）
      if (b.charges) {
        if (b.windup > 0) {
          b.windup--; speed = 0;                       // しこの構え中は止まる
        } else if (b.charging) {
          speed = 6.2; b.chargeT--;                     // 突進中は高速
          if (b.chargeT <= 0) { b.charging = false; b.chargeCd = 150 + Math.floor(Math.random()*90); }
        } else {
          b.chargeCd--;
          if (b.chargeCd <= 0 && b.onGround) {          // まるりんの方を向いて構える
            b.vx = (p.x + p.w/2 < b.x + b.w/2) ? -1 : 1;
            b.windup = 18; b.charging = true; b.chargeT = 46;
          }
        }
      }
      // 横移動＋壁で反転
      b.x += (b.vx > 0 ? 1 : -1) * speed;
      if (b.x < 16) { b.x = 16; b.vx = Math.abs(b.vx); }
      if (b.x + b.w > W - 16) { b.x = W - 16 - b.w; b.vx = -Math.abs(b.vx); }
      b.face = b.vx > 0 ? 1 : -1;
      // ジャンプ（にせぺぎはしない）
      const busy = b.charges && (b.charging || b.windup > 0);
      if (b.jumpCd < 1e8) {
        b.jumpCd--;
        if (b.onGround && b.jumpCd <= 0 && !busy) {
          b.vy = (b.kind === "pegi") ? -13.5 : (b.kind === "mega" ? -13.5 : (-12.5 - phase * 1.6));
          b.jumpCd = (b.kind === "pegi" ? 55 : (b.kind === "mega" ? 150 : 140 - phase * 30)) + Math.floor(Math.random()*30);
        }
      }
      // キュウリを投げる（にせぺぎ）／塩をまく（こうよう）／水しぶき（メガロドン）
      if (b.throws && b.onGround && !busy) {
        b.throwCd--;
        if (b.throwCd <= 0) { throwCuke(b); b.throwCd = (b.throwBase || 80) + Math.floor(Math.random()*50); }
      }
      // 重力＋床
      b.vy += GRAVITY; if (b.vy > 18) b.vy = 18;
      b.y += b.vy; b.onGround = false;
      for (const s of solids) {
        if (rectHit(b, s) && b.vy > 0 && (b.y + b.h) - s.y < 42) { b.y = s.y - b.h; b.vy = 0; b.onGround = true; }
      }
      // プレイヤーとの当たり（足がボスの上のほうにあれば踏みつけ。速い・小さいボスでも踏めるように寛容に）
      if (rectHit(p, b)) {
        const fromAbove = p.vy > 0 && (p.y + p.h) - b.y < b.h * 0.7 + Math.max(0, p.vy);
        if (fromAbove) {
          if (b.invuln <= 0) damageBoss(b, false);
          const timed = jumpKey() || jumpBuffer > 0;
          p.vy = timed ? -15 : -10; p.bounceLock = 12; jumpBuffer = 0; p.squash = 0.7;
          p.invuln = Math.max(p.invuln, 8);   // 踏んだ直後の誤爆被弾を防ぐ
        } else if (p.invuln <= 0) {
          hurtPlayer();
        }
      }
      // たね vs ボス
      if (b.invuln <= 0) {
        for (const sd of seeds) {
          if (rectHit({ x: sd.x - 5, y: sd.y - 5, w: 10, h: 10 }, b)) { damageBoss(b, true); sd.life = 0; break; }
        }
      }
    }

    // くっつき防止：生きてる2体が近すぎたら反転して離す
    const alive = bosses.filter(b => b.alive);
    if (alive.length === 2) {
      const [a, c] = alive;
      if (Math.abs((a.x + a.w/2) - (c.x + c.w/2)) < 90) {
        if (a.x < c.x) { a.vx = -Math.abs(a.vx); c.vx = Math.abs(c.vx); }
        else { a.vx = Math.abs(a.vx); c.vx = -Math.abs(c.vx); }
      }
    }

    updateCukes();

    // 全ボス撃破＆演出終了 → クリア
    if (bosses.every(b => !b.alive && b.dyingT > 90)) stageCleared();
  }

  // 次のステージへ（パワーアップ状態は引き継ぐ）
  function advanceStage() {
    const keepPowered = player.powered, keepSeed = player.seed, keepWing = player.wing;
    loadStage(stageIndex + 1);
    saveProgress(stageIndex);       // 新しいステージに到達したので記録
    buildLevel();
    if (keepPowered) setPowered(true);
    player.seed = keepSeed; player.wing = keepWing;
    stageBgm().currentTime = 0;
    startBGM();
    state = "play";
  }

  function updateParticles() {
    for (const pt of particles) {
      pt.x += pt.vx; pt.y += pt.vy; pt.vy += pt.coin ? 0.4 : 0.35; pt.life--;
    }
    particles = particles.filter(pt => pt.life > 0);
  }

  function resetGameAt(startIndex) {
    lives = 3; score = 0; coinsGot = 0;
    inBoss = false; bosses = []; cukes = [];
    loadStage(startIndex || 0);
    saveProgress(stageIndex);       // 今いるステージを記録
    buildLevel();
    stageBgm().currentTime = 0;
    startBGM();
    state = "play";
  }
  function resetGame() { resetGameAt(0); }

  // ---------- 描画 ----------
  function draw() {
    if (inBoss && STAGES[stageIndex].boss === "penguins") {
      // 駅構内（ボス戦）：やわらかい室内色
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#e2e9ef");
      g.addColorStop(1, "#eef2f6");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    } else if (inBoss && STAGES[stageIndex].boss === "sumo") {
      // 相撲場の館内（ボス戦）：あたたかい木の色
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#f0e2c6");
      g.addColorStop(1, "#f6ecd6");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    } else if (inBoss && STAGES[stageIndex].boss === "mega") {
      // 深海（メガロドン戦）：暗い青のグラデーション＋光のすじ
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#0b5a86");
      g.addColorStop(0.55, "#0a4266");
      g.addColorStop(1, "#062c47");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "rgba(160,220,255,0.10)";
      for (let i = 0; i < 5; i++) {
        const rx = 90 + i * 150 + Math.sin(elapsed * 0.01 + i) * 20;
        ctx.beginPath(); ctx.moveTo(rx, 0); ctx.lineTo(rx + 40, 0); ctx.lineTo(rx + 90, H); ctx.lineTo(rx + 40, H); ctx.closePath(); ctx.fill();
      }
    } else if (theme === "hawaii") {
      // 前半＝ビーチの空／後半＝海の中（カメラ位置でクロスフェード）
      const t = Math.max(0, Math.min(1, (camX + W/2 - 2720) / 620));
      let g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#4fb4ea");
      g.addColorStop(0.6, "#a9e0f5");
      g.addColorStop(1, "#eaf6fb");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      if (t < 0.92) drawClouds();
      if (t > 0) {
        ctx.save(); ctx.globalAlpha = t;
        const u = ctx.createLinearGradient(0, 0, 0, H);
        u.addColorStop(0, "#1a86b8");
        u.addColorStop(0.55, "#137aa8");
        u.addColorStop(1, "#0c5a82");
        ctx.fillStyle = u; ctx.fillRect(0, 0, W, H);
        // 光のすじ
        ctx.fillStyle = "rgba(200,240,255,0.12)";
        for (let i = 0; i < 4; i++) {
          const rx = 120 + i * 190 - (camX * 0.2) % 190;
          ctx.beginPath(); ctx.moveTo(rx, 0); ctx.lineTo(rx + 30, 0); ctx.lineTo(rx + 80, H); ctx.lineTo(rx + 50, H); ctx.closePath(); ctx.fill();
        }
        ctx.restore();
      }
    } else if (theme === "town") {
      // 街の空（少しやわらかい水色）
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#9fd8f2");
      g.addColorStop(0.55, "#cdeaf6");
      g.addColorStop(1, "#eef7fb");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      drawClouds();
      drawSkyline();
    } else if (theme === "narita") {
      // 成田：やわらかい青空＋緑の木立
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#8fcdf0");
      g.addColorStop(0.55, "#c6e7f4");
      g.addColorStop(1, "#eaf6ef");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      drawClouds();
      drawHills();
    } else {
      // 空グラデーション（くさはら）
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#8fd3ff");
      g.addColorStop(0.6, "#bfe9ff");
      g.addColorStop(1, "#e8f8ff");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      drawClouds();
      drawHills();
    }

    ctx.save();
    ctx.translate(-Math.round(camX), 0);

    if (inBoss) drawBossBackdrop();
    else if (theme === "town") drawTownDecor();
    else if (theme === "narita") drawNaritaDecor();
    else if (theme === "hawaii") drawHawaiiDecor();
    drawSolids();
    drawCoins();
    drawNuts();
    drawFlowers();
    drawFeathers();
    drawBubbles();
    drawBreads();
    if (goal) drawGoal(goal);
    drawSeeds();
    drawEnemies();
    if (bosses.length) drawBosses();
    drawCukes();
    drawParticles();
    if (state !== "gameover") drawPlayer();

    ctx.restore();

    drawHUD();

    if (state === "pause")      drawCenterText("ポーズ中", "Pキーで再開");
    if (state === "gameover")   drawGameOver();
    if (state === "clear")      drawClear();
    if (state === "stageclear") drawStageClear();
  }

  function drawClouds() {
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    const cs = [[120,70,40],[360,110,55],[620,60,46],[520,150,38],[730,120,50]];
    for (const [bx,by,r] of cs) {
      const x = (bx - camX*0.3) % (W+300);
      const px = x < -150 ? x + W + 300 : x;
      cloud(px, by, r);
    }
  }
  function cloud(x, y, r) {
    ctx.beginPath();
    ctx.arc(x, y, r*0.6, 0, 7); ctx.arc(x+r*0.6, y+6, r*0.5, 0, 7);
    ctx.arc(x-r*0.6, y+8, r*0.45, 0, 7); ctx.arc(x+r*0.2, y-r*0.3, r*0.5, 0, 7);
    ctx.fill();
  }
  function drawHills() {
    ctx.fillStyle = "#7ec850";
    for (let i = -1; i < 8; i++) {
      const x = i*220 - (camX*0.5) % 220;
      ctx.beginPath();
      ctx.ellipse(x+110, H-60, 150, 90, 0, Math.PI, 0);
      ctx.fill();
    }
  }

  // ===== ステージ2：南流山の街 =====
  const GROUND_Y = 360; // 地面の上端

  // 遠くのビル群（パララックス）
  function drawSkyline() {
    const cols = ["#b9c6d6", "#c7d3e0", "#aeb9c9"];
    for (let i = -1; i < 12; i++) {
      const bw = 92;
      let x = i*140 - (camX*0.4) % 140;
      const h = 90 + ((i*53) % 60 + 60) % 60;
      ctx.fillStyle = cols[((i%3)+3)%3];
      ctx.fillRect(x, GROUND_Y - h, bw, h);
      ctx.fillStyle = "rgba(255,255,255,0.35)";
      for (let wy = GROUND_Y - h + 12; wy < GROUND_Y - 10; wy += 18)
        for (let wx = x + 8; wx < x + bw - 10; wx += 18)
          ctx.fillRect(wx, wy, 8, 10);
    }
  }

  // 看板付きの建物（ヤオコー・コーナンなど）
  function signBuilding(x, w, h, wall, roof, label, bg, fg) {
    const top = GROUND_Y - h;
    ctx.fillStyle = wall; ctx.fillRect(x, top, w, h);
    ctx.fillStyle = roof; ctx.fillRect(x, top, w, 12);
    // 入口
    ctx.fillStyle = "rgba(120,150,180,0.55)";
    ctx.fillRect(x + w/2 - 26, GROUND_Y - 52, 52, 52);
    // 窓
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    for (let wy = top + 22; wy < GROUND_Y - 60; wy += 24)
      for (let wx = x + 12; wx < x + w - 16; wx += 26)
        ctx.fillRect(wx, wy, 16, 16);
    // 看板
    ctx.font = "bold 17px 'Segoe UI', sans-serif";
    const sw = Math.max(80, ctx.measureText(label).width + 28);
    const sx = x + (w - sw)/2, sy = top - 32;
    ctx.fillStyle = bg; ctx.fillRect(sx, sy, sw, 28);
    ctx.strokeStyle = "rgba(0,0,0,0.15)"; ctx.strokeRect(sx + 0.5, sy + 0.5, sw - 1, 27);
    ctx.fillStyle = fg; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(label, x + w/2, sy + 14);
  }

  function sevenEleven(x) {
    const w = 200, h = 138, top = GROUND_Y - h;
    ctx.fillStyle = "#f4f4f4"; ctx.fillRect(x, top, w, h);
    ctx.fillStyle = "rgba(150,190,210,0.6)"; ctx.fillRect(x + 14, GROUND_Y - 72, w - 28, 72);
    // 看板（白地・オレンジ/緑/赤の帯）
    const sw = 184, sx = x + (w - sw)/2, sy = top - 36, sh = 32;
    ctx.fillStyle = "#fff"; ctx.fillRect(sx, sy, sw, sh);
    ctx.fillStyle = "#e7541f"; ctx.fillRect(sx, sy, sw, 5);
    ctx.fillStyle = "#159a4a"; ctx.fillRect(sx, sy + sh - 10, sw, 5);
    ctx.fillStyle = "#d3202a"; ctx.fillRect(sx, sy + sh - 5, sw, 5);
    ctx.font = "bold 17px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillStyle = "#e7541f"; ctx.fillText("7", sx + 24, sy + 15);
    ctx.fillStyle = "#159a4a"; ctx.fillText("ELEVEN", sx + sw/2 + 12, sy + 15);
  }

  function bus(x, baseY) {
    ctx.fillStyle = "#4a9d5b"; ctx.fillRect(x, baseY - 34, 78, 34);
    ctx.fillStyle = "#dff0e2";
    ctx.fillRect(x + 6, baseY - 26, 60, 12);
    ctx.fillStyle = "#2b2b2b";
    ctx.beginPath(); ctx.arc(x + 18, baseY, 7, 0, 7); ctx.arc(x + 60, baseY, 7, 0, 7); ctx.fill();
  }
  function taxi(x, baseY) {
    ctx.fillStyle = "#f2c200"; ctx.fillRect(x, baseY - 24, 62, 24);
    ctx.fillStyle = "#f2c200"; ctx.fillRect(x + 12, baseY - 36, 38, 14);
    ctx.fillStyle = "#bfe0f0"; ctx.fillRect(x + 15, baseY - 33, 32, 10);
    ctx.fillStyle = "#333"; ctx.fillRect(x + 22, baseY - 40, 18, 5); // 行灯
    ctx.fillStyle = "#2b2b2b";
    ctx.beginPath(); ctx.arc(x + 15, baseY, 6, 0, 7); ctx.arc(x + 48, baseY, 6, 0, 7); ctx.fill();
  }
  function rotary(x) {
    // 舗装
    ctx.fillStyle = "#c9cdd3"; ctx.fillRect(x - 10, GROUND_Y - 6, 330, 6);
    // 案内サイン
    ctx.fillStyle = "#1c66b0"; ctx.fillRect(x + 60, GROUND_Y - 120, 8, 120);
    ctx.fillStyle = "#1c66b0"; ctx.fillRect(x + 18, GROUND_Y - 126, 132, 28);
    ctx.fillStyle = "#fff"; ctx.font = "bold 14px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("駅前ロータリー", x + 84, GROUND_Y - 112);
    bus(x + 20, GROUND_Y - 6);
    taxi(x + 230, GROUND_Y - 6);
  }

  // つくばエクスプレスの電車
  function txTrain(x) {
    const w = 250, top = GROUND_Y - 88;
    ctx.fillStyle = "#d7dbe0"; ctx.fillRect(x - 10, GROUND_Y - 12, w + 20, 12); // ホーム
    ctx.fillStyle = "#f5f6f8"; ctx.fillRect(x, top, w, 76);
    ctx.strokeStyle = "#c2c7cd"; ctx.strokeRect(x + 0.5, top + 0.5, w - 1, 75);
    ctx.fillStyle = "#e11f2e"; ctx.fillRect(x, top + 42, w, 8);  // 赤帯
    ctx.fillStyle = "#1b62c4"; ctx.fillRect(x, top + 50, w, 4);  // 青帯
    ctx.fillStyle = "#2b3a4a";
    for (let i = 0; i < 5; i++) ctx.fillRect(x + 16 + i*46, top + 14, 34, 20); // 窓
    ctx.fillStyle = "#c9d2da"; ctx.fillRect(x + w/2 - 12, top + 12, 24, 60);   // ドア
    ctx.fillStyle = "#e11f2e"; ctx.font = "bold 15px 'Segoe UI', sans-serif"; ctx.textAlign = "left"; ctx.textBaseline = "middle";
    ctx.fillText("TX", x + 10, top + 63);
    ctx.fillStyle = "#444"; ctx.font = "11px 'Segoe UI', sans-serif";
    ctx.fillText("つくばエクスプレス", x + 36, top + 64);
  }

  // 駅名標「南流山」
  function stationSign(x) {
    const w = 186, h = 56, top = GROUND_Y - 150;
    ctx.fillStyle = "#8a9099"; ctx.fillRect(x + 20, top + h, 6, GROUND_Y - (top + h));
    ctx.fillStyle = "#8a9099"; ctx.fillRect(x + w - 26, top + h, 6, GROUND_Y - (top + h));
    ctx.fillStyle = "#fff"; ctx.fillRect(x, top, w, h);
    ctx.strokeStyle = "#333"; ctx.strokeRect(x + 0.5, top + 0.5, w - 1, h - 1);
    ctx.fillStyle = "#e11f2e"; ctx.fillRect(x, top, w, 8); // TXライン色
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillStyle = "#111"; ctx.font = "bold 21px 'Segoe UI', sans-serif";
    ctx.fillText("南流山", x + w/2, top + 28);
    ctx.fillStyle = "#444"; ctx.font = "11px 'Segoe UI', sans-serif";
    ctx.fillText("Minami-nagareyama", x + w/2, top + 46);
    ctx.fillStyle = "#666"; ctx.font = "10px sans-serif";
    ctx.textAlign = "left";  ctx.fillText("← 流山セントラルパーク", x + 4, top + h + 11);
    ctx.textAlign = "right"; ctx.fillText("三郷中央 →", x + w - 4, top + h + 11);
  }

  function drawTownDecor() {
    const Lc = camX - 360, R = camX + W + 80;
    const put = (x, fn) => { if (x > Lc && x < R) fn(); };
    put(700,  () => sevenEleven(700));
    put(1800, () => signBuilding(1800, 220, 150, "#f2f2f2", "#e0342f", "ヤオコー", "#e0342f", "#fff"));
    put(2700, () => signBuilding(2700, 230, 160, "#eef0f2", "#f07a1a", "コーナン", "#f07a1a", "#fff"));
    put(3700, () => rotary(3700));
    put(4600, () => txTrain(4600));
    put(5300, () => stationSign(5300));
  }

  // ===== ひまわり（たねまるりんアイテム）=====
  function drawFlowers() {
    for (const f of flowers) {
      if (f.got) continue;
      if (f.x + f.w < camX - 40 || f.x > camX + W + 40) continue;
      f.t += 0.08;
      const cx = f.x + f.w/2, cy = f.y + f.h/2 + Math.sin(f.t)*3;
      ctx.save();
      ctx.globalAlpha = 0.5 + Math.abs(Math.sin(f.t))*0.3;
      ctx.fillStyle = "#fff6c0";
      ctx.beginPath(); ctx.arc(cx, cy, f.w/2 + 2, 0, 7); ctx.fill();
      ctx.restore();
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(Math.sin(f.t*0.5)*0.12);
      ctx.fillStyle = "#ffcf33";
      for (let i = 0; i < 10; i++) {
        ctx.save(); ctx.rotate(i*Math.PI/5);
        ctx.beginPath(); ctx.ellipse(0, -13, 4, 8, 0, 0, 7); ctx.fill();
        ctx.restore();
      }
      ctx.fillStyle = "#7a4a20"; ctx.beginPath(); ctx.arc(0, 0, 8, 0, 7); ctx.fill();
      ctx.fillStyle = "#5a3414";
      for (let i = 0; i < 6; i++) { const a = i*1.05; ctx.beginPath(); ctx.arc(Math.cos(a)*3, Math.sin(a)*3, 1.3, 0, 7); ctx.fill(); }
      ctx.restore();
    }
  }

  // ===== 種の飛び道具 =====
  function drawSeeds() {
    for (const sd of seeds) {
      ctx.save();
      ctx.translate(sd.x, sd.y);
      ctx.rotate(sd.t * 0.5);
      ctx.fillStyle = "#3a2b1a";
      ctx.beginPath(); ctx.ellipse(0, 0, 4.5, 6.5, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#d9c9a0";
      ctx.beginPath(); ctx.ellipse(-1, -1, 1.6, 3, 0, 0, 7); ctx.fill();
      ctx.restore();
    }
  }

  function drawSolids() {
    for (const s of solids) {
      if (s.x + s.w < camX - 40 || s.x > camX + W + 40) continue;
      if (s.type === "ground" && inBoss && STAGES[stageIndex].boss === "mega") {
        // メガロドン戦：地面は木のいかだ（デッキ）
        const topEdge = !isSolidAt(s.x, s.y - TILE);
        ctx.fillStyle = "#8a5e34"; ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.fillStyle = "#7a4f2b";
        for (let py = s.y + 4; py < s.y + s.h; py += 12) ctx.fillRect(s.x, py, s.w, 2);   // 板の目
        ctx.strokeStyle = "rgba(60,40,20,0.35)"; ctx.lineWidth = 1;
        ctx.strokeRect(s.x + 0.5, s.y + 0.5, s.w - 1, s.h - 1);
        if (topEdge) { ctx.fillStyle = "#a5794a"; ctx.fillRect(s.x, s.y, s.w, 5); }
      } else if (s.type === "ground" && theme === "hawaii") {
        // ハワイ：砂浜／海底の砂
        const underwater = s.x + s.w/2 > 3000;
        ctx.fillStyle = underwater ? "#d8c48c" : "#e8d49c";
        ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.fillStyle = underwater ? "#cbb87f" : "#dcc88c";           // 砂つぶ
        for (let i=0;i<3;i++) for(let j=0;j<3;j++) ctx.fillRect(s.x+4+i*13, s.y+13+j*10, 6, 4);
        if (!isSolidAt(s.x, s.y - TILE)) {
          ctx.fillStyle = underwater ? "#e4d4a2" : "#f3e6bd"; ctx.fillRect(s.x, s.y, s.w, 6);
        }
      } else if (s.type === "ground") {
        // 土＋草
        ctx.fillStyle = "#7a4a24";
        ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.fillStyle = "#8a5a2c";
        for (let i=0;i<3;i++) for(let j=0;j<3;j++){
          ctx.fillRect(s.x+3+i*13, s.y+13+j*10, 8, 6);
        }
        if (!isSolidAt(s.x, s.y - TILE)) {
          ctx.fillStyle = "#57b83a"; ctx.fillRect(s.x, s.y, s.w, 10);
          ctx.fillStyle = "#66cc44"; ctx.fillRect(s.x, s.y, s.w, 5);
        }
      } else if (s.type === "brick") {
        ctx.fillStyle = "#b5651d"; ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.fillStyle = "#8a4a12";
        ctx.fillRect(s.x, s.y+TILE/2-1, s.w, 2);
        ctx.fillRect(s.x+TILE/2-1, s.y, 2, TILE/2);
        ctx.fillRect(s.x+TILE/4-1, s.y+TILE/2, 2, TILE/2);
        ctx.fillRect(s.x+3*TILE/4-1, s.y+TILE/2, 2, TILE/2);
        ctx.strokeStyle = "rgba(0,0,0,.15)"; ctx.strokeRect(s.x+0.5, s.y+0.5, s.w-1, s.h-1);
      } else if (s.type === "question") {
        const t = Math.sin(elapsed*0.12)*2;
        ctx.fillStyle = "#e8a92a"; ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.fillStyle = "#f7c948"; ctx.fillRect(s.x+3, s.y+3, s.w-6, s.h-6);
        ctx.fillStyle = "#7a5a12";
        ctx.font = "bold 24px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.fillText("?", s.x+TILE/2, s.y+TILE/2 + t*0.5);
        // 角の鋲
        ctx.fillStyle="#7a5a12";
        [[6,6],[TILE-8,6],[6,TILE-8],[TILE-8,TILE-8]].forEach(([dx,dy])=>ctx.fillRect(s.x+dx,s.y+dy,3,3));
      }
    }
  }
  function isSolidAt(x, y) {
    for (const s of solids) if (x >= s.x && x < s.x+s.w && y >= s.y && y < s.y+s.h) return true;
    return false;
  }

  function drawCoins() {
    for (const c of coins) {
      if (c.got) continue;
      c.t += 0.1;
      const wob = Math.abs(Math.cos(c.t)) ;
      const cx = c.x + c.w/2, cy = c.y + c.h/2;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(0.3 + 0.7*wob, 1);
      ctx.fillStyle = "#ffcf33";
      ctx.beginPath(); ctx.arc(0,0,c.w/2,0,7); ctx.fill();
      ctx.fillStyle = "#ffe58a";
      ctx.beginPath(); ctx.arc(0,0,c.w/2-4,0,7); ctx.fill();
      ctx.strokeStyle = "#e0a800"; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(0,0,c.w/2-2,0,7); ctx.stroke();
      ctx.restore();
    }
  }

  function drawNuts() {
    for (const n of nuts) {
      if (n.got) continue;
      if (n.x + n.w < camX - 40 || n.x > camX + W + 40) continue;
      n.t += 0.08;
      const cx = n.x + n.w/2, cy = n.y + n.h/2 + Math.sin(n.t)*3;
      // きらめき台座
      ctx.save();
      ctx.globalAlpha = 0.5 + Math.abs(Math.sin(n.t))*0.3;
      ctx.fillStyle = "#fff6c0";
      ctx.beginPath(); ctx.arc(cx, cy, n.w/2 + 3, 0, 7); ctx.fill();
      ctx.restore();
      // どんぐり（ナッツ）本体
      ctx.save();
      ctx.translate(cx, cy);
      // 実
      ctx.fillStyle = "#d69a52";
      ctx.beginPath(); ctx.ellipse(0, 3, 9, 11, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#e8b370";
      ctx.beginPath(); ctx.ellipse(-2, 2, 5, 7, 0, 0, 7); ctx.fill();
      // 帽子
      ctx.fillStyle = "#8a5a2c";
      ctx.beginPath(); ctx.ellipse(0, -6, 10, 5, 0, 0, 7); ctx.fill();
      ctx.fillStyle = "#6f4620";
      ctx.beginPath(); ctx.arc(0, -10, 2, 0, 7); ctx.fill();
      ctx.fillRect(-1.2, -13, 2.4, 4);
      // 帽子の網目
      ctx.strokeStyle = "#6f4620"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(-8,-6); ctx.lineTo(8,-6);
      ctx.moveTo(-6,-4); ctx.lineTo(6,-4); ctx.stroke();
      ctx.restore();
    }
  }

  function drawGoal(gl) {
    if (theme === "town") { drawGate(gl); return; }
    if (theme === "narita") { drawAirport(gl); return; }
    if (theme === "hawaii") { drawHawaiiGoal(gl); return; }
    const x = gl.x;
    // ポール
    ctx.fillStyle = "#cfcfcf"; ctx.fillRect(x-3, gl.top, 6, TILE*6);
    ctx.fillStyle = "#ffd34d";
    ctx.beginPath(); ctx.arc(x, gl.top, 8, 0, 7); ctx.fill();
    // 旗
    const wave = Math.sin(elapsed*0.15)*4;
    ctx.fillStyle = "#e94560";
    ctx.beginPath();
    ctx.moveTo(x+3, gl.top+8);
    ctx.lineTo(x+52+wave, gl.top+22);
    ctx.lineTo(x+3, gl.top+36);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle="#fff"; ctx.font="bold 16px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("G", x+22, gl.top+22);
    // 台座
    ctx.fillStyle="#5a8f3a";
    ctx.fillRect(x-TILE, gl.top+TILE*6, TILE*2, TILE);
  }

  // ゴール：南流山駅の改札
  function drawGate(gl) {
    const x = gl.x;
    // 駅舎の壁
    ctx.fillStyle = "#ece6d8"; ctx.fillRect(x - 44, gl.top + 42, 190, GROUND_Y - (gl.top + 42));
    // 屋根・駅名看板
    ctx.fillStyle = "#3777bd"; ctx.fillRect(x - 54, gl.top + 14, 210, 36);
    ctx.fillStyle = "#fff"; ctx.font = "bold 19px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("南流山駅", x + 50, gl.top + 32);
    // 「改札口→」表示
    const chY = GROUND_Y - 74;
    ctx.fillStyle = "#2f7d32"; ctx.fillRect(x - 16, chY - 28, 104, 22);
    ctx.fillStyle = "#fff"; ctx.font = "bold 14px 'Segoe UI', sans-serif";
    ctx.fillText("改札口 →", x + 36, chY - 17);
    // 改札機 2台
    for (let i = 0; i < 2; i++) {
      const gx = x - 6 + i*72;
      ctx.fillStyle = "#dfe3e6"; ctx.fillRect(gx, chY, 28, 74);
      ctx.fillStyle = "#f2c200"; ctx.fillRect(gx, chY, 28, 10);       // 黄色い天面
      ctx.fillStyle = "#33aa55"; ctx.fillRect(gx + 5, chY + 20, 18, 9); // 通れる緑ランプ
      ctx.fillStyle = "#2b6cb0"; ctx.fillRect(gx + 6, chY + 36, 16, 22); // 読み取り部
    }
  }

  // ===== ステージ3：成田 =====
  function drawNaritaDecor() {
    const Lc = camX - 460, R = camX + W + 80;
    const put = (x, fn) => { if (x > Lc && x < R) fn(); };
    put(300,  () => naritaStation(300));
    put(1700, () => pagoda(1700));
    put(3100, () => signBuilding(3100, 240, 150, "#f4eef4", "#e5007e", "イオン成田", "#e5007e", "#fff"));
    put(4500, () => airportRoadSign(4500));
  }

  // 成田駅
  function naritaStation(x) {
    const w = 210, h = 132, top = GROUND_Y - h;
    ctx.fillStyle = "#e8ddc8"; ctx.fillRect(x, top, w, h);            // 壁
    ctx.fillStyle = "#7a5230"; ctx.fillRect(x - 6, top - 14, w + 12, 18); // 屋根
    ctx.fillStyle = "rgba(120,140,160,0.5)"; ctx.fillRect(x + w/2 - 34, GROUND_Y - 60, 68, 60); // 入口
    ctx.fillStyle = "rgba(255,255,255,0.55)";
    for (let wy = top + 20; wy < GROUND_Y - 66; wy += 24)
      for (let wx = x + 14; wx < x + w - 18; wx += 30)
        ctx.fillRect(wx, wy, 20, 16);
    const sw = 128, sx = x + (w - sw)/2, sy = top - 46;
    ctx.fillStyle = "#0a5c3a"; ctx.fillRect(sx, sy, sw, 30);          // 駅名看板（JR系グリーン）
    ctx.fillStyle = "#fff"; ctx.font = "bold 19px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("成田駅", x + w/2, sy + 15);
  }

  // 成田山 三重塔（朱塗り）
  function pagoda(x) {
    const cx = x + 60, baseY = GROUND_Y;
    ctx.fillStyle = "#cfc4a8"; ctx.fillRect(x + 22, baseY - 12, 76, 12); // 基壇
    const tiers = [
      { roofW: 96, bodyW: 36, bodyTop: baseY - 60, bodyH: 48 }, // 下層
      { roofW: 78, bodyW: 30, bodyTop: baseY - 104, bodyH: 44 }, // 中層
      { roofW: 62, bodyW: 24, bodyTop: baseY - 146, bodyH: 42 }  // 上層
    ];
    for (let i = 2; i >= 0; i--) {  // 上から描いて下の屋根を手前に
      const t = tiers[i], ry = t.bodyTop;
      ctx.fillStyle = "#c0392b"; ctx.fillRect(cx - t.bodyW/2, t.bodyTop, t.bodyW, t.bodyH); // 胴
      ctx.fillStyle = "#9e2f24"; ctx.fillRect(cx - t.bodyW/2, t.bodyTop, 4, t.bodyH);        // 柱の陰
      ctx.fillStyle = "#7a2f25";                                                              // 屋根
      ctx.beginPath();
      ctx.moveTo(cx - t.roofW/2, ry + 10);
      ctx.quadraticCurveTo(cx - t.roofW/2 - 4, ry - 4, cx - t.roofW/2 + 10, ry - 6);
      ctx.lineTo(cx + t.roofW/2 - 10, ry - 6);
      ctx.quadraticCurveTo(cx + t.roofW/2 + 4, ry - 4, cx + t.roofW/2, ry + 10);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#efe6cf"; ctx.fillRect(cx - t.roofW/2 + 6, ry + 7, t.roofW - 12, 3);  // 軒先の白
    }
    const topY = tiers[2].bodyTop;                 // 相輪（金）
    ctx.strokeStyle = "#d4af37"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(cx, topY - 6); ctx.lineTo(cx, topY - 30); ctx.stroke();
    ctx.fillStyle = "#d4af37"; ctx.beginPath(); ctx.arc(cx, topY - 32, 3, 0, 7); ctx.fill();
    ctx.fillStyle = "#5b3a1a"; ctx.fillRect(x + 32, baseY - 13, 56, 15);   // 立て札
    ctx.fillStyle = "#fff"; ctx.font = "9px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("成田山 三重塔", x + 60, baseY - 6);
  }

  // 「成田空港 →」の道路案内標識
  function airportRoadSign(x) {
    ctx.fillStyle = "#8a9099"; ctx.fillRect(x + 40, GROUND_Y - 120, 8, 120);
    ctx.fillStyle = "#1b7a3a"; ctx.fillRect(x - 6, GROUND_Y - 134, 140, 34);
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.strokeRect(x - 4, GROUND_Y - 132, 136, 30);
    ctx.fillStyle = "#fff"; ctx.font = "bold 15px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("成田空港 ✈ →", x + 64, GROUND_Y - 117);
  }

  // ゴール：成田空港
  function drawAirport(gl) {
    const x = gl.x;
    const tw = 230, th = 122, top = GROUND_Y - th;
    ctx.fillStyle = "#eef2f6"; ctx.fillRect(x - 44, top, tw, th);      // ターミナル
    ctx.fillStyle = "#cdd7e0"; ctx.fillRect(x - 44, top, tw, 16);      // 屋根
    ctx.fillStyle = "#8fc4e6";                                         // ガラス張りの窓
    for (let wy = top + 26; wy < GROUND_Y - 18; wy += 22)
      ctx.fillRect(x - 34, wy, tw - 20, 14);
    ctx.fillStyle = "#dfe6ec"; ctx.fillRect(x + tw - 78, top - 70, 16, 70); // 管制塔
    ctx.fillStyle = "#3a4652"; ctx.fillRect(x + tw - 86, top - 84, 32, 18);
    ctx.fillStyle = "#8fc4e6"; ctx.fillRect(x + tw - 82, top - 80, 24, 8);
    const sw = 200, sx = x - 30, sy = top - 48;                        // 看板
    ctx.fillStyle = "#0a2e6b"; ctx.fillRect(sx, sy, sw, 36);
    ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "bold 18px 'Segoe UI', sans-serif"; ctx.fillText("✈ 成田空港", sx + sw/2, sy + 13);
    ctx.font = "9px 'Segoe UI', sans-serif"; ctx.fillText("NARITA AIRPORT", sx + sw/2, sy + 27);
    const py = top - 46 + Math.sin(elapsed*0.05)*6;                    // 飛行機（ふわふわ）
    drawPlane(x + 46, py);
    // ゴールのぼり
    const wave = Math.sin(elapsed*0.15)*4;
    ctx.fillStyle = "#cfcfcf"; ctx.fillRect(x - 3, gl.top, 6, TILE*3);
    ctx.fillStyle = "#e94560";
    ctx.beginPath();
    ctx.moveTo(x + 3, gl.top); ctx.lineTo(x + 48 + wave, gl.top + 13); ctx.lineTo(x + 3, gl.top + 26);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.font = "bold 14px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("G", x + 20, gl.top + 13);
  }

  function drawPlane(x, y) {
    ctx.save(); ctx.translate(x, y);
    ctx.fillStyle = "#ffffff";
    ctx.beginPath(); ctx.ellipse(0, 0, 34, 9, 0, 0, 7); ctx.fill();     // 胴体
